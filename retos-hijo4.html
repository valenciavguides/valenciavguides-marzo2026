    <script>
    /* Escalado proporcional PURO: sincronizar con viewport del padre SIN LÍMITES */
    (function(){
        function escalar(){
            var w, h;
            try { w = (window.top || window.parent).innerWidth; h = (window.top || window.parent).innerHeight; }
            catch(e) { w = window.innerWidth; h = window.innerHeight; }
            var f = Math.min(w, h) * 0.025; // Sin límites - proporcional puro
            document.documentElement.style.fontSize = f + "px";
        }
        escalar();
        window.addEventListener("resize", escalar);
    })();
    </script>

    <script type="module">
    /* --- Integración con Sistema de Mensajería --- */
    
    import { getEnviarMensaje, getRegistrarControlador, getEnviarMensajeConConfirmacion } from './js/utils.js';
    import { retryUntilAvailable } from './js/utils.js';

    // Fallbacks que esperan a que window.mensajeria esté disponible
    const enviarMensaje = async (...args) => {
        // En hijos, usar postMessage directamente al padre
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            try {
                window.parent.postMessage({
                    tipo: mensaje.tipo,
                    origen: mensaje.origen || 'hijo4',
                    destino: mensaje.destino,
                    datos: mensaje.datos,
                    timestamp: Date.now()
                }, window.location.origin);
                return Promise.resolve();
            } catch (e) {
                console.error('[hijo4] Error enviando mensaje via postMessage:', e);
                return Promise.reject(e);
            }
        } else {
            // Fallback al método anterior si no estamos en iframe
            return await retryUntilAvailable(
                () => window.mensajeria.enviarMensaje(...args),
                () => window.mensajeria && window.mensajeria.enviarMensaje,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    const registrarControlador = async (tipo, callback) => {
        // En hijos, los controladores se registran localmente para mensajes del padre
        if (window.parent && window.parent !== window) {
            // Registrar listener para mensajes del padre
            const listener = (event) => {
                if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                    callback(event.data);
                }
            };
            window.addEventListener('message', listener);
            return Promise.resolve(() => window.removeEventListener('message', listener));
        } else {
            // Fallback al método anterior
            return await retryUntilAvailable(
                () => window.mensajeria.registrarControlador(tipo, callback),
                () => window.mensajeria && window.mensajeria.registrarControlador,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    const enviarMensajeConConfirmacion = async (...args) => {
        // Similar a enviarMensaje pero esperando confirmación
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error('Timeout esperando confirmación')), 
                    window.ajustarTimeoutPorConexion ? window.ajustarTimeoutPorConexion(5000) : 5000);
                
                const confirmListener = (event) => {
                    if (event.source === window.parent && event.data && event.data.tipo === 'SISTEMA.CONFIRMACION') {
                        clearTimeout(timeout);
                        window.removeEventListener('message', confirmListener);
                        resolve();
                    }
                };
                
                window.addEventListener('message', confirmListener);
                
                try {
                    window.parent.postMessage({
                        tipo: mensaje.tipo,
                        origen: mensaje.origen || 'hijo4',
                        destino: mensaje.destino,
                        datos: mensaje.datos,
                        timestamp: Date.now(),
                        requiereConfirmacion: true
                    }, window.location.origin);
                } catch (e) {
                    clearTimeout(timeout);
                    window.removeEventListener('message', confirmListener);
                    reject(e);
                }
            });
        } else {
            return await retryUntilAvailable(
                () => window.mensajeria.enviarMensajeConConfirmacion(...args),
                () => window.mensajeria && window.mensajeria.enviarMensajeConConfirmacion,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    // ==================== MESSAGING ADAPTER PARA COMUNICACIÓN CON PADRE ====================
    // Este adapter permite a los hijos registrar controladores centralmente en el state-manager del padre
    if (typeof window !== 'undefined' && typeof window.messagingAdapter === 'undefined') {
        window.messagingAdapter = {
            /**
             * Registra un controlador en el state-manager centralizado del padre
             * @param {string} controladorId - ID único del controlador
             * @param {Function} handler - Función manejadora
             * @param {Object} opciones - Opciones incluyendo tipoMensaje
             * @returns {Promise<boolean>} - True si se registró, false si ya existía
             */
            registrarControladorCentral: async function(controladorId, handler, opciones = {}) {
                const iframeId = window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo';
                const tipo = opciones.tipoMensaje || controladorId;
                
                // El registro real ocurre localmente - el padre sincroniza via HIJO_MANEJADORES
                // NOTA: No verificar __CONTROLADOR_REGISTRADOS aquí porque ya se hace en registrarControladorSeguro
                // La verificación duplicada causaba que el listener nunca se añadiera
                
                // Registrar listener local para este tipo de mensaje con soporte para confirmaciones automáticas
                window.addEventListener('message', async function adapterListener(event) {
                    if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                        try {
                            // Ejecutar handler y capturar resultado
                            const resultado = await handler(event.data);
                            
                            // Si el mensaje requería confirmación y el handler devolvió resultado, enviar confirmación automática
                            if (event.data.requiereConfirmacion && event.data.id && resultado !== undefined) {
                                try {
                                    const confirmacion = {
                                        tipo: (typeof TIPOS_MENSAJE !== 'undefined' && TIPOS_MENSAJE.SISTEMA && TIPOS_MENSAJE.SISTEMA.CONFIRMACION) || 'SISTEMA.CONFIRMACION',
                                        idOriginal: event.data.id,
                                        origen: iframeId,
                                        destino: event.data.origen || 'padre',
                                        timestamp: Date.now(),
                                        datos: resultado
                                    };
                                    if (window.parent && window.parent !== window) {
                                        window.parent.postMessage(confirmacion, '*');
                                        (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Auto-confirmación enviada para ${event.data.id}`);
                                    }
                                } catch (confError) {
                                    (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error enviando confirmación:`, confError);
                                }
                            }
                        } catch (e) {
                            (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error en handler ${tipo}:`, e && e.message);
                        }
                    }
                });
                
                (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Handler registrado para ${tipo} en ${iframeId}`);
                return true;
            },
            
            /**
             * Envía mensaje al padre para que lo procese centralmente
             */
            enviarMensajeCentral: async function(mensaje) {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(mensaje, '*'); // '*' para compatibilidad con file://
                    return { exito: true, metodo: 'postMessage' };
                }
                return { exito: false, error: 'No hay padre disponible' };
            }
        };
        (window.logger || console).info && (window.logger || console).info('[HIJO] messagingAdapter creado para comunicación con padre');
    }

    // Wrapper seguro para evitar doble registro de controladores en hijos
    if (typeof window !== 'undefined' && typeof window.registrarControladorSeguro === 'undefined') {
        window.__CONTROLADOR_REGISTRADOS = window.__CONTROLADOR_REGISTRADOS || new Set();
        window.registrarControladorSeguro = async function(tipo, handler, opciones) {
            try {
                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControladorSeguro called: ${tipo}`);
                if (!tipo || typeof handler !== 'function') {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro parámetros inválidos: tipo=${tipo}`);
                    return;
                }
                if (window.__CONTROLADOR_REGISTRADOS.has(tipo)) {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Controlador ya registrado, omitiendo: ${tipo}`);
                    return;
                }
                window.__CONTROLADOR_REGISTRADOS.add(tipo);

                // ALSO keep a local map of handlers so we can respond to direct postMessage calls
                globalThis.__local_controladores = globalThis.__local_controladores || new Map();
                try { globalThis.__local_controladores.set(tipo, handler); } catch(_){ }

                // Prefer central registration via messagingAdapter/state-manager when available
                try {
                    const iframeId = (window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo');
                    const controladorId = `${iframeId}:${tipo}`;
                    if (window.messagingAdapter && typeof window.messagingAdapter.registrarControladorCentral === 'function') {
                        try {
                            const centralRes = await window.messagingAdapter.registrarControladorCentral(controladorId, handler, { tipoMensaje: tipo });
                            if (centralRes === true) {
                                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador registered centrally: ${controladorId} -> ${tipo}`);
                                return true;
                            }
                        } catch (e) {
                            (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Central registrar failed for ${tipo}: ${e && e.message}`);
                        }
                    }
                    if (typeof registrarControlador === 'function') {
                        try {
                            const res = await safeRegistrar(tipo, handler, opciones);
                            (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador delegated to mensajeria for ${tipo}`);
                            return res;
                        } catch (err) {
                            (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControlador failed for ${tipo}: ${err && err.message}`);
                            // fall through to queue
                        }
                    }
                } catch (e) {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro central attempt error for ${tipo}: ${e && e.message}`);
                }
                // Encolar localmente para migración cuando el padre lo solicite
                (window.logger || console).info && (window.logger || console).info(`[HIJO] Handler queued for migration: ${tipo} (local queue)`);
                return;
            } catch (e) {
                (window.logger || console).error(`[HIJO] Error registrando controlador seguro ${tipo}:`, e && e.message);
            }
        };
    }

    // Helper: safeRegistrar delegates to registrarControladorSeguro when available
    if (typeof window !== 'undefined' && typeof window.safeRegistrar === 'undefined') {
        window.safeRegistrar = async function(tipo, handler, opciones) {
            try {
                if (!tipo || typeof handler !== 'function') return;
                if (window.__CONTROLADOR_REGISTRADOS && window.__CONTROLADOR_REGISTRADOS.has(tipo)) return;
                if (typeof window.registrarControladorSeguro === 'function') return window.registrarControladorSeguro(tipo, handler, opciones);
                if (typeof registrarControlador === 'function') return registrarControlador(tipo, handler, opciones);
            } catch (e) { (window.logger || console).warn && (window.logger || console).warn('[HIJO] safeRegistrar error', e && e.message); }
        };
    }

    import { resolverIdsParada, getPadreId } from './js/utils.js';
    import { TIPOS_MENSAJE } from './js/constants.js';
    import logger from './js/logger.js';

    // NOTA: Bloque IIFE "RESPALDO" para PADRE_PIDE_MANEJADORES eliminado (obsoleto).
    // El sistema actual usa state-manager centralizado sin necesidad de migración manual.

    const CONFIG_HIJO = {
        id: 'hijo4',
        IFRAME_ID: 'hijo4',  // Alias para compatibilidad con enviarMensaje (origen)
        nombre: 'Retos',
        COMPONENTE_ID: 'RETOS',
        DEBUG: true
    };

    // Exportar CONFIG_HIJO para compatibilidad con mensajeria.js
    if (typeof module !== 'undefined' && module.exports) {
        module.exports = CONFIG_HIJO;
    } else {
        window.CONFIG_HIJO = CONFIG_HIJO;
    }

    const estado = {
        retoActualId: null,
        inicializado: false,
        modoActual: 'aventura'
        ,padreIdActual: null,
        paradaIdActual: null
        ,paradaPendiente: false
        ,hijoListoEnviado: false  // Flag para evitar envío duplicado de HIJO_LISTO
    };

    // ╔════════════════════════════════════════════════════════════════════════════╗
    // ║ ARRAY VACÍO - Los retos se cargan desde el PADRE via mensaje CARGAR_RETOS   ║
    // ║ El array de backup está comentado abajo por si necesitamos restaurar        ║
    // ╚════════════════════════════════════════════════════════════════════════════╝
    const retosAventura1Es = [];
    
    // Función getter que prioriza datos del padre sobre datos locales
    function obtenerRetos() {
        // Prioridad 1: Datos recibidos del padre
        if (window.__vv_retosAventura && Array.isArray(window.__vv_retosAventura) && window.__vv_retosAventura.length > 0) {
            return window.__vv_retosAventura;
        }
        // Prioridad 2: Array local como fallback de emergencia
        console.warn('[hijo4] ⚠️ Usando retosAventura1Es local vacío - ¿Se cargaron los retos desde el padre?');
        return retosAventura1Es;
    }
    
    // Exponer función globalmente
    window.obtenerRetos = obtenerRetos;
    
    /* ═══════════════════════════════════════════════════════════════════════════════
     * ██ BACKUP: Array de retos original - COMENTADO PARA USAR DATOS CENTRALIZADOS
     * ██ Descomentar solo si falla el flujo centralizado y necesitamos fallback
     * ═══════════════════════════════════════════════════════════════════════════════ */
    
    // Array de retos - NO ELIMINAR NI MODIFICAR SIN REVISIÓN: Este array es esencial para mapear retos/puzzles. Cualquier cambio debe coordinarse con el padre.
    // NOTE: El array backup está deliberadamente comentado para evitar declaraciones duplicadas y errores de parseo si se carga la versión centralizada desde el padre.
    //       Si necesitas reactivar el fallback, descomenta y asegúrate de que su formato coincide con la API esperada y añade pruebas (TODO: añadir test al repositorio).
    // const retosAventura1Es_BACKUP = [ /* fallback placeholder, commented out */ ]
    /* ═══════════════════════════════════════════════════════════════════════════════ */

    const estadoRetos = {
        retosCompletados: new Set(),
        progreso: { completados: 0, total: obtenerRetos().length },
        ultimoReto: null,
        estadisticas: {
            tiempoPromedio: 0,
            intentosPromedio: 0,
            aciertosConsecutivos: 0
        }
    };

    // Duración de la animación de fuegos artificiales
    const DURACION_TOTAL_MS = 3000;

    // Variables globales para elementos del DOM
    let retoDiv;
    let btnEnviar;
    let btnMostrarRespuesta;
    let divRespuestaCorrecta;
    let btnNext;
    let fuegosDiv;

    let retoActual = null; // Objeto del reto actual
        let indiceReto = 0; // Índice del reto actualmente mostrado (inicializado en 0)


    /**
     * Función: ocultarControles()
     * Oculta todos los controles interactivos del reto (botones y campos de entrada).
     * Se usa al cambiar de modo, finalizar un reto, o reiniciar el estado.
     */
    function ocultarControles() {
        try {
            // Ocultar botón Enviar si existe
            if (btnEnviar) {
                btnEnviar.style.display = 'none';
                btnEnviar.disabled = true;
            }
            
            // Deshabilitar botón Mostrar Respuesta
            if (btnMostrarRespuesta) {
                btnMostrarRespuesta.disabled = true;
            }
            
            // Ocultar div de respuesta correcta
            if (divRespuestaCorrecta) {
                divRespuestaCorrecta.style.display = 'none';
            }
            
            // Ocultar campos de entrada del reto (si existen)
            const inputRespuesta = document.getElementById('inputRespuesta');
            if (inputRespuesta) {
                inputRespuesta.style.display = 'none';
            }
            
            // Ocultar contenedores de respuestas de opción múltiple
            const respuestasContainer = document.getElementById('respuestas-container');
            if (respuestasContainer) {
                respuestasContainer.style.display = 'none';
            }
            
            // Limpiar fuegos artificiales si están activos
            if (fuegosDiv) {
                fuegosDiv.innerHTML = '';
                fuegosDiv.style.display = 'none';
            }
            
            logger.debug('[hijo4][ocultarControles] Controles ocultados correctamente');
        } catch (error) {
            logger.warn('[hijo4][ocultarControles] Error ocultando controles:', error);
        }
    }

    /* Función: fuegosArtificiales()
       Muestra una animación de fuegos artificiales en la pantalla.
    */
    function fuegosArtificiales() {
        if (!fuegosDiv) {
            return;
        }
        fuegosDiv.innerHTML = ""; // Limpiar fuegos anteriores
        fuegosDiv.style.display = "block"; // Mostrar el contenedor de fuegos

        const NUM_CHISPAS_POR_FUEGO = 30;
        const NUM_EXPLOSIONES = 15;

        for (let e = 0; e < NUM_EXPLOSIONES; e++) {
            const delayExplosion = (DURACION_TOTAL_MS / NUM_EXPLOSIONES) * e;

            setTimeout(() => {
                const containerWidth = fuegosDiv.offsetWidth || window.innerWidth;
                const containerHeight = fuegosDiv.offsetHeight || window.innerHeight;

                const startX = Math.random() * containerWidth;
                const startY = Math.random() * containerHeight;

                for (let i = 0; i < NUM_CHISPAS_POR_FUEGO; i++) {
                    let chispa = document.createElement("div");
                    chispa.style.position = "absolute";
                    chispa.style.borderRadius = "50%";
                    chispa.style.width = "12px";
                    chispa.style.height = "12px";
                    chispa.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
                    chispa.style.opacity = "1";
                    chispa.style.left = `${startX}px`;
                    chispa.style.top = `${startY}px`;
                    chispa.style.zIndex = "10";

                    fuegosDiv.appendChild(chispa);

                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 80 + 40;
                    const endX = startX + distance * Math.cos(angle);
                    const endY = startY + distance * Math.sin(angle);

                    const chispaDuration = DURACION_TOTAL_MS / NUM_EXPLOSIONES * 1.5;

                    chispa.offsetWidth; // Forzar reflow para asegurar que la transición se aplique
                    chispa.style.transition = `all ${chispaDuration}ms ease-out`;
                    chispa.style.left = `${endX}px`;
                    chispa.style.top = `${endY}px`;
                    chispa.style.opacity = "0";
                    chispa.style.transform = "scale(0.5)";

                    setTimeout(() => {
                        if (chispa.parentNode) {
                            chispa.parentNode.removeChild(chispa);
                        }
                    }, chispaDuration + 50);
                }
            }, delayExplosion);
        }
        setTimeout(() => {
            fuegosDiv.style.display = "none";
        }, DURACION_TOTAL_MS + 100);
    }

        /* Función: verificar()
           Comprueba si la respuesta del usuario para el reto actual es correcta.
        */
        async function verificar() {
            const reto = retoActual;
            if (!reto) return;

            btnEnviar.disabled = true; // Desactivar el botón Enviar
            divRespuestaCorrecta.style.display = "none";
            divRespuestaCorrecta.textContent = "";
            retoDiv.classList.remove("correct", "incorrect");
            fuegosDiv.innerHTML = "";
            fuegosDiv.style.display = "none";

            let esCorrecto = false;

            // Ejecutar validación personalizada primero
            let respuestaUsuario = null;
            try {
                // Obtener la respuesta del usuario según el tipo de reto
                if (reto.tipo === "opcion") {
                    const seleccion = document.querySelector('input[name="op"]:checked');
                    respuestaUsuario = seleccion ? seleccion.value : null;
                } else if (reto.tipo === "opcion-multiple") {
                    respuestaUsuario = Array.from(document.querySelectorAll('input[name="op"]:checked')).map(i => i.value);
                } else if (reto.tipo === "texto") {
                    // Para retos de texto, la respuesta se obtiene del input correspondiente
                    const inputTexto = document.querySelector('input[type="text"], textarea');
                    respuestaUsuario = inputTexto ? inputTexto.value : null;
                }

                // Llamar a la validación personalizada (soporta async)
                let validacionPersonalizada = true;
                if (typeof window.ejecutarValidacion === 'function') {
                    validacionPersonalizada = await window.ejecutarValidacion(reto, respuestaUsuario);
                }
                if (validacionPersonalizada === false) {
                    console.warn(`[hijo4] Validación personalizada falló para reto ${reto?.id || 'desconocido'}`);
                    throw new Error("Validación personalizada falló");
                }
            } catch (error) {
                console.error(`[hijo4] Error en window.ejecutarValidacion para reto ${reto?.id || 'desconocido'}:`, error.message);
                // Si la validación personalizada falla, mostrar error y permitir reintentar
                alert("Error en la validación: " + error.message);
                btnEnviar.disabled = false;
                return;
            }

            if (reto.tipo === "opcion") {
                const seleccion = document.querySelector('input[name="op"]:checked');
                if (!seleccion) {
                    alert("Por favor, seleccione una opción.");
                    btnEnviar.disabled = false;
                    return;
                }
                esCorrecto = reto.correctas.includes(seleccion.value);
            } else if (reto.tipo === "opcion-multiple") {
                const checks = Array.from(document.querySelectorAll('input[name="op"]:checked')).map(i => i.value);
                if (checks.length === 0) {
                    alert("Por favor, seleccione al menos una opción.");
                    btnEnviar.disabled = false;
                    return;
                }
                esCorrecto = reto.correctas.every(c => checks.includes(c)) && checks.every(s => reto.correctas.includes(s));
            } else if (reto.tipo === "texto") {
                // Se establece como correcto por defecto para retos de texto libre.
                esCorrecto = true;
            }

            if (esCorrecto) {
                retoDiv.classList.add("correct");
                fuegosArtificiales(); // Llama a la animación

                // Cambiar btnEnviar a 👍 verde
                ocultarControles();
                if (btnEnviar) {
                    btnEnviar.textContent = "👍";
                    btnEnviar.style.backgroundColor = "#28a745";
                    btnEnviar.style.display = "inline-block";
                    btnEnviar.disabled = true;
                }

                // Habilitar btnNext y ponerlo verde
                if (btnNext) {
                    btnNext.disabled = false;
                    btnNext.style.backgroundColor = "#28a745";
                }

                // Enviar mensaje al padre indicando que el reto se completó
                // Actualizar estado de progreso
                estadoRetos.retosCompletados.add(reto.id);
                estadoRetos.progreso.completados = estadoRetos.retosCompletados.size;
                estadoRetos.ultimoReto = reto.id;
                estadoRetos.estadisticas.aciertosConsecutivos++;
                
                logger.info(`[hijo4] Reto completado: ${reto.id}. Progreso: ${estadoRetos.progreso.completados}/${estadoRetos.progreso.total}`);
                console.log(`[FLUJO-RETO] [HIJO4] Reto completado localmente: ${reto.id}. Enviando al padre...`);

                try {
                    // Usar enviarMensajeConConfirmacion si está disponible, sino fallback a enviarMensaje
                    if (typeof enviarMensajeConConfirmacion === 'function') {
                        await enviarMensajeConConfirmacion({
                            tipo: TIPOS_MENSAJE.RETO.COMPLETADO,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            destino: getPadreId(),
                            datos: {
                                retoId: reto.id,
                                correcto: true,
                                progreso: estadoRetos.progreso
                            }
                        });
                        console.log(`[FLUJO-RETO] [HIJO4] ✅ Confirmación recibida del padre para reto ${reto.id}`);
                    } else {
                        enviarMensaje({
                            tipo: TIPOS_MENSAJE.RETO.COMPLETADO,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            destino: getPadreId(),
                            datos: {
                                retoId: reto.id,
                                correcto: true,
                                progreso: estadoRetos.progreso
                            }
                        });
                        console.log(`[FLUJO-RETO] [HIJO4] ⚠️ Enviado sin confirmación (función no disponible) para reto ${reto.id}`);
                    }
                } catch (e) {
                    console.error(`[FLUJO-RETO] [HIJO4] ❌ Error enviando/confirmando reto completado:`, e);
                    // No bloqueamos el flujo local, el usuario ya ganó visualmente
                }
            } else {
                retoDiv.classList.add("incorrect");
                vibrar();
                btnEnviar.textContent = "👎";
                btnEnviar.style.backgroundColor = "#dc3545";
                btnEnviar.disabled = true;
                setTimeout(() => {
                    btnEnviar.textContent = "🫵";
                    btnEnviar.style.backgroundColor = "#0077cc";
                    btnEnviar.disabled = false;
                }, 3000);
            }
        }

        /* Event Listener: window.message
           Escucha mensajes provenientes del iframe del puzzle para coordinar el avance.
        */
        window.addEventListener("message", async (event) => {
            // En un entorno de producción, es MUY RECOMENDABLE verificar event.origin para seguridad
            // if (event.origin !== "https://valenciavguides.github.io") return; // Reemplaza con tu dominio

            // Asegúrate de que el mensaje provenga del iframe del puzzle

                // Enviar mensaje de completado para puzzles

                    }
                });
                if (btnNext) {
                    btnNext.disabled = false;

            }
            else if (event.data === "puzzle-state-timeout") {
                retoDiv.classList.add("incorrect");
                retoDiv.classList.remove("correct");
                vibrar();
                // El puzzle gestiona su propio comportamiento de timeout, no se activan aquí.
            }
            else if (event.data === "advance-to-next") {
                divRespuestaCorrecta.style.display = "none";
                indiceReto++;
                const retosArray = obtenerRetos();
                if (indiceReto >= retosArray.length) {
                    alert("¡Has terminado todos los retos de la Aventura 1!");
                    indiceReto = 0; // Opcional: Reiniciar o redirigir
                }
                const siguiente = retosArray[indiceReto];
                if (siguiente) {
                    await mostrarReto(siguiente.id);
                } else {
                    logger.warn('[hijo4] No hay siguiente reto para índice', indiceReto);
                }
            }
        });

        /* Función: normalizarModo(modo)
           Acepta string u objeto y devuelve una cadena segura para usos en clases/dataset
        */
        function normalizarModo(modo) {
            try {
                if (typeof modo === 'string') {
                    modo = modo.trim();
                } else if (modo && typeof modo === 'object') {
                    modo = modo.actual || modo.modo || modo.nombre || Object.values(modo).find(v => typeof v === 'string') || '';
                } else if (modo === null || typeof modo === 'undefined') {
                    modo = '';
                } else {
                    modo = String(modo);
                }
                modo = String(modo || '').trim().toLowerCase();
                modo = modo.replace(/[^a-z0-9_-]/g, '-').replace(/^-+|-+$/g, '');
                return modo;
            } catch (e) {
                return '';
            }
        }

        /* Función: actualizarInterfazModo(modo)
           Actualiza la interfaz según el modo (aventura/casa)
        */
        function actualizarInterfazModo(modo) {
            const modoSeguro = normalizarModo(modo);
            console.log(`[RETOS] Actualizando interfaz para modo:`, { original: modo, normalizado: modoSeguro });
            const body = document.body;

            // Actualizar estado local
            estado.modoActual = modoSeguro || modo;

            // Actualizar clases CSS
            body.classList.remove('modo-casa', 'modo-aventura');
            if (modoSeguro) body.classList.add(`modo-${modoSeguro}`);

            // Ajustes específicos según el modo
            const retoContainer = document.getElementById('reto-container');
            if (retoContainer) {
                if (modoSeguro) retoContainer.dataset.modo = modoSeguro;

                // Ajustar estilos según el modo
                if (modoSeguro === 'casa') {
                    retoContainer.style.borderColor = '#3498db'; // Azul para modo casa
                } else if (modoSeguro) {
                    retoContainer.style.borderColor = '#e67e22'; // Naranja para modo aventura u otros
                }
            }

            // Si hay un reto abierto, actualizar su visualización
            if (estado.retoActualId) {
                console.log(`[RETOS] Se está mostrando el reto ${estado.retoActualId} en modo ${modoSeguro || modo}`);
            }
        }

        // Inicializar mensajería y controladores
        try {
            // Ocultar la UI hasta que el padre confirme que los controladores están listos
            let _uiConfirmado = false;
            const _originalDisplay = (document.body && document.body.style && document.body.style.display) || '';
            try { if (document.body) document.body.style.display = 'none'; } catch (e) { /* ignore */ }
            function mostrarUI() {
                if (!_uiConfirmado) { return; }
                try { if (document.body) { document.body.style.display = _originalDisplay || 'block'; console.log(`[hijo4] UI visible tras PADRE_CONFIRMA_HIJO_LISTO — body.display=${document.body.style.display}`); } } catch (e) {}
            }

            // No necesitamos inicializarMensajeria aquí, los fallbacks esperan automáticamente

            // NOTA: HIJO_PREPARADO se envía MÁS ABAJO, DESPUÉS de registrar todos los controladores críticos.
            // Esto garantiza que el padre no envíe PADRE_DATOS antes de que los controladores estén listos.
            logger.debug('[hijo4] HIJO_PREPARADO aplazado hasta post-inicialización de controladores');

            logger.info(`Hijo ${CONFIG_HIJO.IFRAME_ID} registrado el controlador PADRE_DATOS`);
            // Controlador para inicialización del padre
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_DATOS, async (mensaje) => {
                logger.info(`[hijo4] PADRE_DATOS recibido desde ${mensaje.origen}`);
                logger.info(`Hijo ${CONFIG_HIJO.IFRAME_ID} recibió PADRE_DATOS`);

                // ✅ PROCESAR DATOS INICIALES DEL PADRE
                if (mensaje.datos) {
                    const { modo, paradas, paradaActual } = mensaje.datos;

                    if (modo) {
                        logger.info(`[hijo4] Procesando modo inicial del padre: ${modo}`);
                        actualizarInterfazModo(modo);
                    }

                    if (paradas) {
                        logger.debug(`[hijo4] Paradas recibidas: ${paradas.length}`);
                    }

                    if (paradaActual) {
                        logger.debug(`[hijo4] Parada actual: ${paradaActual}`);
                    }
                }

                // Enviar HIJO_LISTO para completar handshake
                if (!estado.hijoListoEnviado) {
                    try {
                        await enviarMensaje({
                            destino: getPadreId(),
                            tipo: TIPOS_MENSAJE.SISTEMA.HIJO_LISTO,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: {
                                componenteId: CONFIG_HIJO.COMPONENTE_ID,
                                iframeId: CONFIG_HIJO.IFRAME_ID,
                                timestamp: Date.now()
                            }
                        });
                        estado.hijoListoEnviado = true;
                        logger.info('[hijo4] HIJO_LISTO enviado al padre');
                    } catch (error) {
                        logger.error('[hijo4] Error enviando HIJO_LISTO:', error);
                    }
                }
            });

            // Controlador para confirmación del padre
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_CONFIRMA_HIJO_LISTO, async (mensaje) => {
                console.log('[hijo4] PADRE_CONFIRMA_HIJO_LISTO recibido:', mensaje);
                logger.info(`[hijo4] PADRE_CONFIRMA_HIJO_LISTO recibido desde ${mensaje.origen}`);

                // Aplicar modo pendiente si estaba encolado
                try {
                    if (estado.pendingCambioModo && estado.pendingCambioModo.modo) {
                        const modoPendiente = estado.pendingCambioModo.modo;
                        logger.info(`[hijo4] Aplicando modo pendiente: ${modoPendiente}`);
                        actualizarInterfazModo(modoPendiente);
                        await enviarMensaje({
                            destino: mensaje.origen,
                            tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: { tipo: 'inicializacion', modo: modoPendiente }
                        });
                        delete estado.pendingCambioModo;
                    }
                } catch (err) {
                    logger.error('[hijo4] Error aplicando modo pendiente:', err);
                }

                // 🔥 NUEVO: Procesar modo inicial si viene en datos
                const { modoInicial } = mensaje.datos || {};
                if (modoInicial) {
                    logger.info(`[hijo4] Modo inicial recibido: ${modoInicial}`);
                    actualizarInterfazModo(modoInicial);
                    logger.debug(`[hijo4] Interfaz actualizada según modo inicial`);
                }

                // Mostrar UI ahora que el padre confirmó
                try { _uiConfirmado = true; mostrarUI(); } catch (e) { /* ignore */ }
                try { await enviarMensaje({ destino: getPadreId(), tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION, origen: CONFIG_HIJO.IFRAME_ID, datos: { tipo: 'UI_VISIBLE', timestamp: Date.now() } }); } catch (e) { /* ignore */ }

                // Verificación diferida: si CARGAR_RETOS no llegó en 3s, solicitarlo al padre
                setTimeout(() => {
                    if (!window.__vv_retosAventura || !Array.isArray(window.__vv_retosAventura) || window.__vv_retosAventura.length === 0) {
                        logger.warn('[hijo4] ⚠️ Retos no recibidos tras 3s de inicialización — solicitando al padre');

                            tipo: TIPOS_MENSAJE.DATOS.SOLICITAR_RETOS,

            // Controlador para mostrar reto específico
            registrarControladorSeguro(TIPOS_MENSAJE.RETO.MOSTRAR, async (mensaje) => {

            // Controlador para cambio de modo - Protocolo bidireccional

                                modoSolicitado: mensaje.datos?.modo

                    // Extraer y validar datos
                    const { modo } = mensaje.datos || {};
                    if (!modo || !['casa', 'aventura'].includes(modo)) {
                        logger.error(`${logPrefix} Modo inválido: ${modo}`);
                        await enviarMensaje({
                            tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            destino: mensaje.origen,
                            datos: { error: 'Modo inválido', modoRecibido: modo }
                        });
                        return;
                    }

                    // Enviar ENTENDIDO
                    logger.info(`${logPrefix} Cambio de modo a "${modo}" entendido`);
                    
                    // Validación explícita antes de enviar
                    const destinoEntendido = mensaje.origen;
                    const tipoEntendido = TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_ENTENDIDO;
                    const origenEntendido = CONFIG_HIJO?.IFRAME_ID;
                    
                    // DEBUG: Console.log directo para diagnóstico (bypass suppress-warnings)
                    if (!destinoEntendido || !tipoEntendido || !origenEntendido) {

                            destino: destinoEntendido,
                            tipo: tipoEntendido,
                            origen: origenEntendido,
                            TIPOS_MENSAJE_exists: typeof TIPOS_MENSAJE !== 'undefined',

                            modo,

                            mensajeId: mensaje.datos?.mensajeId || mensaje.id
                        }
                    });

                    logger.info(`${logPrefix} Procesando cambio a modo: ${modo}`);

                    retoActual = null;
                    if (retoDiv) {

                            mensajeId: mensaje.datos?.mensajeId || mensaje.id
                        }

                            tipo: TIPOS_MENSAJE.SISTEMA.ERROR,

                        logger.error(`${logPrefix} Error notificando fallo:`, e);

                    await enviarMensaje({
                        tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        destino: mensaje.origen,

            // Controlador: SISTEMA.CAMBIO_MODO_APLICADO
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_APLICADO, async (mensaje) => {

            registrarControladorSeguro(TIPOS_MENSAJE.DATOS.CARGAR_RETOS, async (mensaje) => {

                    window.__vv_retosAventura = retos;

            // Controlador para solicitar datos de un reto específico
            registrarControladorSeguro(TIPOS_MENSAJE.DATOS.SOLICITAR_RETO, async (mensaje) => {

                        const errorPayload = {
                            mensajeOriginal: mensaje?.datos?.mensajeId,

                        };

                            destino: mensaje?.origen || getPadreId(),

                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: errorPayload
                        });
                        return errorPayload;

                    // Normalizar y proteger campos del reto
                    const payload = {
                        mensajeOriginal: mensaje?.datos?.mensajeId,
                        retoId,
                        exito: true,
                        reto: {
                            id: reto.id,
                            tipo: reto.tipo,
                            pregunta: reto.pregunta,
                            opciones: Array.isArray(reto.opciones) ? reto.opciones : [],
                            multiple: !!reto.multiple,
                            correctas: Array.isArray(reto.correctas) ? reto.correctas : [],
                            puzzleSrc: reto.src || reto.puzzleSrc || null
                        }
                    };

                    // Enviar datos del reto al origen (padre o quien lo solicitó)
                    try {
                        const enviar = (window.getEnviarMensaje && await getEnviarMensaje()) || enviarMensaje || (msg => window.parent.postMessage(msg, '*')); // '*' para compatibilidad con file://
                        await enviar({ destino: mensaje?.origen || getPadreId(), tipo: TIPOS_MENSAJE.DATOS.RESPUESTA_RETO, origen: CONFIG_HIJO.IFRAME_ID, datos: payload });
                    } catch (err) {
                        // Fallback: intentar postMessage directo si mensajería no disponible
                        try { window.parent.postMessage({ tipo: TIPOS_MENSAJE.DATOS.RESPUESTA_RETO, datos: payload, origen: CONFIG_HIJO.IFRAME_ID }, '*'); } catch (_) {} // '*' para compatibilidad con file://
                    }

                    logger.info(`${logPrefix} Datos del reto enviados: ${retoId}`);
                    
                    // Return para auto-confirmación
                    return payload;
                } catch (error) {
                    logger.error(`[hijo4][SOLICITAR_RETO] Error procesando solicitud:`, error);
                    const errorPayload = { mensajeOriginal: mensaje?.datos?.mensajeId, exito: false, error: error && error.message };
                    try {
                        await enviarMensaje({
                            destino: (mensaje && mensaje.origen) || getPadreId(),
                            tipo: TIPOS_MENSAJE.DATOS.RESPUESTA_RETO,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: errorPayload
                        });

                // Ocultar todos los botones
                ocultarControles();

            // Controlador para habilitar controles
            registrarControladorSeguro(TIPOS_MENSAJE.CONTROL.HABILITAR, async (mensaje) => {

            registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA, async (mensaje) => {

                    const datos = mensaje.datos || {};
                    const padreId = datos.padreId || datos.padreid || null;
                    const paradaId = datos.paradaId || datos.parada_id || null;
                    logger.info(`[hijo4][NAVEGACION.CAMBIO_PARADA] recibido: padreId=${padreId}, paradaId=${paradaId}, retoId=${datos.retoId}`);
                    // update local state such as current challenge if necessary
                    if (paradaId && typeof parseInt === 'function') {

            });

            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.NOTIFICACION, async (mensaje) => {

                try {

                        const padreId = mensaje.datos?.padreId || mensaje.datos?.padreid || null;
                        const motivo = mensaje.datos?.motivo || 'sin_motivo';
                        logger.info(`${logPrefix} PENDING_CANCELADO recibido para ${padreId}: ${motivo}`);
                        if (padreId && padreId === estado.padreIdActual) {
                            // Hide or reset reto UI
                            try {

                                estado.paradaPendiente = false;

                                // Notify parent that the child processed the notification
                                await enviarMensaje({ tipo: TIPOS_MENSAJE.SISTEMA.ACK, origen: CONFIG_HIJO.IFRAME_ID, destino: mensaje.origen, datos: { mensaje: 'PENDING_CANCELADO procesado', padreId, motivo } });
                            } catch (errPR) { logger.warn(`${logPrefix} Error limpiando UI reto por pending cancelado:`, errPR); }
                        }
                    }
                    if (evento === 'PENDING_INICIADO') {
                        const padreId = mensaje.datos?.padreId || mensaje.datos?.padreid || null;
                        const motivo = mensaje.datos?.motivo || 'iniciado';
                        logger.info(`${logPrefix} PENDING_INICIADO para ${padreId}: ${motivo}`);
                        if (padreId && padreId === estado.padreIdActual) {
                            // Hide any active reto UI and prevent further interaction until pending resolves
                            try {

                                estado.paradaPendiente = true;

                                await enviarMensaje({ tipo: TIPOS_MENSAJE.SISTEMA.ACK, origen: CONFIG_HIJO.IFRAME_ID, destino: mensaje.origen, datos: { mensaje: 'PENDING_INICIADO recibid' } });
                            } catch (err) { logger.warn(`${logPrefix} Error procesando PENDING_INICIADO:`, err); }

            // ============================================================

                    return { exito: true };
                } catch (e) {

                    return { exito: false, error: e.message };
                }
            });

            registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.ESTADO_ACTUALIZADO, async (mensaje) => {

                    console.debug(`[hijo4][GPS.ESTADO_ACTUALIZADO] Estado GPS recibido (no-op):`, mensaje?.datos || {});
                    return { exito: true };
                } catch (e) {
                    console.error('[hijo4][GPS.ESTADO_ACTUALIZADO] Error en handler no-op:', e);
                    return { exito: false, error: e.message };

            registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.ERROR, async (mensaje) => {

                    try { details = JSON.stringify({ codigo, codeDesc, mensaje: errorMensaje, contexto }, null, 2); } catch (e) { details = `codigo=${codigo} mensaje=${String(errorMensaje)} contexto=${String(contexto)}`; }

                    try { if (codigo !== undefined) { typeof window.incrementarContador === 'function' && window.incrementarContador(`gps_error_code_${codigo}`); } } catch (err) { /* ignore */ }

        });

            // ============================================================
            // ENVIAR HIJO_PREPARADO AHORA QUE TODOS LOS CONTROLADORES ESTÁN REGISTRADOS
            // ============================================================
            try {
                logger.debug('[hijo4] Todos los controladores registrados; enviando HIJO_PREPARADO ahora');
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.HIJO_PREPARADO,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        componenteId: CONFIG_HIJO.COMPONENTE_ID,
                        version: '1.0.0',
                        capacidades: ['retos', 'preguntas', 'validacion'],
                        timestamp: Date.now()
                    }
                });
                logger.debug('[hijo4] HIJO_PREPARADO enviado; esperando PADRE_DATOS');
            } catch (e) {
                logger.warn('[hijo4] Error enviando HIJO_PREPARADO:', e);
            }

            // NOTA: HIJO_LISTO se envía SOLO en el controlador PADRE_DATOS con protección de flag
            // para evitar mensajes duplicados

            estado.inicializado = true;
            logger.info(`[hijo4] Inicialización completada exitosamente`);


        } catch (error) {
            logger.error(`[hijo4] Error en inicialización:`, error);
        }
    }); // Cierre del DOMContentLoaded listener

    </script>
