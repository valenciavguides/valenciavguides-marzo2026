<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains; preload" />
  <title>Mapa completo de aventura</title>

  <!-- Estilos generales -->
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100vh;
    }

    /* Estilos para los números de parada */
    .numero-parada {
      background: white;
      border: 2px solid black;
      border-radius: 50%;
      width: clamp(2.5rem, 8vmin, 4.375rem);
      height: clamp(2.5rem, 8vmin, 4.375rem);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: clamp(1.5rem, 5vmin, 2.5rem);
      color: black;
    }

    /* Aumentar tamaño de fuente en los popups de Leaflet */
    .leaflet-popup-content {
      font-size: clamp(1rem, 4vmin, 3.125rem) !important;
      font-weight: bold;
    }
    .leaflet-popup-content img {
      max-width: 100%;
      margin-top: 0.5em;
      border-radius: 4px;
    }

    /* Estilos para el control de rotación personalizado */
    .leaflet-control-rotate {
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }
    .leaflet-control-rotate button:hover {
      background-color: rgba(0,0,0,0.1);
    }
  </style>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script>
    // Implementación simple de rotación sin plugin
    (function() {
      if (typeof L === 'undefined') return;

      // Extender L.Map para agregar rotación
      L.Map.include({
        _bearing: 0,

        setBearing: function(bearing) {
          this._bearing = bearing;
          this._updateMapRotation();
          return this;
        },

        getBearing: function() {
          return this._bearing;
        },

        _updateMapRotation: function() {
          if (this._container) {
            this._container.style.transform = `rotate(${this._bearing}deg)`;
            this._container.style.transformOrigin = 'center center';
          }
        }
      });

      // Agregar control de rotación
      L.Control.Rotate = L.Control.extend({
        options: {
          position: 'bottomleft'
        },

        onAdd: function(map) {
          const container = L.DomUtil.create('div', 'leaflet-control-rotate');
          container.style.backgroundColor = 'white';
          container.style.padding = '5px';
          container.style.border = '2px solid rgba(0,0,0,0.2)';
          container.style.borderRadius = '5px';

          const button = L.DomUtil.create('button', '', container);
          button.innerHTML = '🔄';
          button.style.fontSize = '20px';
          button.style.border = 'none';
          button.style.background = 'none';
          button.style.cursor = 'pointer';
          button.title = 'Rotar mapa';

          L.DomEvent.on(button, 'click', function(e) {
            L.DomEvent.stopPropagation(e);
            const currentBearing = map.getBearing();
            const newBearing = (currentBearing + 90) % 360;
            map.setBearing(newBearing);
          });

          return container;
        }
      });

      L.control.rotate = function(options) {
        return new L.Control.Rotate(options);
      };
    })();
  </script>

  <script type="module">
    import { DATOS_AVENTURAS } from './js/coordenadas-aventuras.js';

    // Leer aventura del parámetro URL (?aventura=Aventura1)
    const params = new URLSearchParams(window.location.search);
    const aventura = params.get('aventura') || 'Aventura1';

    const datos = DATOS_AVENTURAS[aventura];
    if (!datos || !datos["coordenadas-hijo2.html"]) {
      document.getElementById('map').innerHTML =
        `<p style="padding:2rem;font-size:1.5rem;">Aventura "${aventura}" no encontrada.</p>`;
      throw new Error(`Aventura "${aventura}" no existe en DATOS_AVENTURAS`);
    }

    const coordenadas = datos["coordenadas-hijo2.html"].coordenadas;

    // Construir ruta lineal y recoger paradas para marcadores
    const rutaPuntos = [];  // [lat, lng] para la polyline
    const paradasInfo = []; // para marcadores numerados

    coordenadas.forEach(entry => {
      if (entry.tipo === 'parada' || entry.tipo === 'inicio') {
        const punto = [entry.coordenadas.lat, entry.coordenadas.lng];
        rutaPuntos.push(punto);
        paradasInfo.push({
          lat: entry.coordenadas.lat,
          lng: entry.coordenadas.lng,
          nombre: entry.nombre,
          imagen: entry.imagen || ''
        });
      } else if (entry.tipo === 'tramo') {
        rutaPuntos.push([entry.inicio.lat, entry.inicio.lng]);
        entry.waypoints.forEach(wp => rutaPuntos.push([wp.lat, wp.lng]));
        rutaPuntos.push([entry.fin.lat, entry.fin.lng]);
      }
    });

    // Inicializar mapa
    const map = L.map('map', {
      center: [39.476, -0.375],
      zoom: 15
    });

    L.control.rotate().addTo(map);

    // Capa base
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Marcadores numerados para paradas
    paradasInfo.forEach((parada, index) => {
      const numero = String(index).padStart(2, '0');
      const iconoNumero = L.divIcon({
        html: `<div class="numero-parada">${numero}</div>`,
        className: '',
        iconSize: [40, 40],
        iconAnchor: [20, 20]
      });

      const imgHtml = parada.imagen
        ? `<br><img src="${parada.imagen}" alt="${parada.nombre}">`
        : '';

      L.marker([parada.lat, parada.lng], { icon: iconoNumero }).addTo(map)
        .bindPopup(`<strong>${numero} - ${parada.nombre}</strong>${imgHtml}`);
    });

    // Dibujar la línea de la ruta
    const polyline = L.polyline(rutaPuntos, { color: 'blue', weight: 6 }).addTo(map);
    map.fitBounds(polyline.getBounds());

    // Construir rutaCompleta plana para compatibilidad con solicitar-ruta
    const rutaCompleta = [];
    coordenadas.forEach(entry => {
      if (entry.tipo === 'parada' || entry.tipo === 'inicio') {
        rutaCompleta.push({ tipo: 'parada', nombre: entry.nombre, lat: entry.coordenadas.lat, lng: entry.coordenadas.lng });
      } else if (entry.tipo === 'tramo') {
        rutaCompleta.push({ tipo: 'waypoint', lat: entry.inicio.lat, lng: entry.inicio.lng });
        entry.waypoints.forEach(wp => rutaCompleta.push({ tipo: 'waypoint', lat: wp.lat, lng: wp.lng }));
        rutaCompleta.push({ tipo: 'waypoint', lat: entry.fin.lat, lng: entry.fin.lng });
      }
    });

    // Comunicación con ventana padre
    window.addEventListener('message', (event) => {
      if (event.data && event.data.tipo === 'solicitar-ruta') {
        window.parent.postMessage({
          tipo: 'ruta-completa',
          paradas: rutaCompleta.filter(p => p.tipo === 'parada'),
          waypoints: rutaCompleta.filter(p => p.tipo === 'waypoint'),
          ruta: rutaCompleta
        }, '*');
      }
    });
  </script>
</body>
</html>
