<!DOCTYPE html>
<html lang="es">
<head>
    <script>
    /* Escalado proporcional PURO: sincronizar con viewport del padre SIN LÍMITES */
    (function(){
        function escalar(){
            var w, h;
            try { w = (window.top || window.parent).innerWidth; h = (window.top || window.parent).innerHeight; }
            catch(e) { w = window.innerWidth; h = window.innerHeight; }
            var f = Math.min(w, h) * 0.025; // Sin límites - proporcional puro
            document.documentElement.style.fontSize = f + "px";
        }
        escalar();
        window.addEventListener("resize", escalar);
    })();
    </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains; preload">
  <title>Botón Más Opciones Centrado</title>
  <script src="js/suppress-warnings.js"></script>
  <script type="module" src="js/monitoreo.js"></script>
  <script type="module">
    import { getEnviarMensaje, getRegistrarControlador, getEnviarMensajeConConfirmacion } from './js/utils.js';

    // Fallbacks que esperan a que window.mensajeria esté disponible
    const enviarMensaje = async (...args) => {
        // En hijos, usar postMessage directamente al padre
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            try {
                window.parent.postMessage({
                    tipo: mensaje.tipo,
                    origen: mensaje.origen || 'hijo1-opciones',
                    destino: mensaje.destino,
                    datos: mensaje.datos,
                    timestamp: Date.now()
                }, '*'); // '*' para compatibilidad con file://
                return Promise.resolve();
            } catch (e) {
                console.error('[hijo1-opciones] Error enviando mensaje via postMessage:', e);
                return Promise.reject(e);
            }
        } else {
            // Fallback al método anterior si no estamos en iframe
            if (window.mensajeria && window.mensajeria.enviarMensaje) {
                return window.mensajeria.enviarMensaje(...args);
            } else {
                try {
                    const send = await getEnviarMensaje();
                    return send(...args);
                } catch (e) {
                    console.error('mensajeria not loaded', args, e);
                }
            }
        }
    };

    const registrarControlador = async (tipo, callback) => {
        // En hijos, los controladores se registran localmente para mensajes del padre
        if (window.parent && window.parent !== window) {
            // Registrar listener para mensajes del padre
            const listener = (event) => {
                if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                    callback(event.data);
                }
            };
            window.addEventListener('message', listener);
            return Promise.resolve(() => window.removeEventListener('message', listener));
        } else {
            // Fallback al método anterior
            if (window.mensajeria && window.mensajeria.registrarControlador) {
                return window.mensajeria.registrarControlador(tipo, callback);
            } else {
                // Esperar a que esté disponible
                try {
                    const reg = await getRegistrarControlador();
                    return reg(tipo, callback);
                } catch (e) {
                    console.error('mensajeria not loaded for registrarControlador', tipo, e);
                }
            }
        }
    };

    const enviarMensajeConConfirmacion = async (...args) => {
        // Similar a enviarMensaje pero esperando confirmación
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error('Timeout esperando confirmación')), 
                    window.ajustarTimeoutPorConexion ? window.ajustarTimeoutPorConexion(5000) : 5000);

                const confirmListener = (event) => {
                    if (event.source === window.parent && event.data && event.data.tipo === 'SISTEMA.CONFIRMACION') {
                        clearTimeout(timeout);
                        window.removeEventListener('message', confirmListener);
                        resolve();
                    }
                };

                window.addEventListener('message', confirmListener);

                try {
                    window.parent.postMessage({
                        tipo: mensaje.tipo,
                        origen: mensaje.origen || 'hijo1-opciones',
                        destino: mensaje.destino,
                        datos: mensaje.datos,
                        timestamp: Date.now(),
                        requiereConfirmacion: true
                    }, '*'); // '*' para compatibilidad con file://
                } catch (e) {
                    clearTimeout(timeout);
                    window.removeEventListener('message', confirmListener);
                    reject(e);
                }
            });
        } else {
            // Fallback al método anterior
            if (window.mensajeria && window.mensajeria.enviarMensajeConConfirmacion) {
                return window.mensajeria.enviarMensajeConConfirmacion(...args);
            } else {
                try {
                    const sendConf = await getEnviarMensajeConConfirmacion();
                    return sendConf(...args);
                } catch (e) {
                    console.error('mensajeria not loaded', args, e);
                }
            }
        }
    };

    // ==================== MESSAGING ADAPTER PARA COMUNICACIÓN CON PADRE ====================
    // Este adapter permite a los hijos registrar controladores centralmente en el state-manager del padre
    if (typeof window !== 'undefined' && typeof window.messagingAdapter === 'undefined') {
        window.messagingAdapter = {
            /**
             * Registra un controlador en el state-manager centralizado del padre
             * @param {string} controladorId - ID único del controlador
             * @param {Function} handler - Función manejadora
             * @param {Object} opciones - Opciones incluyendo tipoMensaje
             * @returns {Promise<boolean>} - True si se registró, false si ya existía
             */
            registrarControladorCentral: async function(controladorId, handler, opciones = {}) {
                const iframeId = window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo';
                const tipo = opciones.tipoMensaje || controladorId;
                
                // El registro real ocurre localmente - el padre sincroniza via HIJO_MANEJADORES
                // NOTA: No verificar __CONTROLADOR_REGISTRADOS aquí porque ya se hace en registrarControladorSeguro
                // La verificación duplicada causaba que el listener nunca se añadiera
                
                // Registrar listener local para este tipo de mensaje con soporte para confirmaciones automáticas
                window.addEventListener('message', async function adapterListener(event) {
                    if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                        try {
                            // Ejecutar handler y capturar resultado
                            const resultado = await handler(event.data);
                            
                            // Si el mensaje requería confirmación y el handler devolvió resultado, enviar confirmación automática
                            if (event.data.requiereConfirmacion && event.data.id && resultado !== undefined) {
                                try {
                                    const confirmacion = {
                                        tipo: (typeof TIPOS_MENSAJE !== 'undefined' && TIPOS_MENSAJE.SISTEMA && TIPOS_MENSAJE.SISTEMA.CONFIRMACION) || 'SISTEMA.CONFIRMACION',
                                        idOriginal: event.data.id,
                                        origen: iframeId,
                                        destino: event.data.origen || 'padre',
                                        timestamp: Date.now(),
                                        datos: resultado
                                    };
                                    if (window.parent && window.parent !== window) {
                                        window.parent.postMessage(confirmacion, '*');
                                        (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Auto-confirmación enviada para ${event.data.id}`);
                                    }
                                } catch (confError) {
                                    (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error enviando confirmación:`, confError);
                                }
                            }
                        } catch (e) {
                            (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error en handler ${tipo}:`, e && e.message);
                        }
                    }
                });
                
                (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Handler registrado para ${tipo} en ${iframeId}`);
                return true;
            },
            
            /**
             * Envía mensaje al padre para que lo procese centralmente
             */
            enviarMensajeCentral: async function(mensaje) {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(mensaje, '*'); // '*' para compatibilidad con file://
                    return { exito: true, metodo: 'postMessage' };
                }
                return { exito: false, error: 'No hay padre disponible' };
            }
        };
        (window.logger || console).info && (window.logger || console).info('[HIJO] messagingAdapter creado para comunicación con padre');
    }

    // Wrapper seguro para evitar doble registro de controladores en hijos
    if (typeof window !== 'undefined' && typeof window.registrarControladorSeguro === 'undefined') {
        window.__CONTROLADOR_REGISTRADOS = window.__CONTROLADOR_REGISTRADOS || new Set();
        window.registrarControladorSeguro = async function(tipo, handler, opciones) {
            try {
                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControladorSeguro called: ${tipo}`);
                if (!tipo || typeof handler !== 'function') {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro parámetros inválidos: tipo=${tipo}`);
                    return;
                }
                if (window.__CONTROLADOR_REGISTRADOS.has(tipo)) {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Controlador ya registrado, omitiendo: ${tipo}`);
                    return;
                }
                window.__CONTROLADOR_REGISTRADOS.add(tipo);
                // Prefer central registration via messagingAdapter/state-manager when available
                try {
                    const iframeId = (window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo');
                    const controladorId = `${iframeId}:${tipo}`;
                    if (window.messagingAdapter && typeof window.messagingAdapter.registrarControladorCentral === 'function') {
                        try {
                            const centralRes = await window.messagingAdapter.registrarControladorCentral(controladorId, handler, { tipoMensaje: tipo });
                            if (centralRes === true) {
                                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador registered centrally: ${controladorId} -> ${tipo}`);
                                return true;
                            }
                        } catch (e) {
                            (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Central registrar failed for ${tipo}: ${e && e.message}`);
                        }
                    }
                    if (typeof registrarControlador === 'function') {
                        try {
                            const res = await safeRegistrar(tipo, handler, opciones);
                            (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador delegated to mensajeria for ${tipo}`);
                            return res;
                        } catch (err) {
                            (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControlador failed for ${tipo}: ${err && err.message}`);
                        }
                    }
                } catch (e) {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro central attempt error for ${tipo}: ${e && e.message}`);
                }
                (window.logger || console).info && (window.logger || console).info(`[HIJO] Handler queued for migration: ${tipo} (local queue)`);
                return;
            } catch (e) {
                (window.logger || console).error(`[HIJO] Error registrando controlador seguro ${tipo}:`, e && e.message);
            }
        };
    }

    // Helper: safeRegistrar delegates to registrarControladorSeguro when available
    if (typeof window !== 'undefined' && typeof window.safeRegistrar === 'undefined') {
        window.safeRegistrar = async function(tipo, handler, opciones) {
            try {
                if (!tipo || typeof handler !== 'function') return;
                if (window.__CONTROLADOR_REGISTRADOS && window.__CONTROLADOR_REGISTRADOS.has(tipo)) return;
                if (typeof window.registrarControladorSeguro === 'function') return window.registrarControladorSeguro(tipo, handler, opciones);
                if (typeof registrarControlador === 'function') return registrarControlador(tipo, handler, opciones);
            } catch (e) { (window.logger || console).warn && (window.logger || console).warn('[HIJO] safeRegistrar error', e && e.message); }
        };
    }
    import { TIPOS_MENSAJE } from './js/constants.js';
    import { getPadreId } from './js/utils.js';
    import logger from './js/logger.js';

    // NOTA: Bloque IIFE "RESPALDO" para PADRE_PIDE_MANEJADORES eliminado (obsoleto).
    // El sistema actual usa state-manager centralizado sin necesidad de migración manual.

    // ============================================================
    // CONFIGURACIÓN DEL COMPONENTE
    // ============================================================
    const CONFIG_HIJO = {
        IFRAME_ID: 'hijo1-opciones',
        COMPONENTE_ID: 'MAS_OPCIONES',
        VERSION: '1.0.0',
        DEBUG: true,
        LOG_PREFIX: '[HIJO1-OPCIONES]',
        TIMEOUT_PARENT: 5000 // 5 segundos
    };

    // ============================================================
    // GESTIÓN DE ESTADO DEL MENÚ
    // ============================================================
    const estadoMenu = {
        abierto: false,
        inicializado: false,
        ultimaInteraccion: null,
        parentReady: false,
        hijoListoEnviado: false  // Flag para evitar envío duplicado de HIJO_LISTO
    };

    // ============================================================
    // FUNCIÓN PARA MOSTRAR UI
    // ============================================================
    window._uiConfirmado = false;
    let _originalDisplay = '';

    function mostrarUI() { 
        if (!window._uiConfirmado) { 
            console.warn(`${CONFIG_HIJO.IFRAME_ID} mostrarUI ignorado: esperando PADRE_CONFIRMA_HIJO_LISTO`); 
            return; 
        } 
        try { 
            if (document.body) document.body.style.display = _originalDisplay || 'block'; 
            console.log(`${CONFIG_HIJO.IFRAME_ID} UI visible tras PADRE_CONFIRMA_HIJO_LISTO`); 
        } catch (e) {} 
    }

    // ============================================================
    // FUNCIÓN DE INICIALIZACIÓN PRINCIPAL
    // ============================================================
    /**
     * Inicializa el componente hijo1-opciones
     * @returns {Promise<void>}
     */
    async function init() {
        const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[init]`;
        
        try {
            logger.info(`${logPrefix} Iniciando componente...`);

            // 1. Esperar a que el padre esté listo (con timeout)
            if (window.parent && window.parent !== window) {
                logger.debug(`${logPrefix} Esperando a que el padre esté listo...`);
                
                let attempts = 0;
                const maxAttempts = CONFIG_HIJO.TIMEOUT_PARENT / 100; // 50 intentos
                
                while (attempts < maxAttempts && (!window.parent.postMessage || typeof window.parent.postMessage !== 'function')) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
                
                if (attempts >= maxAttempts) {
                    logger.warn(`${logPrefix} Padre no listo después de ${CONFIG_HIJO.TIMEOUT_PARENT}ms`);
                } else {
                    estadoMenu.parentReady = true;
                    logger.info(`${logPrefix} Padre listo después de ${attempts * 100}ms`);
                }
            }

            // 2. Inicializar mensajería
            // Ocultar UI hasta recibir PADRE_CONFIRMA_HIJO_LISTO
            window._uiConfirmado = false;
            _originalDisplay = (document.body && document.body.style && document.body.style.display) || '';
            try { if (document.body) document.body.style.display = 'none'; } catch (e) { /* ignore */ }

            // No necesitamos inicializarMensajeria aquí, los fallbacks esperan automáticamente

            // 3. Registrar controladores
            registrarControladores();

            // Nota: la lógica de menú (parte visible) se inicializa solo cuando el padre
            // confirma que los controladores están listos (PADRE_CONFIRMA_HIJO_LISTO).
            // Esto evita mostrar UI antes de la confirmación del padre.

            estadoMenu.inicializado = true;
            logger.info(`${logPrefix} Componente inicializado correctamente`);

            // Enviar HIJO_PREPARADO al padre
            try {
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.HIJO_PREPARADO,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        version: '1.0.0',
                        capacidades: ['opciones', 'configuracion'],
                        timestamp: Date.now()
                    }
                });
                logger.info(`${logPrefix} HIJO_PREPARADO enviado al padre`);
            } catch (error) {
                logger.error(`${logPrefix} Error enviando HIJO_PREPARADO:`, error);
            }

        } catch (error) {
            logger.error(`${logPrefix} Error crítico durante inicialización:`, error);
            
            // Enviar HIJO_FALLIDO al padre
            try {
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.HIJO_FALLIDO,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        error: error.message,
                        stack: error.stack,
                        timestamp: Date.now()
                    }
                });
            } catch (notifyError) {
                logger.error(`${logPrefix} Error notificando fallo al padre:`, notifyError);
            }
        }
    }

    // ============================================================
    // REGISTRO DE CONTROLADORES
    // ============================================================
    /**
     * Registra todos los controladores de mensajes
     */
    function registrarControladores() {
        const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[registrarControladores]`;
        
        try {
            logger.debug(`${logPrefix} Registrando controladores...`);

            // ============================================================
            // CONTROLADOR: SISTEMA.PADRE_DATOS
            // Este es el controlador principal para la comunicación padre->hijo
            // NOTA: PADRE_LISTO fue eliminado (obsoleto) - usar solo PADRE_DATOS
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_DATOS, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[PADRE_DATOS]`;
                
                try {
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        return;
                    }

                    logger.info(`${controladorPrefix} Datos del padre recibidos desde ${mensaje.origen}`);

                    // ✅ PROCESAR DATOS INICIALES DEL PADRE
                    if (mensaje.datos) {
                        const { modo, timestamp } = mensaje.datos;

                        if (modo) {
                            logger.debug(`${controladorPrefix} Modo inicial: ${modo}`);
                        }
                    }

                } catch (error) {
                    logger.error(`${controladorPrefix} Error procesando PADRE_DATOS:`, error);
                }

                // Enviar HIJO_LISTO para completar handshake
                if (!estadoMenu.hijoListoEnviado) {
                    try {
                        await enviarMensaje({
                            destino: getPadreId(),
                            tipo: TIPOS_MENSAJE.SISTEMA.HIJO_LISTO,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: {
                                componenteId: CONFIG_HIJO.COMPONENTE_ID,
                                iframeId: CONFIG_HIJO.IFRAME_ID,
                                timestamp: Date.now()
                            }
                        });
                        estadoMenu.hijoListoEnviado = true;
                        logger.info('[opciones] HIJO_LISTO enviado al padre');
                    } catch (error) {
                        logger.error('[opciones] Error enviando HIJO_LISTO:', error);
                    }
                }
            });

            // ============================================================
            // CONTROLADOR: SISTEMA.PADRE_CONFIRMA_HIJO_LISTO
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_CONFIRMA_HIJO_LISTO, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[PADRE_CONFIRMA_HIJO_LISTO]`;

                try {
                    console.log(`${CONFIG_HIJO.IFRAME_ID} PADRE_CONFIRMA_HIJO_LISTO recibido:`, mensaje);
                    // 1. Validación de origen
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        throw new Error('Mensaje sin origen válido');
                    }

                    logger.info(`${controladorPrefix} Confirmación recibida del padre - controladores listos`);

                    // 🔥 NUEVO: Procesar modo inicial si viene en datos (patrón unificado)
                    const { modoInicial } = mensaje.datos || {};
                    if (modoInicial) {
                        logger.debug(`${controladorPrefix} Modo inicial recibido: ${modoInicial} (registrado para consistencia)`);
                    }

                    // Preparado para futuras solicitudes de datos adicionales del padre
                    logger.debug(`${controladorPrefix} Componente listo para recibir datos adicionales si es necesario`);

                    // Inicializar la lógica de menú visible y mostrar UI ahora que el padre confirmó
                    try { if (typeof inicializarLogicaMenu === 'function') inicializarLogicaMenu(); } catch (e) { logger.warn(`${controladorPrefix} inicializarLogicaMenu falló:`, e); }
                    window._uiConfirmado = true;
                    mostrarUI();
                    try { await enviarMensaje({ destino: getPadreId(), tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION, origen: CONFIG_HIJO.IFRAME_ID, datos: { tipo: 'UI_VISIBLE', timestamp: Date.now() } }); } catch (e) { /* ignore */ }

                    return {
                        exito: true,
                        estado: 'confirmado',
                        timestamp: Date.now()
                    };

                } catch (error) {
                    logger.error(`${controladorPrefix} Error en controlador:`, error);

                    // Notificar error al padre
                    try {
                        await enviarMensaje({
                            destino: getPadreId(),
                            tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: {
                                error: error.message,
                                controlador: 'PADRE_CONFIRMA_HIJO_LISTO',
                                timestamp: Date.now()
                            }
                        });
                    } catch (notifyError) {
                        logger.error(`${controladorPrefix} Error notificando al padre:`, notifyError);
                    }

                    return {
                        exito: false,
                        error: error.message
                    };
                }
            });

            // ============================================================
            // CONTROLADOR 2: UI.CLOSE_MENUS
            // ============================================================
            /**
             * Maneja solicitud de cierre de menús desde el padre
             * @param {Object} mensaje - Mensaje con parámetros de cierre
             * @returns {Object} Estado de la operación
             */
            registrarControladorSeguro(TIPOS_MENSAJE.UI.CLOSE_MENUS, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[CLOSE_MENUS]`;
                
                try {
                    // 1. Validación de origen
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        throw new Error('Mensaje sin origen válido');
                    }

                    logger.debug(`${controladorPrefix} Recibido de ${mensaje.origen}`);

                    // 2. Validación de datos
                    const datos = mensaje.datos || {};
                    const { except } = datos;

                    if (except && typeof except !== 'string') {
                        logger.warn(`${controladorPrefix} Parámetro 'except' no es string:`, except);
                    }

                    logger.debug(`${controladorPrefix} Parámetro except=${except}`);

                    // 3. Cerrar menú si no está exceptuado
                    if (except !== 'mas-opciones') {
                        const resultado = ocultarTodos();
                        
                        if (resultado.exito) {
                            logger.info(`${controladorPrefix} Menú cerrado exitosamente`);
                        } else {
                            logger.warn(`${controladorPrefix} Problemas al cerrar menú:`, resultado);
                        }

                        return {
                            exito: true,
                            menuCerrado: true,
                            estadoAnterior: estadoMenu.abierto,
                            timestamp: Date.now()
                        };
                    } else {
                        logger.debug(`${controladorPrefix} Menú exceptuado, no se cierra`);
                        
                        return {
                            exito: true,
                            menuCerrado: false,
                            razon: 'exceptuado',
                            timestamp: Date.now()
                        };
                    }

                } catch (error) {
                    logger.error(`${controladorPrefix} Error en controlador:`, error);
                    
                    return {
                        exito: false,
                        error: error.message,
                        timestamp: Date.now()
                    };
                }
            });

            // ============================================================
            // CONTROLADOR 2: SISTEMA.HEARTBEAT
            // ============================================================
            /**
             * Responde a heartbeats del sistema de monitoreo
             * @param {Object} mensaje - Mensaje de heartbeat
             * @returns {Object} Respuesta de heartbeat
             */
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.HEARTBEAT, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[HEARTBEAT]`;
                
                try {
                    // 1. Validación de origen
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        return { exito: false, error: 'Sin origen' };
                    }

                    // 2. Preparar datos de respuesta
                    const datosRespuesta = {
                        timestamp: Date.now(),
                        componente: CONFIG_HIJO.COMPONENTE_ID,
                        estado: estadoMenu.abierto ? 'abierto' : 'cerrado',
                        inicializado: estadoMenu.inicializado,
                        ultimaInteraccion: estadoMenu.ultimaInteraccion,
                        parentReady: estadoMenu.parentReady

                    // 3. Enviar respuesta

                        tipo: TIPOS_MENSAJE.SISTEMA.HEARTBEAT_RESPONSE,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: datosRespuesta
                    });

                    logger.debug(`${controladorPrefix} Respuesta enviada a ${mensaje.origen}`);

                    return {
                        exito: true,
                        timestamp: datosRespuesta.timestamp
                    };

                } catch (error) {
                    logger.error(`${controladorPrefix} Error en controlador:`, error);
                    
                    return {
                        exito: false,
                        error: error.message
                    };
                }
            });

            // ============================================================
            // CONTROLADOR 4: SISTEMA.ACK
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.ACK, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[ACK]`;
                
                try {
                    // 1. Validación de origen
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        return { exito: false, error: 'Sin origen' };
                    }

                    logger.debug(`${controladorPrefix} ACK recibido, respondiendo...`);

                    // 2. Preparar datos de respuesta
                    const datosRespuesta = {
                        componenteId: CONFIG_HIJO.COMPONENTE_ID,
                        timestamp: Date.now(),
                        estado: 'activo',
                        menuAbierto: estadoMenu.abierto,
                        inicializado: estadoMenu.inicializado,
                        parentReady: estadoMenu.parentReady
                    };

                    // 3. Enviar respuesta
                    await enviarMensaje({
                        destino: getPadreId(),
                        tipo: TIPOS_MENSAJE.SISTEMA.ACK,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: datosRespuesta
                    });

                    logger.debug(`${controladorPrefix} ACK respondido`);

                    return {
                        exito: true,
                        timestamp: datosRespuesta.timestamp
                    };

                } catch (error) {
                    logger.error(`${controladorPrefix} Error respondiendo ACK:`, error);
                    
                    return {
                        exito: false,
                        error: error.message
                    };

            });

            // ============================================================

            registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.UBICACION_ACTUALIZADA, async (mensaje) => {
                const gPrefix = `${CONFIG_HIJO.LOG_PREFIX}[GPS.UBICACION_ACTUALIZADA]`;
                try {
                    logger.debug(`${gPrefix} Ubicación recibida (no-op) desde ${mensaje?.origen}`);
                    return { exito: true };
                } catch (e) {
                    logger.error(`${gPrefix} Error en handler no-op:`, e);
                    return { exito: false, error: e.message };
                }

            registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.ESTADO_ACTUALIZADO, async (mensaje) => {
                const gPrefix = `${CONFIG_HIJO.LOG_PREFIX}[GPS.ESTADO_ACTUALIZADO]`;
                try {
                    logger.debug(`${gPrefix} Estado GPS recibido (no-op):`, mensaje?.datos || {});

            registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.ERROR, async (mensaje) => {
                const gPrefix = `${CONFIG_HIJO.LOG_PREFIX}[GPS.ERROR]`;
                try {
                    logger.warn(`${gPrefix} Error GPS recibido (no-op):`, mensaje?.datos || {});
                    // Telemetría: incrementar contador por código de error GPS en hijo1-opciones
                    try { const codigo = mensaje?.datos?.codigo; if (codigo !== undefined) { typeof window.incrementarContador === 'function' && window.incrementarContador(`gps_error_code_${codigo}`); } } catch (err) { /* ignore */ }
                    // Enviar métrica a monitoreo
                    try { if (typeof enviarMensaje === 'function') { enviarMensaje({ tipo: TIPOS_MENSAJE.MONITOREO.METRICA, origen: CONFIG_HIJO.IFRAME_ID || 'hijo1-opciones', destino: 'sistema-monitoreo', datos: { nombre: 'gps_error_code', valor: 1, metadatos: { codigo } } }).catch(() => {}); } } catch (ignore) { /* ignore */ }
                    return { exito: true };

                    return { exito: false, error: e.message };

            // Controlador para cambio de modo - componente simple, solo confirma
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO, async (mensaje) => {
                const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[CAMBIO_MODO]`;
                try {
                    // Validar carga secuencial
                    if (!mensaje.datos?.secuenciaCompleta) {
                        logger.warn(`${logPrefix} Mensaje recibido antes de secuencia completa`);
                        await enviarMensaje({
                            tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            destino: mensaje.origen,
                            datos: {
                                error: 'Secuencia no completa',
                                esperarPermiso: true,
                                tipoOriginal: mensaje.tipo,
                                modoSolicitado: mensaje.datos?.modo
                            }
                        });
                        return;
                    }

                    const { modo } = mensaje.datos || {};
                    if (!modo || !['casa', 'aventura'].includes(modo)) {
                        logger.error(`${logPrefix} Modo inválido: ${modo}`);
                        await enviarMensaje({
                            tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            destino: mensaje.origen,
                            datos: { error: 'Modo inválido', modoRecibido: modo }
                        });
                        return;
                    }

                    // Enviar ENTENDIDO
                    logger.info(`${logPrefix} Cambio de modo a "${modo}" entendido (no-op)`);
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_ENTENDIDO,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: { 
                            modo, 
                            timestamp: Date.now(),
                            mensajeId: mensaje.datos?.mensajeId || mensaje.id
                        }
                    });
                    
                    // Componente no cambia con el modo - enviar EFECTUADO inmediatamente
                    logger.info(`${logPrefix} Cambio de modo a "${modo}" efectuado (no-op)`);
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: 'SISTEMA.CAMBIO_MODO_EFECTUADO', // String literal
                        origen: 'hijo1-opciones', // String literal
                        datos: { 
                            modo, 
                            exito: true, 
                            timestamp: Date.now(),
                            mensajeId: mensaje.datos?.mensajeId || mensaje.id
                        }
                    });
                    
                    return { exito: true };
                } catch (error) {
                    logger.error(`${logPrefix} Error:`, error);
                    try {
                        await enviarMensaje({
                            tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                            origen: CONFIG_HIJO.IFRAME_ID,

                        logger.error(`${logPrefix} Error notificando fallo:`, e);
                    }
                    return { exito: false, error: error.message };
                }
            });

            // Controlador: SISTEMA.CAMBIO_MODO_APLICADO
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_APLICADO, async (mensaje) => {
                const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[CAMBIO_MODO_APLICADO]`;
                try {
                    const { modo } = mensaje.datos || {};
                    logger.success(`${logPrefix} ✅ Cambio de modo a "${modo}" aplicado globalmente`);
                } catch (error) {
                    logger.error(`${logPrefix} Error:`, error);
                }
            });

            logger.info(`${logPrefix} Controladores registrados exitosamente`);

        } catch (error) {
            logger.error(`${logPrefix} Error registrando controladores:`, error);

        }
    }

    // ============================================================
    // CONFIGURACIÓN DE ICONOS Y CONSTANTES UI
    // ============================================================
    // Valores base en px (para font-size de 16px). Se escalan proporcionalmente.
    const LAYOUT_CONFIG_BASE = {
        ALTURA_BOTON: 65,
        ALTURA_ICONO: 53,
        SEPARACION: 8,
        DURACION_ANIMACION: 300 // ms (no escala)
    };
    
    // Función para obtener valores escalados según font-size actual
    function obtenerLayoutEscalado() {
        const fs = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
        const escala = fs / 16;
        return {
            ALTURA_BOTON: LAYOUT_CONFIG_BASE.ALTURA_BOTON * escala,
            ALTURA_ICONO: LAYOUT_CONFIG_BASE.ALTURA_ICONO * escala,
            SEPARACION: LAYOUT_CONFIG_BASE.SEPARACION * escala,
            DURACION_ANIMACION: LAYOUT_CONFIG_BASE.DURACION_ANIMACION
        };
    }
    
    // Para compatibilidad, LAYOUT_CONFIG se obtiene dinámicamente
    const LAYOUT_CONFIG = new Proxy({}, {
        get(target, prop) {
            return obtenerLayoutEscalado()[prop];
        }
    });

    const iconosArriba = [
        { id: 'icono-gastronomia', url: 'gastronomia.html', nombre: 'Gastronomía' },
        { id: 'icono-informacion', url: 'consejos-valencia.html', nombre: 'Información' },
        { id: 'icono-historia', url: 'videos-valencia-historica.html', nombre: 'Historia' }
    ];
    
    const iconosAbajo = [
        { id: 'icono-agradecimientos', url: 'agradecimientos.html', nombre: 'Agradecimientos y Fuentes' },
        { id: 'icono-paginas-oficiales', url: 'paginas-oficiales-valencia.html', nombre: 'Páginas Oficiales' },
        { id: 'icono-temporizador', url: null, nombre: 'Temporizador', accion: 'toggleTemporizador' }
    ];

    // FUNCIONES DE GESTIÓN DEL MENÚ
    // ============================================================

    /**
     * Oculta todos los iconos del menú
     * @returns {Object} Resultado de la operación con estadísticas
     */
    function ocultarTodos() {
        const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[ocultarTodos]`;
        
        try {
            logger.debug(`${logPrefix} Iniciando ocultación de iconos...`);

            const todosIconos = [...iconosArriba, ...iconosAbajo];
            let ocultados = 0;
            let errores = 0;

            todosIconos.forEach((icono, index) => {
                try {
                    const el = document.getElementById(icono.id);
                    
                    if (!el) {
                        logger.warn(`${logPrefix} Elemento no encontrado: ${icono.id}`);
                        errores++;
                        return;
                    }

                    el.style.display = 'none';
                    el.style.opacity = '0';
                    
                    ocultados++;

                } catch (error) {
                    logger.error(`${logPrefix} Error ocultando ${icono.id}:`, error);
                    errores++;
                }
            });

            estadoMenu.abierto = false;
            estadoMenu.ultimaInteraccion = Date.now();

            logger.info(`${logPrefix} Iconos ocultados: ${ocultados}/${todosIconos.length}, errores: ${errores}`);

            return {
                exito: errores === 0,
                ocultados,
                errores,
                total: todosIconos.length,
                timestamp: Date.now()
            };

        } catch (error) {
            logger.error(`${logPrefix} Error crítico:`, error);
            
            return {
                exito: false,
                error: error.message,
                timestamp: Date.now()
            };
        }
    }

    /**
     * Muestra todos los iconos del menú con posicionamiento dinámico
     * @returns {Object} Resultado de la operación con estadísticas
     */
    function mostrarIconos() {
        const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[mostrarIconos]`;
        
        try {
            logger.debug(`${logPrefix} Iniciando visualización de iconos...`);

            const iframeHeight = document.body.clientHeight;
            
            if (!iframeHeight || iframeHeight <= 0) {
                logger.error(`${logPrefix} Altura de iframe inválida: ${iframeHeight}`);
                throw new Error('Altura de iframe inválida');
            }

            const btnTop = iframeHeight / 2;
            let mostrados = 0;
            let errores = 0;

            // Mostrar iconos superiores
            iconosArriba.forEach((icono, i) => {
                try {
                    const el = document.getElementById(icono.id);
                    
                    if (!el) {
                        logger.warn(`${logPrefix} Elemento no encontrado: ${icono.id}`);
                        errores++;
                        return;
                    }

                    const posicionTop = btnTop - 
                                       LAYOUT_CONFIG.ALTURA_BOTON / 2 - 
                                       (i + 1) * (LAYOUT_CONFIG.ALTURA_ICONO + LAYOUT_CONFIG.SEPARACION);

                    el.style.display = 'flex';
                    el.style.opacity = '1';
                    el.style.top = `${posicionTop}px`;
                    
                    mostrados++;
                    logger.debug(`${logPrefix} ${icono.nombre} posicionado en ${posicionTop}px`);

                } catch (error) {
                    logger.error(`${logPrefix} Error mostrando ${icono.id}:`, error);
                    errores++;
                }
            });

            // Mostrar iconos inferiores
            iconosAbajo.forEach((icono, i) => {
                try {
                    const el = document.getElementById(icono.id);
                    
                    if (!el) {
                        logger.warn(`${logPrefix} Elemento no encontrado: ${icono.id}`);
                        errores++;
                        return;
                    }

                    const posicionTop = btnTop + 
                                       LAYOUT_CONFIG.ALTURA_BOTON / 2 + 
                                       LAYOUT_CONFIG.SEPARACION + 
                                       i * (LAYOUT_CONFIG.ALTURA_ICONO + LAYOUT_CONFIG.SEPARACION);

                    el.style.display = 'flex';
                    el.style.opacity = '1';
                    el.style.top = `${posicionTop}px`;
                    
                    mostrados++;
                    logger.debug(`${logPrefix} ${icono.nombre} posicionado en ${posicionTop}px`);

                } catch (error) {
                    logger.error(`${logPrefix} Error mostrando ${icono.id}:`, error);
                    errores++;
                }
            });

            estadoMenu.abierto = true;
            estadoMenu.ultimaInteraccion = Date.now();

            const totalIconos = iconosArriba.length + iconosAbajo.length;
            logger.info(`${logPrefix} Iconos mostrados: ${mostrados}/${totalIconos}, errores: ${errores}`);

            return {
                exito: errores === 0,
                mostrados,
                errores,
                total: totalIconos,
                dimensiones: { iframeHeight, btnTop },
                timestamp: Date.now()
            };

        } catch (error) {
            logger.error(`${logPrefix} Error crítico:`, error);
            
            return {
                exito: false,
                error: error.message,
                timestamp: Date.now()
            };
        }
    }

    /**
     * Alterna el estado del menú (abrir/cerrar)
     * @returns {Promise<Object>} Resultado de la operación
     */
    async function toggleMenu() {
        const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[toggleMenu]`;
        
        try {
            logger.debug(`${logPrefix} Estado actual: ${estadoMenu.abierto ? 'abierto' : 'cerrado'}`);

            // 1. Notificar al padre para cerrar otros menús
            try {
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.UI.CLOSE_MENUS,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        except: 'mas-opciones',
                        timestamp: Date.now()
                    }
                });

                logger.debug(`${logPrefix} Notificación CLOSE_MENUS enviada al padre`);

            } catch (mensajeError) {
                logger.warn(`${logPrefix} Error notificando cierre de menús:`, mensajeError);
            }

            // 2. Alternar estado
            let resultado;
            
            if (estadoMenu.abierto) {
                resultado = ocultarTodos();
                logger.info(`${logPrefix} Menú cerrado`);
            } else {
                ocultarTodos(); // Asegurar estado limpio
                resultado = mostrarIconos();
                logger.info(`${logPrefix} Menú abierto`);
            }

            return {
                exito: true,
                accion: estadoMenu.abierto ? 'abierto' : 'cerrado',
                detalles: resultado,
                timestamp: Date.now()
            };

        } catch (error) {
            logger.error(`${logPrefix} Error crítico:`, error);
            
            // Intentar revertir a estado cerrado seguro
            try {
                ocultarTodos();
            } catch (revertError) {
                logger.error(`${logPrefix} Error revirtiendo estado:`, revertError);
            }

            return {
                exito: false,
                error: error.message,
                timestamp: Date.now()
            };
        }
    }

    /**
     * Inicializa la lógica del menú y event handlers
     */
    function inicializarLogicaMenu() {
        const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[inicializarLogicaMenu]`;
        
        try {
            logger.debug(`${logPrefix} Iniciando...`);

            // 1. Ocultar todos los iconos al inicio
            ocultarTodos();

            // 2. Event handler del botón toggle principal
            const masOpcionesBtn = document.getElementById('mas-opciones');
            
            if (!masOpcionesBtn) {
                logger.error(`${logPrefix} Botón mas-opciones no encontrado`);
                throw new Error('Botón mas-opciones no encontrado');
            }

            masOpcionesBtn.onclick = async (event) => {
                const clickPrefix = `${logPrefix}[click-toggle]`;
                
                try {
                    logger.info(`${clickPrefix} Click detectado`);
                    
                    if (event) {
                        event.preventDefault();
                        event.stopPropagation();
                    }

                    const resultado = await toggleMenu();
                    
                    if (!resultado.exito) {
                        logger.error(`${clickPrefix} Error en toggle:`, resultado);
                    }

                } catch (error) {
                    logger.error(`${clickPrefix} Error manejando click:`, error);
                    
                    try {
                        await enviarMensaje({
                            destino: getPadreId(),
                            tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: {
                                error: error.message,
                                contexto: 'click-mas-opciones',
                                timestamp: Date.now()
                            }
                        });
                    } catch (notifyError) {
                        logger.error(`${clickPrefix} Error notificando error:`, notifyError);
                    }
                }
            };

            // 3. Event handlers de iconos individuales
            const todosIconos = [...iconosArriba, ...iconosAbajo];
            
            todosIconos.forEach((icono) => {
                try {
                    const el = document.getElementById(icono.id);
                    
                    if (!el) {
                        logger.warn(`${logPrefix} Elemento ${icono.id} no encontrado`);
                        return;
                    }

                    el.onclick = async (event) => {
                        const clickPrefix = `${logPrefix}[click-${icono.id}]`;
                        
                        try {
                            logger.info(`${clickPrefix} Click detectado en ${icono.nombre}`);
                            
                            if (event) {
                                event.preventDefault();
                                event.stopPropagation();
                            }

                            ocultarTodos();

                            if (icono.url) {
                                logger.info(`${clickPrefix} Abriendo URL: ${icono.url}`);
                                
                                try {
                                    window.open(icono.url, '_blank');
                                    
                                    await enviarMensaje({
                                        destino: getPadreId(),
                                        tipo: TIPOS_MENSAJE.UI.NAVEGACION_EXTERNA,
                                        origen: CONFIG_HIJO.IFRAME_ID,
                                        datos: {
                                            url: icono.url,
                                            icono: icono.id,
                                            timestamp: Date.now()
                                        }
                                    });

                                } catch (openError) {
                                    logger.error(`${clickPrefix} Error abriendo URL:`, openError);
                                    
                                    await enviarMensaje({
                                        destino: getPadreId(),
                                        tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                                        origen: CONFIG_HIJO.IFRAME_ID,
                                        datos: {
                                            error: openError.message,
                                            url: icono.url,
                                            timestamp: Date.now()
                                        }
                                    });
                                }
                            } else if (icono.accion === 'toggleTemporizador') {
                                // Acción especial: toggle de la ventana del temporizador
                                logger.info(`${clickPrefix} Ejecutando acción: toggleTemporizador`);
                                toggleVentanaTemporizador();
                            } else {
                                logger.info(`${clickPrefix} Sin URL ni acción definida para ${icono.nombre}`);
                            }

                        } catch (error) {
                            logger.error(`${clickPrefix} Error manejando click:`, error);
                        }
                    };

                    logger.debug(`${logPrefix} Handler de ${icono.nombre} registrado`);

                } catch (error) {
                    logger.error(`${logPrefix} Error registrando handler ${icono.id}:`, error);
                }
            });

            logger.info(`${logPrefix} Lógica del menú inicializada correctamente`);

        } catch (error) {
            logger.error(`${logPrefix} Error crítico:`, error);
            throw error;
        }
    }

    /**
     * Estado global del temporizador
     */
    const estadoTemporizador = {
        tiempoRestante: 0,       // Tiempo restante en segundos
        tiempoTotal: 0,          // Tiempo total para calcular porcentaje
        enCuenta: false,         // Si está en cuenta atrás
        ventanaVisible: false,   // Si la ventana está visible
        modoAventura: false,     // Si está en modo aventura
        intervalId: null         // ID del interval para poder detenerlo
    };

    /**
     * Formatea el tiempo en HHH:MM:SS
     * @param {number} segundos - Tiempo en segundos
     * @returns {string} Tiempo formateado
     */
    function formatearTiempo(segundos) {
        const horas = Math.floor(segundos / 3600);
        const minutos = Math.floor((segundos % 3600) / 60);
        const segs = segundos % 60;
        
        // Formato HHH:MM:SS (mínimo 3 dígitos para horas)
        const horasStr = String(horas).padStart(3, '0');
        const minutosStr = String(minutos).padStart(2, '0');
        const segsStr = String(segs).padStart(2, '0');
        
        return `${horasStr}:${minutosStr}:${segsStr}`;
    }

    /**
     * Actualiza el color del borde según el tiempo restante
     */
    function actualizarColorBorde() {
        const ventana = document.getElementById('ventana-temporizador');
        if (!ventana) return;
        
        // Remover todas las clases de color
        ventana.classList.remove('tiempo-verde', 'tiempo-amarillo', 'tiempo-rojo');
        
        if (estadoTemporizador.tiempoTotal === 0) return;
        
        const porcentaje = (estadoTemporizador.tiempoRestante / estadoTemporizador.tiempoTotal) * 100;
        
        if (porcentaje >= 60) {
            ventana.classList.add('tiempo-verde');
        } else if (porcentaje >= 20) {
            ventana.classList.add('tiempo-amarillo');
        } else {
            ventana.classList.add('tiempo-rojo');
        }
    }

    /**
     * Actualiza la visualización del tiempo
     */
    function actualizarDisplayTiempo() {
        const display = document.getElementById('tiempo-display');
        if (display) {
            display.textContent = formatearTiempo(estadoTemporizador.tiempoRestante);
        }
        actualizarColorBorde();
    }

    /**
     * Envía mensaje al padre para toggle de ventana del temporizador
     * El padre es quien muestra la ventana centrada en pantalla
     */
    async function toggleVentanaTemporizador() {
        const logPrefix = '[TEMPORIZADOR][toggle]';
        
        try {

            await enviarMensaje({
                destino: getPadreId(),
                tipo: 'TEMPORIZADOR.TOGGLE',
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    tiempoRestante: estadoTemporizador.tiempoRestante,
                    tiempoTotal: estadoTemporizador.tiempoTotal,
                    estado: obtenerEstadoColor(),
                    modoAventura: estadoTemporizador.modoAventura,
                    tiempoFormateado: formatearTiempo(estadoTemporizador.tiempoRestante),
                    timestamp: Date.now()
                }
            });
            
            logger.info(`${logPrefix} Mensaje TEMPORIZADOR.TOGGLE enviado al padre`);
        } catch (error) {
            logger.error(`${logPrefix} Error enviando toggle al padre:`, error);
        }
    }

    /**
     * Inicia la cuenta atrás del temporizador
     * @param {number} tiempoMinutos - Tiempo en minutos
     */
    function iniciarTemporizador(tiempoMinutos) {
        const logPrefix = '[TEMPORIZADOR][iniciar]';
        
        // Convertir minutos a segundos
        estadoTemporizador.tiempoTotal = tiempoMinutos * 60;
        estadoTemporizador.tiempoRestante = estadoTemporizador.tiempoTotal;
        estadoTemporizador.enCuenta = true;
        estadoTemporizador.modoAventura = true;
        
        logger.info(`${logPrefix} Iniciando cuenta atrás: ${tiempoMinutos} minutos (${estadoTemporizador.tiempoTotal} segundos)`);
        
        // Actualizar display inicial
        actualizarDisplayTiempo();
        
        // Limpiar interval anterior si existe
        if (estadoTemporizador.intervalId) {
            clearInterval(estadoTemporizador.intervalId);
        }
        
        // Iniciar el contador cada segundo
        estadoTemporizador.intervalId = setInterval(async () => {
            if (!estadoTemporizador.enCuenta) {
                clearInterval(estadoTemporizador.intervalId);
                return;
            }
            
            estadoTemporizador.tiempoRestante--;
            // NOTA: El display se actualiza en el padre, no localmente
            
            // Enviar actualización al padre cada segundo
            try {
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.AVENTURA ? TIPOS_MENSAJE.AVENTURA.TIEMPO_ACTUALIZADO : 'AVENTURA.TIEMPO_ACTUALIZADO',
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        tiempoRestante: estadoTemporizador.tiempoRestante,
                        tiempoTotal: estadoTemporizador.tiempoTotal,
                        porcentajeRestante: (estadoTemporizador.tiempoRestante / estadoTemporizador.tiempoTotal) * 100,
                        estado: obtenerEstadoColor(),
                        tiempoFormateado: formatearTiempo(estadoTemporizador.tiempoRestante),
                        timestamp: Date.now()
                    }
                });
            } catch (e) {
                // Silenciar errores de envío para no saturar el log
            }
            
            // Verificar si se agotó el tiempo
            if (estadoTemporizador.tiempoRestante <= 0) {
                await tiempoAgotado();
            }
            
        }, 1000); // Cada segundo
        
        logger.info(`${logPrefix} Cuenta atrás iniciada correctamente`);
    }

    /**
     * Obtiene el estado de color actual
     * @returns {string} 'verde', 'amarillo' o 'rojo'
     */
    function obtenerEstadoColor() {
        if (estadoTemporizador.tiempoTotal === 0) return 'verde';
        const porcentaje = (estadoTemporizador.tiempoRestante / estadoTemporizador.tiempoTotal) * 100;
        if (porcentaje >= 60) return 'verde';
        if (porcentaje >= 20) return 'amarillo';
        return 'rojo';
    }

    /**
     * Detiene el temporizador (victoria o cancelación)
     * @returns {Object} Estadísticas del tiempo usado
     */
    function detenerTemporizador() {
        const logPrefix = '[TEMPORIZADOR][detener]';
        
        estadoTemporizador.enCuenta = false;
        
        if (estadoTemporizador.intervalId) {
            clearInterval(estadoTemporizador.intervalId);
            estadoTemporizador.intervalId = null;
        }
        
        const tiempoUsado = estadoTemporizador.tiempoTotal - estadoTemporizador.tiempoRestante;
        
        logger.info(`${logPrefix} Temporizador detenido. Tiempo usado: ${formatearTiempo(tiempoUsado)}`);
        
        return {
            tiempoTotal: estadoTemporizador.tiempoTotal,
            tiempoRestante: estadoTemporizador.tiempoRestante,
            tiempoUsado: tiempoUsado,
            completado: estadoTemporizador.tiempoRestante > 0
        };
    }

    /**
     * Resetea el temporizador a modo casa (000:00:00)
     */
    function resetearTemporizador() {
        detenerTemporizador();
        estadoTemporizador.tiempoRestante = 0;
        estadoTemporizador.tiempoTotal = 0;
        estadoTemporizador.modoAventura = false;
        actualizarDisplayTiempo();
        
        // Ocultar ventana
        const ventana = document.getElementById('ventana-temporizador');
        if (ventana) {
            ventana.style.display = 'none';
            estadoTemporizador.ventanaVisible = false;
        }
        
        logger.info('[TEMPORIZADOR] Reseteado a modo casa');
    }

    /**
     * Maneja cuando el tiempo se agota
     */
    async function tiempoAgotado() {
        const logPrefix = '[TEMPORIZADOR][tiempoAgotado]';
        
        logger.error(`${logPrefix} ¡TIEMPO AGOTADO! La aventura ha terminado.`);
        
        // Detener el temporizador
        detenerTemporizador();
        
        // Mostrar la ventana si no está visible
        const ventana = document.getElementById('ventana-temporizador');
        if (ventana) {
            ventana.style.display = 'block';
            estadoTemporizador.ventanaVisible = true;
        }
        
        // Enviar mensaje urgente al padre
        try {
            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.AVENTURA ? TIPOS_MENSAJE.AVENTURA.TIEMPO_AGOTADO : 'AVENTURA.TIEMPO_AGOTADO',
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    mensaje: '¡Se acabó el tiempo!',
                    redirigir: 'En-busca-del-tesoro.html',
                    timestamp: Date.now()
                }
            });
            logger.info(`${logPrefix} Mensaje TIEMPO_AGOTADO enviado al padre`);
        } catch (error) {
            logger.error(`${logPrefix} Error enviando mensaje al padre:`, error);
        }
    }

    // ============================================================
    // REGISTRAR CONTROLADORES DEL TEMPORIZADOR
    // ============================================================
    
    // Controlador: AVENTURA.INICIADA - recibe tiempo del padre
    registrarControladorSeguro('AVENTURA.INICIADA', async (mensaje) => {
        const logPrefix = '[TEMPORIZADOR][AVENTURA.INICIADA]';
        
        try {
            logger.info(`${logPrefix} Aventura iniciada, recibiendo tiempo...`);
            
            if (mensaje.datos && mensaje.datos.tiempoEstimado) {
                const tiempoMinutos = mensaje.datos.tiempoEstimado;
                logger.info(`${logPrefix} Tiempo estimado: ${tiempoMinutos} minutos`);
                iniciarTemporizador(tiempoMinutos);
                
                return { exito: true, mensaje: 'Temporizador iniciado' };
            } else {
                logger.warn(`${logPrefix} No se recibió tiempoEstimado en el mensaje`);
                return { exito: false, error: 'Sin tiempoEstimado' };
            }
        } catch (error) {
            logger.error(`${logPrefix} Error:`, error);
            return { exito: false, error: error.message };
        }
    });
    
    // Controlador: AVENTURA.FINALIZADA - cuando el usuario gana
    registrarControladorSeguro('AVENTURA.FINALIZADA', async (mensaje) => {
        const logPrefix = '[TEMPORIZADOR][AVENTURA.FINALIZADA]';
        
        try {
            logger.info(`${logPrefix} Aventura finalizada, deteniendo temporizador...`);
            
            const stats = detenerTemporizador();
            
            // Enviar estadísticas al padre
            await enviarMensaje({
                destino: getPadreId(),
                tipo: 'AVENTURA.ESTADISTICAS_TIEMPO',
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: stats
            });
            
            return { exito: true, estadisticas: stats };
        } catch (error) {
            logger.error(`${logPrefix} Error:`, error);
            return { exito: false, error: error.message };
        }
    });
    
    // Controlador: CAMBIO_MODO - para resetear en modo casa
    registrarControladorSeguro('CAMBIO_MODO', async (mensaje) => {
        const logPrefix = '[TEMPORIZADOR][CAMBIO_MODO]';
        
        try {
            if (mensaje.datos && mensaje.datos.modo === 'casa') {
                logger.info(`${logPrefix} Cambiando a modo casa, reseteando temporizador...`);
                resetearTemporizador();
            }
            return { exito: true };
        } catch (error) {
            logger.error(`${logPrefix} Error:`, error);
            return { exito: false, error: error.message };
        }
    });

    // ============================================================
    // EJECUTAR INICIALIZACIÓN
    // ============================================================
    init();

  </script>
