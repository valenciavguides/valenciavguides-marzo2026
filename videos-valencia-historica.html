<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains; preload">
    <title>Videos de la Valencia Histórica</title>
    <style>
        /* Escalado proporcional puro: 2.5% del menor lado del viewport */
        html { font-size: clamp(16px, 5vmin, 24px); }

        * { font-family: Verdana, sans-serif !important; }

        body {
            font-family: Arial, sans-serif;
            background-color: #000; /* Fondo negro */
            color: #fff; /* Letra blanca general */
            margin: 0;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .content-container {
            max-width: 50rem;
            width: 100%;
            padding: 1.5625rem;
            line-height: 1.6;
            text-align: center; /* Centra el contenido dentro del contenedor */
            /* Los bordes deben ser siempre de igual grosor. */
            border: 0.1875rem solid #FFA500; /* Borde naranja */
            border-radius: 0.625rem;
            margin-bottom: 1.25rem;
            overflow-y: auto;
            flex-grow: 1;
            box-shadow: 0 0 0.9375rem rgba(255, 165, 0, 0.5); /* Sombra naranja sutil */
        }

        h1 {
            color: #fff; /* Letra blanca para el título */
            font-weight: bold; /* Negrita */
            font-size: 2.5em; /* Más grande */
            margin-bottom: 0.625rem;
            text-shadow: 0.125rem 0.125rem 0.25rem rgba(0, 0, 0, 0.5); /* Sombra de texto sutil */
        }

        h2 {
            color: #fff; /* Letra blanca para el subtítulo */
            font-weight: bold; /* Negrita */
            font-size: 1.2em; /* Más grande que el texto normal */
            margin-top: 0;
            margin-bottom: 1.875rem;
        }

        ul {
            list-style: none; /* Elimina los puntos predeterminados */
            padding: 0;
        }

        li {
            margin-bottom: 0.9375rem;
        }

        /* Estilo inicial de los enlaces (verde) */
        a {
            color: #4CAF50; /* Verde */
            text-decoration: none;
            font-size: 1.1em; /* Un poco más grande que el texto por defecto, pero más pequeño que h1/h2 */
            transition: color 0.3s ease;
            display: inline-block; /* Para que el padding y margin funcionen bien */
            padding: 0.5rem 0.9375rem;
            border: 1px solid #4CAF50; /* Borde para el enlace */
            border-radius: 0.3125rem;
        }

        /* Estilo de los enlaces al pasar el ratón (un poco más claro) */
        a:hover {
            color: #66BB6A; /* Verde más claro en hover */
            text-decoration: underline;
            border-color: #66BB6A;
        }

        /* Estilo de los enlaces una vez visitados (blanco) */
        a:visited {
            color: #FFFFFF; /* Blanco */
            border-color: #FFFFFF; /* Borde blanco para el enlace visitado */
        }
    </style>
</head>
<body>
    <div class="content-container">
        <h1>Videos de la Valencia Histórica</h1>
        <h2>(créditos a los autores del video)</h2>

        <ul>
            <li>
                <a href="https://www.youtube.com/watch?v=AArYFlMxi9c" target="_blank">Video Valencia Histórica - Ejemplo 1</a>
            </li>
            </ul>
    </div>
</body>
</html>
