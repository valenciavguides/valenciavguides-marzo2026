    <script>
    /* Escalado proporcional PURO: sincronizar con viewport del padre SIN LÍMITES */
    (function(){
        function escalar(){
            var w, h;
            try { w = (window.top || window.parent).innerWidth; h = (window.top || window.parent).innerHeight; }
            catch(e) { w = window.innerWidth; h = window.innerHeight; }
            var f = Math.min(w, h) * 0.025; // Sin límites - proporcional puro
            document.documentElement.style.fontSize = f + "px";
            // Dimensiones reales del iframe (fiables en móvil, no afectadas por bugs vw/vh)
            document.documentElement.style.setProperty('--iframe-w', window.innerWidth + 'px');
            document.documentElement.style.setProperty('--iframe-h', window.innerHeight + 'px');
        }
        escalar();
        window.addEventListener("resize", escalar);
    })();
    </script>

// ==================== INICIALIZACIÓN DE MENSAJERÍA ====================

import { getEnviarMensaje, getRegistrarControlador, getEnviarMensajeConConfirmacion } from './js/utils.js';
import { retryUntilAvailable } from './js/utils.js';
import { obtenerMapaVintage } from './js/mapa-vintage-aventuras.js';

// Fallbacks que esperan a que window.mensajeria esté disponible
const enviarMensaje = async (...args) => {
    // En hijos, usar postMessage directamente al padre
    if (window.parent && window.parent !== window) {
        const mensaje = args[0];
        try {
            window.parent.postMessage({
                tipo: mensaje.tipo,
                origen: mensaje.origen || CONFIG_HIJO.IFRAME_ID,
                destino: mensaje.destino,
                datos: mensaje.datos,
                timestamp: Date.now()
            }, window.location.origin);
            return Promise.resolve();
        } catch (e) {
            console.error('[hijo2] Error enviando mensaje via postMessage:', e);
            return Promise.reject(e);
        }
    } else {
        // Fallback al método anterior si no estamos en iframe
        return await retryUntilAvailable(
            () => window.mensajeria.enviarMensaje(...args),
            () => window.mensajeria && window.mensajeria.enviarMensaje,
            10, 500, (...a) => (window.logger || console).error(...a)
        );
    }
};

const registrarControlador = async (tipo, callback) => {
    // En hijos, los controladores se registran localmente para mensajes del padre
    if (window.parent && window.parent !== window) {
        // Registrar listener para mensajes del padre
        const listener = (event) => {
            if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                callback(event.data);
            }
        };
        window.addEventListener('message', listener);
        return Promise.resolve(() => window.removeEventListener('message', listener));
    } else {
        // Fallback al método anterior
        return await retryUntilAvailable(
            () => window.mensajeria.registrarControlador(tipo, callback),
            () => window.mensajeria && window.mensajeria.registrarControlador,
            10, 500, (...a) => (window.logger || console).error(...a)
        );
    }
};

const enviarMensajeConConfirmacion = async (...args) => {
    // Similar a enviarMensaje pero esperando confirmación
    if (window.parent && window.parent !== window) {
        const mensaje = args[0];
        return new Promise((resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error('Timeout esperando confirmación')), 
                window.ajustarTimeoutPorConexion ? window.ajustarTimeoutPorConexion(5000) : 5000);
            
            const confirmListener = (event) => {
                if (event.source === window.parent && event.data && event.data.tipo === 'SISTEMA.CONFIRMACION') {
                    clearTimeout(timeout);
                    window.removeEventListener('message', confirmListener);
                    resolve();
                }
            };
            
            window.addEventListener('message', confirmListener);
            
            try {
                window.parent.postMessage({
                    tipo: mensaje.tipo,
                    origen: mensaje.origen || CONFIG_HIJO.IFRAME_ID,
                    destino: mensaje.destino,
                    datos: mensaje.datos,
                    timestamp: Date.now(),
                    requiereConfirmacion: true
                }, window.location.origin);
            } catch (e) {
                clearTimeout(timeout);
                window.removeEventListener('message', confirmListener);
                reject(e);
            }
        });
    } else {
        return await retryUntilAvailable(
            () => window.mensajeria.enviarMensajeConConfirmacion(...args),
            () => window.mensajeria && window.mensajeria.enviarMensajeConConfirmacion,
            10, 500, (...a) => (window.logger || console).error(...a)
        );
    }
};

// ==================== MESSAGING ADAPTER PARA COMUNICACIÓN CON PADRE ====================
// Este adapter permite a los hijos registrar controladores centralmente en el state-manager del padre
if (typeof window !== 'undefined' && typeof window.messagingAdapter === 'undefined') {
    window.messagingAdapter = {
        /**
         * Registra un controlador en el state-manager centralizado del padre
         * @param {string} controladorId - ID único del controlador
         * @param {Function} handler - Función manejadora
         * @param {Object} opciones - Opciones incluyendo tipoMensaje
         * @returns {Promise<boolean>} - True si se registró, false si ya existía
         */
        registrarControladorCentral: async function(controladorId, handler, opciones = {}) {
            const iframeId = window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo';
            const tipo = opciones.tipoMensaje || controladorId;

            // Registrar listener local para este tipo de mensaje
            window.addEventListener('message', async function adapterListener(event) {
                if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                    try {
                        // Ejecutar handler y capturar resultado (soporta async)

                        }

                        (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error en handler ${tipo}:`, e && e.message);
                        
                        // Enviar confirmación de error si el mensaje lo requiere
                        if (event.data.requiereConfirmacion && event.data.id) {
                            window.parent.postMessage({
                                tipo: 'SISTEMA.CONFIRMACION',
                                idOriginal: event.data.id,
                                datos: { error: e && e.message },
                                timestamp: Date.now(),
                                origen: iframeId
                            }, '*');
                        }
                    }
                }
            });
            
            (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Handler registrado para ${tipo} en ${iframeId}`);
            return true;
        },
        
        /**
         * Envía mensaje al padre para que lo procese centralmente
         */
        enviarMensajeCentral: async function(mensaje) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage(mensaje, '*'); // '*' para compatibilidad con file://

        }
    };
    (window.logger || console).info && (window.logger || console).info('[HIJO] messagingAdapter creado para comunicación con padre');
}

// Wrapper seguro para evitar doble registro de controladores en hijos
if (typeof window !== 'undefined' && typeof window.registrarControladorSeguro === 'undefined') {
    window.__CONTROLADOR_REGISTRADOS = window.__CONTROLADOR_REGISTRADOS || new Set();
    window.registrarControladorSeguro = async function(tipo, handler, opciones) {
        try {
            (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControladorSeguro called: ${tipo}`);
            if (!tipo || typeof handler !== 'function') {
                (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro parámetros inválidos: tipo=${tipo}`);
                return;
            }
            if (window.__CONTROLADOR_REGISTRADOS.has(tipo)) {
                (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Controlador ya registrado, omitiendo: ${tipo}`);
                return;
            }
            // Track locally (used to generate manifest for migration)
            window.__CONTROLADOR_REGISTRADOS.add(tipo);

            // Prefer central registration via messagingAdapter/state-manager when available
            try {
                const iframeId = (window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo');
                const controladorId = `${iframeId}:${tipo}`;
                if (window.messagingAdapter && typeof window.messagingAdapter.registrarControladorCentral === 'function') {
                    try {
                        const centralRes = await window.messagingAdapter.registrarControladorCentral(controladorId, handler, { tipoMensaje: tipo });
                        if (centralRes === true) {
                            (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador registered centrally: ${controladorId} -> ${tipo}`);
                            return true;
                        }
                    } catch (e) {
                        (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Central registrar failed for ${tipo}: ${e && e.message}`);
                    }
                }
                if (typeof registrarControlador === 'function') {
                    try {
                        const res = await safeRegistrar(tipo, handler, opciones);
                        (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador delegated to mensajeria for ${tipo}`);
                        return res;
                    } catch (error) {
                        (window.logger || console).error && (window.logger || console).error(`[HIJO] Error registrando controlador ${tipo}:`, error);
                    }
                }
            } catch (e) {
                (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Error in registration attempts for ${tipo}: ${e && e.message}`);
            }

            // If we reached here the handler remains tracked locally in __CONTROLADOR_REGISTRADOS
            (window.logger || console).info && (window.logger || console).info(`[HIJO] Handler queued for migration: ${tipo} (local queue)`);
            return;
        } catch (e) {
            (window.logger || console).error(`[HIJO] Error registrando controlador seguro ${tipo}:`, e && e.message);
        }
    }

    // Helper: safeRegistrar delegates to registrarControladorSeguro when available
    if (typeof window !== 'undefined' && typeof window.safeRegistrar === 'undefined') {
        window.safeRegistrar = async function(tipo, handler, opciones) {
            try {
                if (!tipo || typeof handler !== 'function') return;
                if (window.__CONTROLADOR_REGISTRADOS && window.__CONTROLADOR_REGISTRADOS.has(tipo)) return;
                if (typeof window.registrarControladorSeguro === 'function') return window.registrarControladorSeguro(tipo, handler, opciones);
                if (typeof registrarControlador === 'function') return registrarControlador(tipo, handler, opciones);
            } catch (e) { (window.logger || console).warn && (window.logger || console).warn('[HIJO] safeRegistrar error', e && e.message); }
        };
    }
}

/**
 * Calcula multiplicador de timeout según tipo de conexión
 * Metodología consistente con codigo-padre.html (utils.js)
 * @returns {number} Multiplicador (1.0-3.0)
 */
function calcularMultiplicadorTimeoutConexion() {
    try {
        if (!navigator.connection) {
            return 1.5; // Valor moderado si no hay info de conexión
        }

        const effectiveType = navigator.connection.effectiveType || 'unknown';
        const multiplicadores = {
            '4g': 1.0,      // Conexión rápida
            '3g': 1.5,      // Conexión media - 50% más tiempo
            '2g': 2.0,      // Conexión lenta - doble tiempo
            'slow-2g': 3.0, // Conexión muy lenta - triple tiempo
            'unknown': 1.5  // Desconocido - moderado
        };

        return multiplicadores[effectiveType] || 1.5;
    } catch (error) {
        console.warn('[HIJO2][TIMEOUT] Error calculando multiplicador:', error);
        return 1.5;
    }
}

/**
 * Ajusta timeout según conexión de red actual
 * @param {number} timeoutBase - Timeout base en ms
 * @returns {number} Timeout ajustado
 */
function ajustarTimeoutPorConexion(timeoutBase) {
    const multiplicador = calcularMultiplicadorTimeoutConexion();
    const timeoutAjustado = Math.round(timeoutBase * multiplicador);
    console.debug(`[HIJO2][TIMEOUT] ${timeoutBase}ms -> ${timeoutAjustado}ms (${multiplicador}x)`);
    return timeoutAjustado;
}

function iniciarCountdown() {
    const countdownEl = document.getElementById('countdown-timer');
    const countdownContainer = document.getElementById('fuera-rango-countdown');
    if (!countdownEl || !countdownContainer) return;

    countdownContainer.classList.remove('countdown-hidden');

    if (estadoComponente.countdownInterval) {
        clearInterval(estadoComponente.countdownInterval);
    }

    // Actualización inmediata
    const elapsedNow = Date.now() - estadoComponente.timestampSalioDeRango;
    const remainingNow = Math.max(0, estadoComponente.tiempoFueraRequerido - elapsedNow);
    const minsNow = Math.floor(remainingNow / 60000);
    const secsNow = Math.floor((remainingNow % 60000) / 1000);
    countdownEl.textContent = `${String(minsNow).padStart(2, '0')}:${String(secsNow).padStart(2, '0')}`;

    estadoComponente.countdownInterval = setInterval(() => {
        if (estadoComponente.timestampSalioDeRango === null) {
            detenerCountdown();
            return;
        }
        const elapsed = Date.now() - estadoComponente.timestampSalioDeRango;
        const remaining = Math.max(0, estadoComponente.tiempoFueraRequerido - elapsed);
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        countdownEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

        if (remaining <= 0) {
            clearInterval(estadoComponente.countdownInterval);
            estadoComponente.countdownInterval = null;
            countdownEl.textContent = '00:00';
        }
    }, 1000);
}

function detenerCountdown() {
    if (estadoComponente.countdownInterval) {
        clearInterval(estadoComponente.countdownInterval);
        estadoComponente.countdownInterval = null;
    }
    const countdownContainer = document.getElementById('fuera-rango-countdown');
    if (countdownContainer) {
        countdownContainer.classList.add('countdown-hidden');
    }
}

    // === FUERA DE RANGO 5min: solo btn-ubicacion habilitado, todos los demás deshabilitados ===

        if (elementosDOM.btnMapaJpg) desactivarBoton(elementosDOM.btnMapaJpg);

        if (elementosDOM.btnUbicacion) activarBoton(elementosDOM.btnUbicacion);
        logger.debug('⚠️ Fuera de rango >5min: solo btn-ubicacion habilitado, resto deshabilitado');
        return;
    }

    // VIDEO (fotodron): habilitado SOLO cuando hay tramo seleccionado (ambos modos)
    if (elementosDOM.btnVideo) {
        const esTramo = tipoParadaActual === 'tramo' || (idParadaActual && idParadaActual.startsWith('TR-'));

        if (retoActivo) {

            activarBoton(elementosDOM.btnVideo);
            logger.debug(`🎥 Botón video ACTIVADO: tramo seleccionado (${idParadaActual})`);
        } else {
            desactivarBoton(elementosDOM.btnVideo);
            logger.debug('🎥 Botón video DESACTIVADO: no es tramo');
        }
    }

    // IMAGEN: habilitado siempre salvo reto activo
    if (elementosDOM.btnImagen) {
        if (retoActivo) {
            desactivarBoton(elementosDOM.btnImagen);
            logger.debug('📷 Botón imagen DESACTIVADO: reto activo');
        } else {
            activarBoton(elementosDOM.btnImagen);
            logger.debug('📷 Botón imagen ACTIVADO: sin reto');
        }
    }

    // 🛰️ GPS: Deshabilitado en modo casa o reto activo; en aventura por distancia
    if (elementosDOM.btnGps) {
        const esTramo = tipoParadaActual === 'tramo' || (idParadaActual && idParadaActual.startsWith('TR-'));
        if (modo === 'casa') {
            desactivarBoton(elementosDOM.btnGps);
            logger.debug('🛰️ Botón GPS DESACTIVADO: modo casa (forzado)');
        } else if (retoActivo) {
            desactivarBoton(elementosDOM.btnGps);
            logger.debug('🛰️ Botón GPS DESACTIVADO: reto activo');
        } else if (modo === 'aventura') {
            let rangoMinimo = esTramo ? 5 : 0;
            let rangoMaximo = esTramo ? toleranciaGPS : 20;
            const distanciaEnRango = distanciaAlDestino !== null &&
                                   distanciaAlDestino >= rangoMinimo &&
                                   distanciaAlDestino <= rangoMaximo;
            if (distanciaEnRango) {
                activarBoton(elementosDOM.btnGps);
                logger.debug(`🛰️ Botón GPS ACTIVADO (${esTramo ? 'TRAMO' : 'PARADA'}): distancia ${distanciaAlDestino.toFixed(1)}m en rango ${rangoMinimo}-${rangoMaximo}m`);
            } else {
                desactivarBoton(elementosDOM.btnGps);
                logger.debug(`🛰️ Botón GPS DESACTIVADO: distancia ${distanciaAlDestino?.toFixed(1) || 'desconocida'}m fuera de rango ${rangoMinimo}-${rangoMaximo}m`);
                enviarMensaje({
                    tipo: TIPOS_MENSAJE.NAVEGACION.GPS.RESTRINGIDO,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: getPadreId(),
                    datos: {
                        idParada: idParadaActual,
                        distancia: distanciaAlDestino,
                        disponible: 'solo_imagen'
                    }
                }).catch(e => logger.debug('[hijo2] Error notificando GPS restringido:', e.message));
            }
        }
    }

    // 📍 UBICACIÓN: Deshabilitado en modo casa; en aventura lo gestiona verificarDistanciaYActualizarBotones()
    if (elementosDOM.btnUbicacion) {
        if (modo === 'casa') {
            desactivarBoton(elementosDOM.btnUbicacion);
            logger.debug('🧭 Botón ubicación DESACTIVADO: modo casa (forzado)');
        } else if (modo === 'aventura') {
            if (retoActivo) {

                logger.debug('🧭 Botón ubicación DESACTIVADO: reto activo');

        } else {
            desactivarBoton(elementosDOM.btnUbicacion);
            logger.debug(`🧭 Botón ubicación DESACTIVADO: fuera de condiciones`);
        }
    }

    // Botones de mapa completo y mapa JPG siempre están habilitados
    if (elementosDOM.btnMapaCompleto) {
        activarBoton(elementosDOM.btnMapaCompleto);
    }

    if (elementosDOM.btnMapaJpg) {
        activarBoton(elementosDOM.btnMapaJpg);
    }
}

// FUNCIONES HELPER PARA VALIDACIÓN GPS
// ============================================================

/**
 * Calcula la distancia entre dos coordenadas GPS usando fórmula Haversine
 * @param {number} lat1 - Latitud punto 1
 * @param {number} lon1 - Longitud punto 1
 * @param {number} lat2 - Latitud punto 2
 * @param {number} lon2 - Longitud punto 2
 * @returns {number} Distancia en metros
 */
function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371000; // Radio de la Tierra en metros
    const φ1 = lat1 * Math.PI / 180;
    const φ2 = lat2 * Math.PI / 180;
    const Δφ = (lat2 - lat1) * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    
    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
              Math.cos(φ1) * Math.cos(φ2) *
              Math.sin(Δλ/2) * Math.sin(Δλ/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    
    return R * c; // Distancia en metros
}

/**
 * Verifica si el usuario está dentro/fuera del radio de paradas/tramos
 * y actualiza el estado visual del botón de ubicación
 * LÓGICA: Verde habilitado si >50m durante >5min, Rojo deshabilitado si <50m
 * Solo se ejecuta en modo aventura
 */
function verificarDistanciaYActualizarBotones() {
    const logPrefix = '[hijo2][verificarDistanciaYActualizarBotones]';
    
    if (!estadoComponente.posicionActualUsuario) {
        logger.warn(`${logPrefix} No hay posición GPS disponible`);
        return;
    }
    
    const RADIO_PERMITIDO = 50; // metros - radio de validación GPS
    const paradas = window.__vv_coordenadasAventura || [];
    
    if (paradas.length === 0) {
        logger.warn(`${logPrefix} No hay paradas disponibles para validar`);
        return;
    }
    
    let dentroDeRango = false;
    let elementoMasCercano = null;
    let distanciaMinima = Infinity;
    
    // Buscar elemento más cercano (parada o cualquier punto de tramo)
    paradas.forEach(elemento => {
        // PARADAS: Solo validar coordenadas
        if (elemento.tipo === 'parada' && elemento.coordenadas) {
            const dist = calcularDistancia(
                estadoComponente.posicionActualUsuario.lat,
                estadoComponente.posicionActualUsuario.lng,
                elemento.coordenadas.lat,
                elemento.coordenadas.lng
            );
            
            logger.debug(`${logPrefix} Distancia a parada ${elemento.id}: ${dist.toFixed(1)}m`);
            
            if (dist < distanciaMinima) {
                distanciaMinima = dist;
                elementoMasCercano = elemento;
            }
            
            if (dist <= RADIO_PERMITIDO) {
                dentroDeRango = true;
            }
        }
        
        // TRAMOS: Validar inicio, waypoints y fin (importante para viewpoints)
        if (elemento.tipo === 'tramo') {
            const puntosAValidar = [];
            
            if (elemento.inicio) puntosAValidar.push({ ...elemento.inicio, tipo: 'inicio' });
            if (elemento.waypoints && Array.isArray(elemento.waypoints)) {
                elemento.waypoints.forEach((wp, idx) => {
                    puntosAValidar.push({ ...wp, tipo: `waypoint-${idx}` });
                });
            }
            if (elemento.fin) puntosAValidar.push({ ...elemento.fin, tipo: 'fin' });
            
            puntosAValidar.forEach(punto => {
                const dist = calcularDistancia(
                    estadoComponente.posicionActualUsuario.lat,
                    estadoComponente.posicionActualUsuario.lng,
                    punto.lat,
                    punto.lng
                );
                
                logger.debug(`${logPrefix} Distancia a ${elemento.id}[${punto.tipo}]: ${dist.toFixed(1)}m`);
                
                if (dist < distanciaMinima) {
                    distanciaMinima = dist;
                    elementoMasCercano = elemento;
                }
                
                if (dist <= RADIO_PERMITIDO) {
                    dentroDeRango = true;
                }
            });
        }
    });
    
    const ahora = Date.now();
    const btn = elementosDOM.btnUbicacion;
    
    if (!btn) {
        logger.warn(`${logPrefix} Botón de ubicación no encontrado`);
        return;
    }
    
    // LÓGICA CORREGIDA:
    if (dentroDeRango) {
        // DENTRO de rango (<50m) → ROJO DESHABILITADO (estás en la ruta, no necesitas navegar)
        btn.disabled = true;
        btn.style.backgroundColor = '#f44336';
        btn.style.opacity = '0.6';
        
        // Resetear timer si volvió dentro de rango
        if (estadoComponente.timestampSalioDeRango !== null) {
            logger.info(`${logPrefix} ✅ Usuario volvió DENTRO de rango (timer reseteado)`);
            estadoComponente.timestampSalioDeRango = null;
            estadoComponente._notificacionFueraRangoEnviada = false;
            // Ocultar overlay + countdown (visible desde que salió de rango)
            ocultarOverlayFueraRango();
        }

        // Si estaba en modo fuera-de-rango-5min, desactivarlo
        if (estadoComponente.fueraDeRango5min) {
            estadoComponente.fueraDeRango5min = false;
            logger.info(`${logPrefix} ✅ Fuera de rango 5min DESACTIVADO: usuario volvió a ruta`);
            // Recalcular todos los botones para restaurar estados normales
            actualizarEstadoBotones();
        }
    } else {
        // FUERA de rango (>50m)
        if (estadoComponente.timestampSalioDeRango === null) {
            estadoComponente.timestampSalioDeRango = ahora;
            logger.info(`${logPrefix} ⚠️ Usuario SALIÓ de rango (mostrando overlay + countdown 5min)`);
            // Mostrar overlay + countdown INMEDIATAMENTE al salir de rango
            mostrarOverlayFueraRango();
            iniciarCountdown();
        }
        
        const tiempoFuera = ahora - estadoComponente.timestampSalioDeRango;
        
        if (tiempoFuera >= estadoComponente.tiempoFueraRequerido) {
            // Más de 5 min fuera → btn-ubicacion VERDE HABILITADO
            btn.disabled = false;
            btn.style.backgroundColor = '#4CAF50';
            btn.style.opacity = '1';

            // Activar estado fuera-de-rango-5min (deshabilita GPS, video en actualizarEstadoBotones)
            if (!estadoComponente.fueraDeRango5min) {
                estadoComponente.fueraDeRango5min = true;
                // Overlay ya visible desde que salió de rango; countdown llegó a 00:00
                // Recalcular botones para forzar GPS, video a rojo
                actualizarEstadoBotones();
                logger.info(`${logPrefix} ✅ Fuera de rango 5min ACTIVADO: GPS/video deshabilitados`);
            }

            logger.info(`${logPrefix} ✅ btn-ubicacion HABILITADO: Usuario >5min fuera de rango`);
            
            // Notificar al padre (solo una vez) y solicitar polyline
            if (!estadoComponente._notificacionFueraRangoEnviada) {
                estadoComponente._notificacionFueraRangoEnviada = true;
                
                enviarMensaje({
                    tipo: TIPOS_MENSAJE.NAVEGACION.USUARIO_FUERA_RANGO,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: getPadreId(),
                    datos: {
                        distancia: distanciaMinima,
                        tiempoFuera: tiempoFuera,
                        elementoMasCercano: elementoMasCercano?.id || null,
                        timestamp: Date.now()
                    }
                }).catch(e => logger.debug(`${logPrefix} Error notificando usuario fuera de rango:`, e.message));

                // Solicitar polyline desde ubicación actual hasta parada/tramo destino
                const elementoId = estadoComponente.idParadaActual || 'P-0';
                enviarMensaje({
                    tipo: TIPOS_MENSAJE.NAVEGACION.MOSTRAR_UBICACION_POLYLINE,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: getPadreId(),
                    datos: {
                        ubicacionUsuario: estadoComponente.posicionActualUsuario,
                        elementoId: elementoId,
                        centrar: true,
                        zoom: 16
                    }
                }).catch(e => logger.debug(`${logPrefix} Error solicitando polyline:`, e.message));
                
                logger.info(`${logPrefix} 📢 Notificación USUARIO_FUERA_RANGO + polyline enviadas al padre`);
            }
        } else {
            // Menos de 5 min fuera → ROJO DESHABILITADO (esperando)
            btn.disabled = true;
            btn.style.backgroundColor = '#f44336';
            btn.style.opacity = '0.6';
            const segundosRestantes = Math.ceil(Math.max(0, estadoComponente.tiempoFueraRequerido - tiempoFuera) / 1000);
            logger.debug(`${logPrefix} ⏳ Esperando: ${segundosRestantes}s restantes`);
        }
    }
}
