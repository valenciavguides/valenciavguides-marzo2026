// ==================== CONTROLADORES DE MENSAJES ====================

// ACTUALIZAR_POSICION eliminado - tipo de mensaje obsoleto (legacy code)
// Ahora se usa ACTUALIZAR_ESTADO que incluye distancia y otros datos

// 📡 Controlador para actualización de estado GPS (enviado por funciones-mapa.js)
registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.ACTUALIZAR_ESTADO, async (mensaje) => {
    const logPrefix = '[hijo2][ACTUALIZAR_ESTADO]';
    
    try {
        const { distanciaAlDestino, idParada, tipoParada, toleranciaGPS, timestamp, retoActivo, ubicacionActiva } = mensaje.datos;
        
        // Actualizar estado del componente
        if (distanciaAlDestino !== undefined) {
            estadoComponente.distanciaAlDestino = distanciaAlDestino;
        }
        if (idParada !== undefined) {
            estadoComponente.idParadaActual = idParada;
        }
        if (tipoParada !== undefined) {
            estadoComponente.tipoParadaActual = tipoParada;
        }
        if (toleranciaGPS !== undefined) {
            estadoComponente.toleranciaGPS = toleranciaGPS;
            logger.debug(`${logPrefix} 📏 Tolerancia GPS actualizada: ${toleranciaGPS}m (${tipoParada})`);
        }
        if (retoActivo !== undefined) {
            estadoComponente.retoActivo = retoActivo;
            logger.info(`${logPrefix} 🎯 Estado de reto actualizado: ${retoActivo ? 'ACTIVO' : 'INACTIVO'}`);
        }
        if (ubicacionActiva !== undefined) {
            estadoComponente.ubicacionActiva = ubicacionActiva;
            logger.info(`${logPrefix} 🧭 Estado de ubicación actualizado: ${ubicacionActiva ? 'ACTIVA' : 'INACTIVA'}`);
        }
        
        // ✅ CORRECCIÓN CRÍTICA: Detectar llegada a TRAMOS (paradas se manejan en funciones-mapa.js)
        // Las paradas se detectan con watchPosition en funciones-mapa.js, pero los tramos necesitan notificación desde hijo2
        if (tipoParada === 'tramo' && typeof distanciaAlDestino === 'number' && typeof toleranciaGPS === 'number') {
            if (distanciaAlDestino <= toleranciaGPS) {
                // Usuario llegó al rango del tramo → notificar al padre
                // ⚠️ PROTECCIÓN ANTI-DUPLICADOS: Solo enviar una vez por tramo
                if (!estadoComponente._llegadaNotificada || estadoComponente._llegadaNotificada !== idParada) {
                    estadoComponente._llegadaNotificada = idParada;
                    
                    logger.info(`${logPrefix} 🎯 Llegada detectada a tramo ${idParada} (${distanciaAlDestino.toFixed(1)}m ≤ ${toleranciaGPS}m)`);
                    
                    // Notificar al PADRE (no comunicación cruzada)
                    await enviarMensaje({
                        tipo: TIPOS_MENSAJE.NAVEGACION.LLEGADA_DETECTADA,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        destino: getPadreId(),
                        datos: {
                            paradaId: idParada,
                            parada_id: idParada,
                            distancia: distanciaAlDestino,
                            tipoParada: 'tramo',
                            timestamp: Date.now()
                        }
                    }).catch(e => logger.warn(`${logPrefix} Error notificando llegada a tramo:`, e.message));
                }
            } else {
                // Usuario salió del rango → resetear flag para permitir nueva detección
                if (estadoComponente._llegadaNotificada === idParada && distanciaAlDestino > toleranciaGPS * 1.5) {
                    logger.debug(`${logPrefix} 🔄 Usuario salió del rango de ${idParada}, reseteando flag de llegada`);
                    estadoComponente._llegadaNotificada = null;
                }
            }
        }
        
        // Recalcular estados de botones según nueva información
        actualizarEstadoBotones();
        
        logger.debug(`${logPrefix} 📍 Estado actualizado: distancia=${distanciaAlDestino}m, tolerancia=${toleranciaGPS}m, parada=${idParada}, tipo=${tipoParada}, reto=${estadoComponente.retoActivo}, ubicacion=${estadoComponente.ubicacionActiva}`);
    } catch (error) {
        logger.error(`${logPrefix} Error procesando actualización de estado:`, error);
    }
});

/**
 * Controlador: CONTROL.HABILITAR
 * Descripción: Habilita botones cuando el padre lo solicita (ej: después de cerrar un reto)
 */
registrarControladorSeguro(TIPOS_MENSAJE.CONTROL.HABILITAR, async (mensaje) => {
    const logPrefix = '[hijo2][CONTROL.HABILITAR]';
    
    try {
        const { motivo } = mensaje.datos || {};
        logger.info(`${logPrefix} Recibido - motivo: ${motivo}`);

        // Actualizar estado interno
        if (motivo === 'reto_cerrado') {
            estadoComponente.retoActivo = false;
        }

        // Resetear botón activo al cerrar cualquier vista
        setBotonActivo(null);

        // Recalcular estados de todos los botones según reglas GPS
        actualizarEstadoBotones();
        
        logger.debug(`${logPrefix} Botones actualizados según reglas GPS`);
    } catch (error) {
        logger.error(`${logPrefix} Error habilitando controles:`, error);
    }
});

/**
 * Controlador: CONTROL.DESHABILITAR
 * Descripción: Deshabilita botones cuando el padre lo solicita (ej: al abrir un reto)
 */
registrarControladorSeguro(TIPOS_MENSAJE.CONTROL.DESHABILITAR, async (mensaje) => {
    const logPrefix = '[hijo2][CONTROL.DESHABILITAR]';
    
    try {
        const { motivo } = mensaje.datos || {};
        logger.info(`${logPrefix} Recibido - motivo: ${motivo}`);
        
        // Actualizar estado interno
        if (motivo === 'reto_abierto') {
            estadoComponente.retoActivo = true;
        }
        
        // Recalcular estados de todos los botones
        actualizarEstadoBotones();
        
        logger.debug(`${logPrefix} Botones deshabilitados`);
    } catch (error) {
        logger.error(`${logPrefix} Error deshabilitando controles:`, error);
    }
});

// ==================== CONTROLADORES ====================

try {
    // Ocultar la UI hasta que el padre confirme que los controladores están listos
    let _uiConfirmado = false;
    const _originalDisplay = (document.body && document.body.style && document.body.style.display) || '';
    try { if (document.body) document.body.style.display = 'none'; } catch (e) { /* ignore */ }
    function mostrarUI() { if (!_uiConfirmado) { console.warn('[hijo2] mostrarUI ignorado: esperando PADRE_CONFIRMA_HIJO_LISTO'); return; } try { if (document.body) document.body.style.display = _originalDisplay || 'block'; console.log('[hijo2] UI visible tras PADRE_CONFIRMA_HIJO_LISTO'); } catch (e) {} }

    // No necesitamos inicializarMensajeria aquí, los fallbacks esperan automáticamente

    // NOTA: HIJO_PREPARADO se envía MÁS ABAJO, DESPUÉS de registrar todos los controladores críticos.
    // Esto garantiza que el padre no envíe PADRE_DATOS antes de que los controladores estén listos.
    // Ver: "// Enviar HIJO_PREPARADO para indicar que estamos listos para recibir datos del padre"

    // ==================== CONTROLADORES DE DATOS (hijo2 es el experto en coordenadas) ====================
    
    logger.info(`Hijo ${CONFIG_HIJO.IFRAME_ID} registrado el controlador PADRE_DATOS`);
    // ============================================================
    // CONTROLADOR 1: SISTEMA.PADRE_DATOS
    // ============================================================
    registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_DATOS, async (mensaje) => {
        const logPrefix = `[hijo2][PADRE_DATOS]`;

        try {
            if (!mensaje || !mensaje.origen) {
                logger.error(`${logPrefix} Mensaje sin origen válido`, mensaje);
                return;
            }

            logger.info(`${logPrefix} Datos del padre recibidos desde ${mensaje.origen}`);
            logger.info(`Hijo ${CONFIG_HIJO.IFRAME_ID} recibió PADRE_DATOS`);

            // ✅ PROCESAR DATOS INICIALES DEL PADRE
            if (mensaje.datos) {
                const { modo, paradas, paradaActual } = mensaje.datos;

                if (modo) {
                    const modoSeguro = (modo === 'casa' || modo === 'aventura') ? modo : '';
                    logger.info(`${logPrefix} Procesando modo inicial del padre:`, { original: modo, normalizado: modoSeguro });
                    estadoComponente.modo = modoSeguro || modo;
                    if (modoSeguro) document.body.className = `modo-${modoSeguro} hijo2-container`;
                    actualizarEstadoBotones();
                    actualizarEstado(`Modo inicial: ${modoSeguro || modo}`, 'info');
                }

                if (paradas) {
                    logger.debug(`${logPrefix} Paradas recibidas: ${paradas.length}`);
                    // Procesar paradas si necesario
                }

                if (paradaActual) {
                    logger.debug(`${logPrefix} Parada actual: ${paradaActual}`);
                    // Procesar parada actual si necesario
                }
            }

        } catch (error) {
            logger.error(`${logPrefix} Error procesando PADRE_DATOS:`, error);
        }

        // Enviar HIJO_LISTO para completar handshake
        if (!estadoComponente.hijoListoEnviado) {
            try {
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.HIJO_LISTO,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        componenteId: CONFIG_HIJO.COMPONENTE_ID,
                        iframeId: CONFIG_HIJO.IFRAME_ID,
                        timestamp: Date.now()
                    }
                });
                estadoComponente.hijoListoEnviado = true;
                logger.info('[hijo2] HIJO_LISTO enviado al padre');
            } catch (error) {
                logger.error('[hijo2] Error enviando HIJO_LISTO:', error);
            }
        }
    });

    // NOTA: Controlador SISTEMA.PADRE_PIDE_MANEJADORES eliminado (obsoleto).
    // El sistema actual usa state-manager centralizado sin necesidad de migración manual.

    /**
     * Controlador: SISTEMA.PADRE_CONFIRMA_HIJO_LISTO
     * Descripción: Recibe confirmación del padre de que los controladores están listos
     * Origen esperado: padre
     * Respuesta: Ninguna (preparado para futuras solicitudes de datos)
     */
    registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_CONFIRMA_HIJO_LISTO, async (mensaje) => {
        const logPrefix = `[hijo2][PADRE_CONFIRMA_HIJO_LISTO][${mensaje?.origen || 'desconocido'}]`;

        try {
            console.log('[hijo2] PADRE_CONFIRMA_HIJO_LISTO recibido:', mensaje);
            if (!mensaje?.origen) {
                logger.error(`${logPrefix} Mensaje sin origen válido`, mensaje);
                return;
            }

            logger.info(`${logPrefix} Confirmación recibida del padre - controladores listos`);

            // 🔥 NUEVO: Procesar modo inicial si viene en datos
            const { modoInicial } = mensaje.datos || {};
            if (modoInicial) {
                logger.info(`${logPrefix} Modo inicial recibido: ${modoInicial}`);
                estadoComponente.modo = modoInicial;
                actualizarEstadoBotones(); // Actualiza botones según modo
                logger.debug(`${logPrefix} Estado de botones actualizado según modo inicial`);
            }

            // Preparado para futuras solicitudes de datos adicionales del padre
            logger.debug(`${logPrefix} Componente listo para recibir datos adicionales si es necesario`);

            // Verificación diferida: si CARGAR_COORDENADAS o CARGAR_TEXTOS no llegaron, solicitarlos
            setTimeout(() => {
                if (!window.__vv_coordenadasAventura || !Array.isArray(window.__vv_coordenadasAventura) || window.__vv_coordenadasAventura.length === 0) {
                    logger.warn('[hijo2] ⚠️ Coordenadas no recibidas tras 3s — solicitando al padre');
                    enviarMensaje({
                        tipo: TIPOS_MENSAJE.DATOS.SOLICITAR_COORDENADAS,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        destino: getPadreId(),
                        datos: { motivo: 'datos_no_recibidos', timestamp: Date.now() }
                    }).catch(err => logger.error('[hijo2] Error solicitando coordenadas:', err));
                }
                if (!window.__vv_textosAventura || !Array.isArray(window.__vv_textosAventura) || window.__vv_textosAventura.length === 0) {
                    logger.warn('[hijo2] ⚠️ Textos no recibidos tras 3s — solicitando al padre');
                    enviarMensaje({
                        tipo: TIPOS_MENSAJE.DATOS.SOLICITAR_TEXTOS,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        destino: getPadreId(),
                        datos: { motivo: 'datos_no_recibidos', timestamp: Date.now() }
                    }).catch(err => logger.error('[hijo2] Error solicitando textos:', err));
                }
            }, 3000);

            // Si teníamos un cambio de modo pendiente, aplicarlo ahora
            try {
                if (estadoComponente.pendingCambioModo && estadoComponente.pendingCambioModo.modo) {
                    const modoPendiente = estadoComponente.pendingCambioModo.modo;
                    logger.info(`${logPrefix} Aplicando cambio de modo pendiente: ${modoPendiente}`);
                    estadoComponente.modo = modoPendiente;
                    actualizarEstadoBotones();
                    // Notificar confirmación al padre
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: { tipo: 'inicializacion', modo: modoPendiente }
                    });
                    delete estadoComponente.pendingCambioModo;
                }
            } catch (err) {
                logger.error(`${logPrefix} Error aplicando cambio de modo pendiente:`, err);
            }

            // Mostrar UI ahora que el padre confirmó
            try { _uiConfirmado = true; mostrarUI(); } catch (e) { /* ignore */ }
            try { await enviarMensaje({ destino: getPadreId(), tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION, origen: CONFIG_HIJO.IFRAME_ID, datos: { tipo: 'UI_VISIBLE', timestamp: Date.now() } }).catch(() => {}); } catch (e) { /* ignore */ }

        } catch (error) {
            logger.error(`${logPrefix} Error procesando confirmación del padre:`, error);
        }
    });

    /**
     * Controlador: SISTEMA.CAMBIO_MODO
     * Protocolo bidireccional:
     * 1. Padre → Hijo: CAMBIO_MODO
     * 2. Hijo → Padre: CAMBIO_MODO_ENTENDIDO
     * 3. Hijo procesa cambio
     * 4. Hijo → Padre: CAMBIO_MODO_EFECTUADO
     * 5. Padre → Hijo: CAMBIO_MODO_APLICADO
     */
    registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO, async (mensaje) => {
        const logPrefix = `[hijo2][CAMBIO_MODO]`;

        try {
            // Paso 1: Validar carga secuencial
            if (!mensaje.datos?.secuenciaCompleta) {
                logger.warn(`${logPrefix} Mensaje recibido antes de secuencia completa`);
                if (estadoComponente) estadoComponente.pendingCambioModo = mensaje.datos || { modo: null };
                await enviarMensaje({
                    tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: mensaje.origen,
                    datos: {
                        error: 'Secuencia no completa',
                        esperarPermiso: true,
                        tipoOriginal: mensaje.tipo,
                        modoSolicitado: mensaje.datos?.modo
                    }
                });
                return;
            }

            // Paso 2: Extraer y validar datos
            const { modo } = mensaje.datos || {};
            if (!modo || !['casa', 'aventura'].includes(modo)) {
                logger.error(`${logPrefix} Modo inválido: ${modo}`);
                await enviarMensaje({
                    tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: mensaje.origen,
                    datos: { error: 'Modo inválido', modoRecibido: modo }
                });
                return;
            }

            // Paso 3: Enviar ENTENDIDO
            logger.info(`${logPrefix} Cambio de modo a "${modo}" entendido`);
            
            // Validación explícita antes de enviar
            const destinoEntendido = mensaje.origen;
            const tipoEntendido = TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_ENTENDIDO;
            const origenEntendido = CONFIG_HIJO?.IFRAME_ID || 'hijo2';
            
            // DEBUG: Console.log directo para diagnóstico (bypass suppress-warnings)
            if (!destinoEntendido || !tipoEntendido || !origenEntendido) {
                const debugInfo = {
                    destino: destinoEntendido,
                    tipo: tipoEntendido,
                    origen: origenEntendido,
                    TIPOS_MENSAJE_exists: typeof TIPOS_MENSAJE !== 'undefined',
                    TIPOS_MENSAJE_SISTEMA_exists: typeof TIPOS_MENSAJE?.SISTEMA !== 'undefined',
                    CONFIG_HIJO_exists: typeof CONFIG_HIJO !== 'undefined',
                    mensaje_origen: mensaje?.origen
                };
                console.error('[hijo2][CAMBIO_MODO] 🔴 DEBUG CAMPOS UNDEFINED:', JSON.stringify(debugInfo, null, 2));
                logger.error(`${logPrefix} ❌ Campos undefined antes de enviar ENTENDIDO:`, debugInfo);
                throw new Error('Campos undefined en CAMBIO_MODO_ENTENDIDO');
            }
            
            await enviarMensaje({
                destino: destinoEntendido,
                tipo: tipoEntendido,
                origen: origenEntendido,
                datos: { 
                    modo, 
                    timestamp: Date.now(),
                    mensajeId: mensaje.datos?.mensajeId || mensaje.id
                }
            });

            // Paso 4: Procesar cambio
            logger.info(`${logPrefix} Procesando cambio a modo: ${modo}`);
            estadoComponente.modo = modo;
            estadoComponente.paradaActual = null;
            estadoComponente.tipoParadaActual = null;
            estadoComponente.retoActivo = false;
            estadoComponente.ubicacionActiva = false;
            estadoComponente.gpsActivo = false;
            
            // Paso 4.1: Resetear timer GPS y actualizar botón según nuevo modo
            if (estadoComponente.timestampSalioDeRango !== null) {
                logger.info(`${logPrefix} Reseteando timer GPS por cambio de modo`);
                estadoComponente.timestampSalioDeRango = null;
            }
            
            const btn = elementosDOM.btnUbicacion;
            if (btn) {
                if (modo === 'casa') {
                    btn.disabled = true;
                    btn.style.backgroundColor = '#f44336'; // Rojo
                    btn.style.opacity = '0.6';
                    btn.title = 'Ubicación no disponible en modo casa';
                    logger.info(`${logPrefix} → Modo CASA: botón rojo deshabilitado`);
                } else {
                    logger.info(`${logPrefix} → Modo AVENTURA: botón controlado por distancias`);
                    if (estadoComponente.posicionActualUsuario) {
                        verificarDistanciaYActualizarBotones();
                    }
                }
            }
            
            logger.debug(`${logPrefix} Estado reseteado para nuevo modo`);
            actualizarEstadoBotones();

            // Paso 5: Enviar EFECTUADO
            logger.info(`${logPrefix} Cambio de modo a "${modo}" efectuado`);
            await enviarMensaje({
                destino: mensaje.origen,
                tipo: TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_EFECTUADO,
                origen: CONFIG_HIJO?.IFRAME_ID || 'hijo2',
                datos: { 
                    modo, 
                    exito: true, 
                    timestamp: Date.now(),
                    mensajeId: mensaje.datos?.mensajeId || mensaje.id
                }
            });

        } catch (error) {
            logger.error(`${logPrefix} Error:`, error);
            try {
                await enviarMensaje({
                    tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: mensaje.origen || 'padre',
                    datos: { error: error.message, tipo: 'CAMBIO_MODO_FALLIDO' }
                });
            } catch (e) {
                logger.error(`${logPrefix} Error notificando fallo:`, e);
            }
        }
    });

    /**
     * Controlador: SISTEMA.CAMBIO_MODO_APLICADO
     * Confirmación final del padre de que el cambio fue aplicado globalmente
     */
    registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_APLICADO, async (mensaje) => {
        const logPrefix = `[hijo2][CAMBIO_MODO_APLICADO]`;
        try {
            const { modo } = mensaje.datos || {};
            logger.success(`${logPrefix} ✅ Cambio de modo a "${modo}" aplicado globalmente`);
        } catch (error) {
            logger.error(`${logPrefix} Error:`, error);
        }
    });

    // ============================================================
    // CONTROLADOR: DATOS.CARGAR_COORDENADAS
    // Recibe coordenadas centralizadas del padre al iniciar aventura
    // ============================================================
    
    /**
     * Controlador: DATOS.CARGAR_COORDENADAS
     * Descripción: Recibe y almacena las coordenadas de la aventura seleccionada
     * Origen: padre (codigo-padre.html)
     * Datos recibidos: { aventura, idioma, coordenadas: Array, total, timestamp }
     */
    registrarControladorSeguro(TIPOS_MENSAJE.DATOS.CARGAR_COORDENADAS, async (mensaje) => {
        const logPrefix = `[hijo2][CARGAR_COORDENADAS]`;
        
        try {
            const { aventura, idioma, coordenadas, total, timestamp } = mensaje.datos || {};
            
            logger.info(`${logPrefix} 📥 Recibiendo coordenadas de ${aventura} (${idioma}): ${total} elementos`);
            
            if (!coordenadas || !Array.isArray(coordenadas)) {
                throw new Error('Datos de coordenadas inválidos o no son un array');
            }
            
            // Almacenar en estado global (igual que audios y retos)
            window.__vv_coordenadasAventura = coordenadas;
            window.__vv_aventuraActual = aventura;
            window.__vv_idiomaActual = idioma;
            
            logger.info(`${logPrefix} ✅ ${coordenadas.length} coordenadas almacenadas en window.__vv_coordenadasAventura`);
            
            // Enviar confirmación al padre
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.DATOS.COORDENADAS_CARGADAS,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: {
                    exito: true,
                    aventura: aventura,
                    idioma: idioma,
                    totalCargadas: coordenadas.length,
                    timestamp: Date.now()
                }
            });
            
            logger.success(`${logPrefix} ✅ Confirmación COORDENADAS_CARGADAS enviada al padre`);
            
        } catch (error) {
            logger.error(`${logPrefix} Error cargando coordenadas:`, error);
            
            // Enviar error al padre
            try {
                await enviarMensaje({
                    tipo: TIPOS_MENSAJE.DATOS.COORDENADAS_CARGADAS,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: getPadreId(),
                    datos: {
                        exito: false,
                        error: error.message,
                        timestamp: Date.now()
                    }
                });
            } catch (sendError) {
                logger.error(`${logPrefix} Error enviando confirmación de error:`, sendError);
            }
        }
    });

    // CONTROLADOR: DATOS.CARGAR_TEXTOS
    // Recibe textos centralizados del padre al iniciar aventura
    // ============================================================
    registrarControladorSeguro(TIPOS_MENSAJE.DATOS.CARGAR_TEXTOS, async (mensaje) => {
        const logPrefix = `[hijo2][CARGAR_TEXTOS]`;
        
        try {
            const { aventura, idioma, textos, total, timestamp } = mensaje.datos || {};
            
            logger.info(`${logPrefix} Recibiendo textos de ${aventura} (${idioma}): ${total} elementos`);
            
            if (!textos || !Array.isArray(textos)) {
                throw new Error('Datos de textos inválidos o no son un array');
            }
            
            // Almacenar en estado global
            window.__vv_textosAventura = textos;
            
            logger.info(`${logPrefix} ${textos.length} textos almacenados en window.__vv_textosAventura`);
            
            // Enviar confirmación al padre
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.DATOS.TEXTOS_CARGADOS,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: {
                    exito: true,
                    aventura: aventura,
                    idioma: idioma,
                    totalCargados: textos.length,
                    timestamp: Date.now()
                }
            });
            
        } catch (error) {
            logger.error(`${logPrefix} Error cargando textos:`, error);
            
            try {
                await enviarMensaje({
                    tipo: TIPOS_MENSAJE.DATOS.TEXTOS_CARGADOS,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: getPadreId(),
                    datos: {
                        exito: false,
                        error: error.message,
                        timestamp: Date.now()
                    }
                });
            } catch (sendError) {
                logger.error(`${logPrefix} Error enviando confirmación de error:`, sendError);
            }
        }
    });

    /**
     * Controlador: DATOS.COORDENADAS_PARADAS_REQUEST
     * Descripción: Envía coordenadas filtradas por paradaId o el array completo al solicitante
     * Origen esperado: padre
     * Respuesta: DATOS.COORDENADAS_PARADAS_RESPONSE
     *
     * Datos recibidos: {
     *     paradaId?: string (opcional - filtra por ID específico),
     *     incluirRutas?: boolean,
     *     incluirMarcadores?: boolean,
     *     actualizarMapa?: boolean,
     *     contexto?: string
     * }
     * Datos enviados: { coordenadas: Array, total: number, exito: boolean, mensajeOriginal: string, paradaId?: string }
     */
    registrarControladorSeguro(TIPOS_MENSAJE.DATOS.COORDENADAS_PARADAS_REQUEST, async (mensaje) => {
        const logPrefix = `[hijo2][COORDENADAS_PARADAS_REQUEST]`;
        
        try {
            const { paradaId, incluirRutas, incluirMarcadores, actualizarMapa, contexto, pedidoId } = mensaje.datos || {};
            
            logger.info(`${logPrefix} 📥 Solicitud recibida - paradaId: ${paradaId || 'TODAS'}, contexto: ${contexto}`);
            
            // Obtener coordenadas almacenadas
            const todasCoordenadas = obtenerCoordenadasParadas();
            
            if (!todasCoordenadas || todasCoordenadas.length === 0) {
                logger.warn(`${logPrefix} No hay coordenadas cargadas todavía`);
                // Return para confirmación automática
                return {
                    coordenadas: [],
                    total: 0,
                    exito: false,
                    error: 'No hay coordenadas cargadas',
                    pedidoId: pedidoId,
                    contexto: contexto
                };
            }
            
            // Filtrar por paradaId si se especifica
            let coordenadasFiltradas;
            if (paradaId) {
                // Buscar SOLO la parada o tramo específico por ID exacto
                coordenadasFiltradas = todasCoordenadas.filter(c => c.id === paradaId);
                logger.debug(`${logPrefix} Filtrado exacto por ${paradaId}: ${coordenadasFiltradas.length} coordenadas`);

                // ✅ Actualizar tipoParadaActual e idParadaActual para que los botones reflejen
                // el elemento seleccionado (especialmente el botón de video en modo casa)
                const tipoDetectado = coordenadasFiltradas[0]?.tipo
                    || (paradaId.startsWith('TR-') ? 'tramo' : 'parada');
                estadoComponente.idParadaActual = paradaId;
                estadoComponente.tipoParadaActual = tipoDetectado;
                actualizarEstadoBotones();
                logger.debug(`${logPrefix} Estado botones actualizado: id=${paradaId} tipo=${tipoDetectado}`);
            } else {
                // Sin filtro = todas las coordenadas
                coordenadasFiltradas = todasCoordenadas;
                logger.debug(`${logPrefix} Enviando TODAS las coordenadas: ${coordenadasFiltradas.length}`);
            }
            
            const respuesta = {
                coordenadas: coordenadasFiltradas,
                total: coordenadasFiltradas.length,
                exito: true,
                paradaId: paradaId || null,
                pedidoId: pedidoId,
                incluirRutas: incluirRutas !== false,
                incluirMarcadores: incluirMarcadores !== false,
                actualizarMapa: actualizarMapa !== false,
                contexto: contexto
            };
            
            // También enviar respuesta por mensaje normal para compatibilidad
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.DATOS.COORDENADAS_PARADAS_RESPONSE,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: mensaje.origen,
                datos: respuesta
            });
            
            logger.success(`${logPrefix} ✅ Enviadas ${coordenadasFiltradas.length} coordenadas`);
            
            // Return para confirmación automática
            return respuesta;
            
        } catch (error) {
            logger.error(`${logPrefix} Error procesando solicitud:`, error);
            
            const errorResponse = {
                coordenadas: [],
                total: 0,
                exito: false,
                error: error.message,
                pedidoId: mensaje.datos?.pedidoId,
                contexto: mensaje.datos?.contexto
            };
            
            try {
                await enviarMensaje({
                    tipo: TIPOS_MENSAJE.DATOS.COORDENADAS_PARADAS_RESPONSE,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    destino: mensaje.origen,
                    datos: errorResponse
                });
            } catch (sendError) {
                logger.error(`${logPrefix} Error enviando respuesta de error:`, sendError);
            }
            
            // Return para confirmación automática
            return errorResponse;
        }
    });

    /**
     * Controlador: SISTEMA.HEARTBEAT
     * Descripción: Responde a pings de monitoreo del padre para verificar que el componente está activo
     * Origen esperado: padre (monitoreo.js)
     * Respuesta: SISTEMA.HEARTBEAT_RESPONSE
     * 
     * Datos recibidos: { timestamp: number }
     * Datos enviados: { timestamp: number, estado: string, gpsActivo: boolean, paradaActual: any }
     * 
     * Nota: Incluye información del estado interno para diagnóstico
     */
    registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.HEARTBEAT, async (mensaje) => {
        const logPrefix = `[hijo2][HEARTBEAT][${mensaje?.origen || 'desconocido'}]`;
        
        try {
            // Responder inmediatamente con estado actual
            await enviarMensaje({
                destino: mensaje.origen,
                tipo: TIPOS_MENSAJE.SISTEMA.HEARTBEAT_RESPONSE,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: { 
                    timestamp: Date.now(),
                    estado: estadoComponente.inicializado ? 'activo' : 'inicializando',
                    gpsActivo: estadoComponente.gpsActivo,
                    paradaActual: estadoComponente.paradaActual,
                    coordenadasCargadas: obtenerCoordenadasParadas().length
                }
            });
            
            logger.debug(`${logPrefix} Heartbeat respondido - Estado: ${estadoComponente.inicializado ? 'activo' : 'inicializando'}`);
        } catch (error) {
            logger.error(`${logPrefix} Error respondiendo heartbeat:`, error);
        }
    });

    // Controlador: SISTEMA.HEARTBEAT.START (activar comportamiento local de heartbeat)
    registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.HEARTBEAT_START, async (mensaje) => {
        const logPrefix = `[hijo2][HEARTBEAT_START][${mensaje?.origen || 'desconocido'}]`;
        try {
            estadoComponente.heartbeatActivo = true;
            logger.info(`${logPrefix} Activado heartbeat local`);
            return { started: true };
        } catch (error) {
            logger.error(`${logPrefix} Error procesando HEARTBEAT_START:`, error);
            return { started: false, error: error && error.message };
        }
    });

    // Controlador: SISTEMA.HEARTBEAT.PAUSE (desactivar comportamiento local de heartbeat)
    registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.HEARTBEAT_PAUSE, async (mensaje) => {
        const logPrefix = `[hijo2][HEARTBEAT_PAUSE][${mensaje?.origen || 'desconocido'}]`;
        try {
            estadoComponente.heartbeatActivo = false;
            logger.info(`${logPrefix} Pausado heartbeat local`);
            return { paused: true };
        } catch (error) {
            logger.error(`${logPrefix} Error procesando HEARTBEAT_PAUSE:`, error);
            return { paused: false, error: error && error.message };
        }
    });

    // Controlador para respuesta de datos de paradas del padre
    registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.RESPUESTA_DATOS_PARADAS, async (mensaje) => {
        const logPrefix = `[hijo2][NAVEGACION.RESPUESTA_DATOS_PARADAS][${mensaje?.origen || 'desconocido'}]`;
        
        try {
            // Solo bloquear el primer envío masivo de datos (carga inicial).
            // Actualizaciones posteriores (cambio de parada) deben procesarse.
            const esCargaInicial = !estadoComponente.datosRecibidos;

            if (!esCargaInicial && mensaje.datos?.paradas?.length > 5) {
                logger.debug(`${logPrefix} Datos iniciales ya recibidos, ignorando envío masivo duplicado`);
                return;
            }
            
            logger.debug(`${logPrefix} Respuesta de paradas recibida`);
            
            // Validación de datos
            if (!mensaje.datos || !mensaje.datos.paradas || !Array.isArray(mensaje.datos.paradas)) {
                logger.error(`${logPrefix} Datos de paradas inválidos`, mensaje.datos);
                return;
            }
            
            // Almacenar datos localmente — usar helper central de normalización
            try {
                estadoComponente.arrayParadasLocal = normalizarParadas(mensaje.datos.paradas || []);
                estadoComponente.datosRecibidos = true;
            } catch (err) {
                logger.error(`${logPrefix} Error normalizando/parando datos de paradas:`, err);
                return;
            }
            
            // ✅ Si se especifica paradaActual, actualizar el estado
            if (mensaje.datos.paradaActual) {
                estadoComponente.idParadaActual = mensaje.datos.paradaActual;
                estadoComponente.tipoParadaActual = mensaje.datos.paradaActual.startsWith('TR-') ? 'tramo' : 'parada';
                
                logger.debug(`${logPrefix} Parada actual actualizada: ${mensaje.datos.paradaActual}`);
            }
            
            // ✅ Refrescar botones tras actualizar estado de parada
            actualizarEstadoBotones();

            logger.info(`${logPrefix} Datos almacenados:`, {
                totalParadas: estadoComponente.arrayParadasLocal.length,
                paradaActual: estadoComponente.idParadaActual,
                tipoParada: estadoComponente.tipoParadaActual,
                primerasParadas: estadoComponente.arrayParadasLocal.slice(0, 3).map(p => ({
                    id: p.id,
                    nombre: p.nombre,
                    tieneImagen: !!p.imagen,
                    tieneVideo: !!p.video
                }))
            });
            
            // Confirmar recepción al padre
            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION,
                origen: CONFIG_HIJO.IFRAME_ID,
                idOriginal: mensaje.id, // CLAVE: permite resolver promesas pendientes
                datos: {
                    tipoConfirmacion: 'DATOS_RECIBIDOS',
                    totalParadas: estadoComponente.arrayParadasLocal.length
                }
            });
            
        } catch (error) {
            logger.error(`${logPrefix} Error al procesar respuesta de datos de paradas:`, error);
        }
    });

    // Controlador para solicitud de coordenadas del padre
    registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.SOLICITAR_COORDENADAS, async (mensaje) => {
        const logPrefix = `[hijo2][NAVEGACION.SOLICITAR_COORDENADAS][${mensaje?.origen || 'desconocido'}]`;
        
        try {
            const { paradaId, tipoConsulta } = mensaje.datos;
            
            // Validar datos requeridos
            if (!paradaId) {
                logger.error(`${logPrefix} paradaId requerido faltante`);
                return;
            }
            if (!tipoConsulta) {
                logger.error(`${logPrefix} tipoConsulta requerido faltante`);
                return;
            }
            if (tipoConsulta !== 'COORDENADAS') {
                logger.error(`${logPrefix} tipoConsulta inválido: ${tipoConsulta}, esperado: COORDENADAS`);
                return;
            }
            
            logger.info(`${logPrefix} Solicitud de información COMPLETA para ${paradaId}`);
            
            // Buscar parada en datos centralizados (prioriza datos del padre)
            const parada = obtenerCoordenadasParadas().find(p => p.id === paradaId);
            
            if (!parada) {
                logger.warn(`${logPrefix} Parada no encontrada en datos centralizados para ${paradaId}`);
                return;
            }
            
            // Obtener coordenadas según tipo de parada
            const coordenadas = parada.coordenadas || parada.inicio;
            
            // Validar que las coordenadas sean válidas
            if (!coordenadas || !coordenadas.lat || !coordenadas.lng) {
                logger.error(`${logPrefix} Coordenadas inválidas para ${paradaId}:`, coordenadas);
                return;
            }
            
            // ✅ INFORMACIÓN COMPLETA con multimedia
            const informacionCompleta = {
                paradaId,
                id: parada.id,
                tipo: parada.tipo,
                nombre: parada.nombre,
                lat: coordenadas.lat,
                lng: coordenadas.lng,
                coordenadas: coordenadas,
                coordenadasFin: parada.fin, // Para tramos
                waypoints: parada.waypoints,
                // 🎯 MULTIMEDIA COMPLETA
                imagen: parada.imagen || null,
                video: parada.video || null
            };
            
            // Responder al padre con información completa
            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.NAVEGACION.RESPUESTA_COORDENADAS,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: informacionCompleta
            });
            
            logger.info(`${logPrefix} Información completa enviada para ${paradaId}:`, {
                tieneImagen: !!informacionCompleta.imagen,
                tieneVideo: !!informacionCompleta.video
            });
            
        } catch (error) {
            logger.error(`${logPrefix} Error respondiendo coordenadas:`, error);
        }
    });

    // Controlador para ACK del sistema
    registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.ACK, async (mensaje) => {
        const logPrefix = `[hijo2][SISTEMA.ACK][${mensaje?.origen || 'desconocido'}]`;
        
        try {
            logger.debug(`${logPrefix} ACK recibido, respondiendo...`);
            
            // Responder al ACK
            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.SISTEMA.ACK,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    componenteId: CONFIG_HIJO.COMPONENTE_ID,
                    timestamp: Date.now(),
                    estado: 'activo'
                }
            });
            
            logger.debug(`${logPrefix} ACK respondido`);
            
        } catch (error) {
            logger.error(`${logPrefix} Error respondiendo ACK:`, error);
        }
    });

    // ============================================================
    // HANDLERS GPS
    // ============================================================
    registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.UBICACION_ACTUALIZADA, async (mensaje) => {
        const logPrefix = '[hijo2][GPS.UBICACION_ACTUALIZADA]';
        try {
            const datos = mensaje.datos || {};
            const { lat, lng, accuracy, timestamp, cached, fresh, heading } = datos;
            
            // Validar datos mínimos
            if (lat === undefined || lng === undefined) {
                logger.warn(`${logPrefix} Datos GPS incompletos:`, datos);
                return { exito: false, error: 'Coordenadas inválidas' };
            }
            
            // Actualizar heading si está disponible (brújula del dispositivo)
            if (heading !== undefined && heading !== null) {
                estadoComponente.ultimoHeading = heading;
            }
            
            // Guardar posición en estadoComponente
            const posicionPrevia = estadoComponente.posicionActualUsuario;
            estadoComponente.posicionActualUsuario = { lat, lng };
            logger.info(`${logPrefix} 📍 Ubicación GPS recibida: [${lat}, ${lng}] ±${Math.round(accuracy || 0)}m ${cached ? '(caché)' : fresh ? '(fresca)' : ''}`);
            
            // Calcular heading basado en movimiento si no viene del GPS
            if (heading === undefined && posicionPrevia && posicionPrevia.lat && posicionPrevia.lng) {
                const deltaLat = lat - posicionPrevia.lat;
                const deltaLng = lng - posicionPrevia.lng;
                if (Math.abs(deltaLat) > 0.00001 || Math.abs(deltaLng) > 0.00001) {
                    // Calcular ángulo de movimiento (0° = Norte, 90° = Este)
                    estadoComponente.ultimoHeading = Math.atan2(deltaLng, deltaLat) * (180 / Math.PI);
                    if (estadoComponente.ultimoHeading < 0) estadoComponente.ultimoHeading += 360;
                }
            }
            
            // Solicitar al padre que actualice el marcador en el mapa (NO tocamos Leaflet aquí)
            // BUG CORREGIDO: localStorage.getItem('modoActual') nunca se escribía → siempre devolvía 'casa'
            // Ahora se usa estadoComponente.modo que SÍ se actualiza en el handler CAMBIO_MODO
            const modoActual = (estadoComponente && estadoComponente.modo) || 'casa';
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.NAVEGACION.ACTUALIZAR_MARCADOR_USUARIO,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: {
                    lat: lat,
                    lng: lng,
                    heading: estadoComponente.ultimoHeading || 0,
                    accuracy: accuracy || 0,
                    modo: modoActual // AVENTURA: flecha azul, CASA: emoji 🛸
                }
            });
            
            // Solo validar distancias si estamos en modo aventura (GPS activo en ambos modos)
            if (modoActual === 'aventura') {
                logger.debug(`${logPrefix} 📏 Modo AVENTURA: verificando distancias a paradas`);
                verificarDistanciaYActualizarBotones();
            } else {
                logger.debug(`${logPrefix} 🏠 Modo CASA: GPS activo pero botón siempre rojo deshabilitado`);
                // Forzar botón rojo en modo casa (no validar distancias)
                const btn = elementosDOM.btnUbicacion;
                if (btn) {
                    btn.disabled = true;
                    btn.style.backgroundColor = '#f44336'; // Rojo
                    btn.style.opacity = '0.6';
                    btn.title = 'Ubicación no disponible en modo casa';
                }
            }
            
            actualizarEstado(`GPS ±${Math.round(accuracy || 0)}m`, 'success');
            return { exito: true };
            
        } catch (e) {
            logger.error(`${logPrefix} Error procesando ubicación GPS:`, e);
            actualizarEstado('Error procesando ubicación', 'error');
            return { exito: false, error: e.message };
        }
    });

    registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.ESTADO_ACTUALIZADO, async (mensaje) => {
        const logPrefix = '[hijo2][GPS.ESTADO_ACTUALIZADO]';
        try {
            const datos = mensaje?.datos || {};
            logger.debug(`${logPrefix} Estado GPS recibido:`, datos);
            
            // BUG CORREGIDO: localStorage.getItem('modoActual') nunca se escribía → siempre 'casa'
            const modoActual = (estadoComponente && estadoComponente.modo) || 'casa';
            const btn = elementosDOM.btnUbicacion;
            
            if (!btn) {
                logger.warn(`${logPrefix} Botón ubicación no encontrado`);
                return { exito: true };
            }
            
            // MODO CASA: Siempre rojo deshabilitado (ignorar estado GPS)
            if (modoActual === 'casa') {
                btn.disabled = true;
                btn.style.backgroundColor = '#f44336'; // Rojo
                btn.style.opacity = '0.6';
                btn.title = 'Ubicación no disponible en modo casa';
                logger.debug(`${logPrefix} Modo casa: botón forzado a rojo deshabilitado`);
                return { exito: true };
            }
            
            // MODO AVENTURA: Depende de verificación de distancias
            // No modificar aquí - la lógica la maneja verificarDistanciaYActualizarBotones()
            logger.debug(`${logPrefix} Modo aventura: estado controlado por distancias`);
            
            return { exito: true };
        } catch (e) {
            logger.error(`${logPrefix} Error en handler:`, e);
            return { exito: false, error: e.message };
        }
    });

    safeRegistrar(TIPOS_MENSAJE.NAVEGACION.GPS.ERROR, async (mensaje) => {
        try {
            const datos = mensaje?.datos || {};
            const { codigo } = datos;
            const errorMensaje = datos.mensaje || datos.message || null;
            const contexto = datos.contexto || datos.context || 'desconocido';
            const codeMap = { 1: 'PERMISSION_DENIED', 2: 'POSITION_UNAVAILABLE', 3: 'TIMEOUT' };
            const codeDesc = codeMap[codigo] || 'UNKNOWN_CODE';
            let details;
            try { details = JSON.stringify({ codigo, codeDesc, mensaje: errorMensaje, contexto }, null, 2); } catch (e) { details = `codigo=${codigo} mensaje=${String(errorMensaje)} contexto=${String(contexto)}`; }
            logger.error(`[hijo2][GPS.ERROR] Error GPS recibido: ${details}`);
            // Telemetría: incrementar contador por código de error GPS en hijo2
            try { if (codigo !== undefined) { typeof window.incrementarContador === 'function' && window.incrementarContador(`gps_error_code_${codigo}`); } } catch (err) { /* ignore */ }
            // Enviar métrica a monitoreo (si mensajería disponible)
            try { if (typeof enviarMensaje === 'function') { enviarMensaje({ tipo: TIPOS_MENSAJE.MONITOREO.METRICA, origen: CONFIG_HIJO.IFRAME_ID || 'hijo2', destino: getPadreId(), datos: { nombre: 'gps_error_code', valor: 1, metadatos: { codigo } } }).catch(() => {}); } } catch (ignore) { /* ignore */ }
            return { exito: true };
        } catch (e) {
            logger.error('[hijo2][GPS.ERROR] Error en handler no-op:', e);
            return { exito: false, error: e.message };
        }
    });

    // ============================================================
    // CONTROLADOR CAMBIO_PARADA: actualizar estado local y botones
    // ============================================================
    registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA, async (mensaje) => {
        try {
            const datos = mensaje?.datos || {};
            const parada_id = datos.parada_id || datos.paradaId || null;
            const tipoRecibido = datos.tipo ||
                (parada_id && parada_id.startsWith('TR-') ? 'tramo' : 'parada');

            if (parada_id) estadoComponente.idParadaActual = parada_id;
            estadoComponente.tipoParadaActual = tipoRecibido;

            logger.debug(`[hijo2][CAMBIO_PARADA] parada=${parada_id} tipo=${tipoRecibido}`);

            // Resetear botón activo al cambiar de parada
            setBotonActivo(null);

            // Refrescar estado de botones con el nuevo tipo
            actualizarEstadoBotones();
        } catch (e) {
            logger.error('[hijo2][CAMBIO_PARADA] Error:', e);
        }
    });

    // Notificar al padre que hijo2 está listo
    try {
        logger.debug('[hijo2] Controladores críticos registrados; enviando HIJO_PREPARADO ahora');
    } catch (e) { /* ignore */ }

    // Enviar HIJO_PREPARADO para indicar que estamos listos para recibir datos del padre
    try {
        await enviarMensaje({
            destino: getPadreId(),
            tipo: TIPOS_MENSAJE.SISTEMA.HIJO_PREPARADO,
            origen: CONFIG_HIJO.IFRAME_ID,
            datos: {
                componenteId: CONFIG_HIJO.COMPONENTE_ID,
                coordenadasDisponibles: obtenerCoordenadasParadas().length,
                capacidades: ['navegacion', 'coordenadas'],
                timestamp: Date.now()
            }
        });
        logger.debug('[hijo2] HIJO_PREPARADO enviado, esperando PADRE_DATOS');
    } catch (e) {
        logger.warn('[hijo2] Error enviando HIJO_PREPARADO:', e && e.message ? e.message : e);
    }

// Removed stray closing catch block after initialization. The initialization try/catch above is sufficient.

// Implementar pagehide para limpiar recursos
window.addEventListener('pagehide', () => {
    logger.info(`[hijo2] Limpiando recursos en pagehide`);
    estadoComponente.inicializado = false;
});

    // CONTROLADOR: SISTEMA.NOTIFICACION - manejar PENDING_CANCELADO
    safeRegistrar(TIPOS_MENSAJE.SISTEMA.NOTIFICACION, async (mensaje) => {
        const logPrefix = `[hijo2][NOTIFICACION][${mensaje?.origen || 'desconocido'}]`;
        try {
            const evento = mensaje.datos?.evento;
            if (!evento) return;
            if (evento === 'PENDING_CANCELADO') {
                const padreId = mensaje.datos?.padreId || mensaje.datos?.padreid || null;
                const motivo = mensaje.datos?.motivo || 'sin_motivo';
                logger.info(`${logPrefix} Pendiente cancelado: ${padreId} motivo: ${motivo}`);
                // Si corresponde a la parada actual, actualizar UI
                if (padreId && (padreId === estadoComponente.idParadaActual || padreId === (`padre-${estadoComponente.idParadaActual}`))) {
                    try {
                        estadoComponente.paradaPendiente = false;
                        // Deshabilitar botones relacionados (ubicación/controles de completado)
                        if (elementosDOM.btnUbicacion) { desactivarBoton(elementosDOM.btnUbicacion); estadoComponente.botonesActivos.ubicacion = false; }
                        // Informar al usuario
                        actualizarEstado(`Parada cancelada por: ${motivo}`, 'warn');
                    } catch (err) {}
                }
                // Acknowledge to padre
                try { await enviarMensaje({ tipo: TIPOS_MENSAJE.SISTEMA.ACK, origen: CONFIG_HIJO.IFRAME_ID, destino: mensaje.origen, datos: { mensaje: 'PENDING_CANCELADO recibido', padreId, motivo } }); } catch (e) { /* ignore */ }
            }
            if (evento === 'PENDING_INICIADO') {
                const padreId = mensaje.datos?.padreId || mensaje.datos?.padreid || null;
                const ttlMs = mensaje.datos?.ttlMs || null;
                const motivo = mensaje.datos?.motivo || 'iniciado';
                logger.info(`${logPrefix} PENDING_INICIADO para ${padreId} ttl=${ttlMs}`);
                if (padreId && (padreId === estadoComponente.idParadaActual || padreId === (`padre-${estadoComponente.idParadaActual}`))) {
                    estadoComponente.paradaPendiente = true;
                    if (elementosDOM.btnUbicacion) { desactivarBoton(elementosDOM.btnUbicacion); estadoComponente.botonesActivos.ubicacion = false; }
                    actualizarEstado('Pendiente creado: esperando condiciones', 'info');
                }
            }
        } catch (err) {
            logger.warn(`${logPrefix} Error procesando NOTIFICACION:`, err);
        }
    });
} catch (error) {
    logger.error('[hijo2] Error durante la inicialización:', error);
    actualizarEstado('Error de inicialización', 'error');
}
    </script>
