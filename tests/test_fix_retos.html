<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Fix Retos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test Fix Retos</h1>
    <p>Este test verifica que obtenerRetos() funciona correctamente.</p>

    <button onclick="testObtenerRetos()">Test obtenerRetos()</button>
    <button onclick="testAccesoDirecto()">Test acceso directo (funciona)</button>

    <div id="results"></div>

    <script src="test-reporter-utility.js"></script>
    <script>
        // Función para agregar resultado
        function addResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }

        function testObtenerRetos() {
            try {
                const retos = window.obtenerRetos();
                if (retos && Array.isArray(retos) && retos.length > 0) {
                    addResult(`✅ obtenerRetos() funciona: ${retos.length} retos`, 'success');
                } else {
                    addResult('❌ obtenerRetos() retornó array vacío o inválido', 'error');
                }
            } catch (error) {
                addResult(`❌ Error en obtenerRetos(): ${error.message}`, 'error');
            }
        }

        function testAccesoDirecto() {
            try {
                // Intentar acceder directamente (debería funcionar ya que está en scope global)
                const retos = window.retosAventura1Es;
                if (retos && Array.isArray(retos) && retos.length > 0) {
                    addResult(`✅ Acceso directo a retosAventura1Es funciona: ${retos.length} retos`, 'success');
                } else {
                    addResult('❌ Acceso directo a retosAventura1Es retorna undefined o vacío', 'error');
                }
            } catch (error) {
                addResult(`❌ Error en acceso directo: ${error.message}`, 'error');
            }
        }

        // Inicializar
        addResult('Test inicializado. Esperando acciones del usuario...');
    </script>

    <!-- Simular la estructura del script global con formato real -->
    <script>
        // Simular retosAventura usando el formato real de __vv_RETOS_AVENTURAS
        const retosAventura1Es = [
            { id: 'R3-Av1-es', parada_id: 'P-0', tipo: 'opcion', pregunta: '¿De qué siglo son las Torres?', opciones: ['XIV', 'XVI', 'XVIII'], multiple: false, correctas: ['XIV'] },
            { id: 'R4-Av1-es', parada_id: 'P-1', tipo: 'opcion', pregunta: '¿Colores de la bandera?', opciones: ['Violeta', 'Verde', 'Azul'], multiple: false, correctas: ['Azul'] }
        ];

        // Simular el formato centralizado __vv_RETOS_AVENTURAS
        window.__vv_RETOS_AVENTURAS = {
            Aventura1: {
                es: retosAventura1Es
            }
        };

        // Función getter (estilo actual de la app)
        function obtenerRetos() {
            const aventura = window.aventuraSeleccionada || 'Aventura1';
            const idioma = window.idiomaSeleccionado || 'es';
            return window.__vv_RETOS_AVENTURAS?.[aventura]?.[idioma] || [];
        }

        // Exponer globalmente
        window.obtenerRetos = obtenerRetos;
        window.retosAventura1Es = retosAventura1Es;
        window.aventuraSeleccionada = 'Aventura1';
        window.idiomaSeleccionado = 'es';

        // Función auto-ejecutable
        window.runTest = function() {
            testObtenerRetos();
            testAccesoDirecto();

            // Test 3: Verificar formato de datos
            try {
                const retos = obtenerRetos();
                const reto = retos[0];
                const tieneFormatoCorrecto = reto && reto.id && reto.parada_id && reto.tipo && reto.pregunta && Array.isArray(reto.opciones);
                addResult(tieneFormatoCorrecto
                    ? '✅ Formato de reto correcto (id, parada_id, tipo, pregunta, opciones)'
                    : '❌ Formato de reto incorrecto', tieneFormatoCorrecto ? 'success' : 'error');
            } catch (e) {
                addResult('❌ Error verificando formato: ' + e.message, 'error');
            }

            // Test 4: Verificar acceso vía __vv_RETOS_AVENTURAS
            try {
                const retosViaGlobal = window.__vv_RETOS_AVENTURAS?.Aventura1?.es;
                const ok = Array.isArray(retosViaGlobal) && retosViaGlobal.length === 2;
                addResult(ok
                    ? '✅ __vv_RETOS_AVENTURAS accesible: ' + retosViaGlobal.length + ' retos'
                    : '❌ __vv_RETOS_AVENTURAS no accesible', ok ? 'success' : 'error');
            } catch (e) {
                addResult('❌ Error accediendo __vv_RETOS_AVENTURAS: ' + e.message, 'error');
            }

            // Reportar
            window.TestReporter.report({
                name: 'Fix: Retos',
                resultsContainer: document.getElementById('results')
            });
        };
    </script>
</body>
</html></content>
