<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sistema de Videos por Aventura</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 10px 0; padding: 10px; border-radius: 4px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .error   { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .info    { background-color: #d1ecf1; color: #0c5460; border-color: #bee5eb; }
        pre { background: #f4f4f4; padding: 8px; border-radius: 3px; overflow-x: auto; font-size: 0.85em; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test Sistema de Videos por Aventura</h1>
    <p>Verifica que <code>DATOS_AVENTURAS</code> tiene rutas de video correctas por aventura y que no existen claves duplicadas.</p>

    <button onclick="runVideoTest()">Ejecutar Tests</button>
    <button onclick="document.getElementById('results').innerHTML = ''">Limpiar</button>

    <div id="results"></div>

    <script src="test-reporter-utility.js"></script>
    <script type="module">
        import { DATOS_AVENTURAS } from '../js/coordenadas-aventuras.js';

        // Mapa de aventura → carpeta esperada
        const CARPETAS_ESPERADAS = {
            Aventura1:     'videos-aventuras/av1/',
            Aventura2:     'videos-aventuras/av2/',
            Aventura3:     'videos-aventuras/av3/',
            Aventura4:     'videos-aventuras/av4/',
            Aventura5:     'videos-aventuras/av5/',
            AventuraFallas: 'videos-aventuras/avfallas/',
            Aventura34km:  'videos-aventuras/Av34km/'
        };

        function addResult(title, content, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-section ${type}`;
            div.innerHTML = `<strong>${title}</strong><pre>${content}</pre>`;
            document.getElementById('results').appendChild(div);
        }

        async function runVideoTest() {
            document.getElementById('results').innerHTML = '';
            let passed = 0;
            let failed = 0;

            // Test 1: DATOS_AVENTURAS existe y es un objeto
            if (!DATOS_AVENTURAS || typeof DATOS_AVENTURAS !== 'object') {
                addResult('❌ Test 1: DATOS_AVENTURAS', 'No existe o no es un objeto', 'error');
                failed++;
            } else {
                addResult('✅ Test 1: DATOS_AVENTURAS', 'Existe y es un objeto', 'success');
                passed++;
            }

            // Test 2: Todas las aventuras esperadas están presentes (sin claves duplicadas)
            const aventurasPresentes = Object.keys(DATOS_AVENTURAS);
            const aventurasEsperadas = Object.keys(CARPETAS_ESPERADAS);
            const faltantes = aventurasEsperadas.filter(a => !aventurasPresentes.includes(a));

            if (faltantes.length > 0) {
                addResult('❌ Test 2: Claves de aventuras', `Aventuras faltantes: ${faltantes.join(', ')}`, 'error');
                failed++;
            } else {
                addResult('✅ Test 2: Claves de aventuras', `Todas presentes: ${aventurasPresentes.join(', ')}`, 'success');
                passed++;
            }

            // Test 3: Aventura34km existe (fue añadida durante el fix del bug de duplicados)
            if (DATOS_AVENTURAS.Aventura34km) {
                addResult('✅ Test 3: Aventura34km', 'Existe en DATOS_AVENTURAS', 'success');
                passed++;
            } else {
                addResult('❌ Test 3: Aventura34km', 'Faltante en DATOS_AVENTURAS', 'error');
                failed++;
            }

            // Test 4: Rutas de video usan la carpeta correcta por aventura
            let erroresRutas = [];
            let exitosRutas = [];

            for (const [aventuraId, carpetaEsperada] of Object.entries(CARPETAS_ESPERADAS)) {
                const datos = DATOS_AVENTURAS[aventuraId];
                if (!datos) continue;

                const coordenadas = datos['coordenadas-hijo2.html']?.coordenadas || [];
                const conVideo = coordenadas.filter(c => c.video && c.video.trim() !== '');

                if (conVideo.length === 0) continue; // aventuras sin video data aún (Av2-5, 34km)

                for (const entrada of conVideo) {
                    if (!entrada.video.startsWith(carpetaEsperada)) {
                        erroresRutas.push(`${aventuraId} / ${entrada.id}: "${entrada.video}" no empieza por "${carpetaEsperada}"`);
                    }
                    if (entrada.video.startsWith('videos/')) {
                        erroresRutas.push(`${aventuraId} / ${entrada.id}: usa prefijo antiguo "videos/"`);
                    }
                }

                exitosRutas.push(`${aventuraId}: ${conVideo.length} videos → ${carpetaEsperada} ✅`);
            }

            if (erroresRutas.length > 0) {
                addResult('❌ Test 4: Prefijos de carpeta de video', erroresRutas.join('\n'), 'error');
                failed++;
            } else {
                addResult('✅ Test 4: Prefijos de carpeta de video', exitosRutas.join('\n'), 'success');
                passed++;
            }

            // Test 5: Todos los videos terminan en .mp4
            let erroresMp4 = [];

            for (const aventuraId of aventurasPresentes) {
                const coords = DATOS_AVENTURAS[aventuraId]?.['coordenadas-hijo2.html']?.coordenadas || [];
                for (const entrada of coords) {
                    if (entrada.video && !entrada.video.endsWith('.mp4')) {
                        erroresMp4.push(`${aventuraId} / ${entrada.id}: "${entrada.video}" no termina en .mp4`);
                    }
                }
            }

            if (erroresMp4.length > 0) {
                addResult('❌ Test 5: Extensión .mp4', erroresMp4.join('\n'), 'error');
                failed++;
            } else {
                addResult('✅ Test 5: Extensión .mp4', 'Todos los videos terminan en .mp4', 'success');
                passed++;
            }

            // Test 6: AventuraFallas tiene datos reales (no es el stub vacío)
            const fallas = DATOS_AVENTURAS.AventuraFallas?.['coordenadas-hijo2.html']?.coordenadas || [];
            if (fallas.length > 0) {
                addResult('✅ Test 6: AventuraFallas tiene coordenadas', `${fallas.length} entradas (no es stub vacío)`, 'success');
                passed++;
            } else {
                addResult('❌ Test 6: AventuraFallas tiene coordenadas', 'Array vacío — puede haber bug de clave duplicada', 'error');
                failed++;
            }

            // Resumen
            const total = passed + failed;
            addResult(
                `Resumen: ${passed}/${total} tests pasados`,
                `✅ Exitosos: ${passed}\n❌ Fallidos: ${failed}\nEstado: ${failed === 0 ? 'TODO CORRECTO' : 'HAY ERRORES'}`,
                failed === 0 ? 'success' : 'error'
            );
        }

        window.runVideoTest = runVideoTest;

        // Auto-ejecución para master-test
        window.runTest = function() {
            runVideoTest().then(() => {
                setTimeout(() => {
                    window.TestReporter.report({
                        name: 'Data: Videos por Aventura',
                        resultsContainer: document.getElementById('results')
                    });
                }, 300);
            });
        };

        // Auto-ejecutar al cargar
        runVideoTest();
    </script>
</body>
</html>
