<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Carga Hijos</title>
</head>
<body>
    <h1>Test de Carga de Hijos</h1>
    <div id="log"></div>
    <div id="results"></div>

    <script src="test-reporter-utility.js"></script>
    <script>
        const log = document.getElementById('log');

        function addLog(message) {
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            log.appendChild(div);
            console.log(message);
        }

        addLog('Iniciando test de carga de hijos...');

        // Lista de hijos a probar (rutas relativas desde /tests/)
        const hijos = [
            '../En-busca-del-tesoro.html',
            '../coordenadas-hijo2.html',
            '../audio-hijo3.html',
            '../retos-hijo4.html',
            '../extrainfo-hijo1.html'
        ];

        hijos.forEach((hijoSrc, index) => {
            const container = document.createElement('div');
            container.innerHTML = `<h3>${hijoSrc}</h3>`;
            const iframe = document.createElement('iframe');
            iframe.src = hijoSrc;
            iframe.style.width = '400px';
            iframe.style.height = '300px';
            iframe.style.border = '1px solid #ccc';
            iframe.onload = () => addLog(`${hijoSrc} cargado correctamente`);
            iframe.onerror = (e) => addLog(`Error cargando ${hijoSrc}: ${e}`);
            container.appendChild(iframe);
            document.body.appendChild(container);
        });

        // Escuchar mensajes de los iframes
        window.addEventListener('message', (event) => {
            addLog(`Mensaje de ${event.origin}: ${JSON.stringify(event.data).substring(0, 100)}...`);
        });

        addLog('Test iniciado. Esperando carga de iframes...');

        // Auto-run para master-test
        window.runTest = function() {
            const resultsDiv = document.getElementById('results');
            let passed = 0, failed = 0;
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => {
                try {
                    if (iframe.contentDocument || iframe.contentWindow) {
                        passed++;
                        const d = document.createElement('div');
                        d.className = 'pass';
                        d.textContent = '✅ ' + iframe.src.split('/').pop() + ' cargado';
                        resultsDiv.appendChild(d);
                    } else { failed++; }
                } catch(e) {
                    // Cross-origin = loaded but not accessible (still counts)
                    passed++;
                    const d = document.createElement('div');
                    d.className = 'pass';
                    d.textContent = '✅ ' + iframe.src.split('/').pop() + ' cargado (cross-origin)';
                    resultsDiv.appendChild(d);
                }
            });
            window.TestReporter.report({ name: 'Basic: Carga Hijos', passed, failed });
        };
        // Auto-ejecutar después de que los iframes carguen
        setTimeout(() => { if (window.runTest) window.runTest(); }, 5000);
    </script>
</body>
</html>
