<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Distribución Audio</title>
    <script src="../js/suppress-warnings.js"></script>
    <script src="../js/logger.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/constants.js"></script>
    <script src="../js/mensajeria.js"></script>
    <script src="../js/validacion.js"></script>
    <script src="test-reporter-utility.js"></script>
</head>
<body>
    <h1>Test Distribución de Datos de Audio</h1>
    <div id="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');

        window.runTest = async function testAudioDistribution() {
            try {
                resultsDiv.innerHTML = '<p>🔄 Probando distribución de datos de audio...</p>';

                // Simular selección de aventura
                window.aventuraSeleccionada = 'Aventura1';
                window.idiomaSeleccionado = 'es';

                // Cargar datos centralizados
                const [audiosModule] = await Promise.all([
                    import('./js/audios-aventuras.js')
                ]);

                const AUDIOS_AVENTURAS = audiosModule.AUDIOS_AVENTURAS;
                window.__vv_AUDIOS_AVENTURAS = AUDIOS_AVENTURAS;

                resultsDiv.innerHTML += '<p>✅ Datos de audio cargados</p>';

                // Verificar que los datos existen
                if (AUDIOS_AVENTURAS && AUDIOS_AVENTURAS.Aventura1 && AUDIOS_AVENTURAS.Aventura1.es) {
                    const audios = AUDIOS_AVENTURAS.Aventura1.es;
                    resultsDiv.innerHTML += `<p>✅ Encontrados ${audios.length} audios para Aventura1/es</p>`;

                    // Mostrar algunos audios de ejemplo
                    const sampleAudios = audios.slice(0, 3);
                    resultsDiv.innerHTML += '<h3>Ejemplos de audios:</h3><ul>';
                    sampleAudios.forEach(audio => {
                        resultsDiv.innerHTML += `<li>${audio.id}: ${audio.title} (${audio.file})</li>`;
                    });
                    resultsDiv.innerHTML += '</ul>';
                } else {
                    resultsDiv.innerHTML += '<p>❌ Datos de audio no encontrados</p>';
                }

                // Simular iframe de audio-hijo3
                const audioIframe = document.createElement('iframe');
                audioIframe.id = 'hijo3';
                audioIframe.src = 'audio-hijo3.html';
                audioIframe.style.width = '400px';
                audioIframe.style.height = '200px';
                audioIframe.style.border = '1px solid #ccc';
                document.body.appendChild(audioIframe);

                resultsDiv.innerHTML += '<p>✅ Iframe de audio creado</p>';

                // Esperar a que el iframe cargue
                await new Promise(resolve => {
                    audioIframe.onload = resolve;
                    setTimeout(resolve, 3000); // timeout de 3 segundos
                });

                resultsDiv.innerHTML += '<p>✅ Iframe cargado</p>';

                // Simular envío de mensaje CARGAR_AUDIOS
                if (typeof window.enviarMensaje === 'function') {
                    const audios = AUDIOS_AVENTURAS.Aventura1.es;

                    await window.enviarMensaje({
                        tipo: TIPOS_MENSAJE.DATOS.CARGAR_AUDIOS,
                        origen: 'test',
                        destino: 'hijo3',
                        datos: {
                            aventura: 'Aventura1',
                            idioma: 'es',
                            audios: audios,
                            total: audios.length,
                            timestamp: Date.now()
                        }
                    });

                    resultsDiv.innerHTML += '<p>✅ Mensaje CARGAR_AUDIOS enviado</p>';
                } else {
                    resultsDiv.innerHTML += '<p>❌ Función enviarMensaje no disponible</p>';
                }

            } catch (error) {
                resultsDiv.innerHTML += `<p>❌ Error: ${error.message}</p>`;
                console.error('Error en test:', error);
            }
        }

        // Ejecutar test cuando la página cargue
        window.addEventListener('load', () => {
            setTimeout(() => {
                testAudioDistribution();
                setTimeout(() => {
                    window.TestReporter.report({
                        name: 'Cargar: Audio Distribution',
                        resultsContainer: document.getElementById('results')
                    });
                }, 500);
            }, 1000);
        });
    </script>
</body>
</html>
