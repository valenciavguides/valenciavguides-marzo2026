<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sincronización Confirmaciones</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .log { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; margin: 10px 0; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Test Sincronización de Confirmaciones</h1>
    <p>Este test verifica que INICIAR_AVENTURA espere las confirmaciones antes de mostrar iframes.</p>

    <button onclick="testSincronizacionCompleta()">Test Sincronización Completa</button>
    <button onclick="testTimeout()">Test Timeout</button>
    <button onclick="testConfirmacionesParciales()">Test Confirmaciones Parciales</button>
    <button onclick="clearLog()">Limpiar Log</button>

    <div id="results"></div>
    <div class="log" id="log"></div>

    <script src="test-reporter-utility.js"></script>
    <script>
        // Mock del logger
        window.logger = {
            info: (msg, ...args) => log(`[INFO] ${msg}`, ...args),
            warn: (msg, ...args) => log(`[WARN] ${msg}`, ...args),
            error: (msg, ...args) => log(`[ERROR] ${msg}`, ...args),
            success: (msg, ...args) => log(`[SUCCESS] ${msg}`, ...args),
            debug: (msg, ...args) => log(`[DEBUG] ${msg}`, ...args)
        };

        // Estado mock
        window.estado = {
            seleccion: {
                coordenadasCargadas: false,
                audiosCargados: false,
                retosCargados: false
            }
        };

        // Función para loggear
        function log(message, ...args) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message, ...args);
        }

        // Función para agregar resultado
        function addResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }

        // Función esperarConfirmaciones (copiada del código padre)
        const esperarConfirmaciones = async (timeoutMs = 10000) => {
            const startTime = Date.now();

            while (Date.now() - startTime < timeoutMs) {
                const coordenadasOk = estado.seleccion.coordenadasCargadas !== false; // true o undefined = ok
                const audiosOk = estado.seleccion.audiosCargados !== false;
                const retosOk = estado.seleccion.retosCargados !== false;

                if (coordenadasOk && audiosOk && retosOk) {
                    logger.success(`✅ Todas las confirmaciones recibidas`);
                    return true;
                }

                // Esperar un poco antes de verificar nuevamente
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            logger.warn(`⚠️ Timeout esperando confirmaciones (${timeoutMs}ms)`);
            return false;
        };

        // Función para simular envío de confirmación
        function enviarConfirmacion(tipo, delay = 0) {
            setTimeout(() => {
                estado.seleccion[tipo] = true;
                log(`📨 Confirmación ${tipo} recibida`);
            }, delay);
        }

        // Test sincronización completa
        async function testSincronizacionCompleta() {
            clearLog();
            addResult('Iniciando test de sincronización completa...', 'info');

            // Resetear estado
            estado.seleccion.coordenadasCargadas = false;
            estado.seleccion.audiosCargados = false;
            estado.seleccion.retosCargados = false;

            // Simular confirmaciones con delays realistas
            enviarConfirmacion('coordenadasCargadas', 500);
            enviarConfirmacion('audiosCargados', 1200);
            enviarConfirmacion('retosCargados', 800);

            const startTime = Date.now();
            const resultado = await esperarConfirmaciones(5000);
            const duration = Date.now() - startTime;

            if (resultado) {
                addResult(`✅ Test completado exitosamente en ${duration}ms`, 'success');
            } else {
                addResult(`❌ Test falló - timeout`, 'error');
            }
        }

        // Test timeout
        async function testTimeout() {
            clearLog();
            addResult('Iniciando test de timeout...', 'info');

            // Resetear estado
            estado.seleccion.coordenadasCargadas = false;
            estado.seleccion.audiosCargados = false;
            estado.seleccion.retosCargados = false;

            // Solo enviar 2 confirmaciones, dejar una pendiente
            enviarConfirmacion('coordenadasCargadas', 200);
            enviarConfirmacion('audiosCargados', 300);
            // retosCargados nunca se envía

            const startTime = Date.now();
            const resultado = await esperarConfirmaciones(2000); // Timeout corto
            const duration = Date.now() - startTime;

            if (!resultado) {
                addResult(`✅ Timeout funcionó correctamente en ${duration}ms`, 'success');
            } else {
                addResult(`❌ Test falló - no debería haber completado`, 'error');
            }
        }

        // Test confirmaciones parciales
        async function testConfirmacionesParciales() {
            clearLog();
            addResult('Iniciando test de confirmaciones parciales...', 'info');

            // Resetear estado
            estado.seleccion.coordenadasCargadas = false;
            estado.seleccion.audiosCargados = false;
            estado.seleccion.retosCargados = false;

            // Enviar confirmaciones con delays
            enviarConfirmacion('coordenadasCargadas', 100);
            enviarConfirmacion('audiosCargados', 200);
            enviarConfirmacion('retosCargados', 300);

            const startTime = Date.now();
            const resultado = await esperarConfirmaciones(1000);
            const duration = Date.now() - startTime;

            if (resultado) {
                addResult(`✅ Confirmaciones parciales procesadas correctamente en ${duration}ms`, 'success');
            } else {
                addResult(`❌ Test falló - debería haber completado`, 'error');
            }
        }

        // Limpiar log
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            document.getElementById('results').innerHTML = '';
        }

        // Reportar al master-test
        window.reportTest = function() {
            window.TestReporter.report({
                name: 'Verification: Sincronización Confirmaciones',
                resultsContainer: document.getElementById('results')
            });
        };

        // Función por defecto para auto-ejecución desde master-test
        window.runTest = async function() {
            await testSincronizacionCompleta();
            window.reportTest();
        };
    </script>
</body>
</html>
