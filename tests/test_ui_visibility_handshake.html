<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Test UI Visibility Handshake</title>
  <style>body{font-family:Arial,Helvetica,sans-serif}#log{white-space:pre-wrap;background:#f7f7f7;padding:8px;border:1px solid #ddd}</style>
  <script src="test-reporter-utility.js"></script>
</head>
<body>
  <h3>Test: Ningún hijo debe mostrar UI antes de PADRE_CONFIRMA_HIJO_LISTO</h3>
  <div id="status">RUNNING</div>
  <div id="results"></div>
  <div id="log"></div>

  <iframe id="sut" src="../codigo-padre.html" style="width:100%;height:600px;border:1px solid #ccc"></iframe>

  <script>
  window.runTest = async function(){
    const logEl = document.getElementById('log');
    function append(...args){ logEl.textContent += args.join(' ') + '\n'; }
    const iframe = document.getElementById('sut');
    await new Promise(r=>{ iframe.onload = r; });
    append('[test] Parent cargado');

    const win = iframe.contentWindow;
    const childIds = ['hijo1-opciones','hijo2','hijo3','hijo4','hijo5'];

    // Wait short time to allow children to initialize (but before confirm flows should complete)
    await new Promise(r => setTimeout(r, 2000));

    let anyVisible = false;
    for (const id of childIds) {
      try {
        const el = win.document.getElementById(id);
        if (!el) { append(`[diag] ${id} no encontrado en padre`); continue; }
        const iframeDisp = el.style && el.style.display;
        if (iframeDisp === 'none') { append(`[diag] ${id} oculto por padre (iframe.style.display=none)`); continue; }
        if (!el.contentDocument) { append(`[diag] ${id} document inaccessible`); continue; }
        const body = el.contentDocument && el.contentDocument.body;
        const disp = body && body.style && body.style.display;
        const vis = window.getComputedStyle(body || el.contentDocument.documentElement).visibility || '';
        append(`[diag] ${id} iframe.display="${String(iframeDisp)}" body.display="${String(disp)}" visibility="${vis}"`);
        if ((iframeDisp && iframeDisp !== 'none') && ((disp && disp !== 'none') || vis === 'visible')) {
          anyVisible = true;
        }
      } catch (e) { append(`[diag] ${id} check falló: ${e.message}`); }
    }

    const resultsDiv = document.getElementById('results');
    let resultClass = 'pass';
    let resultMsg = '[PASS] Ningún hijo visible prematuramente';
    
    if (anyVisible) { 
      append('[FAIL] Algún hijo es visible antes del handshake completo'); 
      document.getElementById('status').textContent='FAIL'; 
      resultClass = 'fail';
      resultMsg = '[FAIL] Algún hijo visible prematuramente';
    } else { 
      append('[PASS] Ningún hijo visible prematuramente'); 
      document.getElementById('status').textContent='PASS'; 
    }
    
    const div = document.createElement('div');
    div.className = resultClass;
    div.textContent = resultMsg;
    resultsDiv.appendChild(div);
    
    window.TestReporter.report({
      name: 'Integración: UI Visibility Handshake',
      resultsContainer: resultsDiv
    });
  };
  </script>
</body>
</html>
