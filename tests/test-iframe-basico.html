<!DOCTYPE html>
<html>
<head>
    <title>Test Básico Iframe</title>
    <script src="test-reporter-utility.js"></script>
</head>
<body>
    <h1>Test Básico de Iframe</h1>
    <div id="results"></div>
    <div id="iframe-container"></div>

    <script>
        let iframeReady = false;
        // Set up listener BEFORE creating iframe to avoid race condition
        window.addEventListener('message', (e) => {
            console.log('Mensaje recibido:', e.data);
            if (e.data === 'iframe-ready') iframeReady = true;
        });

        // Create iframe AFTER listener is attached
        const iframe = document.createElement('iframe');
        iframe.width = 400;
        iframe.height = 200;
        iframe.src = "data:text/html,<html><body><script>window.parent.postMessage('iframe-ready','*');<\/script></body></html>";
        document.getElementById('iframe-container').appendChild(iframe);

        window.runTest = function() {
            // Wait up to 3s for iframe message, then report
            let attempts = 0;
            const maxAttempts = 30;
            function checkAndReport() {
                attempts++;
                if (iframeReady || attempts >= maxAttempts) {
                    const resultsDiv = document.getElementById('results');
                    const d = document.createElement('div');
                    d.className = iframeReady ? 'pass' : 'fail';
                    d.textContent = iframeReady ? '✅ Iframe enviado mensaje postMessage' : '❌ Iframe no respondió';
                    resultsDiv.appendChild(d);
                    window.TestReporter.report({ name: 'Basic: iframe Basico', resultsContainer: resultsDiv });
                } else {
                    setTimeout(checkAndReport, 100);
                }
            }
            checkAndReport();
        };
    </script>
</body>
</html>
