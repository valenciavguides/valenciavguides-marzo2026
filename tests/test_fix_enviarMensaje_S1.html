<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Fix enviarMensaje_S1</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .log { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; margin: 10px 0; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Test Fix enviarMensaje_S1</h1>
    <p>Este test verifica que los mensajes se pongan en cola cuando enviarMensaje_S1 no está disponible.</p>

    <button onclick="testBroadcastAntesDeInit()">Enviar Broadcast Antes de Init</button>
    <button onclick="inicializarEnviarMensaje()">Inicializar enviarMensaje_S1</button>
    <button onclick="procesarPendientes()">Procesar Pendientes</button>
    <button onclick="clearLog()">Limpiar Log</button>

    <div id="results"></div>
    <div class="log" id="log"></div>

    <script src="test-reporter-utility.js"></script>
    <script>
        // Mock del logger
        window.logger = {
            info: (msg, ...args) => log(`[INFO] ${msg}`, ...args),
            warn: (msg, ...args) => log(`[WARN] ${msg}`, ...args),
            error: (msg, ...args) => log(`[ERROR] ${msg}`, ...args),
            success: (msg, ...args) => log(`[SUCCESS] ${msg}`, ...args),
            debug: (msg, ...args) => log(`[DEBUG] ${msg}`, ...args)
        };

        // Función para loggear
        function log(message, ...args) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message, ...args);
        }

        // Función para agregar resultado
        function addResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }

        // Función clearLog
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            document.getElementById('results').innerHTML = '';
        }

        // Mock de enviarMensaje_S1 inicialmente no disponible
        let enviarMensaje_S1;
        let mensajesEnviados = [];

        // Función que simula enviarMensaje_S1
        function mockEnviarMensaje_S1(mensaje) {
            mensajesEnviados.push(mensaje);
            log(`📨 Mensaje enviado: ${mensaje.tipo}`);
            return Promise.resolve();
        }

        // Función que simula el broadcast con verificación de existencia
        async function broadcastMensaje(mensaje) {
            if (typeof enviarMensaje_S1 === 'function') {
                log(`✅ enviarMensaje_S1 disponible, enviando directamente: ${mensaje.tipo}`);
                return await enviarMensaje_S1(mensaje);
            } else {
                log(`⏳ enviarMensaje_S1 no disponible, encolando: ${mensaje.tipo}`);
                if (!window.__pendingBroadcast) {
                    window.__pendingBroadcast = [];
                }
                window.__pendingBroadcast.push(mensaje);
                return Promise.resolve();
            }
        }

        // Función que procesa broadcasts pendientes (copiada del fix)
        async function procesarBroadcastsPendientes() {
            if (window.__pendingBroadcast && Array.isArray(window.__pendingBroadcast) && typeof enviarMensaje_S1 === 'function') {
                log(`🔄 Procesando broadcasts pendientes: ${window.__pendingBroadcast.length}`);
                try {
                    for (const mensaje of window.__pendingBroadcast) {
                        await enviarMensaje_S1(mensaje);
                        log(`✅ Broadcast pendiente enviado: ${mensaje.tipo}`);
                    }
                    delete window.__pendingBroadcast;
                    log(`✅ Todos los broadcasts pendientes procesados`);
                    return true;
                } catch (error) {
                    log(`❌ Error procesando broadcasts pendientes: ${error.message}`);
                    return false;
                }
            } else {
                log(`ℹ️ No hay broadcasts pendientes o enviarMensaje_S1 no disponible`);
                return false;
            }
        }

        // Test functions
        function testBroadcastAntesDeInit() {
            addResult('Enviando broadcasts antes de inicializar enviarMensaje_S1...', 'info');

            // Enviar varios mensajes antes de que enviarMensaje_S1 esté disponible
            broadcastMensaje({ tipo: 'TEST.MENSAJE_1', data: 'test1' });
            broadcastMensaje({ tipo: 'TEST.MENSAJE_2', data: 'test2' });
            broadcastMensaje({ tipo: 'TEST.MENSAJE_3', data: 'test3' });

            addResult(`✅ Mensajes encolados. Pendientes: ${window.__pendingBroadcast ? window.__pendingBroadcast.length : 0}`, 'success');
        }

        function inicializarEnviarMensaje() {
            enviarMensaje_S1 = mockEnviarMensaje_S1;
            addResult('✅ enviarMensaje_S1 inicializado', 'success');
            log(`🚀 enviarMensaje_S1 ahora disponible`);
        }

        async function procesarPendientes() {
            addResult('Procesando broadcasts pendientes...', 'info');
            const resultado = await procesarBroadcastsPendientes();
            if (resultado) {
                addResult(`✅ Procesamiento completado. Mensajes enviados: ${mensajesEnviados.length}`, 'success');
            } else {
                addResult('❌ Error en procesamiento', 'error');
            }
        }

        // Inicializar
        log('🧪 Test inicializado. enviarMensaje_S1 no disponible inicialmente.');

        // Función auto-ejecutable
        window.runTest = function() {
            testBroadcastAntesDeInit();
            inicializarEnviarMensaje();
            procesarPendientes().then(() => {
                // Reportar
                window.TestReporter.report({
                    name: 'Fix: enviarMensaje S1',
                    resultsContainer: document.getElementById('results')
                });
            });
        };
    </script>
</body>
