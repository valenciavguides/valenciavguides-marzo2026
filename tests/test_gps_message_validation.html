<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Test GPS Message Validation</title>
  <style>body{font-family:Arial,Helvetica,sans-serif}#log{white-space:pre-wrap;background:#f7f7f7;padding:8px;border:1px solid #ddd}</style>
  <script src="test-reporter-utility.js"></script>
</head>
<body>
  <h3>Test: GPS messages from children should be rejected (only parent may emit)</h3>
  <div id="status">RUNNING</div>
  <div id="results"></div>
  <div id="log"></div>
  <iframe id="sut" src="../codigo-padre.html" style="width:100%;height:200px;border:1px solid #ccc"></iframe>
  <script>
  window.runTest = async function(){
    const logEl = document.getElementById('log');
    function append(...args){ logEl.textContent += args.join(' ') + '\n'; }
    const iframe = document.getElementById('sut');
    await new Promise(r=>{ iframe.onload = r; });
    append('[test] iframe cargado');

    const win = iframe.contentWindow;
    if (!win) { document.getElementById('status').textContent = 'ERROR: no iframe access'; return; }

    // Send a spoofed UBICACION_ACTUALIZADA from a child origin
    const msg = {
      id: 'test-msg-1',
      tipo: (win.TIPOS_MENSAJE && win.TIPOS_MENSAJE.NAVEGACION && win.TIPOS_MENSAJE.NAVEGACION.GPS && win.TIPOS_MENSAJE.NAVEGACION.GPS.UBICACION_ACTUALIZADA) || 'NAVEGACION.GPS.UBICACION_ACTUALIZADA',
      origen: 'hijo2',
      destino: 'broadcast',
      datos: { lat: 0.123, lng: 0.456, accuracy: 5 }
    };

    append('[test] Enviando mensaje UBICACION_ACTUALIZADA como if origen hijo2');
    win.postMessage(msg, window.location.origin);

    // Wait a bit and check padre estado
    await new Promise(r=>setTimeout(r, 800));
    try {
      const gps = win.estadoPadre && win.estadoPadre.gps;
      append('[diag] estadoPadre.gps.posicionUsuario:', gps && gps.posicionUsuario);
      if (!gps || !gps.posicionUsuario) {
        append('[PASS] Mensaje UBICACION_ACTUALIZADA rechazado correctamente (sin cambios en estadoPadre.gps.posicionUsuario)');
        document.getElementById('status').textContent = 'PASS';
      } else {
        append('[FAIL] Mensaje fue aplicado inesperadamente:', gps.posicionUsuario);
        document.getElementById('status').textContent = 'FAIL';
      }
    } catch (e) {
      append('[ERROR] Excepción comprobando estado padre:', e && e.message);
      document.getElementById('status').textContent = 'ERROR';
    }
    
    const resultsDiv = document.getElementById('results');
    const statusText = document.getElementById('status').textContent;
    const resultDiv = document.createElement('div');
    resultDiv.className = (statusText === 'PASS' ? 'pass' : 'fail');
    resultDiv.textContent = statusText === 'PASS' ? '[PASS] GPS validation correcta' : `[FAIL] GPS validation error: ${statusText}`;
    resultsDiv.appendChild(resultDiv);
    
    window.TestReporter.report({
      name: 'Navegación: GPS Message Validation',
      resultsContainer: resultsDiv
    });
  };
  </script>
</body>
</html>
