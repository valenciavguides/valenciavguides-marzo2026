<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Integración Distribuir Datos Aventura</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test Integración: Distribuir Datos Aventura</h1>

    <div id="test-results"></div>

    <button onclick="runIntegrationTest()">Ejecutar Test de Integración</button>
    <button onclick="clearResults()">Limpiar Resultados</button>

    <script src="test-reporter-utility.js"></script>
    <script type="module">
        // Simular datos de prueba con formato real
        const testData = {
            coordenadas: [
                { id: 'P-0', tipo: 'inicio', nombre: "Torres de Serranos", lat: 39.4789, lng: -0.3756 },
                { id: 'P-1', tipo: 'parada', nombre: "Plaza de la crída", lat: 39.4799, lng: -0.3760 }
            ],
            audios: [
                { id: 'audio-Av1-P0-es', parada_id: 'P-0', nombre: "Audio P0", url: "audio-p0.mp3" },
                { id: 'audio-Av1-P1-es', parada_id: 'P-1', nombre: "Audio P1", url: "audio-p1.mp3" }
            ],
            retos: [
                { id: 'R3-Av1-es', parada_id: 'P-0', tipo: 'opcion', pregunta: '¿De qué siglo?', opciones: ['XIV','XVI'], correctas: ['XIV'] },
                { id: 'R4-Av1-es', parada_id: 'P-1', tipo: 'opcion', pregunta: '¿Color bandera?', opciones: ['Azul','Verde'], correctas: ['Azul'] }
            ],
            elementosIDpadre: [
                { tipo: 'inicio', nombre: 'Torres de Serranos', padreid: 'padre-P0', parada_id: 'P-0', audio_id: 'audio-Av1-P0-es', reto_id: 'R3-Av1-es' },
                { tipo: 'parada', nombre: 'Plaza de la crída', padreid: 'padre-P1', parada_id: 'P-1', audio_id: 'audio-Av1-P1-es', reto_id: 'R4-Av1-es' }
            ]
        };

        // Simular TIPOS_MENSAJE
        const TIPOS_MENSAJE = {
            DATOS: {
                CARGAR_COORDENADAS: 'DATOS.CARGAR_COORDENADAS',
                CARGAR_AUDIOS: 'DATOS.CARGAR_AUDIOS',
                CARGAR_RETOS: 'DATOS.CARGAR_RETOS',
                CARGAR_TEXTOS: 'DATOS.CARGAR_TEXTOS'
            }
        };

        // Simular estadoComponente
        window.estadoComponente = {};
        // Simular AVENTURA_PARADAS (nuevo: se asigna en distribuirDatosAventura)
        window.AVENTURA_PARADAS = null;

        // Funciones getter (simulando las implementadas en los componentes)
        function obtenerCoordenadasParadas() {
            return window.estadoComponente.arrayCoordenadasLocal || [];
        }

        function obtenerAudioFiles() {
            return window.estadoComponente.arrayAudiosLocal || [];
        }

        function obtenerRetos() {
            return window.estadoComponente.arrayRetosLocal || [];
        }

        // Simular handlers de mensajes (como los implementados en los componentes)
        function simulateMessageHandler(type, data) {
            const mensaje = {
                origen: 'padre',
                tipo: type,
                datos: data
            };

            switch (type) {
                case TIPOS_MENSAJE.DATOS.CARGAR_COORDENADAS:
                    if (!window.estadoComponente) window.estadoComponente = {};
                    window.estadoComponente.arrayCoordenadasLocal = data.coordenadas;
                    return `Coordenadas almacenadas: ${data.coordenadas.length}`;

                case TIPOS_MENSAJE.DATOS.CARGAR_AUDIOS:
                    if (!window.estadoComponente) window.estadoComponente = {};
                    window.estadoComponente.arrayAudiosLocal = data.audios;
                    return `Audios almacenados: ${data.audios.length}`;

                case TIPOS_MENSAJE.DATOS.CARGAR_RETOS:
                    if (!window.estadoComponente) window.estadoComponente = {};
                    window.estadoComponente.arrayRetosLocal = data.retos;
                    return `Retos almacenados: ${data.retos.length}`;

                default:
                    return 'Tipo de mensaje desconocido';
            }
        }

        // Simular distribuirDatosAventura
        async function simulateDistribuirDatosAventura(aventura, idioma) {
            const resultados = { coordenadas: false, audios: false, retos: false };

            try {
                // Simular envío a hijo2 (coordenadas)
                const coordResult = simulateMessageHandler(TIPOS_MENSAJE.DATOS.CARGAR_COORDENADAS, {
                    aventura, idioma, coordenadas: testData.coordenadas, total: testData.coordenadas.length, timestamp: Date.now()
                });
                resultados.coordenadas = true;
                console.log('Coordenadas:', coordResult);

                // Simular envío a hijo3 (audios)
                const audioResult = simulateMessageHandler(TIPOS_MENSAJE.DATOS.CARGAR_AUDIOS, {
                    aventura, idioma, audios: testData.audios, total: testData.audios.length, timestamp: Date.now()
                });
                resultados.audios = true;
                console.log('Audios:', audioResult);

                // Simular envío a hijo4 (retos)
                const retoResult = simulateMessageHandler(TIPOS_MENSAJE.DATOS.CARGAR_RETOS, {
                    aventura, idioma, retos: testData.retos, total: testData.retos.length, timestamp: Date.now()
                });
                resultados.retos = true;
                console.log('Retos:', retoResult);

                // Nuevo: Asignar AVENTURA_PARADAS (como hace el código real)
                if (Array.isArray(testData.elementosIDpadre) && testData.elementosIDpadre.length > 0) {
                    window.AVENTURA_PARADAS = testData.elementosIDpadre;
                    console.log('AVENTURA_PARADAS asignado:', testData.elementosIDpadre.length, 'elementos');
                }

            } catch (error) {
                console.error('Error en distribución:', error);
            }

            return resultados;
        }

        function addTestResult(title, content, type = 'info') {
            const resultsDiv = document.getElementById('test-results');
            const section = document.createElement('div');
            section.className = `test-section ${type}`;
            section.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
            resultsDiv.appendChild(section);
        }

        async function runIntegrationTest() {
            clearResults();

            try {
                addTestResult('Iniciando Test', 'Probando integración de distribuirDatosAventura con handlers de componentes', 'info');

                // Paso 1: Verificar estado inicial
                addTestResult('Estado Inicial',
                    `Coordenadas: ${obtenerCoordenadasParadas().length}\n` +
                    `Audios: ${obtenerAudioFiles().length}\n` +
                    `Retos: ${obtenerRetos().length}`,
                    'info'
                );

                // Paso 2: Simular distribución de datos
                const resultados = await simulateDistribuirDatosAventura('Aventura1', 'esp');

                // Paso 3: Verificar que los datos se almacenaron correctamente
                const coordCount = obtenerCoordenadasParadas().length;
                const audioCount = obtenerAudioFiles().length;
                const retoCount = obtenerRetos().length;

                addTestResult('Después de Distribución',
                    `Coordenadas: ${coordCount} (esperado: ${testData.coordenadas.length})\n` +
                    `Audios: ${audioCount} (esperado: ${testData.audios.length})\n` +
                    `Retos: ${retoCount} (esperado: ${testData.retos.length})\n` +
                    `Resultados: ${JSON.stringify(resultados)}`,
                    (coordCount === testData.coordenadas.length &&
                     audioCount === testData.audios.length &&
                     retoCount === testData.retos.length) ? 'success' : 'error'
                );

                // Paso 4: Verificar contenido de los datos
                const coordData = obtenerCoordenadasParadas();
                const audioData = obtenerAudioFiles();
                const retoData = obtenerRetos();

                addTestResult('Validación de Datos',
                    `Primera coordenada: ${coordData[0]?.nombre || 'N/A'}\n` +
                    `Primer audio: ${audioData[0]?.nombre || 'N/A'}\n` +
                    `Primer reto: ${retoData[0]?.pregunta || 'N/A'}`,
                    (coordData[0]?.nombre && audioData[0]?.nombre && retoData[0]?.pregunta) ? 'success' : 'error'
                );

                // Paso 5: Verificar que los getters funcionan
                addTestResult('Validación de Getters',
                    `obtenerCoordenadasParadas() funciona: ${typeof obtenerCoordenadasParadas === 'function'}\n` +
                    `obtenerAudioFiles() funciona: ${typeof obtenerAudioFiles === 'function'}\n` +
                    `obtenerRetos() funciona: ${typeof obtenerRetos === 'function'}`,
                    'success'
                );

                // Paso 6: Verificar window.AVENTURA_PARADAS
                const paradasOk = Array.isArray(window.AVENTURA_PARADAS) && window.AVENTURA_PARADAS.length === testData.elementosIDpadre.length;
                addTestResult('Validación AVENTURA_PARADAS',
                    `window.AVENTURA_PARADAS asignado: ${Array.isArray(window.AVENTURA_PARADAS)}\n` +
                    `Elementos: ${window.AVENTURA_PARADAS?.length || 0} (esperado: ${testData.elementosIDpadre.length})\n` +
                    `Primer padreid: ${window.AVENTURA_PARADAS?.[0]?.padreid || 'N/A'}\n` +
                    `Primer parada_id: ${window.AVENTURA_PARADAS?.[0]?.parada_id || 'N/A'}`,
                    paradasOk ? 'success' : 'error'
                );

                // Paso 7: Verificar formato de IDs en AVENTURA_PARADAS
                const formatoOk = window.AVENTURA_PARADAS?.every(p =>
                    p.padreid && p.padreid.startsWith('padre-') && p.parada_id
                );
                addTestResult('Validación Formato IDs',
                    `Todos los elementos tienen padreid (padre-X): ${formatoOk}\n` +
                    `Ejemplo: padreid=${window.AVENTURA_PARADAS?.[0]?.padreid}, parada_id=${window.AVENTURA_PARADAS?.[0]?.parada_id}`,
                    formatoOk ? 'success' : 'error'
                );

            } catch (error) {
                addTestResult('Error en Test', `Error: ${error.message}\nStack: ${error.stack}`, 'error');
            }
        }

        function clearResults() {
            document.getElementById('test-results').innerHTML = '';
        }

        // Exponer funciones globalmente para botones
        window.runIntegrationTest = runIntegrationTest;
        window.clearResults = clearResults;

        // Función auto-ejecutable para master-test
        window.runTest = function() {
            runIntegrationTest();
            // Reportar después de un pequeño delay para permitir que se procese
            setTimeout(() => {
                window.TestReporter.report({
                    name: 'Integration: Distribuir Datos',
                    resultsContainer: document.getElementById('test-results')
                });
            }, 500);
        };
    </script>
</body>
</html>
