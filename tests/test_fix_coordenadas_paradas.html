<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Fix CoordenadasParadas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test Fix CoordenadasParadas</h1>
    <p>Este test verifica que obtenerCoordenadasParadas() funciona correctamente.</p>

    <button onclick="testObtenerCoordenadas()">Test obtenerCoordenadasParadas()</button>
    <button onclick="testAccesoDirecto()">Test acceso directo (debe fallar)</button>

    <div id="results"></div>

    <script src="test-reporter-utility.js"></script>
    <script>
        // Función para agregar resultado
        function addResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }

        function testObtenerCoordenadas() {
            try {
                const coords = window.obtenerCoordenadasParadas();
                if (coords && Array.isArray(coords) && coords.length > 0) {
                    addResult(`✅ obtenerCoordenadasParadas() funciona: ${coords.length} coordenadas`, 'success');
                } else {
                    addResult('❌ obtenerCoordenadasParadas() retornó array vacío o inválido', 'error');
                }
            } catch (error) {
                addResult(`❌ Error en obtenerCoordenadasParadas(): ${error.message}`, 'error');
            }
        }

        function testAccesoDirecto() {
            try {
                // Intentar acceder directamente (debe fallar)
                const coords = window.CoordenadasParadas;
                if (coords) {
                    addResult('⚠️ Acceso directo a CoordenadasParadas funciona (inesperado)', 'error');
                } else {
                    addResult('✅ Acceso directo a CoordenadasParadas retorna undefined (esperado)', 'success');
                }
            } catch (error) {
                addResult(`✅ Acceso directo falla correctamente: ${error.message}`, 'success');
            }
        }

        // Inicializar
        addResult('Test inicializado. Esperando acciones del usuario...');
    </script>

    <!-- Simular la estructura del módulo ES6 -->
    <script type="module">
        // Simular CoordenadasParadas
        const CoordenadasParadas = [
            { id: 'P-1', nombre: 'Parada 1', coordenadas: { lat: 39.47, lng: -0.37 } },
            { id: 'P-2', nombre: 'Parada 2', coordenadas: { lat: 39.48, lng: -0.38 } }
        ];

        // Función getter
        function obtenerCoordenadasParadas() {
            return CoordenadasParadas;
        }

        // Exponer globalmente
        window.obtenerCoordenadasParadas = obtenerCoordenadasParadas;

        // Función auto-ejecutable
        window.runTest = function() {
            testObtenerCoordenadas();
            testAccesoDirecto();
            // Reportar
            window.TestReporter.report({
                name: 'Fix: Coordenadas Paradas',
                resultsContainer: document.getElementById('results')
            });
        };
    </script>
</body>
