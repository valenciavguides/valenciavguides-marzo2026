<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Índice de Aventuras</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .summary { background: #e9ecef; padding: 15px; border-radius: 5px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Test Índice de Aventuras</h1>

    <div class="summary">
        <h3>Resumen del Test</h3>
        <p>Este test valida que el índice de aventuras funciona correctamente y está sincronizado con los datos reales de coordenadas, audios y retos.</p>
    </div>

    <button onclick="runIndiceTest()">Ejecutar Test Completo</button>
    <button onclick="clearResults()">Limpiar Resultados</button>

    <div id="test-results"></div>

    <script src="test-reporter-utility.js"></script>
    <script type="module">
        // Importar módulos necesarios
        import { INDICE_AVENTURAS, MAPEO_IDIOMAS } from '../js/indice-aventuras.js';
        import { DATOS_AVENTURAS } from '../js/coordenadas-aventuras.js';
        import { AUDIOS_AVENTURAS } from '../js/audios-aventuras.js';
        import { RETOS_AVENTURAS } from '../js/retos-aventuras.js';

        function addTestResult(title, content, type = 'info') {
            const resultsDiv = document.getElementById('test-results');
            const section = document.createElement('div');
            section.className = `test-section ${type}`;
            section.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
            resultsDiv.appendChild(section);
        }

        function clearResults() {
            document.getElementById('test-results').innerHTML = '';
        }

        async function runIndiceTest() {
            clearResults();

            try {
                addTestResult('Test 1: Estructura del Índice', 'Validando estructura básica del índice...', 'info');

                // Test 1: Validar estructura básica
                if (!INDICE_AVENTURAS || typeof INDICE_AVENTURAS !== 'object') {
                    throw new Error('INDICE_AVENTURAS no está definido o no es un objeto');
                }

                const aventuras = Object.keys(INDICE_AVENTURAS);
                addTestResult('Aventuras encontradas', `Total: ${aventuras.length}\nLista: ${aventuras.join(', ')}`, 'success');

                // Test 2: Validar mapeo de idiomas
                if (!MAPEO_IDIOMAS || typeof MAPEO_IDIOMAS !== 'object') {
                    throw new Error('MAPEO_IDIOMAS no está definido o no es un objeto');
                }

                const idiomas = Object.keys(MAPEO_IDIOMAS);
                addTestResult('Idiomas mapeados', `Total: ${idiomas.length}\nLista: ${idiomas.join(', ')}`, 'success');

                // Test 3: Validar consistencia con datos reales
                let erroresConsistencia = [];
                let exitosConsistencia = [];

                for (const aventuraId of aventuras) {
                    const aventura = INDICE_AVENTURAS[aventuraId];

                    // Verificar que existe en DATOS_AVENTURAS
                    if (!DATOS_AVENTURAS[aventuraId]) {
                        erroresConsistencia.push(`${aventuraId}: No existe en DATOS_AVENTURAS`);
                    } else {
                        exitosConsistencia.push(`${aventuraId}: Existe en coordenadas`);
                    }

                    // Verificar que existe en AUDIOS_AVENTURAS
                    if (!AUDIOS_AVENTURAS[aventuraId]) {
                        erroresConsistencia.push(`${aventuraId}: No existe en AUDIOS_AVENTURAS`);
                    } else {
                        exitosConsistencia.push(`${aventuraId}: Existe en audios`);
                    }

                    // Verificar que existe en RETOS_AVENTURAS
                    if (!RETOS_AVENTURAS[aventuraId]) {
                        erroresConsistencia.push(`${aventuraId}: No existe en RETOS_AVENTURAS`);
                    } else {
                        exitosConsistencia.push(`${aventuraId}: Existe en retos`);
                    }

                    // Verificar idiomas disponibles
                    for (const idioma of idiomas) {
                        if (aventura.idiomas[idioma]?.disponible) {
                            // Verificar que hay datos para este idioma
                            if (AUDIOS_AVENTURAS[aventuraId] && !AUDIOS_AVENTURAS[aventuraId][idioma]) {
                                erroresConsistencia.push(`${aventuraId}/${idioma}: Audios marcados como disponibles pero no existen`);
                            }
                            if (RETOS_AVENTURAS[aventuraId] && !RETOS_AVENTURAS[aventuraId][idioma]) {
                                erroresConsistencia.push(`${aventuraId}/${idioma}: Retos marcados como disponibles pero no existen`);
                            }
                        }
                    }
                }

                if (erroresConsistencia.length > 0) {
                    addTestResult('Errores de Consistencia', erroresConsistencia.join('\n'), 'error');
                } else {
                    addTestResult('Consistencia Validada', `✅ Todas las aventuras están sincronizadas\n\nÉxitos:\n${exitosConsistencia.join('\n')}`, 'success');
                }

                // Test 4: Validar conteos
                let erroresConteos = [];
                let exitosConteos = [];

                for (const aventuraId of aventuras) {
                    const aventura = INDICE_AVENTURAS[aventuraId];

                    try {
                        // Contar coordenadas reales
                        const coordenadasReales = DATOS_AVENTURAS[aventuraId]?.[aventura.claveCoord]?.coordenadas || [];
                        const paradasReales = coordenadasReales.filter(c => c.tipo === 'parada').length;
                        const tramosReales = coordenadasReales.filter(c => c.tipo === 'tramo').length;

                        if (paradasReales !== aventura.totalParadas) {
                            erroresConteos.push(`${aventuraId}: Paradas - Índice: ${aventura.totalParadas}, Real: ${paradasReales}`);
                        } else {
                            exitosConteos.push(`${aventuraId}: Paradas OK (${paradasReales})`);
                        }

                        if (tramosReales !== aventura.totalTramos) {
                            erroresConteos.push(`${aventuraId}: Tramos - Índice: ${aventura.totalTramos}, Real: ${tramosReales}`);
                        } else {
                            exitosConteos.push(`${aventuraId}: Tramos OK (${tramosReales})`);
                        }

                        // Contar audios reales (solo español por ahora)
                        const audiosReales = AUDIOS_AVENTURAS[aventuraId]?.es?.length || 0;
                        if (audiosReales !== aventura.totalAudios) {
                            erroresConteos.push(`${aventuraId}: Audios - Índice: ${aventura.totalAudios}, Real: ${audiosReales}`);
                        } else {
                            exitosConteos.push(`${aventuraId}: Audios OK (${audiosReales})`);
                        }

                        // Contar retos reales (solo español por ahora)
                        const retosReales = RETOS_AVENTURAS[aventuraId]?.es?.length || 0;
                        if (retosReales !== aventura.totalRetos) {
                            erroresConteos.push(`${aventuraId}: Retos - Índice: ${aventura.totalRetos}, Real: ${retosReales}`);
                        } else {
                            exitosConteos.push(`${aventuraId}: Retos OK (${retosReales})`);
                        }

                    } catch (error) {
                        erroresConteos.push(`${aventuraId}: Error contando datos - ${error.message}`);
                    }
                }

                if (erroresConteos.length > 0) {
                    addTestResult('Errores en Conteos', erroresConteos.join('\n'), 'error');
                } else {
                    addTestResult('Conteos Validados', `✅ Todos los conteos son correctos\n\n${exitosConteos.join('\n')}`, 'success');
                }

                // Test 5: Validar estructura de aventura
                const aventuraEjemplo = INDICE_AVENTURAS.Aventura1;
                const camposRequeridos = ['id', 'nombre', 'disponible', 'claveCoord', 'totalParadas', 'totalTramos', 'totalRetos', 'totalAudios', 'idiomas'];

                let erroresEstructura = [];
                for (const campo of camposRequeridos) {
                    if (!(campo in aventuraEjemplo)) {
                        erroresEstructura.push(`Campo faltante: ${campo}`);
                    }
                }

                if (erroresEstructura.length > 0) {
                    addTestResult('Errores de Estructura', erroresEstructura.join('\n'), 'error');
                } else {
                    addTestResult('Estructura Validada', '✅ Estructura de aventura correcta', 'success');
                }

                // Resumen final
                const totalTests = 5;
                const passedTests = document.querySelectorAll('.test-section.success').length;
                const failedTests = document.querySelectorAll('.test-section.error').length;

                addTestResult('Resumen Final',
                    `Tests ejecutados: ${totalTests}\n` +
                    `✅ Exitosos: ${passedTests}\n` +
                    `❌ Fallidos: ${failedTests}\n` +
                    `Estado: ${failedTests === 0 ? 'TODOS LOS TESTS PASARON' : 'HAY ERRORES QUE CORREGIR'}`,
                    failedTests === 0 ? 'success' : 'error'
                );

            } catch (error) {
                addTestResult('Error Fatal', `Error ejecutando tests: ${error.message}\nStack: ${error.stack}`, 'error');
            }
        }

        // Exponer funciones globalmente
        window.runIndiceTest = runIndiceTest;
        window.clearResults = clearResults;

        // Auto-ejecución para master-test
        window.runTest = function() {
            runIndiceTest();
            setTimeout(() => {
                window.TestReporter.report({
                    name: 'Verification: Índice Aventuras',
                    resultsContainer: document.getElementById('test-results')
                });
            }, 500);
        };
    </script>
</body>
</html>
