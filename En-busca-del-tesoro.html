
<!DOCTYPE html>

<head>

  <title>València be Guides</title>
  
  <!-- 🚨 REDIRECCIÓN: Este archivo debe cargarse como iframe desde codigo-padre.html -->
  <script>
    // Detectar si estamos siendo cargados directamente (no como iframe)
    if (window.parent === window && window.top === window) {
      console.warn('[SELECCION] ⚠️ Archivo abierto directamente. Redirigiendo a codigo-padre.html...');
      window.location.href = 'codigo-padre.html';
    }
  </script>
  
  <script src="js/suppress-warnings.js"></script>
  <style>
        /* Escalado proporcional puro: 2.5% del menor lado del viewport */
        html { font-size: 2.5vmin; }

    * { font-family: Verdana, sans-serif !important; }
    body { margin: 0; font-family: Verdana, sans-serif; background-color: #ff8c00; color: white; }
    .pantalla { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: relative; text-align: center; padding: 1.25rem; box-sizing: border-box; }
    .visible { display: flex; }
    .logo-redondo { width: 14rem; border-radius: 50%; }
    .logo-alargado { width: 28rem; margin-top: 0.9375rem; }
    .btn { 
      margin-top: 1.875rem; padding: 0.9375rem 1.5625rem; font-size: 1.25rem; font-weight: bold;
      background-color: white; color: black; 
      border-radius: 1.5625rem; cursor: pointer; 
      border: 0.1875rem solid black; 
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      min-width: 3.75rem; min-height: 3.75rem;
    }
    .btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0.25rem 0.75rem rgba(0,0,0,0.2); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn.success { border-color: #28a745; }
    .btn.error { border-color: #dc3545; }
    .arrow-right { color: #28a745; font-size: 3rem; font-weight: bold; margin-top: -0.125rem; }
    .checkmark { color: #28a745; font-size: 3rem; font-weight: bold; margin-top: -0.125rem; }
    .cross { color: #dc3545; font-size: 3rem; font-weight: bold; margin-top: -0.125rem; }
    .free-demo { position: absolute; top: 0.625rem; left: 0.625rem; background-color: red; color: white; padding: 0.3125rem 0.625rem; font-weight: bold; font-size: 0.875rem; border-radius: 0.3125rem; }
    .texto-box { max-height: 18.75rem; overflow-y: auto; border: 0.125rem solid white; padding: 1.25rem; margin-top: 1.25rem; background-color: #111; border-radius: 0.625rem; text-align: left; width: 80%; }
    .banderas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; margin-top: 1.875rem; }
    .bandera-container { position: relative; }
    .bandera { width: 7.5rem; height: auto; border: 0.1875rem solid white; border-radius: 0.625rem; cursor: pointer; }
    .en-desarrollo { position: absolute; top: 0.625rem; left: 0.625rem; background-color: white; color: red; padding: 0.3125rem; font-size: 0.75rem; font-weight: bold; transform: rotate(-20deg); }
    .audio-controls { margin-top: 1.875rem; }
    .reto-box { background: white; color: black; border-radius: 1.25rem; padding: 1.25rem; border: 0.3125rem solid blue; width: 80%; max-width: 25rem; }
    .respuesta { margin: 0.625rem 0; }
    .tick, .x { display: none; font-weight: bold; font-size: 3rem; margin-top: -0.125rem; }
    .tick.correcto { display: inline; color: #28a745; }
    .x.incorrecto { display: inline; color: #dc3545; }
    .visual-feedback { font-size: 2rem; font-weight: bold; }
    .visual-feedback.success { color: #28a745; }
    .visual-feedback.error { color: #dc3545; }
    .aventuras-lista { display: flex; flex-direction: column; gap: clamp(0.15rem, 0.5vmin, 0.35rem); width: 90%; max-width: 90vw; flex: 1; }
    .aventuras-lista .btn { margin-top: 0; min-height: 0; flex: 1; padding: 0.25rem 0.8rem; font-size: var(--btn-font-size, clamp(0.75rem, 3vmin, 1.8rem)); }
    #pantalla7 { justify-content: flex-start; padding-top: 3rem; }
    
    /* Escalar controles de audio nativos - proporcional al viewport */
    audio { 
      width: 100% !important; 
      height: clamp(4rem, 12vmin, 12rem) !important; 
    }
    audio::-webkit-media-controls-panel { height: 100% !important; }
    .audio-player-container { padding: clamp(0.5rem, 1.5vmin, 1.5rem) clamp(0.75rem, 2vmin, 2rem) !important; width: 92vw !important; max-width: 60rem !important; margin: clamp(0.5rem, 1.5vmin, 1.5rem) auto !important; }
  </style>
</head>
<body>

  <!-- P1: Bienvenida -->
  <div class="pantalla visible" id="pantalla1">
    <div class="free-demo">FREE DEMO</div>
    <img src="imagenes/imagenes-aplicación/logo-redondo.png" class="logo-redondo">
    <img src="imagenes/imagenes-aplicación/logo-alargado.png" class="logo-alargado">
    <button class="btn" onclick="mostrar(2)" title="Continuar">
      <span class="arrow-right">→</span>
    </button>
  </div>

  <!-- P2: Selección de idioma -->
  <div class="pantalla" id="pantalla2">
    <div class="free-demo">FREE DEMO</div>
    <div class="banderas">
      <div class="bandera-container"><img src="imagenes/imagenes-aplicación/Bandera España.png" class="bandera" onclick="seleccionarIdioma('es')"></div>
      <div class="bandera-container"><img src="imagenes/imagenes-aplicación/Bandera habla inglesa.png" class="bandera"><div class="en-desarrollo">Soon coming</div></div>
      <div class="bandera-container"><img src="imagenes/imagenes-aplicación/Bandera Francia.png" class="bandera"><div class="en-desarrollo">En développement</div></div>
      <div class="bandera-container"><img src="imagenes/imagenes-aplicación/Bandera Italia.png" class="bandera"><div class="en-desarrollo">In sviluppo</div></div>
      <div class="bandera-container"><img src="imagenes/imagenes-aplicación/Bandera Paises bajos.png" class="bandera"><div class="en-desarrollo">In ontwikkeling</div></div>
      <div class="bandera-container"><img src="imagenes/imagenes-aplicación/Bandera Japon.png" class="bandera"><div class="en-desarrollo">開発中</div></div>
    </div>
  </div>

  <!-- P3: Confirmación de idioma -->
  <div class="pantalla" id="pantalla3">
    <div class="free-demo">FREE DEMO</div>
    <div style="display: flex; flex-direction: column; align-items: center; margin: 1.25rem 0;">
      <img id="idioma-bandera-confirmacion" src="" alt="Bandera" style="width: 7.5rem; height: auto; border: 0.1875rem solid white; border-radius: 0.625rem; margin-bottom: 0.9375rem;">
    </div>
    <div style="display:flex; gap:1.25rem; justify-content:center;">
      <button class="btn success" onclick="confirmarIdioma()" title="Sí, confirmar">
        <span class="checkmark">✓</span>
      </button>
      <button class="btn error" onclick="mostrar(2)" title="No, cambiar">
        <span class="cross">✗</span>
      </button>
    </div>
  </div>

  <!-- P4: Términos y Condiciones (carga dinámica desde js/terminos-aventuras.js) -->
  <div class="pantalla" id="pantalla4">
    <div class="free-demo">FREE DEMO</div>
    <h2>Términos y Condiciones</h2>
    <div id="terminos-contenido" class="texto-box" style="max-height:50vh; overflow-y:auto;" onscroll="checkTerminosScroll()">
      <!-- Contenido cargado dinámicamente según idioma seleccionado -->
      <p>Cargando términos...</p>
    </div>
    <div style="display:flex; gap:1.25rem; justify-content:center; margin-top:1.25rem;">
      <button class="btn success" id="btn-aceptar-terminos" onclick="aceptarTerminos()" disabled title="Aceptar términos">
        <span class="checkmark">✓</span>
      </button>
    </div>
  </div>

  <!-- P5: Audio Intro (carga dinámica de audio-P-00 desde js/audios-aventuras.js) -->
  <div class="pantalla" id="pantalla5">
    <div class="free-demo">FREE DEMO</div>
    <img src="imagenes/imagenes-aplicación/logo-alargado.png" class="logo-alargado">
    <div class="audio-player-container" style="background:rgba(255,255,255,0.95); border-radius:1.25rem; box-shadow:0 0.375rem 1.25rem rgba(0,0,0,0.3);">
      <audio id="audio-intro-player" controls>
        <!-- Fuente cargada dinámicamente según idioma -->
        <source id="audio-intro-source" src="" type="audio/mpeg">
        Tu navegador no soporta el audio.
      </audio>
    </div>
    <button class="btn" onclick="mostrar(6)" title="Siguiente">
      <span class="arrow-right">→</span>
    </button>
  </div>

  <!-- P6: Reto R-1 (carga dinámica desde js/retos-aventuras.js) -->
  <div class="pantalla" id="pantalla6">
    <div class="free-demo">FREE DEMO</div>
    <img src="imagenes/imagenes-aplicación/logo-alargado.png" class="logo-alargado">
    <div class="reto-box" id="reto">
      <h3 id="reto-titulo">Reto 1</h3>
      <p id="reto-pregunta">Cargando reto...</p>
      <div id="reto-opciones">
        <!-- Opciones cargadas dinámicamente -->
      </div>
      <button class="btn" id="btn-verificar-reto" onclick="verificarRetoR1()" disabled title="Continuar">
        <span class="arrow-right">→</span>
      </button>
    </div>
  </div>

  <script>
    // ============================================================
    // ESTADO GLOBAL DE SELECCIÓN
    // ============================================================
    let idiomaSeleccionado = "";
    let aventuraSeleccionada = "";
    let retoActualR1 = null;
    let terminosCargados = false;
    let audioCargado = false;
    let retoCargado = false;
    let puzzleCompletado = false;
    let codigoValidado = false;
    
    // Datos cargados dinámicamente (se llenan desde los módulos)
    let TERMINOS_DATOS = null;
    let AUDIOS_DATOS = null;
    let RETOS_DATOS = null;
    let PUZZLES_DATOS = null;
    let INDICE_AVENTURAS_DATOS = null;
    let MAPEO_IDIOMAS_DATOS = null;
    
    // ============================================================
    // FUNCIÓN: VERIFICAR SCROLL EN TÉRMINOS
    // ============================================================
    function checkTerminosScroll() {
      const contenedor = document.getElementById('terminos-contenido');
      const boton = document.getElementById('btn-aceptar-terminos');
      if (contenedor && boton) {
        const scrolledToBottom = contenedor.scrollTop + contenedor.clientHeight >= contenedor.scrollHeight - 5;
        boton.disabled = !scrolledToBottom;
        boton.style.opacity = scrolledToBottom ? '1' : '0.3';
      }
    }
    
    // ============================================================
    // VERIFICAR SI UNA IMAGEN EXISTE (para puzzle)
    // ============================================================
    function verificarImagenExiste(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }
    
    // ============================================================
    // FUNCIÓN PRINCIPAL: MOSTRAR PANTALLA
    // ============================================================
    async function mostrar(id) {
      // Pantalla 9 (puzzle): verificar si la imagen del puzzle existe
      if (id === 9) {
        try {
          const modulo = await import('./js/puzzles-aventuras.js');
          PUZZLES_DATOS = modulo.PUZZLES_AVENTURAS;
          const puzzleIntro = PUZZLES_DATOS?.INTRO?.['puzzle.html']?.puzzle_id?.find(p => p.id === 'PZ-intro');
          const imagenPuzzle = puzzleIntro?.imagen || 'fotos-botones/logo-luna.jpg';
          
          const imagenExiste = await verificarImagenExiste(imagenPuzzle);
          
          if (!imagenExiste) {
            console.warn('[SELECCION] Imagen del puzzle no encontrada:', imagenPuzzle, '- Saltando a P10');
            puzzleCompletado = true;
            notificarPadrePreparacion();
            mostrar(10);
            return;
          }
          console.log('[SELECCION] Imagen del puzzle encontrada:', imagenPuzzle);
        } catch (error) {
          console.warn('[SELECCION] Error verificando puzzle, saltando a P10:', error);
          puzzleCompletado = true;
          notificarPadrePreparacion();
          mostrar(10);
          return;
        }
      }
      
      // Pausar cualquier audio en reproducción al cambiar de pantalla
      document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
      
      document.querySelectorAll(".pantalla").forEach(p => p.classList.remove("visible"));
      const pantalla = document.getElementById("pantalla" + id);
      if (pantalla) {
        pantalla.classList.add("visible");
        
        // Acciones específicas al mostrar ciertas pantallas
        if (id === 4 && !terminosCargados) {
          cargarTerminos();
        } else if (id === 5 && !audioCargado) {
          cargarAudioIntro();
        } else if (id === 6 && !retoCargado) {
          cargarRetoR1();
        } else if (id === 7) {
          cargarAventurasDinamicamente();
        } else if (id === 9) {
          cargarPuzzle();
          // Durante el puzzle, notificar al padre para que prepare a los hijos
          notificarPadrePreparacion();
        }
      }
    }
    
    // ============================================================
    // P4: CARGAR TÉRMINOS DESDE js/terminos-aventuras.js
    // ============================================================
    async function cargarTerminos() {
      const contenedor = document.getElementById('terminos-contenido');
      try {
        // Importar dinámicamente el módulo de términos
        const modulo = await import('./js/terminos-aventuras.js');
        TERMINOS_DATOS = modulo.TERMINOS_AVENTURAS;
        
        const idioma = idiomaSeleccionado || 'es';
        const terminos = TERMINOS_DATOS?.terminos_idiomas?.[idioma];
        
        if (terminos && typeof terminos === 'string' && terminos.trim().length > 0) {
          // El contenido ya es un string HTML
          contenedor.innerHTML = terminos;
          terminosCargados = true;
          console.log('[SELECCION] Términos cargados para idioma:', idioma);
        } else {
          contenedor.innerHTML = '<p>Los términos para este idioma no están disponibles aún.</p>';
        }
      } catch (error) {
        console.error('[SELECCION] Error cargando términos:', error);
        contenedor.innerHTML = '<p>Error cargando términos. Por favor, continúa.</p>';
      }
    }
    
    // ============================================================
    // P5: CARGAR AUDIO INTRO DESDE js/audios-aventuras.js
    // ============================================================
    async function cargarAudioIntro() {
      const audioPlayer = document.getElementById('audio-intro-player');
      const audioSource = document.getElementById('audio-intro-source');
      const audioNombre = document.getElementById('audio-intro-nombre');
      const audioTitulo = document.getElementById('audio-intro-titulo');
      
      try {
        const modulo = await import('./js/audios-aventuras.js');
        AUDIOS_DATOS = modulo.AUDIOS_AVENTURAS;
        
        const idioma = idiomaSeleccionado || 'es';
        // Buscar en la aventura seleccionada (o Aventura1 por defecto)
        const aventura = aventuraSeleccionada || 'Aventura1';
        const audiosIdioma = AUDIOS_DATOS?.[aventura]?.[idioma];
        
        if (audiosIdioma && Array.isArray(audiosIdioma)) {
          // Buscar el audio con id "audio-P-00"
          const audioIntro = audiosIdioma.find(a => a.id === 'audio-P-00');
          
          if (audioIntro) {
            audioSource.src = audioIntro.file;
            audioPlayer.load();
            audioNombre.textContent = audioIntro.title || 'Introducción';
            audioTitulo.textContent = audioIntro.title || 'Audio de introducción';
            audioCargado = true;
            console.log('[SELECCION] Audio intro cargado:', audioIntro.file);
          } else {
            audioNombre.textContent = 'Audio intro no encontrado (id: audio-P-00)';
          }
        } else {
          audioNombre.textContent = 'No hay audios para este idioma';
        }
      } catch (error) {
        console.error('[SELECCION] Error cargando audio:', error);
        audioNombre.textContent = 'Error cargando audio';
      }
    }
    
    // ============================================================
    // P6: CARGAR RETO R-1 DESDE js/retos-aventuras.js
    // ============================================================
    async function cargarRetoR1() {
      const titulo = document.getElementById('reto-titulo');
      const pregunta = document.getElementById('reto-pregunta');
      const opciones = document.getElementById('reto-opciones');
      const caja = document.getElementById('reto');
      
      try {
        const modulo = await import('./js/retos-aventuras.js');
        RETOS_DATOS = modulo.RETOS_AVENTURAS;
        
        const idioma = idiomaSeleccionado || 'es';
        const retosIdioma = RETOS_DATOS?.Aventura1?.[idioma];
        
        if (retosIdioma && Array.isArray(retosIdioma)) {
          // Buscar el reto con id "R-1"
          const retoR1 = retosIdioma.find(r => r.id === 'R-1');
          
          if (retoR1) {
            retoActualR1 = retoR1;
            titulo.textContent = `Reto ${retoR1.reto}`;
            pregunta.textContent = retoR1.pregunta;
            
            // Generar opciones de respuesta
            opciones.innerHTML = '';
            if (retoR1.opciones && Array.isArray(retoR1.opciones)) {
              retoR1.opciones.forEach((opcion, index) => {
                const div = document.createElement('div');
                div.className = 'respuesta';
                div.innerHTML = `
                  <input type="radio" name="reto-r1" value="${opcion}" id="opcion-${index}" onchange="habilitarBotonReto()">
                  <label for="opcion-${index}">${opcion}</label>
                  <span class="tick" style="display:none; color:#28a745;">✓</span>
                  <span class="x" style="display:none; color:#dc3545;">✗</span>
                `;
                opciones.appendChild(div);
              });
            }
            
            retoCargado = true;
            caja.style.borderColor = '#ccc'; // Reset border
            console.log('[SELECCION] Reto R-1 cargado:', retoR1.pregunta);
            
            // Habilitar botón cuando algo esté seleccionado
            function habilitarBotonReto() {
              const seleccion = document.querySelector('input[name="reto-r1"]:checked');
              const boton = document.getElementById('btn-verificar-reto');
              if (boton) {
                boton.disabled = !seleccion;
                boton.style.opacity = seleccion ? '1' : '0.3';
              }
            }
            window.habilitarBotonReto = habilitarBotonReto;
          } else {
            pregunta.textContent = 'Reto R-1 no encontrado';
          }
        } else {
          pregunta.textContent = 'No hay retos para este idioma';
        }
      } catch (error) {
        console.error('[SELECCION] Error cargando reto:', error);
        pregunta.textContent = 'Error cargando reto';
      }
    }
    
    // ============================================================
    // P6: VERIFICAR RESPUESTA DEL RETO R-1 (SIN ALERT)
    // ============================================================
    function verificarRetoR1() {
      if (!retoActualR1) {
        return;
      }
      
      const seleccion = document.querySelector('input[name="reto-r1"]:checked');
      const caja = document.getElementById('reto');
      const boton = document.getElementById('btn-verificar-reto');
      
      if (!seleccion) {
        return;
      }
      
      const respuestaUsuario = seleccion.value;
      const esCorrecta = retoActualR1.correctas && retoActualR1.correctas.includes(respuestaUsuario);
      
      // Mostrar feedback visual
      const opcionDiv = seleccion.closest('.respuesta');
      const tick = opcionDiv.querySelector('.tick');
      const x = opcionDiv.querySelector('.x');
      
      if (esCorrecta) {
        caja.style.borderColor = '#28a745';
        tick.style.display = 'inline';
        x.style.display = 'none';
        
        // Habilitar botón de continuar
        boton.disabled = false;
        boton.style.opacity = '1';
        boton.classList.add('success');
        
        // Marcar todas las opciones como no seleccionables
        document.querySelectorAll('input[name="reto-r1"]').forEach(input => {
          input.disabled = true;
        });
        
        // Navegación automática después de 1.5 segundos
        setTimeout(() => mostrar(7), 1500);
      } else {
        caja.style.borderColor = '#dc3545';
        tick.style.display = 'none';
        x.style.display = 'inline';
        navigator.vibrate?.(300);
        // Permitir reintentar
        setTimeout(() => {
          tick.style.display = 'none';
          x.style.display = 'none';
          caja.style.borderColor = '#ccc';
        }, 2000);
      }
    }
    
    // ============================================================
    // P9: CARGAR PUZZLE DESDE js/puzzles-aventuras.js
    // ============================================================
    async function cargarPuzzle() {
      const iframe = document.getElementById('puzzle-iframe');
      const btnContinuar = document.getElementById('btn-continuar-puzzle');
      
      try {
        const modulo = await import('./js/puzzles-aventuras.js');
        PUZZLES_DATOS = modulo.PUZZLES_AVENTURAS;
        
        // Buscar puzzle con id "PZ-intro" en INTRO
        const puzzleIntro = PUZZLES_DATOS?.INTRO?.['puzzle.html']?.puzzle_id?.find(p => p.id === 'PZ-intro');
        
        if (puzzleIntro) {
          // Cargar puzzle.html con aventura=INTRO para que encuentre PZ-intro
          const imagenPuzzle = puzzleIntro.imagen || 'fotos-botones/logo-luna.jpg';
          iframe.src = `puzzle.html?aventura=INTRO&id=${puzzleIntro.id}&noOverlay=1`;
          console.log('[SELECCION] Puzzle cargado:', puzzleIntro.id, imagenPuzzle);
          
          // Escuchar mensajes de puzzle.html (envía strings planos)
          // Secuencia: puzzle-state-completed/timeout → advance-to-next
          // No eliminar listener hasta advance-to-next o navegación manual
          window.addEventListener('message', function puzzleListener(event) {
            const msg = event.data;
            if (msg === 'puzzle-state-completed' || msg === 'puzzle-state-timeout') {
              puzzleCompletado = true;
              btnContinuar.disabled = false;
              btnContinuar.style.opacity = '1';
            } else if (msg === 'advance-to-next') {
              // El botón "continuar" interno de puzzle.html
              puzzleCompletado = true;
              window.removeEventListener('message', puzzleListener);
              completarPuzzle();
            }
          });
        } else {
          // Habilitar botón de todas formas para no bloquear
          btnContinuar.disabled = false;
          btnContinuar.style.opacity = '1';
        }
      } catch (error) {
        console.error('[SELECCION] Error cargando puzzle:', error);
        status.textContent = 'Error cargando puzzle';
        // Habilitar botón para no bloquear
        btnContinuar.disabled = false;
        btnContinuar.style.opacity = '1';
      }
    }
    
    // ============================================================
    // P9: COMPLETAR PUZZLE Y CONTINUAR
    // ============================================================
    function completarPuzzle() {
      // Pasar a pantalla de código
      mostrar(10);
    }
    
    // ============================================================
    // P9: NOTIFICAR AL PADRE PARA PREPARAR LOS HIJOS
    // Durante el puzzle, el padre tiene tiempo para comunicar
    // idioma y aventura a los hijos 1,2,3,4,5
    // ============================================================
    function notificarPadrePreparacion() {
      if (window.parent && window.parent !== window) {

  <script type="module">
    import { getEnviarMensaje, getRegistrarControlador, getEnviarMensajeConConfirmacion } from './js/utils.js';

    // Fallbacks que esperan a que window.mensajeria esté disponible
    const enviarMensaje = async (...args) => {
        // En hijos, usar postMessage directamente al padre
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            try {
                window.parent.postMessage({
                    tipo: mensaje.tipo,
                    origen: mensaje.origen || 'seleccion',
                    destino: mensaje.destino,
                    datos: mensaje.datos,
                    timestamp: Date.now()
                }, '*'); // Usar '*' para permitir file:// URLs
                return Promise.resolve();
            } catch (e) {
                console.error('[seleccion] Error enviando mensaje via postMessage:', e);
                return Promise.reject(e);
            }
        } else {
            // Fallback al método anterior si no estamos en iframe
            if (window.mensajeria && window.mensajeria.enviarMensaje) {
                return window.mensajeria.enviarMensaje(...args);
            } else {
                try {
                    const send = await getEnviarMensaje();
                    return send(...args);
                } catch (e) {
                    console.error('mensajeria not loaded', args, e);
                }
            }
        }
    };

    const registrarControlador = async (tipo, callback) => {
        // En hijos, los controladores se registran localmente para mensajes del padre
        if (window.parent && window.parent !== window) {
            // Registrar listener para mensajes del padre
            const listener = (event) => {
                if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                    callback(event.data);
                }
            };
            window.addEventListener('message', listener);
            return Promise.resolve(() => window.removeEventListener('message', listener));
        } else {
            // Fallback al método anterior
            if (window.mensajeria && window.mensajeria.registrarControlador) {
                return window.mensajeria.registrarControlador(tipo, callback);
            } else {
                // Esperar a que esté disponible
                try {
                    const reg = await getRegistrarControlador();
                    return reg(tipo, callback);
                } catch (e) {
                    console.error('mensajeria not loaded for registrarControlador', tipo, e);
                }
            }
        }
    };

    const enviarMensajeConConfirmacion = async (...args) => {
        // Similar a enviarMensaje pero esperando confirmación
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error('Timeout esperando confirmación')), 
                    window.ajustarTimeoutPorConexion ? window.ajustarTimeoutPorConexion(5000) : 5000);

                const confirmListener = (event) => {
                    if (event.source === window.parent && event.data && event.data.tipo === 'SISTEMA.CONFIRMACION') {
                        clearTimeout(timeout);
                        window.removeEventListener('message', confirmListener);
                        resolve();
                    }
                };

                window.addEventListener('message', confirmListener);

                try {
                    window.parent.postMessage({
                        tipo: mensaje.tipo,
                        origen: mensaje.origen || 'seleccion',
                        destino: mensaje.destino,
                        datos: mensaje.datos,
                        timestamp: Date.now(),
                        requiereConfirmacion: true
                    }, '*'); // Usar '*' para permitir file:// URLs
                } catch (e) {
                    clearTimeout(timeout);
                    window.removeEventListener('message', confirmListener);
                    reject(e);
                }
            });
        } else {
            // Fallback al método anterior
            if (window.mensajeria && window.mensajeria.enviarMensajeConConfirmacion) {
                return window.mensajeria.enviarMensajeConConfirmacion(...args);
            } else {
                try {
                    const sendConf = await getEnviarMensajeConConfirmacion();
                    return sendConf(...args);
                } catch (e) {
                    console.error('mensajeria not loaded', args, e);
                }
            }
        }
    };

    // ==================== MESSAGING ADAPTER PARA COMUNICACIÓN CON PADRE ====================
    // Este adapter permite a los hijos registrar controladores centralmente en el state-manager del padre
    if (typeof window !== 'undefined' && typeof window.messagingAdapter === 'undefined') {
        window.messagingAdapter = {
            /**
             * Registra un controlador en el state-manager centralizado del padre
             * @param {string} controladorId - ID único del controlador
             * @param {Function} handler - Función manejadora
             * @param {Object} opciones - Opciones incluyendo tipoMensaje
             * @returns {Promise<boolean>} - True si se registró, false si ya existía
             */
            registrarControladorCentral: async function(controladorId, handler, opciones = {}) {
                const iframeId = window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo';
                const tipo = opciones.tipoMensaje || controladorId;
                
                // El registro real ocurre localmente - el padre sincroniza via HIJO_MANEJADORES
                // NOTA: No verificar __CONTROLADOR_REGISTRADOS aquí porque ya se hace en registrarControladorSeguro

                window.addEventListener('message', async function adapterListener(event) {
                    if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                        try {
                            // Ejecutar handler y capturar resultado
                            const resultado = await handler(event.data);

                            if (event.data.requiereConfirmacion && event.data.id && resultado !== undefined) {

                                    };
                                    if (window.parent && window.parent !== window) {
                                        window.parent.postMessage(confirmacion, '*');
                                        (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Auto-confirmación enviada para ${event.data.id}`);
                                    }
                                } catch (confError) {
                                    (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error enviando confirmación:`, confError);
                                }
                            }
                        } catch (e) {
                            (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error en handler ${tipo}:`, e && e.message);
                        }
                    }
                });
                
                (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Handler registrado para ${tipo} en ${iframeId}`);
                return true;
            },
            
            /**

            enviarMensajeCentral: async function(mensaje) {

        (window.logger || console).info && (window.logger || console).info('[HIJO] messagingAdapter creado para comunicación con padre');
    }

    // Wrapper seguro para evitar doble registro de controladores en hijos
    if (typeof window !== 'undefined' && typeof window.registrarControladorSeguro === 'undefined') {
        window.__CONTROLADOR_REGISTRADOS = window.__CONTROLADOR_REGISTRADOS || new Set();
        window.registrarControladorSeguro = async function(tipo, handler, opciones) {
            try {
                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControladorSeguro called: ${tipo}`);
                if (!tipo || typeof handler !== 'function') {

                logger.info(`${logPrefix} HIJO_PREPARADO enviado al padre`);
            } catch (error) {
                logger.error(`${logPrefix} Error enviando HIJO_PREPARADO:`, error);
            }

        } catch (error) {
            logger.error(`${logPrefix} Error crítico durante inicialización:`, error);
            
            // Enviar HIJO_FALLIDO al padre
            try {
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.HIJO_FALLIDO,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        error: error.message,
                        stack: error.stack,
                        timestamp: Date.now()
                    }
                });
            } catch (notifyError) {
                logger.error(`${logPrefix} Error notificando fallo al padre:`, notifyError);
            }
        }
    }

    // ============================================================
    // REGISTRO DE CONTROLADORES
    // ============================================================
    /**
     * Registra todos los controladores de mensajes
     */
    function registrarControladores() {
        const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[registrarControladores]`;
        
        try {
            logger.debug(`${logPrefix} Registrando controladores...`);

            // ============================================================
            // CONTROLADOR: SISTEMA.PADRE_DATOS
            // Este es el controlador principal para la comunicación padre->hijo
            // NOTA: PADRE_LISTO fue eliminado (obsoleto) - usar solo PADRE_DATOS
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_DATOS, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[PADRE_DATOS]`;
                
                try {
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        return;
                    }

                    logger.info(`${controladorPrefix} Datos del padre recibidos desde ${mensaje.origen}`);

                    // ✅ PROCESAR DATOS INICIALES DEL PADRE
                    if (mensaje.datos) {
                        const { modo, paradaActual } = mensaje.datos;

                        if (modo) {
                            logger.debug(`${controladorPrefix} Modo inicial: ${modo}`);
                        }

                        if (paradaActual) {
                            logger.debug(`${controladorPrefix} Parada actual: ${paradaActual}`);
                        }
                    }

                    // Enviar HIJO_LISTO al padre (solo si no se ha enviado antes)
                    // Este es el punto de envío estandarizado para todos los hijos
                    if (!estadoComponente.hijoListoEnviado) {
                        try {
                            await enviarMensaje({
                                destino: getPadreId(),
                                tipo: TIPOS_MENSAJE.SISTEMA.HIJO_LISTO,
                                origen: CONFIG_HIJO.IFRAME_ID,
                                datos: {
                                    componenteId: CONFIG_HIJO.COMPONENTE_ID,
                                    capacidades: ['seleccion', 'idioma', 'aventura'],
                                    timestamp: Date.now()
                                }
                            });
                            estadoComponente.hijoListoEnviado = true;
                            logger.info(`${controladorPrefix} HIJO_LISTO enviado al padre`);
                        } catch (error) {
                            logger.error(`${controladorPrefix} Error enviando HIJO_LISTO:`, error);
                        }
                    } else {
                        logger.debug(`${controladorPrefix} HIJO_LISTO ya enviado previamente, omitiendo duplicado`);
                    }

                } catch (error) {
                    logger.error(`${controladorPrefix} Error procesando PADRE_DATOS:`, error);
                }
            });

            // ============================================================
            // CONTROLADOR: SISTEMA.PADRE_CONFIRMA_HIJO_LISTO
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_CONFIRMA_HIJO_LISTO, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[PADRE_CONFIRMA_HIJO_LISTO]`;

                try {
                    console.log(`${CONFIG_HIJO.IFRAME_ID} PADRE_CONFIRMA_HIJO_LISTO recibido:`, mensaje);
                    // 1. Validación de origen
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        throw new Error('Mensaje sin origen válido');
                    }

                    logger.info(`${controladorPrefix} Confirmación recibida del padre - controladores listos`);

                    // 🔥 NUEVO: Procesar modo inicial si viene en datos (patrón unificado)
                    const { modoInicial } = mensaje.datos || {};
                    if (modoInicial) {
                        logger.debug(`${controladorPrefix} Modo inicial recibido: ${modoInicial} (registrado para consistencia)`);
                    }

                    // Inicializar la lógica de menú visible y mostrar UI ahora que el padre confirmó
                    try { if (typeof inicializarLogicaSeleccion === 'function') inicializarLogicaSeleccion(); } catch (e) { logger.warn(`${controladorPrefix} inicializarLogicaSeleccion falló:`, e); }
                    window._uiConfirmado = true;
                    mostrarUI();
                    try { await enviarMensaje({ destino: getPadreId(), tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION, origen: CONFIG_HIJO.IFRAME_ID, datos: { tipo: 'UI_VISIBLE', timestamp: Date.now() } }); } catch (e) { /* ignore */ }

                    return {
                        exito: true,
                        estado: 'confirmado',
                        timestamp: Date.now()
                    };

                } catch (error) {
                    logger.error(`${controladorPrefix} Error en controlador:`, error);

                    // Notificar error al padre
                    try {
                        await enviarMensaje({
                            destino: getPadreId(),
                            tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: {
                                error: error.message,
                                controlador: 'PADRE_CONFIRMA_HIJO_LISTO',
                                timestamp: Date.now()
                            }
                        });
                    } catch (notifyError) {
                        logger.error(`${controladorPrefix} Error notificando al padre:`, notifyError);
                    }

                    return {
                        exito: false,
                        error: error.message
                    };
                }
            });

            // ============================================================
            // CONTROLADOR: SISTEMA.HEARTBEAT
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.HEARTBEAT, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[HEARTBEAT]`;
                
                try {
                    // 1. Validación de origen
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        return { exito: false, error: 'Sin origen' };
                    }

                    // 2. Preparar datos de respuesta
                    const datosRespuesta = {
                        timestamp: Date.now(),
                        componente: CONFIG_HIJO.COMPONENTE_ID,
                        estado: 'activo',
                        inicializado: estadoComponente.inicializado,
                        padreConectado: estadoComponente.padreConectado,
                        idiomaSeleccionado: estadoComponente.idiomaSeleccionado,
                        aventuraSeleccionada: estadoComponente.aventuraSeleccionada,
                        terminosAceptados: estadoComponente.terminosAceptados,
                        ultimaInteraccion: estadoComponente.ultimaInteraccion
                    };

                    // 3. Enviar respuesta
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: TIPOS_MENSAJE.SISTEMA.HEARTBEAT_RESPONSE,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: datosRespuesta
                    });

                    logger.debug(`${controladorPrefix} Respuesta enviada a ${mensaje.origen}`);

                    return {
                        exito: true,
                        timestamp: datosRespuesta.timestamp
                    };

                } catch (error) {
                    logger.error(`${controladorPrefix} Error en controlador:`, error);
                    
                    return {
                        exito: false,
                        error: error.message
                    };
                }
            });

            // ============================================================
            // CONTROLADOR: SISTEMA.ACK
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.ACK, async (mensaje) => {
                const controladorPrefix = `${CONFIG_HIJO.LOG_PREFIX}[ACK]`;
                
                try {
                    // 1. Validación de origen
                    if (!mensaje || !mensaje.origen) {
                        logger.error(`${controladorPrefix} Mensaje sin origen válido`, mensaje);
                        return { exito: false, error: 'Sin origen' };
                    }

                    logger.debug(`${controladorPrefix} ACK recibido, respondiendo...`);

                    // 2. Preparar datos de respuesta
                    const datosRespuesta = {
                        componenteId: CONFIG_HIJO.COMPONENTE_ID,
                        timestamp: Date.now(),
                        estado: 'activo',
                        inicializado: estadoComponente.inicializado,
                        padreConectado: estadoComponente.padreConectado
                    };

                    // 3. Enviar respuesta
                    await enviarMensaje({
                        destino: getPadreId(),
                        tipo: TIPOS_MENSAJE.SISTEMA.ACK,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: datosRespuesta
                    });

                    logger.debug(`${controladorPrefix} ACK respondido`);

                    return {
                        exito: true,
                        timestamp: datosRespuesta.timestamp
                    };

                } catch (error) {
                    logger.error(`${controladorPrefix} Error respondiendo ACK:`, error);
                    
                    return {
                        exito: false,
                        error: error.message
                    };
                }
            });

            // ============================================================
            // CONTROLADOR: SISTEMA.CAMBIO_MODO
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO, async (mensaje) => {
                const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[CAMBIO_MODO]`;
                try {
                    // Validar carga secuencial
                    if (!mensaje.datos?.secuenciaCompleta) {
                        logger.warn(`${logPrefix} Mensaje recibido antes de secuencia completa`);
                        await enviarMensaje({
                            tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            destino: mensaje.origen,
                            datos: {
                                error: 'Secuencia no completa',
                                esperarPermiso: true,
                                tipoOriginal: mensaje.tipo,
                                modoSolicitado: mensaje.datos?.modo
                            }
                        });
                        return;
                    }

                    const { modo } = mensaje.datos || {};
                    if (!modo || !['casa', 'aventura'].includes(modo)) {
                        logger.error(`${logPrefix} Modo inválido: ${modo}`);
                        await enviarMensaje({
                            tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            destino: mensaje.origen,
                            datos: { error: 'Modo inválido', modoRecibido: modo }
                        });
                        return;
                    }

                    // Enviar ENTENDIDO
                    logger.info(`${logPrefix} Cambio de modo a "${modo}" entendido (componente de selección)`);
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_ENTENDIDO,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: { 
                            modo, 
                            timestamp: Date.now(),
                            mensajeId: mensaje.datos?.mensajeId || mensaje.id
                        }
                    });
                    
                    // Componente de selección no cambia con el modo - enviar EFECTUADO inmediatamente
                    logger.info(`${logPrefix} Cambio de modo a "${modo}" efectuado (componente de selección)`);
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: 'SISTEMA.CAMBIO_MODO_EFECTUADO', // String literal
                        origen: CONFIG_HIJO.IFRAME_ID, // String literal
                        datos: { 
                            modo, 
                            exito: true, 
                            timestamp: Date.now(),
                            mensajeId: mensaje.datos?.mensajeId || mensaje.id
                        }
                    });
                    
                    return { exito: true };
                } catch (error) {
                    logger.error(`${logPrefix} Error:`, error);
                    try {
                        await enviarMensaje({
                            tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            destino: mensaje.origen || 'padre',
                            datos: { error: error.message, tipo: 'CAMBIO_MODO_FALLIDO' }
                        });
                    } catch (e) {
                        logger.error(`${logPrefix} Error notificando fallo:`, e);
                    }
                    return { exito: false, error: error.message };
                }
            });

            // ============================================================
            // CONTROLADOR: SISTEMA.CAMBIO_MODO_APLICADO
            // ============================================================
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_APLICADO, async (mensaje) => {
                const logPrefix = `${CONFIG_HIJO.LOG_PREFIX}[CAMBIO_MODO_APLICADO]`;
                try {
                    const { modo } = mensaje.datos || {};
                    logger.success(`${logPrefix} ✅ Cambio de modo a "${modo}" aplicado globalmente`);
                } catch (error) {
                    logger.error(`${logPrefix} Error:`, error);
                }
            });

            logger.info(`${logPrefix} Controladores registrados exitosamente`);

        } catch (error) {
            logger.error(`${logPrefix} Error registrando controladores:`, error);
            throw error;
        }
    }

    // ============================================================
    // FUNCIONES DE SELECCIÓN (MANTENIDAS)
    // ============================================================

    /**
     * Selecciona un idioma y notifica al padre
     */
    window.seleccionarIdioma = async function(idioma) {
        try {
            estadoComponente.idiomaSeleccionado = idioma;
            estadoComponente.ultimaInteraccion = Date.now();
            window.idiomaSeleccionado = idioma; // Para funciones legacy
            
            logger.info(`[SELECCION] Idioma seleccionado: ${idioma}`);
            
            // Enviar mensaje al padre
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.SELECCION.IDIOMA_SELECCIONADO,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: {
                    idioma: idioma,
                    timestamp: Date.now()
                }
            });
            
            logger.debug(`[SELECCION] Mensaje IDIOMA_SELECCIONADO enviado al padre`);
            
            // Actualizar bandera de confirmación en P3
            const banderaIdioma = document.getElementById('idioma-bandera-confirmacion');
            if (banderaIdioma) {
                const banderasIdiomas = { 'es': 'Bandera España.png', 'en': 'Bandera habla inglesa.png', 'fr': 'Bandera Francia.png', 'it': 'Bandera Italia.png', 'nl': 'Bandera Paises bajos.png', 'ja': 'Bandera Japon.png' };
                banderaIdioma.src = `imagenes/imagenes-aplicación/${banderasIdiomas[idioma] || banderasIdiomas['es']}`;
            }
            
            // Navegar a confirmación de idioma
            mostrar(3);
        } catch (error) {
            logger.error(`[SELECCION] Error seleccionando idioma:`, error);
            // Continuar con navegación aunque falle el mensaje
            mostrar(3);
        }
    };

    /**
     * Selecciona una aventura y notifica al padre para iniciar
     */
    window.seleccionarAventura = async function(aventura) {
        try {
            estadoComponente.aventuraSeleccionada = aventura;
            estadoComponente.ultimaInteraccion = Date.now();
            window.aventuraSeleccionada = aventura;
            
            logger.info(`[SELECCION] Aventura seleccionada: ${aventura}`);
            
            // Enviar mensaje al padre con la selección completa
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.SELECCION.AVENTURA_SELECCIONADA,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: {
                    aventura: aventura,
                    idioma: estadoComponente.idiomaSeleccionado || 'es',
                    timestamp: Date.now()
                }
            });
            
            logger.debug(`[SELECCION] Mensaje AVENTURA_SELECCIONADA enviado al padre`);
            
            // Actualizar texto de confirmación con nombre completo
            const textoAventura = document.getElementById('aventura-seleccionada-texto');
            if (textoAventura) {
                // Mapeo de IDs a nombres completos
                const nombresAventuras = {
                    'Aventura1': 'Aventura 1 - València histórica 1',
                    'Aventura2': 'Aventura 2 - València histórica 2',
                    'Aventura3': 'Aventura 3 - València histórica 3',
                    'Aventura4': 'Aventura 4 - València histórica 4',
                    'Aventura5': 'Aventura 5 - València histórica 5',
                    'AventuraFallas': 'Aventura Especial - Fallas',
                    'Aventura34km': 'Aventura 34 km'
                };
                textoAventura.textContent = nombresAventuras[aventura] || aventura;
            }
            
            // Sincronizar variable global del primer script
            window.aventuraSeleccionada = aventura;
            
            // Navegar a confirmación de aventura (P8)
            mostrar(8);
        } catch (error) {
            logger.error(`[SELECCION] Error seleccionando aventura:`, error);
            mostrar(8);
        }
    };

    /**
     * Inicia la aventura - envía mensaje final al padre
     */
    window.iniciarAventura = async function() {
        try {
            console.log('🚀 [SELECCION] iniciarAventura() LLAMADA');
            console.log('🚀 [SELECCION] Estado:', JSON.stringify({
                aventura: estadoComponente.aventuraSeleccionada,
                idioma: estadoComponente.idiomaSeleccionado,
                padreConectado: estadoComponente.padreConectado
            }));
            
            logger.info(`[SELECCION] Iniciando aventura: ${estadoComponente.aventuraSeleccionada} en idioma ${estadoComponente.idiomaSeleccionado}`);
            
            const padreId = getPadreId();
            console.log('🚀 [SELECCION] Destino (padre):', padreId);
            
            // Enviar mensaje de inicio al padre
            const mensajeEnviado = await enviarMensaje({
                tipo: TIPOS_MENSAJE.SELECCION.INICIAR_AVENTURA,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: padreId,
                datos: {
                    aventura: estadoComponente.aventuraSeleccionada || 'Aventura1',
                    idioma: estadoComponente.idiomaSeleccionado || 'es',
                    terminosAceptados: estadoComponente.terminosAceptados,
                    timestamp: Date.now()
                }
            });
            
            console.log('🚀 [SELECCION] Mensaje enviado:', mensajeEnviado);
            logger.info(`[SELECCION] Mensaje INICIAR_AVENTURA enviado al padre`);
            
        } catch (error) {
            console.error('❌ [SELECCION] Error en iniciarAventura:', error);
            logger.error(`[SELECCION] Error iniciando aventura:`, error);
        }
    };

    /**
     * Acepta términos y condiciones
     */
    window.aceptarTerminos = async function() {
        try {
            estadoComponente.terminosAceptados = true;
            estadoComponente.ultimaInteraccion = Date.now();
            
            // Enviar mensaje al padre (opcional)
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.SELECCION.TERMINOS_ACEPTADOS,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: {
                    aceptados: true,
                    timestamp: Date.now()
                }
            });
            
            // Navegar a audio intro
            mostrar(5);
        } catch (error) {
            logger.error(`[SELECCION] Error aceptando términos:`, error);
            mostrar(5);
        }
    };

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    // Ejecutar inicialización cuando el DOM esté listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => init());
    } else {
        init();
    }

    // Función para inicializar la lógica de selección (llamada después de PADRE_CONFIRMA_HIJO_LISTO)
    function inicializarLogicaSeleccion() {
        console.log('📋 [SELECCION] inicializarLogicaSeleccion() - Lógica de menú visible activada');
        // Aquí se puede agregar lógica adicional que necesite ejecutarse después de la confirmación del padre
    }
  </script>

          <input type="email" id="input-email" placeholder="user@email.com" disabled style="width:100%; padding:0.75rem; border:0.125rem solid #ddd; border-radius:0.5rem; font-size:1rem; box-sizing:border-box; background:#f5f5f5; color:#999;">
        </div>
      </div>
    </div>
    
    <!-- Activation code field -->
    <div style="margin-bottom:1.5625rem;">
      <div style="display:flex; align-items:center; gap:0.75rem;">
        <span style="font-size:3rem; color:#666; position:relative; top:-1.25rem;">🔐</span>
        <div style="flex:1;">
          <input type="text" id="input-codigo" placeholder="0000" maxlength="10" oninput="validarCodigo()" style="width:100%; padding:1.125rem; border:0.125rem solid #ddd; border-radius:0.75rem; font-size:1.75rem; text-align:center; letter-spacing:0.75rem; box-sizing:border-box; font-weight:bold;">
          <div id="feedback-codigo" style="text-align:center; margin-top:0.5rem; font-size:2rem; height:2.5rem;">
            <!-- Visual feedback appears here -->
          </div>
        </div>
      </div>
    </div>
    
    <button id="btn-iniciar-aventura" class="btn" onclick="iniciarAventura()" disabled title="Iniciar aventura">
      <span class="arrow-right">→</span>
      <span style="font-size:1.5rem;">🚀</span>
    </button>
  </div>
  <div style="text-align:center; margin-top:0.9375rem;">
    <div style="font-size:1rem; color:rgba(255,255,255,0.8);">🔑 → 0000</div>
  </div>
</div>

</body>
</html>
