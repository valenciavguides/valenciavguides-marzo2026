    <script>
    /* Escalado proporcional PURO: sincronizar con viewport del padre SIN LÍMITES */
    (function(){
        function escalar(){
            var w, h;
            try { w = (window.top || window.parent).innerWidth; h = (window.top || window.parent).innerHeight; }
            catch(e) { w = window.innerWidth; h = window.innerHeight; }
            var f = Math.min(w, h) * 0.025; // Sin límites - proporcional puro
            document.documentElement.style.fontSize = f + "px";
        }
        escalar();
        window.addEventListener("resize", escalar);
    })();
    </script>

    <script type="module">
    // Validar que estamos dentro de un iframe con padre accesible
    if (!window.parent || window.parent === window) {
        console.error('[hijo5] Este componente debe ejecutarse dentro de un iframe');
        document.body.innerHTML = '<div style="padding: 20px; color: red;">Error: Este componente debe cargarse desde la página principal.</div>';
        throw new Error('Componente debe ejecutarse dentro de un iframe');
    }

    import { getEnviarMensaje, getRegistrarControlador, getEnviarMensajeConConfirmacion } from './js/utils.js';
    import { retryUntilAvailable } from './js/utils.js';

    // Fallbacks que esperan a que window.mensajeria esté disponible
    const enviarMensaje = async (...args) => {
        // En hijos, usar postMessage directamente al padre
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            try {
                window.parent.postMessage({
                    tipo: mensaje.tipo,
                    origen: mensaje.origen || 'hijo5',
                    destino: mensaje.destino,
                    datos: mensaje.datos,
                    timestamp: Date.now()
                }, window.location.origin);
                return Promise.resolve();
            } catch (e) {
                console.error('[hijo5] Error enviando mensaje via postMessage:', e);
                return Promise.reject(e);
            }
        } else {
            // Fallback al método anterior si no estamos en iframe
            return await retryUntilAvailable(
                () => window.mensajeria.enviarMensaje(...args),
                () => window.mensajeria && window.mensajeria.enviarMensaje,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    const registrarControlador = async (tipo, callback) => {
        // En hijos, los controladores se registran localmente para mensajes del padre
        if (window.parent && window.parent !== window) {
            // Registrar listener para mensajes del padre
            const listener = (event) => {
                if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                    callback(event.data);
                }
            };
            window.addEventListener('message', listener);
            return Promise.resolve(() => window.removeEventListener('message', listener));
        } else {
            // Fallback al método anterior
            return await retryUntilAvailable(
                () => window.mensajeria.registrarControlador(tipo, callback),
                () => window.mensajeria && window.mensajeria.registrarControlador,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    const enviarMensajeConConfirmacion = async (...args) => {
        // Similar a enviarMensaje pero esperando confirmación
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error('Timeout esperando confirmación')), 
                    window.ajustarTimeoutPorConexion ? window.ajustarTimeoutPorConexion(5000) : 5000);
                
                const confirmListener = (event) => {
                    if (event.source === window.parent && event.data && event.data.tipo === 'SISTEMA.CONFIRMACION') {
                        clearTimeout(timeout);
                        window.removeEventListener('message', confirmListener);
                        resolve();
                    }
                };
                
                window.addEventListener('message', confirmListener);
                
                try {
                    window.parent.postMessage({
                        tipo: mensaje.tipo,
                        origen: mensaje.origen || 'hijo5',
                        destino: mensaje.destino,
                        datos: mensaje.datos,
                        timestamp: Date.now(),
                        requiereConfirmacion: true
                    }, window.location.origin);
                } catch (e) {
                    clearTimeout(timeout);
                    window.removeEventListener('message', confirmListener);
                    reject(e);
                }
            });
        } else {
            return await retryUntilAvailable(
                () => window.mensajeria.enviarMensajeConConfirmacion(...args),
                () => window.mensajeria && window.mensajeria.enviarMensajeConConfirmacion,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    // ==================== MESSAGING ADAPTER PARA COMUNICACIÓN CON PADRE ====================
    // Este adapter permite a los hijos registrar controladores centralmente en el state-manager del padre
    if (typeof window !== 'undefined' && typeof window.messagingAdapter === 'undefined') {
        window.messagingAdapter = {
            /**
             * Registra un controlador en el state-manager centralizado del padre
             * @param {string} controladorId - ID único del controlador
             * @param {Function} handler - Función manejadora
             * @param {Object} opciones - Opciones incluyendo tipoMensaje
             * @returns {Promise<boolean>} - True si se registró, false si ya existía
             */
            registrarControladorCentral: async function(controladorId, handler, opciones = {}) {
                const iframeId = window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo';
                const tipo = opciones.tipoMensaje || controladorId;
                
                // El registro real ocurre localmente - el padre sincroniza via HIJO_MANEJADORES
                // NOTA: No verificar __CONTROLADOR_REGISTRADOS aquí porque ya se hace en registrarControladorSeguro
                // La verificación duplicada causaba que el listener nunca se añadiera
                
                // Registrar listener local para este tipo de mensaje con soporte para confirmaciones automáticas
                window.addEventListener('message', async function adapterListener(event) {
                    if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                        try {
                            // Ejecutar handler y capturar resultado
                            const resultado = await handler(event.data);
                            
                            // Si el mensaje requería confirmación y el handler devolvió resultado, enviar confirmación automática
                            if (event.data.requiereConfirmacion && event.data.id && resultado !== undefined) {
                                try {
                                    const confirmacion = {
                                        tipo: (typeof TIPOS_MENSAJE !== 'undefined' && TIPOS_MENSAJE.SISTEMA && TIPOS_MENSAJE.SISTEMA.CONFIRMACION) || 'SISTEMA.CONFIRMACION',
                                        idOriginal: event.data.id,
                                        origen: iframeId,
                                        destino: event.data.origen || 'padre',
                                        timestamp: Date.now(),
                                        datos: resultado
                                    };
                                    if (window.parent && window.parent !== window) {
                                        window.parent.postMessage(confirmacion, '*');
                                        (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Auto-confirmación enviada para ${event.data.id}`);
                                    }
                                } catch (confError) {
                                    (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error enviando confirmación:`, confError);
                                }
                            }
                        } catch (e) {
                            (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error en handler ${tipo}:`, e && e.message);
                        }
                    }
                });
                
                (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Handler registrado para ${tipo} en ${iframeId}`);
                return true;
            },
            
            /**
             * Envía mensaje al padre para que lo procese centralmente
             */
            enviarMensajeCentral: async function(mensaje) {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(mensaje, '*'); // '*' para compatibilidad con file://
                    return { exito: true, metodo: 'postMessage' };
                }
                return { exito: false, error: 'No hay padre disponible' };
            }
        };
        (window.logger || console).info && (window.logger || console).info('[HIJO] messagingAdapter creado para comunicación con padre');
    }

    // Wrapper seguro para evitar doble registro de controladores en hijos
    if (typeof window !== 'undefined' && typeof window.registrarControladorSeguro === 'undefined') {
        window.__CONTROLADOR_REGISTRADOS = window.__CONTROLADOR_REGISTRADOS || new Set();
        window.registrarControladorSeguro = async function(tipo, handler, opciones) {
            try {
                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControladorSeguro called: ${tipo}`);
                if (!tipo || typeof handler !== 'function') {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro parámetros inválidos: tipo=${tipo}`);
                    return;
                }
                if (window.__CONTROLADOR_REGISTRADOS.has(tipo)) {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Controlador ya registrado, omitiendo: ${tipo}`);
                    return;
                }
                window.__CONTROLADOR_REGISTRADOS.add(tipo);
                // Prefer central registration via messagingAdapter/state-manager when available
                try {
                    const iframeId = (window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo');
                    const controladorId = `${iframeId}:${tipo}`;
                    if (window.messagingAdapter && typeof window.messagingAdapter.registrarControladorCentral === 'function') {
                        try {
                            const centralRes = await window.messagingAdapter.registrarControladorCentral(controladorId, handler, { tipoMensaje: tipo });
                            if (centralRes === true) {
                                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador registered centrally: ${controladorId} -> ${tipo}`);
                                return true;
                            }
                        } catch (e) {
                            (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Central registrar failed for ${tipo}: ${e && e.message}`);
                        }
                    }
                    if (typeof registrarControlador === 'function') {
                        try {
                            const res = await safeRegistrar(tipo, handler, opciones);
                            (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador delegated to mensajeria for ${tipo}`);
                            return res;
                        } catch (err) {
                            (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControlador failed for ${tipo}: ${err && err.message}`);
                        }
                    }
                } catch (e) {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro central attempt error for ${tipo}: ${e && e.message}`);
                }
                // Handler remains tracked locally in `window.__CONTROLADOR_REGISTRADOS`
                (window.logger || console).info && (window.logger || console).info(`[HIJO] Handler queued for migration: ${tipo} (local queue)`);
                return;
            } catch (e) {
                (window.logger || console).error(`[HIJO] Error registrando controlador seguro ${tipo}:`, e && e.message);
            }
        };

        // Helper: safeRegistrar delegates to registrarControladorSeguro when available
        if (typeof window !== 'undefined' && typeof window.safeRegistrar === 'undefined') {
            window.safeRegistrar = async function(tipo, handler, opciones) {
                try {
                    if (!tipo || typeof handler !== 'function') return;
                    if (window.__CONTROLADOR_REGISTRADOS && window.__CONTROLADOR_REGISTRADOS.has(tipo)) return;
                    if (typeof window.registrarControladorSeguro === 'function') return window.registrarControladorSeguro(tipo, handler, opciones);
                    if (typeof registrarControlador === 'function') return registrarControlador(tipo, handler, opciones);
                } catch (e) { (window.logger || console).warn && (window.logger || console).warn('[HIJO] safeRegistrar error', e && e.message); }
            };
        }
    }
    import { resolverIdsParada, getPadreId } from './js/utils.js';
    import { TIPOS_MENSAJE } from './js/constants.js';
    import logger from './js/logger.js';

    // NOTA: Bloque IIFE "RESPALDO" para PADRE_PIDE_MANEJADORES eliminado (obsoleto).
    // El sistema actual usa state-manager centralizado sin necesidad de migración manual.

    import { normalizarParadas } from './js/utils.js';

    const CONFIG_HIJO = {
        IFRAME_ID: 'hijo5',
        COMPONENTE_ID: 'BOTON_CASA',
        DEBUG: true
    };

    // Estado del componente
    const estado = {
        inicializado: false,
        gpsActivo: false,
        gpsPermisos: null, // null = desconocido, true = concedidos, false = denegados
        gpsPrecision: null, // Precisión actual del GPS en metros
        gpsError: null, // Último error GPS
        ultimaUbicacion: null, // { lat, lng, precision, timestamp }
        modo: 'casa',
        aventuraParadas: [], // Array de paradas recibidas del padre
        paradasMapeadas: {}, // Mapeo de IDs locales a IDs del padre
        datosRecibidos: false, // Flag para evitar procesamiento duplicado
        hijoListoEnviado: false  // Flag para evitar envío duplicado de HIJO_LISTO
    };

    // Controladores se registrarán después de la confirmación del padre
    // para evitar duplicados y asegurar inicialización completa

    // Array de paradas y tramos — ahora se recibe dinámicamente del padre
    // (fuente: coordenadas-aventuras.js centralizado)
    // Ya NO se usa un array local estático

    // Función para mostrar u ocultar la ventana de paradas
    function toggleParadasWindow() {
        const paradasWindow = document.getElementById('paradas-window');
        paradasWindow.style.display = paradasWindow.style.display === 'none' ? 'block' : 'none';
        try {
            if (window.parent && typeof window.parent.postMessage === 'function') {
                parent.postMessage({ tipo: TIPOS_MENSAJE.PARADAS.SHOWN, datos: { visible: paradasWindow.style.display === 'block' } }, '*'); // '*' para compatibilidad con file://
            }
        } catch (e) { /* ignore */ }
    }

    /**
     * Función para generar botones de paradas dinámicamente
     * SOLO usa datos del padre (estado.aventuraParadas)
     * Si no hay datos del padre, NO genera nada y muestra mensaje de espera
     * @returns {void}
     */
    function generarBotonesParadas() {
        const logPrefix = '[hijo5][generarBotonesParadas]';
        
        try {
            logger.debug(`${logPrefix} Generando botones de paradas...`);
            
            // Obtener referencia al contenedor de lista
            const lista = document.getElementById('lista-paradas');
            if (!lista) {
                logger.error(`${logPrefix} Contenedor 'lista-paradas' no encontrado en el DOM`);
                return;
            }
            
            // Limpiar lista existente
            lista.innerHTML = '';
            logger.debug(`${logPrefix} Lista de botones limpiada`);
            
            // SOLO usar datos del padre - NO hay fallback a datos locales
            if (!estado.aventuraParadas || !Array.isArray(estado.aventuraParadas) || estado.aventuraParadas.length === 0) {
                logger.warn(`${logPrefix} ⏳ Esperando datos del padre... (estado.aventuraParadas vacío)`);
                // Mostrar mensaje de espera en la lista
                lista.innerHTML = '<div style="padding: 20px; text-align: center; color: #999; font-size: 12px;">Esperando datos de la aventura...</div>';
                return;
            }
            
            const puntosAUsar = estado.aventuraParadas;
            logger.info(`${logPrefix} ✅ Usando ${puntosAUsar.length} paradas dinámicas del padre`);
            
            let botonesGenerados = 0;
            
            // Generar un botón por cada punto de la ruta (SOLO datos del padre)
            puntosAUsar.forEach((punto, index) => {
                try {
                    // Validar estructura del punto
                    if (!punto || typeof punto !== 'object') {
                        logger.warn(`${logPrefix} Punto ${index} inválido, omitiendo`);
                        return;
                    }
                    
                    if (!punto.tipo) {
                        logger.warn(`${logPrefix} Punto ${index} sin tipo, omitiendo`);
                        return;
                    }

                    // Solo mostrar paradas con ubicación física en el mapa
                    // Los elementos tipo "pre-intro1", "intro", etc. pertenecen a las
                    // pantallas de En-busca-del-tesoro.html y no tienen coordenadas
                    const TIPOS_CON_MAPA = ['inicio', 'parada', 'tramo'];
                    if (!TIPOS_CON_MAPA.includes(punto.tipo)) {
                        logger.debug(`${logPrefix} Punto ${index} tipo "${punto.tipo}" sin ubicación en mapa, omitiendo`);
                        return;
                    }

                    // Crear botón
                    const btn = document.createElement('button');
                    
                    // Asignar clases según el tipo
                    const claseBase = 'parada-tramo-btn';
                    const claseTipo = punto.tipo === 'parada' ? 'parada-btn' : 
                                     punto.tipo === 'tramo' ? 'tramo-btn' : 
                                     punto.tipo === 'inicio' ? 'inicio-btn' : 'default-btn';
                    btn.className = `${claseBase} ${claseTipo}`;
                    
                    // Determinar emoji según el tipo
                    const emoji = punto.tipo === 'parada' ? '🎯' : 
                                 punto.tipo === 'tramo' ? '🛣️' : 
                                 punto.tipo === 'inicio' ? '📌' : '❓';
                    
                    // Extraer número de parada/tramo - soportar ambos formatos (padre y local)
                    // Formato padre: parada_id = "P-1" o "TR-1"
                    // Formato local: parada = 1 o tramo = 1
                    let numeroParada = punto.parada;
                    let numeroTramo = punto.tramo;
                    
                    if (!numeroParada && punto.parada_id && punto.parada_id.startsWith('P-')) {
                        numeroParada = parseInt(punto.parada_id.replace('P-', ''), 10);
                    }
                    if (!numeroTramo && punto.parada_id && punto.parada_id.startsWith('TR-')) {
                        numeroTramo = parseInt(punto.parada_id.replace('TR-', ''), 10);
                    }
                    
                    // Determinar título según el tipo
                    const titulo = punto.tipo === 'parada' ? `P${numeroParada || '?'}` : 
                                  punto.tipo === 'tramo' ? `T${numeroTramo || '?'}` : 
                                  punto.tipo === 'inicio' ? 'Inicio' : 'N/A';
                    
                    // Crear estructura HTML del botón
                    btn.innerHTML = `
                        <div class="btn-row">
                            <span class="btn-icon">${emoji}</span>
                            <span class="btn-title">${titulo}</span>
                        </div>
                    `;
                    
                    // Agregar data attribute con el ID local
                    btn.dataset.puntoIndex = index;
                    btn.dataset.puntoTipo = punto.tipo;
                    btn.dataset.puntoId = numeroParada || numeroTramo || 0;
                    
                    // Manejar click en el botón
                    btn.onclick = async () => {
                        const clickPrefix = `${logPrefix}[click-${titulo}]`;
                        
                        try {
                            logger.info(`${clickPrefix} Click en botón de parada/tramo`);
                            
                            // Remover clase 'actual' de todos los botones para evitar duplicados
                            const todosBotones = document.querySelectorAll('.parada-tramo-btn');
                            todosBotones.forEach(boton => boton.classList.remove('actual'));
                            
                            // Agregar clase 'actual' al botón clicado
                            btn.classList.add('actual');
                            logger.info(`${clickPrefix} Botón marcado como activo visualmente`);
                            
                            // Obtener ID para enviar al padre - soportar ambos formatos
                            // Formato padre: padreid = "padre-P-1"
                            // Formato local: padreid = "padre-P-1"
                            const idPadre = punto.padreid || `padre-${punto.parada_id || punto.id}`;
                            
                            console.log(`[hijo5] Click en ${titulo}: idPadre=${idPadre}`);
                            
                            logger.debug(`${clickPrefix} Enviando cambio de parada al padre: ${idPadre}`);
                            
                            // Enviar mensaje al padre para cambiar de parada
                            await enviarMensaje({
                                destino: getPadreId(),
                                tipo: TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA,
                                origen: CONFIG_HIJO.IFRAME_ID,
                                datos: { 
                                    paradaId: idPadre,
                                    timestamp: Date.now(),
                                    origen: 'hijo5'
                                }
                            });
                            
                            logger.info(`${clickPrefix} Solicitud de cambio de parada enviada exitosamente`);
                            
                        } catch (clickError) {
                            logger.error(`${clickPrefix} Error al manejar click:`, clickError);
                            
                            // Notificar error al padre
                            try {
                                await enviarMensaje({
                                    destino: getPadreId(),
                                    tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                                    origen: CONFIG_HIJO.IFRAME_ID,
                                    datos: {
                                        error: clickError.message,
                                        contexto: 'click-boton-parada',
                                        paradaId: idPadre,
                                        timestamp: Date.now()
                                    }
                                });
                            } catch (notifError) {
                                logger.error(`${clickPrefix} Error al notificar error:`, notifError);
                            }
                        }
                    };
                    
                    // Agregar botón a la lista
                    lista.appendChild(btn);
                    botonesGenerados++;
                    
                } catch (puntoError) {
                    logger.error(`${logPrefix} Error al generar botón para punto ${index}:`, puntoError);
                }
            });
            
            logger.info(`${logPrefix} ${botonesGenerados} botones generados exitosamente`);
            try {
                if (window.parent && window.parent !== window && typeof window.parent.postMessage === 'function') {
                    parent.postMessage({ tipo: TIPOS_MENSAJE.PARADAS.READY, datos: { count: botonesGenerados } }, '*'); // '*' para compatibilidad con file://
                }
            } catch (e) { /* ignore */ }
            
        } catch (error) {
            logger.error(`${logPrefix} Error al generar botones de paradas:`, {
                message: error.message,
                stack: error.stack
            });
        }
    }

    /**
     * Función para manejar click en botón GPS
     * Alterna entre modo casa y aventura, actualiza UI y notifica al padre
     * @returns {Promise<void>}
     */
    async function manejarClickGPS() {
        const logPrefix = '[hijo5][manejarClickGPS]';

        try {
            logger.debug(`${logPrefix} Click en botón GPS detectado`);

            // Obtener referencia al botón
            const btn = document.getElementById('gps-casa-btn');
            if (!btn) {
                logger.error(`${logPrefix} Botón GPS no encontrado en el DOM`);
                return;
            }

            // Alternar modo
            const modoNuevo = estado.modo === 'casa' ? 'aventura' : 'casa';

            logger.info(`${logPrefix} Cambiando modo: ${estado.modo} → ${modoNuevo}`);

            // Actualizar estado local
            estado.modo = modoNuevo;

            // Actualizar UI del botón
            const isOn = modoNuevo === 'aventura';
            btn.classList.toggle('on', isOn);
            btn.classList.toggle('off', !isOn);

            // Actualizar etiqueta del botón
            const label = btn.querySelector('.gps-label');
            if (label) {
                label.textContent = isOn ? 'ON' : 'OFF';
                logger.debug(`${logPrefix} Etiqueta actualizada a: ${label.textContent}`);
            }

            // Actualizar ventana de paradas según el modo
            const paradasWindow = document.getElementById('paradas-window');
            if (paradasWindow) {
                paradasWindow.style.display = modoNuevo === 'casa' ? 'block' : 'none';
                logger.debug(`${logPrefix} Ventana de paradas ${modoNuevo === 'casa' ? 'mostrada' : 'ocultada'}`);
            }

            // Notificar al padre del cambio de modo
            logger.info(`${logPrefix} Notificando cambio de modo al padre: ${modoNuevo}`);

            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    modo: modoNuevo,
                    timestamp: Date.now(),
                    origen: 'boton-gps'
                }
            });

            logger.info(`${logPrefix} Cambio de modo completado exitosamente`);

        } catch (error) {
            logger.error(`${logPrefix} Error al manejar click en GPS:`, {
                message: error.message,
                stack: error.stack
            });
            
            // Intentar revertir el estado en caso de error
            try {
                estado.modo = estado.modo === 'casa' ? 'aventura' : 'casa'; // Revertir modo
                const btn = document.getElementById('gps-casa-btn');
                if (btn) {
                    const isOn = estado.modo === 'aventura';
                    btn.classList.toggle('on', isOn);
                    btn.classList.toggle('off', !isOn);
                    const label = btn.querySelector('.gps-label');
                    if (label) {
                        label.textContent = isOn ? 'ON' : 'OFF';
                    }
                }
                logger.warn(`${logPrefix} Estado revertido debido al error`);
            } catch (revertError) {
                logger.error(`${logPrefix} Error al revertir estado:`, revertError);
            }
            
            // Notificar error al padre
            try {
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        error: error.message,
                        contexto: 'manejarClickGPS',
                        timestamp: Date.now()
                    }
                });
            } catch (notifError) {
                logger.error(`${logPrefix} Error al notificar error al padre:`, notifError);
            }
        }
    }

    /**
     * Función para solicitar paradas del padre
     * Envía solicitud REQUEST-RESPONSE al padre para obtener lista completa de paradas
     * Valida exhaustivamente la respuesta y actualiza el estado local
     * @returns {Promise<void>}
     */
    async function solicitarParadasDelPadre() {
        const logPrefix = '[hijo5][solicitarParadasDelPadre]';

        try {
            logger.info(`${logPrefix} Solicitando paradas del padre...`);

            // Validar que tengamos ubicación de usuario antes de solicitar (solo en modo aventura)
            if (estado.modo === 'aventura' && !estado.ubicacionUsuario) {
                logger.warn(`${logPrefix} No hay ubicación de usuario disponible en modo aventura, omitiendo solicitud`);
                return;
            }

            // Enviar solicitud al padre
            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.NAVEGACION.SOLICITAR_DATOS_PARADAS,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    incluirTramos: true,
                    incluirInicio: true,
                    incluirMetadatos: true,
                    ubicacionUsuario: estado.ubicacionUsuario
                }
            });

            logger.debug(`${logPrefix} Solicitud enviada al padre - esperando respuesta asíncrona`);

            // La respuesta será procesada por el controlador DATOS.RESPUESTA_PARADAS
            // No esperamos respuesta aquí porque el procesamiento es asíncrono

        } catch (error) {
            logger.error(`${logPrefix} Error al solicitar paradas del padre:`, {
                message: error.message,
                stack: error.stack
            });

            // Intentar notificar al padre del error
            try {
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: {
                        mensaje: error.message,
                        contexto: 'solicitarParadasDelPadre',
                        timestamp: Date.now()
                    }
                });
            } catch (notifError) {
                logger.error(`${logPrefix} Error al notificar error al padre:`, notifError);
            }
        }
    }

    /**
     * Función auxiliar para activar la UI según el modo inicial
     * Esta función replica la lógica del controlador CAMBIO_MODO pero de manera síncrona
     * @param {string} modo - El modo a activar ('casa' o 'aventura')
     */
    function activarModoInicial(modo) {
        const logPrefix = '[hijo5][activarModoInicial]';
        
        try {
            logger.info(`${logPrefix} Activando modo inicial: ${modo}`);
            
            // Actualizar estado local
            estado.modo = modo;
            
            // Actualizar UI: mostrar/ocultar ventana de paradas
            const paradasWindow = document.getElementById('paradas-window');
            if (paradasWindow) {
                // En modo casa, mostrar ventana inmediatamente con botones locales
                paradasWindow.style.display = modo === 'casa' ? 'block' : 'none';
                logger.debug(`${logPrefix} Ventana de paradas ${modo === 'casa' ? 'mostrada inmediatamente' : 'ocultada'}`);
            }
            
            // Actualizar botón GPS según el modo
            const btn = document.getElementById('gps-casa-btn');
            if (btn) {
                estado.gpsActivo = (modo === 'aventura');
                btn.classList.toggle('on', estado.gpsActivo);
                btn.classList.toggle('off', !estado.gpsActivo);
                const label = btn.querySelector('.gps-label');
                if (label) {
                    label.textContent = estado.gpsActivo ? 'ON' : 'OFF';
                }
                logger.debug(`${logPrefix} Botón GPS actualizado: ${estado.gpsActivo ? 'ON' : 'OFF'}`);
            }
            
            logger.info(`${logPrefix} Modo inicial activado exitosamente: ${modo}`);
            
        } catch (error) {
            logger.error(`${logPrefix} Error al activar modo inicial:`, error);
        }
    }

    try {
        // Ocultar UI hasta PADRE_CONFIRMA
        let _uiConfirmado = false;
        const _originalDisplay = (document.body && document.body.style && document.body.style.display) || '';
        try { if (document.body) document.body.style.display = 'none'; } catch (e) { /* ignore */ }
        function mostrarUI() { if (!_uiConfirmado) { console.warn('[hijo5] mostrarUI ignorado: esperando PADRE_CONFIRMA_HIJO_LISTO'); return; } try { if (document.body) document.body.style.display = _originalDisplay || 'block'; console.log('[hijo5] UI visible tras PADRE_CONFIRMA_HIJO_LISTO'); } catch (e) {} }

        // No necesitamos inicializarMensajeria aquí, los fallbacks esperan automáticamente

        // NOTA: HIJO_PREPARADO se envía MÁS ABAJO, DESPUÉS de registrar todos los controladores críticos.
        // Esto garantiza que el padre no envíe PADRE_DATOS antes de que los controladores estén listos.
        // Ver: "// Enviar HIJO_PREPARADO y esperar PADRE_DATOS antes de enviar HIJO_LISTO"

        // INICIALIZACIÓN ASÍNCRONA: Esperar datos del padre antes de activar UI
        console.log(`🏠 [hijo5] REGISTRANDO CONTROLADORES ANTES DE ENVIAR HIJO_PREPARADO`);
        // No activar modo ni generar botones hasta recibir RESPUESTA_DATOS_PARADAS

        // ============================================
        // CONTROLADOR 1: SISTEMA.PADRE_DATOS
        // ============================================
        logger.info(`Hijo hijo5 registrado el controlador PADRE_DATOS`);
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_DATOS, async (mensaje) => {
            const logPrefix = `[hijo5][PADRE_DATOS]`;
            
            console.log(`🔥 [hijo5] CONTROLADOR PADRE_DATOS EJECUTADO!`, mensaje);
            
            try {
                if (!mensaje || !mensaje.origen) {
                    logger.error(`${logPrefix} Mensaje sin origen válido`, mensaje);
                    return;
                }

                logger.info(`${logPrefix} Datos del padre recibidos desde ${mensaje.origen}`);
                logger.info(`Hijo hijo5 recibió PADRE_DATOS`);

                // ✅ PROCESAR DATOS INICIALES DEL PADRE
                if (mensaje.datos) {
                    const { modo, paradas, paradaActual } = mensaje.datos;

                    if (modo) {
                        logger.debug(`${logPrefix} Modo inicial: ${modo}`);
                        // Procesar modo si necesario
                    }

                    if (paradas) {
                        logger.debug(`${logPrefix} Paradas recibidas: ${paradas.length}`);
                    }

                    if (paradaActual) {
                        logger.debug(`${logPrefix} Parada actual: ${paradaActual}`);
                    }
                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando PADRE_DATOS:`, error);
            }

            // Enviar HIJO_LISTO para completar handshake
            if (!estado.hijoListoEnviado) {
                try {
                    await enviarMensaje({
                        destino: getPadreId(),
                        tipo: TIPOS_MENSAJE.SISTEMA.HIJO_LISTO,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: {
                            componenteId: CONFIG_HIJO.COMPONENTE_ID,
                            iframeId: CONFIG_HIJO.IFRAME_ID,
                            timestamp: Date.now()
                        }
                    });
                    estado.hijoListoEnviado = true;
                    logger.info('[hijo5] HIJO_LISTO enviado al padre');
                } catch (error) {
                    logger.error('[hijo5] Error enviando HIJO_LISTO:', error);
                }
            }
        });

        // ============================================================
        // CONTROLADOR: SISTEMA.PADRE_CONFIRMA_HIJO_LISTO
        // ============================================================
        // Propósito: Recibir confirmación del padre de que los controladores están listos
        // Origen esperado: padre
        // Respuesta: Solicitar datos iniciales
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_CONFIRMA_HIJO_LISTO, async (mensaje) => {
            const logPrefix = `[hijo5][PADRE_CONFIRMA_HIJO_LISTO][${mensaje?.origen || 'desconocido'}]`;
            
            try {
                console.log('[hijo5] PADRE_CONFIRMA_HIJO_LISTO recibido:', mensaje);
                logger.info(`${logPrefix} Confirmación recibida del padre - controladores listos`);
                
                // 🔥 NUEVO: Procesar modo inicial si viene en datos
                const { modoInicial } = mensaje.datos || {};
                if (modoInicial) {
                    logger.info(`${logPrefix} Modo inicial recibido: ${modoInicial}`);
                    estado.modo = modoInicial;
                    
                    // Sincronizar botón con el modo inicial
                    const btn = document.getElementById('gps-casa-btn');
                    if (btn) {
                        const isOn = modoInicial === 'aventura';
                        btn.classList.toggle('on', isOn);
                        btn.classList.toggle('off', !isOn);
                        const label = btn.querySelector('.gps-label');
                        if (label) {
                            label.textContent = isOn ? 'ON' : 'OFF';
                        }
                        logger.debug(`${logPrefix} Botón sincronizado con modo inicial: ${isOn ? 'ON' : 'OFF'}`);
                    }
                }
                
                // Ahora sí solicitar datos iniciales del padre
                // Confirmar UI y mostrar
                _uiConfirmado = true;
                mostrarUI();
                
                await solicitarParadasDelPadre();
                
                logger.info(`${logPrefix} Solicitud de datos iniciales enviada tras confirmación`);
                
            } catch (error) {
                logger.error(`${logPrefix} Error procesando confirmación del padre:`, error);
            }
            // Aplicar modo pendiente si existe
            try {
                if (estado.pendingCambioModo && estado.pendingCambioModo.modo) {
                    const modoPendiente = estado.pendingCambioModo.modo;
                    logger.info(`${logPrefix} Aplicando cambio de modo pendiente: ${modoPendiente}`);
                    // Reutilizar el controlador CAMBIO_MODO existente para aplicar el modo
                    await enviarMensaje({
                        destino: 'self',
                        tipo: TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: { modo: modoPendiente, secuenciaCompleta: true }
                    }).catch(() => {
                        // fallback: aplicar localmente
                        estado.modo = modoPendiente;
                    });
                    delete estado.pendingCambioModo;
                }
            } catch (err) {
                logger.error(`${logPrefix} Error aplicando modo pendiente:`, err);
            }

            // Mostrar UI ahora que el padre confirmó
            try { _uiConfirmado = true; mostrarUI(); } catch (e) { /* ignore */ }
            try { await enviarMensaje({ destino: getPadreId(), tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION, origen: CONFIG_HIJO.IFRAME_ID, datos: { tipo: 'UI_VISIBLE', timestamp: Date.now() } }); } catch (e) { /* ignore */ }
        });

        // ============================================
        // CONTROLADOR 2: SISTEMA.CAMBIO_MODO
        // ============================================
        // Propósito: Actualizar el modo de la aplicación (casa/aventura) y adaptar la UI
        // Origen esperado: padre, modo-handler
        // Datos requeridos: { modo: 'casa'|'aventura' }
        // Respuesta: Ninguna (actualización de estado local)
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO, async (mensaje) => {
            const logPrefix = `[hijo5][CAMBIO_MODO]`;
            
            try {
                // Validar carga secuencial
                if (!mensaje.datos?.secuenciaCompleta) {
                    logger.warn(`${logPrefix} Mensaje recibido antes de secuencia completa`);
                    estado.pendingCambioModo = mensaje.datos || { modo: null };
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: {
                            error: 'Secuencia no completa',
                            esperarPermiso: true,
                            tipoOriginal: mensaje.tipo,
                            modoSolicitado: mensaje.datos?.modo
                        }
                    });
                    return;
                }

                // Validaciones básicas
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Mensaje sin origen, ignorando`);
                    return;
                }
                if (!mensaje.datos || typeof mensaje.datos !== 'object') {
                    logger.error(`${logPrefix} Datos inválidos`, mensaje);
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: { error: 'Datos de mensaje inválidos' }
                    });
                    return;
                }
                
                const { modo } = mensaje.datos || {};
                
                // Validar modo
                if (!modo || (modo !== 'casa' && modo !== 'aventura')) {
                    logger.error(`${logPrefix} Modo inválido: ${modo}`);
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: { 
                            error: `Modo inválido: ${modo}`, 
                            valoresValidos: ['casa', 'aventura']
                        }
                    });
                    return;
                }

                // Enviar ENTENDIDO
                logger.info(`${logPrefix} Cambio de modo a "${modo}" entendido`);
                
                // Validación explícita antes de enviar
                const destinoEntendido = mensaje.origen;
                const tipoEntendido = TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_ENTENDIDO;
                const origenEntendido = CONFIG_HIJO?.IFRAME_ID;
                
                // DEBUG: Console.log directo para diagnóstico (bypass suppress-warnings)
                if (!destinoEntendido || !tipoEntendido || !origenEntendido) {
                    const debugInfo = {
                        destino: destinoEntendido,
                        tipo: tipoEntendido,
                        origen: origenEntendido,
                        TIPOS_MENSAJE_exists: typeof TIPOS_MENSAJE !== 'undefined',
                        TIPOS_MENSAJE_SISTEMA_exists: typeof TIPOS_MENSAJE?.SISTEMA !== 'undefined',
                        CONFIG_HIJO_exists: typeof CONFIG_HIJO !== 'undefined',
                        mensaje_origen: mensaje?.origen
                    };
                    console.error('[hijo5][CAMBIO_MODO] 🔴 DEBUG CAMPOS UNDEFINED:', JSON.stringify(debugInfo, null, 2));
                    logger.error(`${logPrefix} ❌ Campos undefined antes de enviar ENTENDIDO:`, debugInfo);
                    throw new Error('Campos undefined en CAMBIO_MODO_ENTENDIDO');
                }
                
                await enviarMensaje({
                    destino: destinoEntendido,
                    tipo: tipoEntendido,
                    origen: origenEntendido,
                    datos: { 
                        modo, 
                        timestamp: Date.now(),
                        mensajeId: mensaje.datos?.mensajeId || mensaje.id
                    }
                });
                
                // Procesar cambio
                logger.info(`${logPrefix} Cambiando modo a: ${modo}`);
                const modoAnterior = estado.modo;
                estado.modo = modo;
                
                // Actualizar UI
                const window = document.getElementById('paradas-window');
                if (window) {
                    window.style.display = modo === 'casa' ? 'block' : 'none';
                    logger.debug(`${logPrefix} Ventana de paradas ${modo === 'casa' ? 'mostrada' : 'ocultada'}`);
                    
                    // Regenerar botones si es modo casa
                    if (modo === 'casa') {
                        generarBotonesParadas();
                        logger.debug(`${logPrefix} Botones de paradas regenerados para modo casa`);
                    }
                }
                
                // Actualizar botón según el modo
                const btn = document.getElementById('gps-casa-btn');

        // Controlador: SISTEMA.CAMBIO_MODO_APLICADO
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO_APLICADO, async (mensaje) => {

        // ============================================

        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.HEARTBEAT, async (mensaje) => {

                // Enviar respuesta con timestamp actual
                await enviarMensaje({

                    tipo: TIPOS_MENSAJE.SISTEMA.HEARTBEAT_RESPONSE,

                        }
                    }

                // Intentar enviar respuesta de error
                try {

        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.HEARTBEAT_START, async (mensaje) => {

        // ============================================
        // CONTROLADOR: DATOS.RESPUESTA_PARADAS
        // ============================================
        // Propósito: Recibir respuesta con datos de paradas del padre
        // Origen esperado: padre, funciones-mapa
        // Datos requeridos: { paradas: Array, total: number }
        // Respuesta: Ninguna (procesamiento de datos)
        registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.RESPUESTA_DATOS_PARADAS, async (mensaje) => {
            const logPrefix = `[hijo5][NAVEGACION.RESPUESTA_DATOS_PARADAS][${mensaje?.origen || 'desconocido'}]`;
            
            try {
                // Validación de origen
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Mensaje sin origen, ignorando`);
                    return;
                }
                
                // Evitar procesamiento duplicado
                if (estado.datosRecibidos) {
                    logger.debug(`${logPrefix} Datos ya recibidos anteriormente, ignorando mensaje duplicado`);
                    return;
                }
                
                logger.debug(`${logPrefix} Respuesta de paradas recibida`);
                
                // Validación de datos
                if (!mensaje.datos || typeof mensaje.datos !== 'object') {
                    logger.error(`${logPrefix} Mensaje sin datos o datos inválidos`, mensaje);
                    return;
                }
                
                const { paradas, total, estadisticas } = mensaje.datos;
                
                // Validación de paradas - AVENTURA_PARADAS tiene estructura diferente
                if (!paradas || !Array.isArray(paradas)) {
                    logger.error(`${logPrefix} Paradas no es un array válido`, typeof paradas);
                    return;
                }
                
                if (paradas.length === 0) {
                    logger.warn(`${logPrefix} Array de paradas vacío`);
                    return;
                }
                
                logger.info(`${logPrefix} Procesando ${paradas.length} paradas del padre (fuente: coordenadas-aventuras.js)`);
                
                // Los datos ya vienen con nombre, tipo, parada/tramo del padre
                // Solo necesitamos asegurar estructura consistente
                const paradasTransformadas = paradas.map(paradaPadre => {
                    try {
                        if (!paradaPadre || typeof paradaPadre !== 'object') {
                            logger.warn(`${logPrefix} Parada inválida encontrada, omitiendo`);
                            return null;
                        }
                        
                        return {
                            id: paradaPadre.id || paradaPadre.padreid,
                            parada_id: paradaPadre.parada_id,
                            tipo: paradaPadre.tipo,
                            parada: paradaPadre.parada,
                            tramo: paradaPadre.tramo,
                            nombre: paradaPadre.nombre || `Parada ${paradaPadre.parada_id}`,
                            padreid: paradaPadre.padreid || `padre-${paradaPadre.parada_id}`,
                            ubicacion: paradaPadre.coordenadas 
                                ? { lat: paradaPadre.coordenadas.lat || 0, lng: paradaPadre.coordenadas.lng || 0 }
                                : { lat: 0, lng: 0 }
                        };
                    } catch (error) {
                        logger.warn(`${logPrefix} Error transformando parada:`, error);
                        return null;
                    }
                }).filter(p => p !== null);
                
                logger.info(`${logPrefix} ${paradasTransformadas.length} paradas transformadas de ${paradas.length} originales`);
                
                // Validar estructura de paradas transformadas
                const paradasValidas = paradasTransformadas.filter(p => {
                    if (!p || typeof p !== 'object') return false;
                    if (!p.id && !p.parada_id) return false;
                    if (!p.nombre) return false;
                    if (!p.ubicacion || typeof p.ubicacion.lat !== 'number' || typeof p.ubicacion.lng !== 'number') {
                        // Para paradas sin coordenadas válidas, intentar obtener de hijo2
                        logger.debug(`${logPrefix} Parada ${p.id} sin coordenadas válidas, solicitando a hijo2`);
                        return true; // Incluir pero marcar para actualización posterior
                    }
                    return true;
                });
                
                if (paradasValidas.length !== paradasTransformadas.length) {
                    logger.warn(`${logPrefix} ${paradasTransformadas.length - paradasValidas.length} paradas inválidas después de transformación`);
                }
                
                // Actualizar estado con paradas válidas
                estado.aventuraParadas = paradasValidas;
                logger.info(`${logPrefix} ${paradasValidas.length} paradas válidas almacenadas`);
                
                console.log('[hijo5] Paradas del padre almacenadas:', paradasValidas.slice(0, 3), '...');
                
                // ACTIVAR MODO INICIAL ahora que tenemos datos
                estado.modo = 'casa'; // Default: casa
                await activarModoInicial('casa');
                logger.info(`${logPrefix} Modo casa activado con datos iniciales`);
                
                // Regenerar botones de paradas con los nuevos datos
                generarBotonesParadas();
                
                // Mostrar ventana de paradas ahora que tiene contenido
                if (estado.modo === 'casa') {
                    const window = document.getElementById('paradas-window');
                    if (window) {
                        window.style.display = 'block';
                        logger.info(`${logPrefix} Ventana de paradas mostrada con ${paradasValidas.length} paradas`);
                    }
                }
                
                // Logs de estadísticas si están disponibles
                if (estadisticas) {
                    logger.debug(`${logPrefix} Estadísticas: paradas=${estadisticas.paradas || 0}, tramos=${estadisticas.tramos || 0}`);
                }
                
                logger.info(`${logPrefix} Paradas procesadas y UI actualizada exitosamente`);
                
                // Marcar datos como recibidos para evitar duplicados
                estado.datosRecibidos = true;
                
                // Confirmar recepción al padre
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    idOriginal: mensaje.id, // CLAVE: permite resolver promesas pendientes
                    datos: {
                        tipoConfirmacion: 'DATOS_RECIBIDOS',
                        totalParadas: paradasValidas.length
                    }
                });
                
            } catch (error) {
                logger.error(`${logPrefix} Error al procesar respuesta de paradas:`, error);
                
                // Intentar notificar al origen del error
                try {
                    await enviarMensaje({
                        destino: mensaje.origen,
                        tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: { 
                            error: error.message,
                            stack: error.stack,
                            contexto: 'DATOS.RESPUESTA_PARADAS',
                            mensajeOriginal: mensaje.tipo
                        }
                    });
                } catch (notifError) {
                    logger.error(`${logPrefix} Error al notificar error al origen:`, notifError);
                }
            }
        });

        // ============================================
        // CONTROLADOR: NAVEGACION.CAMBIO_PARADA (Respuesta)
        // ============================================
        // Propósito: Recibir confirmación de cambio de parada desde el padre
        // Origen esperado: padre, funciones-mapa
        // Datos requeridos: { paradaId: string, exito: boolean }
        // Respuesta: Ninguna (actualización de UI)
        registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA, async (mensaje) => {
            const logPrefix = `[hijo5][NAVEGACION.CAMBIO_PARADA][${mensaje?.origen || 'desconocido'}]`;
            
            try {
                // Validación de origen
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Mensaje sin origen, ignorando`);
                    return;
                }
                
                // Prevenir loops: solo procesar si viene del padre
                if (mensaje.origen === CONFIG_HIJO.IFRAME_ID) {
                    logger.debug(`${logPrefix} Mensaje propio detectado, ignorando para evitar loop`);
                    return;
                }
                
                logger.debug(`${logPrefix} Notificación de cambio de parada recibida`);
                
                // Validación de datos
                if (!mensaje.datos || typeof mensaje.datos !== 'object') {
                    logger.warn(`${logPrefix} Mensaje sin datos, procesando sin validación adicional`);
                    return;
                }
                
                const resolved = resolverIdsParada(mensaje.datos || {});
                const paradaId = resolved.paradaId || mensaje.datos?.paradaId || mensaje.datos?.parada_id || null;
                const padreId = resolved.padreId || mensaje.datos?.padreId || mensaje.datos?.padreid || null;
                const { exito, paradaActual } = mensaje.datos;
                
                // Log de información del cambio
                if (paradaId) {
                    logger.info(`${logPrefix} Cambio a parada: ${paradaId}${exito === false ? ' (FALLIDO)' : ''}`);
                }
                
                // Actualizar UI si es necesario (resaltar parada activa, etc.)
                if (paradaId && exito !== false) {
                    // Limpiar selección anterior
                    const botones = document.querySelectorAll('.parada-tramo-btn');
                    botones.forEach(btn => btn.classList.remove('activa'));
                    
                    // Encontrar y resaltar el botón de la parada actual
                    // Usar estado.aventuraParadas (fuente centralizada)
                    const paradasActuales = estado.aventuraParadas || [];
                    const indexEncontrado = paradasActuales.findIndex(p => {
                        return p.padreid === padreId || 
                               p.parada_id === paradaId ||
                               p.id === padreId;
                    });
                    
                    if (indexEncontrado >= 0) {
                        const botonActual = botones[indexEncontrado];
                        if (botonActual) {
                            botonActual.classList.add('activa');
                            logger.debug(`${logPrefix} Botón de parada ${paradaId} resaltado (index: ${indexEncontrado})`);
                        }
                    }
                }
                
                logger.debug(`${logPrefix} Cambio de parada procesado`);
                
            } catch (error) {
                logger.error(`${logPrefix} Error al procesar cambio de parada:`, error);
                
                // No notificar error al origen para evitar loops
                // Solo log local del error
            }
        });

        // ============================================
        // CONTROLADOR: SISTEMA.ERROR
        // ============================================
        // Propósito: Recibir notificaciones de errores de otros componentes
        // Origen esperado: padre, cualquier hijo
        // Datos requeridos: { error: string, contexto: string }
        // Respuesta: Ninguna (log del error)
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.ERROR, async (mensaje) => {
            const logPrefix = `[hijo5][SISTEMA.ERROR][${mensaje?.origen || 'desconocido'}]`;
            
            try {
                // Validación de origen
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Notificación de error sin origen`);
                    return;
                }
                
                // Validación de datos
                if (!mensaje.datos || typeof mensaje.datos !== 'object') {
                    logger.warn(`${logPrefix} Notificación de error sin datos`);
                    return;
                }
                
                const { error, contexto, mensajeOriginal } = mensaje.datos;
                
                logger.error(`${logPrefix} Error recibido del origen:`, {
                    error,
                    contexto: contexto || 'desconocido',
                    mensajeOriginal: mensajeOriginal || 'N/A'
                });
                
                // Si el error es relacionado con solicitudes de hijo5, intentar reintentar
                if (mensajeOriginal === TIPOS_MENSAJE.DATOS.SOLICITAR_PARADAS) {
                    logger.warn(`${logPrefix} Error en solicitud de paradas, intentando recargar después de 5s`);
                    setTimeout(() => {
                        solicitarParadasDelPadre();
                    }, 5000);
                }
                
            } catch (error) {
                logger.error(`${logPrefix} Error al procesar notificación de error:`, error);
            }
        });

        // ============================================
        // CONTROLADOR: SISTEMA.CONFIRMACION
        // ============================================
        // Propósito: Confirmar recepción de mensajes enviados
        // Origen esperado: manejador-errores, otros componentes
        // Datos requeridos: { mensajeOriginalId: string }
        // Respuesta: Ninguna (logging)
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.CONFIRMACION, async (mensaje) => {
            const logPrefix = `[hijo5][SISTEMA.CONFIRMACION][${mensaje?.origen || 'desconocido'}]`;
            
            try {
                logger.debug(`${logPrefix} Confirmación recibida`, {
                    mensajeOriginalId: mensaje.datos?.mensajeOriginalId,
                    timestamp: mensaje.timestamp
                });
                
                // Aquí se podría implementar lógica adicional si es necesario
                // Por ahora solo logging
                
            } catch (error) {
                logger.error(`${logPrefix} Error al procesar confirmación:`, error);
            }
        });

        // Controlador para confirmación de cambio de parada
        registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA_CONFIRMADO, async (mensaje) => {
            const logPrefix = `[hijo5][CAMBIO_PARADA_CONFIRMADO][${mensaje?.origen || 'desconocido'}]`;
            
            try {
                // Validación de datos
                if (!mensaje.datos || typeof mensaje.datos !== 'object') {
                    logger.warn(`${logPrefix} Mensaje sin datos válidos`);
                    return;
                }
                
                const resolved = resolverIdsParada(mensaje.datos || {});
                const paradaId = resolved.paradaId || mensaje.datos?.paradaId || mensaje.datos?.parada_id || mensaje.datos?.padreid || null;
                const coordenadas = mensaje.datos?.coordenadas || null;
                const audio = mensaje.datos?.audio || null;
                const reto = mensaje.datos?.reto || null;
                
                logger.info(`${logPrefix} Cambio de parada confirmado: ${paradaId}`);
                
                // Aquí se podría actualizar UI: resaltar botón, mostrar indicadores de audio/reto disponibles
                // Por ejemplo, agregar clase 'activo' al botón correspondiente
                const botones = document.querySelectorAll('.parada-tramo-btn');
                botones.forEach(btn => {
                    if (btn.dataset.padreid === paradaId) {
                        btn.classList.add('actual');
                    } else {
                        btn.classList.remove('actual');
                    }
                });
                
                if (audio) {
                    logger.debug(`${logPrefix} Audio disponible para ${paradaId}`);
                }
                if (reto) {
                    logger.debug(`${logPrefix} Reto disponible para ${paradaId}`);
                }
                
            } catch (error) {
                logger.error(`${logPrefix} Error procesando confirmación:`, error);
            }
        });

        // Controlador para ACK del sistema de monitoreo
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.ACK, async (mensaje) => {
            const logPrefix = `[hijo5][SISTEMA.ACK][${mensaje?.origen || 'desconocido'}]`;
            try {
                // Responder automáticamente con ACK para mantener bidireccionalidad
                await enviarMensaje({
                    destino: getPadreId(),
                    tipo: TIPOS_MENSAJE.SISTEMA.ACK,
                    origen: CONFIG_HIJO.IFRAME_ID,
                    datos: { mensajeOriginalId: mensaje.id }
                });
                logger.debug(`${logPrefix} ACK respondido al padre`);
            } catch (error) {
                logger.error(`${logPrefix} Error respondiendo ACK:`, error);
            }
        });

        // Instrumentación: confirmar que los controladores GPS fueron registrados
        try {
            logger.debug('[hijo5] Controladores GPS registrados y listos para recibir mensajes');
        } catch (e) { /* ignore */ }

        // Enviar HIJO_PREPARADO y esperar PADRE_DATOS antes de enviar HIJO_LISTO
        try {
            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.SISTEMA.HIJO_PREPARADO,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    componenteId: CONFIG_HIJO.COMPONENTE_ID,
                    version: '1.0.0',
                    capacidades: ['modo-selector', 'gps', 'paradas-list'],
                    timestamp: Date.now()
                }
            });
            logger.debug('[hijo5] HIJO_PREPARADO enviado; esperando PADRE_DATOS');
        } catch (e) {
            logger.warn('[hijo5] Error enviando HIJO_PREPARADO:', e);
        }

        // ============================================
        // INICIALIZACIÓN DE EVENTOS Y DATOS
        // ============================================
        logger.info('[hijo5] Inicializando eventos y solicitando datos del padre...');
        
        // Vincular evento de click al botón GPS
        const btnGPS = document.getElementById('gps-casa-btn');
        if (btnGPS) {
            btnGPS.onclick = manejarClickGPS;
            logger.debug('[hijo5] Evento click vinculado al botón GPS');
        } else {
            logger.error('[hijo5] Botón GPS no encontrado en el DOM');
        }
        
        // Marcar como inicializado
        estado.inicializado = true;
        
        logger.info('[hijo5] Inicialización completada exitosamente', {
            modo: estado.modo,
            paradasCargadas: estado.aventuraParadas?.length || 0,
            idsMapeados: Object.keys(estado.paradasMapeadas).length
        });
        
    } catch (error) {
        logger.error('[hijo5] Error crítico durante la inicialización:', {
            message: error.message,
            stack: error.stack
        });
        
        // Intentar notificar al padre del error crítico
            try {
            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    error: error.message,
                    contexto: 'inicializacion-hijo5',
                    critico: true,
                    timestamp: Date.now()
                }
            });
        } catch (notifError) {
            logger.error('[hijo5] Error al notificar error crítico al padre:', notifError);
        }
    }

    // ============================================
    // HANDLER: visibilitychange — reconectar tras cambio de pestaña
    // ============================================
    // Cuando el usuario abre otra pestaña y vuelve, la mensajería puede
    // haberse interrumpido (timeouts expirados, correlaciones perdidas).
    // Al volver, reenviamos un ping al padre y, si teníamos botones,
    // nos aseguramos de que sigan funcionales.
    document.addEventListener('visibilitychange', async () => {
        if (document.hidden) return; // Solo actuar al VOLVER a ser visible

        const logPrefix = '[hijo5][visibilitychange]';
        logger.info(`${logPrefix} Pestaña visible de nuevo, verificando conexión con padre...`);

        try {
            // 1. Resetear flag de datos para permitir recepción fresca si es necesario
            //    (no borramos aventuraParadas para no perder la UI)
            estado.datosRecibidos = false;

            // 2. Enviar ping/heartbeat al padre para verificar conexión
            await enviarMensaje({
                destino: getPadreId(),
                tipo: TIPOS_MENSAJE.SISTEMA.HEARTBEAT_RESPONSE,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    timestamp: Date.now(),
                    componenteId: CONFIG_HIJO.COMPONENTE_ID,
                    razon: 'visibilitychange',
                    estado: {
                        inicializado: estado.inicializado,
                        modo: estado.modo,
                        paradasCargadas: estado.aventuraParadas?.length || 0
                    }
                }
            });

            // 3. Si los botones ya estaban generados, resolicitar datos por si cambiaron
            if (estado.aventuraParadas && estado.aventuraParadas.length > 0) {
                logger.debug(`${logPrefix} Botones existentes (${estado.aventuraParadas.length}), regenerando UI`);
                generarBotonesParadas();
            } else {
                // Sin datos previos — pedir paradas al padre nuevamente
                logger.info(`${logPrefix} Sin datos previos, solicitando paradas al padre`);
                await solicitarParadasDelPadre();
            }

            logger.info(`${logPrefix} Reconexión tras cambio de pestaña completada`);
        } catch (err) {
            logger.warn(`${logPrefix} Error durante reconexión:`, err);
        }
    });
    </script>

</head>

        <button id="gps-casa-btn" class="off">
            <div class="button-content">
                <span class="satellite-emoji">🛰️</span>
                <span class="gps-label">OFF</span>
            </div>
        </button>
        <div id="paradas-window" class="visible">
            <div id="lista-paradas">
                <!-- Los botones de paradas se generan dinámicamente -->
            </div>
        </div>
    </div>
    <div id="estado-carga"></div>
</body>
