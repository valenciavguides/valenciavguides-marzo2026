                        const c = elemento.coordinates[0];
                        if (c && c.lat && c.lng) {
                            pending.destinoCoords = { lat: c.lat, lng: c.lng };
                            return pending.destinoCoords;
                        }
                    }
                }

                // Otherwise, request from hijo2 via DATOS.COORDENADAS_PARADAS_REQUEST and parse the response
                // We reuse the existing messaging mechanism with a temporary controller for the response
                const padreId = pendKey;
                const paradaId = (elemento && (elemento.parada_id || elemento.tramo_id)) || String(pendKey).replace(/^padre-/, '');
                const timeoutMs = (window.Config && window.Config.PENDING && window.Config.PENDING.CLEANUP_INTERVAL_MS) ? Math.max(window.Config.PENDING.CLEANUP_INTERVAL_MS * 0.5, 2000) : 5000;
                const coordsResponse = await solicitarCoordenadasHijo('hijo2', { paradaId: paradaId, padreId }, timeoutMs).catch(err => null);

                    if (coordsResponse) {
                    // Normalize: coordsResponse might be array or object
                    let coordsObj = null;
                    if (Array.isArray(coordsResponse) && coordsResponse.length > 0) coordsObj = coordsResponse[0].coordenadas || coordsResponse[0];
                    else if (coordsResponse && coordsResponse.coordenadas) coordsObj = coordsResponse.coordenadas;
                    else coordsObj = coordsResponse;
                    if (coordsObj && coordsObj.lat && coordsObj.lng) {
                        pending.destinoCoords = { lat: coordsObj.lat, lng: coordsObj.lng };
                        return pending.destinoCoords;
                    }
            }

                return null;
            } catch (error) {
                logger.warn('[PADRE][PENDING] Error populating pending coords:', error);
                return null;
            }
        }

        function cancelarPending(clave, motivo = 'cancelado') {
            try {
                if (!clave || !estado.pendingCompleciones || !estado.pendingCompleciones[clave]) return false;
                const pending = estado.pendingCompleciones[clave];
                delete estado.pendingCompleciones[clave];
                logger.warn(`[PADRE][PENDING] Cancelado pending ${clave} por motivo=${motivo}`);
                // Notificar a hijos interesados (hijo2/hijo3/hijo4) para que limpien UI
                try {
                    enviarMensajePadre({ tipo: TIPOS_MENSAJE.SISTEMA.NOTIFICACION, origen: getPadreId(), destino: 'hijo2', datos: { evento: 'PENDING_CANCELADO', padreId: clave, motivo } }).catch(e => {});
                    enviarMensajePadre({ tipo: TIPOS_MENSAJE.SISTEMA.NOTIFICACION, origen: getPadreId(), destino: 'hijo3', datos: { evento: 'PENDING_CANCELADO', padreId: clave, motivo } }).catch(e => {});
                    enviarMensajePadre({ tipo: TIPOS_MENSAJE.SISTEMA.NOTIFICACION, origen: getPadreId(), destino: 'hijo4', datos: { evento: 'PENDING_CANCELADO', padreId: clave, motivo } }).catch(e => {});
                } catch (errNotif) { /* ignore */ }
                return true;
            } catch (e) {
                logger.warn('[PADRE][PENDING] Error cancelando pending:', e);
                return false;
            }
        }

        function updatePendingDistances(posicionUsuario) {
            try {
                if (!posicionUsuario || !estado.pendingCompleciones) return;
                const pendingCfg = (window.Config && window.Config.PENDING) ? window.Config.PENDING : null;
                const now = Date.now();
                for (const [clave, pending] of Object.entries(estado.pendingCompleciones)) {
                    if (!pending) continue;
                    // Only consider pending entries with destino coords
                    if (!pending.destinoCoords) continue;
                    const dist = calcularDistancia(posicionUsuario.lat, posicionUsuario.lng, pending.destinoCoords.lat, pending.destinoCoords.lng);
                    pending._lastDistance = dist;
                        const outOfRangeThreshold = (typeof pending.outOfRangeM === 'number') ? pending.outOfRangeM : (pendingCfg && typeof pendingCfg.OUT_OF_RANGE_M === 'number' ? pendingCfg.OUT_OF_RANGE_M : 53);
                        const gracePeriod = (typeof pending.outOfRangeGrace === 'number') ? pending.outOfRangeGrace : (pendingCfg && typeof pendingCfg.OUT_OF_RANGE_GRACE_MS === 'number' ? pendingCfg.OUT_OF_RANGE_GRACE_MS : (5 * 60 * 1000));
                        if (typeof outOfRangeThreshold === 'number') {
                            if (dist > outOfRangeThreshold) {
                                if (!pending._outOfRangeAt) pending._outOfRangeAt = now;
                                else if (pending._outOfRangeAt && (now - pending._outOfRangeAt) >= gracePeriod) {
                                    // Cancelar el pending por out-of-range persistente
                                    cancelarPending(clave, 'out_of_range_expirado');
                                    continue; // canceled, skip rest
                                }
                            } else {
                                // If it's back in range, reset outOfRangeAt
                                pending._outOfRangeAt = null;
                            }
                        }
                }
            } catch (e) {
                logger.warn('[PADRE][PENDING] Error actualizando distancias pendings:', e);
            }
        }

        async function intentarCompletarElemento(padreId) {
            try {
                if (!padreId) return;
                const key = String(padreId).trim();
                const pending = estado.pendingCompleciones?.[key];
                if (!pending) return;

                const elemento = findElementoPorPadreId(padreId) || DATOS_PADRE[window.aventuraSeleccionada][window.idiomaSeleccionado].elementosIDpadre.find(p => p.parada_id === key || p.padreid === padreId);
                if (!elemento) return;

                const tipo = elemento.tipo;
                if (tipo === 'parada' || tipo === 'inicio') {
                    const retosIds = obtenerRetosIds(elemento);
                    const necesitaReto = retosIds.length > 0;
                    // Multi-reto: completado cuando retosCompletadosCount >= retosTotal (o reto legacy = true)
                    const retosOk = !necesitaReto || pending.reto === true || (pending.retosTotal > 0 && pending.retosCompletadosCount >= pending.retosTotal);
                    // Requiere audio && todos los retos completados
                    if (pending.audio && retosOk) {
                        logger.info(`[PADRE][PENDINGS] Parada listada completa por condiciones: audio && retos(${pending.retosCompletadosCount}/${pending.retosTotal}) => ${elemento.parada_id}`);
                        await marcarParadaCompletada({ paradaId: elemento.parada_id || elemento.tramo_id || elemento.padreid, origen: 'padre-pending', causa: 'audio_reto' });
                        delete estado.pendingCompleciones[key];
                    }
                } else if (tipo === 'tramo') {
                    // Requiere llegada && audio
                    if (pending.audio && pending.llegada) {
                        logger.info(`[PADRE][PENDINGS] Tramo completado por condiciones: audio && llegada => ${elemento.tramo_id}`);
                        await marcarParadaCompletada({ paradaId: elemento.tramo_id || elemento.parada_id || elemento.padreid, origen: 'padre-pending', causa: 'audio_llegada_tramo' });
                        delete estado.pendingCompleciones[key];
                    }
                }
            } catch (e) {
                logger.warn('[PADRE][PENDINGS] Error en intentarCompletarElemento:', e);
            }
        }

        /**
         * Procesa la progresión al siguiente elemento de la aventura
         */
        async function progresarSiguienteElemento() {
            const logPrefix = '[PADRE][PROGRESION]';

            try {
                // Limpieza: eliminar pendientes de elemento anterior si existían
                const elementoAnterior = obtenerElementoActual();
                if (elementoAnterior && estado.pendingCompleciones) {
                    const keyPrev = elementoAnterior.padreid || (`padre-${elementoAnterior.parada_id || elementoAnterior.tramo_id}`);
                    if (estado.pendingCompleciones[keyPrev]) {
                        delete estado.pendingCompleciones[keyPrev];
                        logger.debug('[PADRE][PROGRESION] Limpiando pendingCompleciones para elemento anterior:', keyPrev);
                    }
                }

                // Incrementar índice de progreso
                estado.indiceProgreso++;

                // Obtener siguiente elemento
                const siguienteElemento = obtenerElementoActual();

                if (!siguienteElemento) {
                    logger.info(`${logPrefix} Fin de la aventura alcanzado`);

                    // Notificar al temporizador (hijo1-opciones) que la aventura terminó
                    const iframeOpciones = document.getElementById('hijo1-opciones');
                    if (iframeOpciones && iframeOpciones.contentWindow) {
                        iframeOpciones.contentWindow.postMessage({
                            tipo: TIPOS_MENSAJE.AVENTURA.FINALIZADA,
                            origen: getPadreId(),
                            destino: 'hijo1-opciones',
                            datos: {
                                aventuraId: window.aventuraSeleccionada,
                                idioma: window.idiomaSeleccionado,
                                timestamp: Date.now()
                            }
                        }, '*');
                        logger.info(`${logPrefix} Mensaje AVENTURA.FINALIZADA enviado al temporizador`);
                    }
                    return;
                }

                // Actualizar estado
                estado.elementoActual = siguienteElemento;
                const retosIds = obtenerRetosIds(siguienteElemento);
                estado.retoActual = {
                    id: retosIds[0] || null,
                    disponible: false,
                    completado: false,
                    cola: retosIds,
                    indiceCola: 0,
                    colaCompletados: new Set()
                };

                logger.info(`${logPrefix} Progresando a elemento ${estado.indiceProgreso}: ${siguienteElemento.tipo} ${siguienteElemento.parada_id || siguienteElemento.tramo_id}`);

                // Usar NAVEGACION.CAMBIO_PARADA para coordinar el cambio de manera consistente
                // Esto asegura que todos los hijos reciban la información correcta en el orden adecuado
                const paradaId = siguienteElemento.parada_id || siguienteElemento.tramo_id || (typeof siguienteElemento.padreid === 'string' ? siguienteElemento.padreid.replace(/^padre-/, '') : undefined);
                const padreId = siguienteElemento.padreid || (paradaId ? `padre-${paradaId}` : undefined);

                if (paradaId) {
                    // Debug: store last Cambio Parada payload for diagnostics
                    window._lastCambioParada = { paradaId, parada_id: paradaId, padreId: padreId, padreid: padreId, contexto: 'progresion_aventura', timestamp: Date.now() };
                    await enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA,
                        origen: getPadreId(),
                        destino: getPadreId(), // El padre se envía el mensaje a sí mismo para activar el controlador
                            datos: {
                            paradaId: paradaId,
                            parada_id: paradaId,
                            padreId: padreId,
                            padreid: padreId,
                            contexto: 'progresion_aventura',
                            timestamp: Date.now()
                        }
                    });
                } else {
                    logger.warn(`${logPrefix} No se pudo determinar paradaId para el elemento:`, siguienteElemento);
                }

            } catch (error) {
                logger.error(`${logPrefix} Error en progresión:`, error);
            }
        }

            // ============================================================
            // FUNCION CENTRAL: MARCAR_PARADA_COMPLETADA
            // Registra, persiste y coordina la progresión cuando una parada/tramo
            // se marca como completado (por hijo2, llegada GPS o reto).
            // ============================================================
            async function marcarParadaCompletada({ paradaId, origen = 'desconocido', coordenadas = null, distancia = null, causa = 'parada_completada' } = {}) {
                const logPrefix = '[PADRE][MARCAR_PARADA]';

                try {
                    if (!paradaId) {
                        logger.warn(`${logPrefix} paradaId ausente — ignorando petición`, { origen, causa });
                        return;
                    }

                    const idLimpio = String(paradaId).replace(/^padre-/, '').trim();

                    // Inicializar estructura si hace falta
                    if (!estado.paradasCompletadas) estado.paradasCompletadas = new Map();

                    // Evitar dobles registros
                    if (estado.paradasCompletadas.has(idLimpio)) {
                        logger.info(`${logPrefix} Parada ya marcada: ${idLimpio}`, { origen, causa });
                        return;
                    }

                    // Registrar en memoria
                    const registro = {
                        paradaId: idLimpio,
                        padreId: `padre-${idLimpio}`,
                        origen,
                        coordenadas,
                        distancia,
                        causa,
                        timestamp: Date.now()
                    };
                    estado.paradasCompletadas.set(idLimpio, registro);
                    logger.info(`${logPrefix} Registrada parada completada: ${idLimpio}`, registro);

                    // Persistir de forma simple (localStorage) — no rompe si no está disponible
                    try {
                        const objetoSerializable = [...estado.paradasCompletadas.entries()];
                        localStorage.setItem('vv_paradas_completadas', JSON.stringify(objetoSerializable));
                        logger.debug(`${logPrefix} Persistencia local OK`);
                    } catch (persistError) {
                        logger.warn(`${logPrefix} No se pudo persistir en localStorage`, persistError);
                    }

                    // Persistir además el índice de progreso si está definido
                    try { persistProgressState(); } catch (e) { logger.warn(`${logPrefix} No se pudo persistir vv_progreso`, e); }

                    // Limpiar cualquier pending para la parada completada
                    try {
                        const clavePend = `padre-${idLimpio}`;
                        if (estado.pendingCompleciones && estado.pendingCompleciones[clavePend]) {
                            delete estado.pendingCompleciones[clavePend];
                            logger.debug(`${logPrefix} Limpiado pendingCompleciones para ${clavePend}`);
                        }
                    } catch (errPendingCleanup) { /* ignore */ }

                    // Notificar a módulos interesados (mapa para capas/estadísticas, hijo2 para UI)
                    try {
                        await enviarMensajePadre({
                            tipo: TIPOS_MENSAJE.NAVEGACION.ENVIAR_PARADA_COMPLETADA,
                            origen: getPadreId(),
                            destino: 'mapa',
                            datos: { paradaCompletada: idLimpio, padreId: `padre-${idLimpio}`, registro }
                        });
                        logger.debug(`${logPrefix} Notificado a 'mapa'`);
                    } catch (err) {
                        logger.warn(`${logPrefix} Error notificando a mapa:`, err);
                    }

                    try {
                        await enviarMensajePadre({
                            tipo: TIPOS_MENSAJE.SISTEMA.NOTIFICACION,
                            origen: getPadreId(),
                            destino: 'hijo2',
                            datos: { evento: 'PARADA_COMPLETADA', paradaId: idLimpio, padreId: `padre-${idLimpio}`, causa, timestamp: Date.now() }
                        });
                        logger.debug(`${logPrefix} Notificado a 'hijo2'`);
                    } catch (err) {
                        logger.debug(`${logPrefix} No se pudo notificar a hijo2:`, err);
                    }

                    // Política de progresión:
                    // - Si hay retos asociados y todavía quedan pendientes de resolución, NO proseguir.
                    // - Si no hay reto pendiente, progresar inmediatamente.
                    const cola = estado.retoActual?.cola || [];
                    const completados = estado.retoActual?.colaCompletados || new Set();
                    const retoPendiente = cola.length > 0 && cola.some(id => !completados.has(id)) && estado.retoActual.disponible;
                    if (retoPendiente) {
                        logger.info(`${logPrefix} Parada ${idLimpio} registrada; retos pendientes (${completados.size}/${cola.length}) -> esperando RETO.COMPLETADO`);
                        return;
                    }

                    // Si no hay restricción por reto, progresar
                    try {
                        logger.info(`${logPrefix} Sin reto pendiente -> progresando al siguiente elemento`);
                        await progresarSiguienteElemento();
                    } catch (progErr) {
                        logger.error(`${logPrefix} Error progresando siguiente elemento:`, progErr);
                    }

                } catch (error) {
                    logger.error('[PADRE][MARCAR_PARADA] Error inesperado:', error);
                }
            }

        /**
         * Solicita coordenadas a hijo2 para el elemento especificado
         */
        async function solicitarCoordenadasAHijo2(elemento) {
            const logPrefix = '[PADRE][COORDENADAS]';

            try {
                const destinoId = elemento.parada_id || elemento.tramo_id;

                logger.info(`${logPrefix} Solicitando coordenadas para ${destinoId}`);

                await enviarMensaje_S2({
                    tipo: TIPOS_MENSAJE_S2.DATOS.COORDENADAS_PARADAS_REQUEST,
                    origen: getPadreId(),
                    destino: 'hijo2',
                    datos: {
                        paradaId: destinoId,
                        padreId: elemento.padreid || `padre-${destinoId}`,
                        tipo: elemento.tipo,
                        contexto: 'progresion_aventura'
                    }
                });

            } catch (error) {
                logger.error(`${logPrefix} Error solicitando coordenadas:`, error);
            }
        }

        /**
         * Solicita reproducción de audio a hijo3
         */
        async function solicitarAudioAHijo3(audioId) {
            const logPrefix = '[PADRE][AUDIO]';

            try {
                logger.info(`${logPrefix} Solicitando reproducción de audio ${audioId}`);

                await enviarMensajePadre({
                    tipo: TIPOS_MENSAJE.AUDIO.REPRODUCIR_REQUEST,
                    origen: getPadreId(),
                    destino: 'hijo3',
                    datos: {
                        audioId: audioId,
                        contexto: 'progresion_aventura',
                        autoplay: false
                    }
                });

            } catch (error) {
                logger.error(`${logPrefix} Error solicitando audio:`, error);
            }
        }

        // Usar window.CONFIG_PADRE ya que CONFIG_PADRE no está en scope local de Script 2
        const CONFIG_PADRE = window.CONFIG_PADRE || { LOG_PREFIX: '[PADRE]', ID: 'padre' };
        logger.info(`${CONFIG_PADRE.LOG_PREFIX} Inicializando controladores del padre...`);

        // Controladores SISTEMA registrados en Script 1: CAMBIO_MODO, ESTADO, HEARTBEAT, APLICACION_INICIALIZADA

        // ============================================================
        // CONTROLADOR 1: RETO.SOLICITAR_RETO
        // El padre decide qué reto mostrar basado en su estado y array DATOS_PADRE
        // ============================================================
        window.registrarControladorSeguro(TIPOS_MENSAJE_S2.RETO.SOLICITAR_RETO, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[RETO.SOLICITAR_RETO]`;

            try {
                logger.info(`${logPrefix} Solicitud de reto recibida de ${mensaje.origen}`);

                // El padre decide basado en su estado y array DATOS_PADRE
                const elementosIDpadre = DATOS_PADRE[window.aventuraSeleccionada]?.[window.idiomaSeleccionado]?.elementosIDpadre;
                if (!elementosIDpadre) {
                    logger.warn(`${logPrefix} No hay elementosIDpadre disponibles para aventura ${window.aventuraSeleccionada} idioma ${window.idiomaSeleccionado}`);
                    await enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                        origen: getPadreId(),
                        destino: mensaje.origen,
                        datos: {
                            error: 'Datos de aventura no disponibles',
                            mensaje: 'No se puede solicitar reto en este momento'
                        }
                    });
                    return { exito: false, error: 'Datos de aventura no disponibles' };
                }
                // Buscar parada con multi-criterio (mismo patrón que CAMBIO_PARADA)
                const _paradaId = estado.paradaActual;
                const _idSinPrefijo = _paradaId?.startsWith('padre-') ? _paradaId.substring(6) : _paradaId;
                const paradaEncontrada = elementosIDpadre.find(p =>
                    p.padreid === _paradaId ||
                    p.parada_id === _paradaId ||
                    p.parada_id === _idSinPrefijo ||
                    p.tramo_id === _idSinPrefijo
                );
                const retosIds = obtenerRetosIds(paradaEncontrada);

                // Determinar qué reto mostrar: el siguiente no completado de la cola
                let retoIdToUsar = null;
                if (estado.retoActual.cola && estado.retoActual.cola.length > 0) {
                    // Buscar el primer reto no completado en la cola
                    for (let i = 0; i < estado.retoActual.cola.length; i++) {
                        if (!estado.retoActual.colaCompletados.has(estado.retoActual.cola[i])) {
                            retoIdToUsar = estado.retoActual.cola[i];
                            estado.retoActual.indiceCola = i;
                            break;
                        }
                    }
                }
                // Fallback: usar reto_id clásico si la cola no está inicializada
                if (!retoIdToUsar && retosIds.length > 0) {
                    retoIdToUsar = retosIds[0];
                    estado.retoActual.cola = retosIds;
                    estado.retoActual.indiceCola = 0;
                    estado.retoActual.colaCompletados = estado.retoActual.colaCompletados || new Set();
                }

                if (!estado.paradaActual || !retoIdToUsar) {
                    logger.warn(`${logPrefix} No hay parada actual (${estado.paradaActual}) o reto_id definido para parada encontrada: ${paradaEncontrada ? JSON.stringify(paradaEncontrada) : 'null'}`);
                    await enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                        origen: getPadreId(),
                        destino: mensaje.origen,
                        datos: {
                            error: 'No hay reto disponible',
                            mensaje: 'No se puede solicitar reto en este momento'
                        }
                    });
                    return { exito: false, error: 'No hay reto disponible' };
                }

                estado.retoActual.id = retoIdToUsar;
                estado.retoActual.disponible = true;
                estado.retoActual.completado = false;

                // Mostrar el iframe de hijo4 antes de enviar el reto
                await mostrarHijo4();

                // Verificar que hijo4 esté listo antes de enviar el mensaje
                let _hijo4Listo = estado.hijosInicializados && estado.hijosInicializados.has('hijo4');
                if (!_hijo4Listo) {
                    logger.warn(`${logPrefix} Hijo4 no está en hijosInicializados, esperando hasta 5s...`);
                    // Esperar hasta 5 segundos a que hijo4 se inicialice
                    let intentos = 0;
                    while ((!estado.hijosInicializados || !estado.hijosInicializados.has('hijo4')) && intentos < 50) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                        intentos++;
                    }
                    _hijo4Listo = estado.hijosInicializados && estado.hijosInicializados.has('hijo4');

                    if (!_hijo4Listo) {
                        // 🔧 FIX: No abortar — intentar enviar RETO.MOSTRAR de todos modos
                        // El iframe hijo4 puede estar cargado y funcionando aunque no haya completado
                        // el handshake HIJO_LISTO (por ejemplo, si hubo timeout durante FASE 3)
                        logger.warn(`${logPrefix} ⚠️ Hijo4 no en hijosInicializados tras 5s, pero intentando enviar RETO.MOSTRAR de todos modos`);
                        console.error(`[PADRE][DEBUG-RETO] hijosInicializados NO tiene hijo4. Set actual:`, Array.from(estado.hijosInicializados || []));
                    }
                }

                // Obtener array completo de retos para enviar como respaldo
                // (hijo4 puede no haber recibido CARGAR_RETOS si hubo race condition)
                const _retosAventuras = window.__vv_RETOS_AVENTURAS;
                const _aventura = window.aventuraSeleccionada;
                const _idioma = window.idiomaSeleccionado;
                const _retosArray = _retosAventuras?.[_aventura]?.[_idioma] || [];

                // Enviar RETO.MOSTRAR a hijo4 con el ID decidido por el padre
                const _retoMostrarMsg = {
                    tipo: TIPOS_MENSAJE.RETO.MOSTRAR,
                    origen: getPadreId(),
                    destino: 'hijo4',
                    datos: {
                        retoId: retoIdToUsar,
                        contexto: 'manual',
                        retosArray: _retosArray
                    }
                };
                logger.info(`${logPrefix} Enviando RETO.MOSTRAR a hijo4 con retoId: ${retoIdToUsar} (incluyendo ${_retosArray.length} retos como respaldo)`);
                try {
                    await enviarMensajePadre(_retoMostrarMsg);
                    logger.success(`${logPrefix} RETO.MOSTRAR enviado via enviarMensajePadre`);
                } catch (envioError) {
                    // Si enviarMensajePadre falla, intentar postMessage directo como único fallback
                    logger.warn(`${logPrefix} enviarMensajePadre falló, intentando postMessage directo:`, envioError);
                    try {
                        const _hijo4El = document.getElementById('hijo4');
                        if (_hijo4El && _hijo4El.contentWindow) {
                            _hijo4El.contentWindow.postMessage({
                                tipo: TIPOS_MENSAJE.RETO.MOSTRAR,
                                origen: getPadreId(),
                                destino: 'hijo4',
                                datos: { retoId: retoIdToUsar, contexto: 'manual', retosArray: _retosArray },
                                timestamp: Date.now()
                            }, '*');
                            logger.info(`${logPrefix} ✅ RETO.MOSTRAR enviado por postMessage directo (fallback)`);
                        }
                    } catch (directError) {
                        logger.error(`${logPrefix} Error en envío directo fallback:`, directError);
                    }
                }

        window.registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.ERROR, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[GPS.ERROR][${mensaje?.origen || 'desconocido'}]`;

            try {
                const { correlationId } = mensaje.datos || {};

                if (!correlationId) {
                    logger.warn(`${logPrefix} Error GPS sin correlationId, ignorando`);
                    return;
                }

                // Buscar correlación
                if (!estado.correlacionesMensajes || !estado.correlacionesMensajes.has(correlationId)) {
                    logger.error(`${logPrefix} CorrelationId de error GPS no encontrado: ${correlationId}`);
                    return;
                }

                const correlacion = estado.correlacionesMensajes.get(correlationId);
                const { solicitanteOriginal } = correlacion;

                logger.warn(`${logPrefix} Error GPS - reenviando a ${solicitanteOriginal}`);
                // Telemetría: incrementar contador por razón de error
                try { if (mensaje?.datos?.codigo !== undefined) { typeof window.incrementarContador === 'function' && window.incrementarContador(`gps_error_code_${mensaje.datos.codigo}`); } } catch (err) { /* ignore */ }

                // Reenviar error al solicitante original
                await enviarMensajePadre({
                    tipo: TIPOS_MENSAJE.NAVEGACION.GPS.ERROR,
                    origen: getPadreId(),
                    destino: solicitanteOriginal,
                    datos: mensaje.datos
                });

                // Limpiar correlación
                estado.correlacionesMensajes.delete(correlationId);

            } catch (error) {
                logger.error(`${logPrefix} Error procesando error GPS:`, error);
            }
        });

        /**
         * Controlador: NAVEGACION.GPS.RESTRINGIDO

        window.registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.GPS.RESTRINGIDO, async (mensaje) => {

        // ============================================================

        // ============================================================

            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[CENTRAR_EN_UBICACION][${mensaje?.origen || 'desconocido'}]`;

            try {
                logger.debug(`${logPrefix} Solicitud de centrado GPS recibida de ${mensaje.origen}`);

                const { posicion, paradaActual, zoom = 15, suavizado = true } = mensaje.datos || {};

                let coordenadasObjetivo = null;

                // Caso 1: Posición directa proporcionada
                if (posicion && posicion.lat && posicion.lng) {
                    coordenadasObjetivo = posicion;
                    logger.debug(`${logPrefix} Usando posición directa: [${posicion.lat}, ${posicion.lng}]`);
                }
                // Caso 2: Centrar en parada actual
                else if (paradaActual) {
                    // Buscar coordenadas de la parada en DATOS_PADRE
                    const parada = DATOS_PADRE[window.aventuraSeleccionada][window.idiomaSeleccionado].elementosIDpadre.find(p =>
                        p.parada_id === paradaActual ||
                        p.padreid === paradaActual
                    );

                    if (parada && parada.lat && parada.lng) {
                        coordenadasObjetivo = { lat: parada.lat, lng: parada.lng };
                        logger.debug(`${logPrefix} Centrando en parada ${paradaActual}: [${parada.lat}, ${parada.lng}]`);
                    } else {
                        // Parada no encontrada o sin coords en el padre: solicitar a hijo2
                        logger.warn(`${logPrefix} Parada ${paradaActual} no encontrada o sin coordenadas en padre; solicitando a hijo2...`);

                        try {
                                const coordenadasResponse = await solicitarCoordenadasHijo('hijo2', { paradaId: paradaActual, padreId: `padre-${paradaActual}`, incluirMetadatos: false }, ajustarTimeoutPorConexionSafe(5000));

                            if (coordenadasResponse && coordenadasResponse.exito && coordenadasResponse.coordenadas && Array.isArray(coordenadasResponse.coordenadas) && coordenadasResponse.coordenadas.length > 0 && coordenadasResponse.coordenadas[0].coordenadas) {
                                const c = coordenadasResponse.coordenadas[0].coordenadas;
                                coordenadasObjetivo = { lat: c.lat || c[0], lng: c.lng || c[1] };

                            } else {

                                coordenadasObjetivo = _obtenerCoordenadasP0Fallback();

                            coordenadasObjetivo = _obtenerCoordenadasP0Fallback();

                        }
                    }
                }
                // Caso 3: Centrar en ubicación GPS actual
                else {
                    let posicionUsuario = await getPosicionUsuario();

                    if (!posicionUsuario) {
                        // Intentar obtener ubicación directamente si GPS está activo pero no hay posición cached
                        logger.debug(`${logPrefix} No hay posición cached, intentando obtener ubicación actual...`);
                        try {
                            posicionUsuario = await new Promise((resolve, reject) => {
                                if (!navigator.geolocation) {
                                    reject(new Error('Geolocalización no soportada'));
                                    return;
                                }

                                navigator.geolocation.getCurrentPosition(
                                    (position) => {
                                        const { latitude: lat, longitude: lng, accuracy } = position.coords;

                                    (error) => {

                    } else {

                            // Si hay paradaActual, buscar siguiente; si no, usar primera
                            const paradaActualId = estadoMapa.paradaActual;

                            if (paradaActualId) {
                                const indexActual = paradas.findIndex(p => p.padreid === paradaActualId);

                                try {

                                    if (coordenadasResponse && coordenadasResponse.exito && coordenadasResponse.coordenadas && Array.isArray(coordenadasResponse.coordenadas) && coordenadasResponse.coordenadas.length > 0) {
                                        const coord0 = coordenadasResponse.coordenadas[0];

        // ============================================================
        // CONTROLADOR 9.6: NAVEGACION.MOSTRAR_UBICACION_POLYLINE

        // ============================================================
        window.registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.MOSTRAR_UBICACION_POLYLINE, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[MOSTRAR_UBICACION_POLYLINE][${mensaje?.origen || 'desconocido'}]`;

            try {

                        coordenadasUsuario = await new Promise((resolve, reject) => {
                            if (!navigator.geolocation) {
                                reject(new Error('Geolocalización no soportada'));

                            navigator.geolocation.getCurrentPosition(

                        // Usar ubicación del estado si está disponible

                        if (estadoGPS && estadoGPS.lat && estadoGPS.lng) {

                    }

                // 2. Determinar coordenadas del próximo elemento
                let coordenadasDestino = null;

                if (proximoElemento && proximoElemento.lat && proximoElemento.lng) {

                } else if (elementoId) {

        // ============================================================
        window.registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[NAVEGACION.CAMBIO_PARADA]`;

            try {
                // Normalize IDs from payload to accept both 'padreId'/'padreid' and 'paradaId'/'parada_id'
                const resolved = resolverIdsParada(mensaje.datos || {});
                const paradaId = resolved.paradaId || mensaje.datos?.paradaId || mensaje.datos?.parada_id || null;
                const padreId = resolved.padreId || mensaje.datos?.padreId || mensaje.datos?.padreid || null;
                const { timestamp, origen: origenDatos } = mensaje.datos || {};

                logger.info(`${logPrefix} Cambio de parada solicitado por ${mensaje.origen}`);
                logger.debug(`${logPrefix} Datos recibidos:`, { paradaId, timestamp, origen: origenDatos });

                // Validar que se recibió un paradaId
                if (!paradaId) {
                    logger.warn(`${logPrefix} paradaId no proporcionado, ignorando solicitud`);
                    return {
                        exito: false,
                        error: 'paradaId es requerido'
                    };
                }

                // Buscar la parada en DATOS_PADRE (padre coordina con IDs específicos)
                // Soportar múltiples formatos de ID:
                // - hijo5 envía "padre-P-5" (padre-{coord.id} donde coord.id="P-5")
                // - DATOS_PADRE tiene padreid="padre-P5", parada_id="P-5", tramo_id="TR-5"
                const idSinPrefijo = paradaId.startsWith('padre-') ? paradaId.substring(6) : paradaId;
                const parada = DATOS_PADRE[window.aventuraSeleccionada][window.idiomaSeleccionado].elementosIDpadre.find(p =>
                    p.parada_id === paradaId ||
                    p.padreid === paradaId ||
                    p.parada_id === idSinPrefijo ||
                    p.tramo_id === idSinPrefijo
                );

                if (!parada) {
                    logger.warn(`${logPrefix} Parada con ID ${paradaId} no encontrada en DATOS_PADRE`);
                    return {
                        exito: false,
                        error: `Parada ${paradaId} no encontrada`,
                        paradaId
                    };
                }

                // Actualizar estado del padre
                const paradaAnterior = estado.paradaActual;
                estado.paradaActual = paradaId;
                estado.elementoActual = parada; // Actualizar elemento actual con la parada encontrada
                estado.ultimoCambioParada = Date.now();
                // Actualizar indice de progreso según elementosIDpadre
                try {
                    const idx = findIndexByPadreIdOrId(paradaId);
                    if (idx >= 0) estado.indiceProgreso = idx;
                } catch (e) { /* ignore */ }
                // Persistir progreso actualizado
                try { persistProgressState(); } catch (e) { logger.warn('[CAMBIO_PARADA] persistProgressState failed', e); }

                logger.success(`${logPrefix} Estado actualizado: ${paradaAnterior || 'ninguna'} → ${paradaId}`);

                // ============================================================
                // SOLICITAR DATOS A HIJOS EXPERTOS usando IDs específicos
                // ============================================================
                const solicitudes = {};

                // 1. HIJO2: Solicitar datos de parada usando parada_id
                if (parada.parada_id || parada.tramo_id) {
                    const paradaIdSolicitud = parada.parada_id || parada.tramo_id;
                    // Si la parada es un tramo, solicitar rutas/waypoints (inicio/fin)
                    const esTramo = (parada.tipo && parada.tipo === 'tramo') || !!parada.tramo_id;
                    logger.debug(`${logPrefix} Solicitando datos de parada a hijo2 con ID: ${paradaIdSolicitud} (esTramo=${esTramo})`);

                    solicitudes.paradaData = Promise.resolve(enviarMensajeConConfirmacion({
                        tipo: TIPOS_MENSAJE.DATOS.COORDENADAS_PARADAS_REQUEST,
                        origen: getPadreId(),
                        destino: 'hijo2',
                        datos: {
                            paradaId: paradaIdSolicitud,
                            padreId: parada.padreid || `padre-${paradaIdSolicitud}`,
                            incluirRutas: esTramo, // pedir rutas si es tramo para obtener inicio/fin/waypoints
                            incluirHorario: false,
                            incluirEstadisticas: false
                        }
                    })).catch(error => {
                        logger.warn(`${logPrefix} Error solicitando datos a hijo2:`, error);
                        return null;
                    });
                }

                // 2. HIJO3: En modo 'casa' primero solicitar al hijo3 información (id/url)
                //    y, tras recibir confirmación/respuesta, solicitar reproducción.
                if (parada.audio_id) {
                    const paradaIdSolicitud = parada.parada_id || parada.tramo_id || parada.audio_id;
                    if (estado.modo && estado.modo.actual === 'casa') {
                        logger.debug(`${logPrefix} [CASA] Solicitando info de audio a hijo3 para parada: ${paradaIdSolicitud}`);
                        solicitudes.audio = Promise.resolve(
                            enviarMensajeConConfirmacion({
                                tipo: TIPOS_MENSAJE.AUDIO.SOLICITAR_AUDIO,
                                origen: getPadreId(),
                                destino: 'hijo3',
                                datos: {
                                    paradaId: paradaIdSolicitud,
                                    padreId: parada.padreid || `padre-${paradaIdSolicitud}`,
                                    tipoConsulta: 'AUDIO'
                                }
                            })
                        ).then(audioDatos => {
                            if (!audioDatos) return null;
                            logger.debug(`${logPrefix} [CASA] Audio info recibida de hijo3:`, audioDatos);
                            // Enviar petición de reproducción usando la información recibida
                            const audioIdParaRepro = audioDatos.audioId || audioDatos.url || parada.audio_id;
                            return Promise.resolve(enviarMensajeConConfirmacion({
                                tipo: TIPOS_MENSAJE.AUDIO.REPRODUCIR_REQUEST,
                                origen: getPadreId(),
                                destino: 'hijo3',
                                datos: {
                                        audioId: audioIdParaRepro,
                                        autoplay: false,
                                        contexto: {
                                            parada: paradaIdSolicitud,
                                            tipo: parada.tipo
                                        }
                                    }
                            })).catch(error => {
                                logger.warn(`${logPrefix} [CASA] Error solicitando reproducción a hijo3:`, error);
                                return null;
                            });
                        }).catch(error => {
                            logger.warn(`${logPrefix} [CASA] Error solicitando info de audio a hijo3:`, error);
                            return null;
                        });
                    } else {
                        // Modo no-casa: mantener comportamiento previo (solicitar reproducción directamente)
                        logger.debug(`${logPrefix} Solicitando reproducción de audio a hijo3 con ID: ${parada.audio_id}`);
                        solicitudes.audio = Promise.resolve(enviarMensajeConConfirmacion({
                            tipo: TIPOS_MENSAJE.AUDIO.REPRODUCIR_REQUEST,
                            origen: getPadreId(),
                            destino: 'hijo3',
                            datos: {
                                    audioId: parada.audio_id,
                                    autoplay: false,
                                    contexto: {
                                        parada: parada.parada_id || parada.tramo_id,
                                        tipo: parada.tipo
                                    }
                                }
                        })).catch(error => {
                            logger.warn(`${logPrefix} Error solicitando audio a hijo3:`, error);
                            return null;
                        });
                    }
                }

                // Esperar respuestas de los hijos expertos
                const respuestas = await Promise.all([
                    solicitudes.paradaData,
                    solicitudes.audio
                ]);

                const [paradaData, audio] = respuestas;
                const reto = null;

                logger.debug(`${logPrefix} Respuestas recibidas:`, {
                    paradaData: paradaData ? 'OK' : 'FALLO',
                    audio: audio ? 'OK' : 'FALLO',
                    reto: reto ? 'OK' : 'FALLO'
                });

                // Normalizar la estructura recibida desde hijo2 para soportar
                // distintas formas de respuesta (antes: {parada: {...}} ahora: {coordenadas: [...]})
                let paradaNormalized = null;
                try {
                    // Si el hijo devuelve un objeto con `parada`, usarlo
                    if (paradaData && paradaData.parada) {
                        paradaNormalized = paradaData.parada;
                    }
                    // Si el hijo devuelve un array `coordenadas`, tomar el primer elemento
                    else if (paradaData && Array.isArray(paradaData.coordenadas) && paradaData.coordenadas.length > 0) {
                        paradaNormalized = paradaData.coordenadas[0];
                    }
                    // Si el hijo devuelve un objeto `coordenadas` directamente (caso único), envolverlo
                    else if (paradaData && paradaData.coordenadas && paradaData.coordenadas.lat && paradaData.coordenadas.lng) {
                        paradaNormalized = { coordenadas: paradaData.coordenadas };
                    }
                } catch (e) {
                    logger.warn(`${logPrefix} Error normalizando paradaData:`, e);
                }

                // 🔍 DEBUG: Verificar estructura de datos multimedia de hijo2 (normalizada)
                logger.debug(`${logPrefix} DEBUG paradaData completo (raw):`, paradaData);
                logger.debug(`${logPrefix} DEBUG paradaNormalized:`, paradaNormalized);

                // ============================================================
                // NOTIFICAR CAMBIO A OTROS HIJOS
                // ============================================================
                const notificaciones = [];

                // Preparar datos completos de notificación con respuestas de expertos
                const datosNotificacion = {
                    paradaId,
                    parada_id: parada.parada_id || parada.tramo_id || parada.id || null,
                    padreid: parada.padreid || `padre-${parada.parada_id || parada.tramo_id || parada.id}`,
                    padreId: parada.padreid || `padre-${parada.parada_id || parada.tramo_id || parada.id}`,
                    paradaActual: paradaId,
                    parada: parada.parada_id || parada.tramo_id,
                    tipo: parada.tipo,
                    // Datos obtenidos de hijo2
                    coordenadas: paradaNormalized || null,
                    // IDs para referencias
                    audioId: parada.audio_id,
                    retoId: parada.reto_id,
                    retoIds: obtenerRetosIds(parada),
                    // Metadata del reto (si fue solicitado)
                    retoDisponible: reto?.reto ? true : false,
                    exito: true,
                    timestamp: Date.now(),
                    origenCambio: mensaje.origen
                };

                // Notificar a hijo5 (solo si el cambio NO vino de él)
                if (mensaje.origen !== 'hijo5') {
                    notificaciones.push(
                        Promise.resolve(enviarMensajePadre({
                            tipo: TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA,
                            origen: getPadreId(),
                            destino: 'hijo5',
                            datos: {
                                ...datosNotificacion,
                                // keep legacy keys too
                                paradaId: datosNotificacion.paradaId,
                                parada_id: datosNotificacion.parada_id,
                                padreId: datosNotificacion.padreId,
                                padreid: datosNotificacion.padreid
                            }
                        })).catch(error => {
                            logger.warn(`${logPrefix} Error notificando a hijo5:`, error);
                            return null;
                        })
                    );
                }

                // ✅ NOTIFICAR SIEMPRE A HIJO2 para que actualice su estado CON DATOS MULTIMEDIA
                notificaciones.push(
                    Promise.resolve(enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA,
                        origen: getPadreId(),
                        destino: 'hijo2',
                        datos: {
                            paradaId,
                            parada_id: parada.parada_id || parada.tramo_id || parada.id || null,
                            padreId: parada.padreid || `padre-${parada.parada_id || parada.tramo_id || parada.id}`,
                            padreid: parada.padreid || `padre-${parada.parada_id || parada.tramo_id || parada.id}`,
                            parada: parada.parada || parada.tramo,
                            nombre: parada.nombre || parada.title,
                            tipo: parada.tipo,
                            // ✅ INCLUIR DATOS MULTIMEDIA obtenidos de hijo2 (normalizados)
                            imagen: paradaNormalized?.imagen || null,
                            video: paradaNormalized?.video || null,
                            coordenadas: paradaNormalized?.coordenadas || null,
                            timestamp: Date.now(),
                            origenCambio: mensaje.origen
                        }
                    })).catch(error => {
                        logger.warn(`${logPrefix} Error notificando a hijo2:`, error);
                        return null;
                    })
                );

                // ✅ NOTIFICAR A HIJO4 para que prepare el reto (si existe)
                if (estado.hijosInicializados?.has('hijo4')) {
                    notificaciones.push(
                        Promise.resolve(enviarMensajePadre({
                            tipo: TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA,
                            origen: getPadreId(),
                            destino: 'hijo4',
                            datos: {
                                paradaId,
                                parada_id: parada.parada_id || parada.tramo_id || parada.id || null,
                                padreId: parada.padreid || `padre-${parada.parada_id || parada.tramo_id || parada.id}`,
                                padreid: parada.padreid || `padre-${parada.parada_id || parada.tramo_id || parada.id}`,
                                tipo: parada.tipo,
                                retoId: parada.reto_id || null,
                                retoIds: obtenerRetosIds(parada),
                                timestamp: Date.now(),
                                origenCambio: mensaje.origen
                            }
                        })).catch(error => {
                            logger.warn(`${logPrefix} Error notificando a hijo4:`, error);
                            return null;
                        })
                    );
                }

                // 🔍 DEBUG: Log de datos que se envían a hijo2
                logger.debug(`${logPrefix} Enviando a hijo2:`, {
                    paradaId,
                    imagen: paradaNormalized?.imagen || null,
                    video: paradaNormalized?.video || null,
                    coordenadas: paradaNormalized?.coordenadas || null
                });

                await Promise.all(notificaciones);

                // ✅ En modo casa: habilitar/deshabilitar retosBtn según si hay reto
                const modoParaReto = estado.modo?.actual || MODOS.CASA;
                const retosDeParada = obtenerRetosIds(parada);
                if (modoParaReto === MODOS.CASA && estado.hijosInicializados?.has('hijo3')) {
                    if (retosDeParada.length > 0) {
                        // Inicializar cola de retos para esta parada
                        estado.retoActual = {
                            id: retosDeParada[0],
                            disponible: true,
                            completado: false,
                            cola: retosDeParada,
                            indiceCola: 0,
                            colaCompletados: new Set()
                        };
                        await enviarMensajePadre({
                            tipo: TIPOS_MENSAJE.CONTROL.HABILITAR,
                            origen: getPadreId(),
                            destino: 'hijo3',
                            datos: { control: 'retosBtn', razon: 'parada_con_reto_casa', retoId: retosDeParada[0] }
                        });
                    } else {
                        await enviarMensajePadre({
                            tipo: TIPOS_MENSAJE.CONTROL.DESHABILITAR,
                            origen: getPadreId(),
                            destino: 'hijo3',
                            datos: { control: 'retosBtn', razon: 'parada_sin_reto_casa' }
                        });
                    }
                }

                // Disparar CustomEvent para que funciones-mapa.js dibuje marcadores/polylines/zoom
                // (funciones-mapa escucha 'vv-parada-cambiada' en vez de registrar CAMBIO_PARADA)
                // Se incluyen las coordenadas ya resueltas para evitar una segunda petición a hijo2
                try {
                    const mensajeParaMapa = {
                        ...mensaje,
                        datos: {
                            ...(mensaje.datos || {}),
                            coordenadasYaResueltas: paradaNormalized || null
                        }
                    };
                    window.dispatchEvent(new CustomEvent('vv-parada-cambiada', { detail: mensajeParaMapa }));
                    logger.debug(`${logPrefix} Evento vv-parada-cambiada disparado para funciones-mapa`);
                } catch (evtErr) {
                    logger.warn(`${logPrefix} Error disparando evento vv-parada-cambiada:`, evtErr);
                }

                logger.success(`${logPrefix} Cambio de parada completado exitosamente`);

                // Devolver confirmación al solicitante
                return {
                    exito: true,
                    paradaId,
                    paradaActual: paradaId,
                    coordenadas: paradaNormalized || null,
                    audioId: parada.audio_id,
                    audioIniciado: audio?.exito || false,
                    retoId: parada.reto_id,
                    retoDisponible: reto?.reto ? true : false,
                    mensaje: `Cambio a parada ${paradaId} procesado exitosamente`
                };

            } catch (error) {
                logger.error(`${logPrefix} Error procesando cambio de parada:`, error);

                return {
                    exito: false,
                    error: error.message,
                    contexto: 'cambio_parada'
                };
            }
        });

        // ============================================================
        // CONTROLADOR (nuevo): NAVEGACION.CAMBIO_PARADA_CONFIRMADO
        // Maneja confirmaciones desde hijos que aceptaron/cambiaron correctamente
        // ============================================================
        window.registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.CAMBIO_PARADA_CONFIRMADO, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[NAVEGACION.CAMBIO_PARADA_CONFIRMADO]`;
            try {
                logger.info(`${logPrefix} Confirmación recibida de ${mensaje.origen}`, { datos: mensaje.datos || {} });

                // Manage a local registry with confirmations per padreId
                try {
                    const padreId = (mensaje.datos && (mensaje.datos.padreId || mensaje.datos.padreid || mensaje.datos.padre)) || null;
                    if (padreId) {
                        const est = getEstadoSafe();
                        est.paradasConfirmaciones = est.paradasConfirmaciones || {};
                        est.paradasConfirmaciones[padreId] = est.paradasConfirmaciones[padreId] || [];
                        est.paradasConfirmaciones[padreId].push({ origen: mensaje.origen, timestamp: Date.now(), datos: mensaje.datos });
                    }
                    // Telemetría: incrementar contador si existe
                    try { typeof window.incrementarContador === 'function' && window.incrementarContador('confirmaciones_cambio_parada'); } catch (err) { /* ignore */ }
                } catch (err) {
                    logger.warn(`${logPrefix} Error gestionando confirmación local:`, err);
                }
            } catch (err) {
                logger.warn(`${logPrefix} Error en handler:`, err);
            }
        });

        // ============================================================
        // CONTROLADOR 10.5: NAVEGACION.LLEGADA_DETECTADA
        // Maneja detección de llegada GPS a paradas desde hijo2
        // ============================================================
        window.registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.LLEGADA_DETECTADA, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[NAVEGACION.LLEGADA_DETECTADA]`;

            try {
                const resolved = resolverIdsParada(mensaje.datos || {});
                const paradaId = resolved.paradaId || mensaje.datos?.paradaId || mensaje.datos?.parada_id || null;
                const { coordenadas, distancia, timestamp } = mensaje.datos || {};

                logger.info(`${logPrefix} Llegada detectada por ${mensaje.origen}`, {
                    paradaId,
                    distancia,
                    coordenadas
                });

                // Verificar que coincide con el elemento actual
                if (!estado.elementoActual || (estado.elementoActual.parada_id !== paradaId && estado.elementoActual.tramo_id !== paradaId)) {
                    logger.warn(`${logPrefix} Llegada detectada para ${paradaId} pero elemento actual es ${estado.elementoActual?.parada_id || estado.elementoActual?.tramo_id || 'ninguno'}`);
                    return;
                }

                // ============================================================
                // ZOOM AUTOMÁTICO EN LLEGADA (MODO AVENTURA)
                // ============================================================
                if (coordenadas && coordenadas.lat && coordenadas.lng) {
                    try {
                        logger.info(`${logPrefix} Centrando mapa en llegada: [${coordenadas.lat}, ${coordenadas.lng}]`);

                        // Usar la API centralizada expuesta por funciones-mapa
                        if (window.funcionesMapa && typeof window.funcionesMapa.setMapView === 'function') {
                            window.funcionesMapa.setMapView([coordenadas.lat, coordenadas.lng], 17, {
                                animate: true,
                                duration: 0.8
                            }).then(() => {
                                logger.success(`${logPrefix} Mapa centrado en llegada detectada`);
                            }).catch(err => {
                                logger.warn(`${logPrefix} Error centrando mapa en llegada:`, err);
                            });
                        } else {
                            logger.warn(`${logPrefix} Mapa no inicializado todavía (ni setMapView disponible)`);
                        }
                    } catch (mapError) {
                        logger.warn(`${logPrefix} Error centrando mapa en llegada:`, mapError);
                    }
                }

                // Actualizar estado de audio
                estado.audioActual.id = estado.elementoActual.audio_id;
                estado.audioActual.estado = 'solicitado';
                estado.audioActual.timestamp = timestamp || Date.now();

                // Solicitar reproducción de audio a hijo3
                await enviarMensajePadre({
                    tipo: TIPOS_MENSAJE.AUDIO.REPRODUCIR_REQUEST,
                    origen: getPadreId(),
                    destino: 'hijo3',
                    datos: {
                        audioId: estado.elementoActual.audio_id,
                        autoplay: false,
                        contexto: 'llegada_parada',
                        coordenadas
                    }
                });

                logger.success(`${logPrefix} Audio solicitado para llegada a ${paradaId}`);

                                // Registrar la llegada y marcar pending; no completar automáticamente si hay reto
                                try {
                                    const elemento = findElementoPorPadreId(paradaId) || findElementoPorPadreId(`padre-${paradaId}`) || findElementoPorPadreId(paradaId.replace(/^padre-/, ''));
                                    const key = elemento?.padreid || (`padre-${paradaId}`);
                                    const pending = ensurePending(key, elemento?.tipo || 'parada');
                                    pending.llegada = true;
                                    if (coordenadas && coordenadas.lat && coordenadas.lng) pending.destinoCoords = coordenadas;
                                    pending.timestamp = Date.now();
                                    // Intentar completar (reglas: parada -> audio+reto; tramo -> audio+llegada)
                                    intentarCompletarElemento(key);
                                } catch (err) {
                                    logger.warn(`${logPrefix} Error marcando pending por llegada:`, err);
                                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando llegada detectada:`, error);
            }
        });

        // ============================================================
        // CONTROLADOR: NAVEGACION.USUARIO_FUERA_RANGO
        // Recibido desde hijo2 cuando usuario está >5min fuera de rango (>50m)
        // Acción: Limpiar polylines y preparar para reactivación
        // ============================================================
        window.registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.USUARIO_FUERA_RANGO, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[USUARIO_FUERA_RANGO][${mensaje?.origen || 'desconocido'}]`;

            try {
                const { distancia, tiempoFuera, elementoMasCercano, timestamp } = mensaje.datos || {};

                logger.warn(`${logPrefix} Usuario fuera de rango: ${Math.ceil(distancia)}m por ${Math.ceil(tiempoFuera/1000)}s (elemento más cercano: ${elementoMasCercano || 'desconocido'})`);

                // Limpiar polylines de navegación activas
                if (window.funcionesMapa && typeof window.funcionesMapa.limpiarPolylineNavegacion === 'function') {
                    try {
                        await window.funcionesMapa.limpiarPolylineNavegacion();
                        logger.info(`${logPrefix} Polylines de navegación limpiadas`);
                    } catch (err) {
                        logger.warn(`${logPrefix} Error limpiando polylines:`, err);
                    }
                }

                // Actualizar estado para indicar que usuario está fuera de rango
                estado.usuarioFueraRango = {
                    activo: true,
                    distancia: distancia,
                    tiempoFuera: tiempoFuera,
                    elementoMasCercano: elementoMasCercano,
                    timestamp: timestamp || Date.now()
                };

                logger.info(`${logPrefix} Estado actualizado: usuario fuera de rango durante ${Math.ceil(tiempoFuera/60000)}min`);

            } catch (error) {
                logger.error(`${logPrefix} Error procesando usuario fuera de rango:`, error);
            }
        });

        // ============================================================
        // CONTROLADOR: NAVEGACION.PARADA_COMPLETADA
        // Recibido usualmente desde hijo2 (botón ubicación o lógica local)
        // ============================================================
        window.registrarControladorSeguro(TIPOS_MENSAJE.NAVEGACION.PARADA_COMPLETADA, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[NAVEGACION.PARADA_COMPLETADA][${mensaje?.origen || 'desconocido'}]`;

            try {
                const { idParada, paradaId, paradaCompletada, distancia, coordenadas } = mensaje.datos || {};
                const pid = idParada || paradaId || paradaCompletada || mensaje.datos?.id || null;

                if (!pid) {
                    logger.warn(`${logPrefix} Mensaje sin paradaId`, mensaje.datos);
                    // ACK/NACK según política
                    await enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.SISTEMA.NACK,
                        origen: getPadreId(),
                        destino: mensaje.origen,
                        datos: { error: 'paradaId requerido' }
                    });
                    return;
                }

                logger.info(`${logPrefix} Procesando parada completada: ${pid}`);

                // Marcar pending de llegada desde hijo2; no completar inmediatamente si existe reto
                try {
                    const elemento = findElementoPorPadreId(pid) || findElementoPorPadreId(`padre-${pid}`) || findElementoPorPadreId(pid.replace(/^padre-/, ''));
                    const key = elemento?.padreid || `padre-${pid}`;
                    const pending = ensurePending(key, elemento?.tipo || 'parada');
                    pending.llegada = true;
                    if (coordenadas && coordenadas.lat && coordenadas.lng) pending.destinoCoords = coordenadas;
                    pending.timestamp = Date.now();
                    // Registrar coordenadas/distancia en pending para debug/registro
                    pending.coordenadas = coordenadas || null;
                    if (coordenadas && coordenadas.lat && coordenadas.lng) pending.destinoCoords = coordenadas;
                    pending.distancia = distancia || null;
                    // Solicitar audio si existe (cobertura para flows que vienen desde botón de hijo2)
                    if (elemento?.audio_id) {
                        try { await solicitarAudioAHijo3(elemento.audio_id); } catch (errReq) { logger.warn(`${logPrefix} No se pudo solicitar audio para ${elemento.audio_id}:`, errReq); }
                    }
                    intentarCompletarElemento(key);
                } catch (err) {
                    logger.warn(`${logPrefix} Error marcando pending por PARADA_COMPLETADA:`, err);
                }

                // Confirmación al emisor
                await enviarMensajePadre({
                    tipo: TIPOS_MENSAJE.SISTEMA.ACK,

                    destino: mensaje.origen,

                logger.error(`${logPrefix} Error procesando PARADA_COMPLETADA:`, error);

                    await enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                        origen: getPadreId(),
                        destino: mensaje.origen,

                    });

                    logger.warn(`${logPrefix} Error enviando ERROR al origen:`, err);
                }

        logger.info(`${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'} ✅ Controladores del padre inicializados`);

        // ============================================================
        // CONTROLADORES MOVIDOS DESDE SCRIPT 1 (para aligerar carga inicial)
        // ============================================================

        // CONTROLADOR 11: RETO.COMPLETADO (Recibe de hijo4)
        window.registrarControladorSeguro(TIPOS_MENSAJE.RETO.COMPLETADO, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[RETO.COMPLETADO]`;
            const timestamp = Date.now();

            try {
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Mensaje sin origen`);
                    return;
                }

                const { retoId, correcto, respuesta, puntos = 0, tiempoRespuesta = 0 } = mensaje.datos || {};

                logger.info(`${logPrefix} Reto completado recibido de ${mensaje.origen}`, {
                    retoId,
                    correcto,
                    puntos
                });

                // Actualizar estado global del padre
                if (!estado.retosCompletados) {
                    estado.retosCompletados = new Map();
                }

                estado.retosCompletados.set(retoId, {
                    correcto,
                    respuesta,
                    puntos,
                    tiempoRespuesta,
                    timestamp,
                    origen: mensaje.origen
                });

                // Actualizar estado del reto actual
                estado.retoActual.completado = correcto;

                // Notificar a hijo3 (audio) para que pueda reanudar o actuar
                try {
                    await enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.SISTEMA.NOTIFICACION,
                        origen: getPadreId(),
                        destino: 'hijo3',
                        datos: {
                            evento: 'reto_completado',
                            retoId,
                            correcto,
                            puntos,
                            timestamp
                        }
                    });

                    logger.debug(`${logPrefix} Notificación enviada a hijo3`);
                } catch (notifError) {
                    logger.warn(`${logPrefix} Error notificando a hijo3:`, notifError);
                }

                // 📤 Notificar a hijo2 que reto terminó (para rehabilitar botones)
                try {
                    await enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.NAVEGACION.ACTUALIZAR_ESTADO,
                        origen: getPadreId(),
                        destino: 'hijo2',
                        datos: {
                            retoActivo: false,
                            retoCompletado: correcto,
                            retoId,
                            timestamp: Date.now()
                        }
                    });
                    logger.debug(`${logPrefix} 📤 Estado de reto completado notificado a hijo2`);
                } catch (notifError) {
                    logger.warn(`${logPrefix} Error notificando fin de reto a hijo2:`, notifError);
                }

                // Lógica de progresión: si el reto fue correcto, marcar en cola y delegar comprobación
                if (correcto) {
                    // Registrar este reto como completado en la cola
                    if (estado.retoActual.colaCompletados) {
                        estado.retoActual.colaCompletados.add(retoId);
                    }

                    // Comprobar si quedan más retos en la cola
                    const cola = estado.retoActual.cola || [];
                    const completados = estado.retoActual.colaCompletados || new Set();
                    const siguienteRetoEnCola = cola.find(id => !completados.has(id));

                    if (siguienteRetoEnCola) {
                        // Hay más retos: mostrar el siguiente automáticamente
                        logger.info(`${logPrefix} Reto ${retoId} completado, mostrando siguiente en cola: ${siguienteRetoEnCola}`);
                        estado.retoActual.id = siguienteRetoEnCola;
                        estado.retoActual.indiceCola = cola.indexOf(siguienteRetoEnCola);
                        estado.retoActual.completado = false;

                        // Enviar RETO.MOSTRAR a hijo4 con el siguiente reto
                        try {
                            await enviarMensajePadre({
                                tipo: TIPOS_MENSAJE.RETO.MOSTRAR,
                                origen: getPadreId(),
                                destino: 'hijo4',
                                datos: {
                                    retoId: siguienteRetoEnCola,
                                    contexto: 'secuencial'
                                }
                            });
                            logger.info(`${logPrefix} RETO.MOSTRAR enviado para siguiente reto: ${siguienteRetoEnCola}`);
                        } catch (errNext) {
                            logger.error(`${logPrefix} Error mostrando siguiente reto en cola:`, errNext);
                        }
                    } else {
                        // Todos los retos de la cola completados
                        logger.info(`${logPrefix} Todos los retos de la cola completados (${completados.size}/${cola.length}) -> marcando pending.reto`);
                        estado.retoActual.completado = true;

                        try {
                            const elementoReto = findElementoPorReto(retoId) || findElementoPorPadreId(estado.elementoActual?.padreid);
                            const claveR = elementoReto?.padreid || (elementoReto?.parada_id ? `padre-${elementoReto.parada_id}` : null);
                            if (claveR) {
                                const pendingR = ensurePending(claveR, elementoReto?.tipo || 'parada');
                                pendingR.reto = true;
                                pendingR.retosCompletadosCount = completados.size;
                                pendingR.timestamp = Date.now();
                                intentarCompletarElemento(claveR);
                            } else {
                                // Fallback: sin ID, progresar directamente
                                await progresarSiguienteElemento();
                            }
                        } catch (errMap) {
                            logger.warn(`${logPrefix} Error marcando pending por cola completa:`, errMap);
                            await progresarSiguienteElemento();
                        }
                    }
                } else {
                    // Si el reto fue incorrecto, el usuario puede intentarlo de nuevo
                    // El botón permanece deshabilitado hasta que se complete correctamente
                    logger.info(`${logPrefix} Reto fallido, esperando nuevo intento`);
                }

                // Enviar confirmación a hijo4
                await enviarMensajePadre({
                    tipo: TIPOS_MENSAJE.SISTEMA.ACK,
                    origen: getPadreId(),
                    destino: mensaje.origen,
                    datos: {
                        mensaje: 'Reto completado registrado',
                        retoId,
                        timestamp
                    }
                });

                logger.success(`${logPrefix} Reto ${retoId} procesado exitosamente - ${correcto ? '✅ CORRECTO' : '❌ INCORRECTO'}`);

                logger.error(`${logPrefix} Error procesando reto completado:`, error);

                try {
                    await enviarMensajePadre({
                        tipo: TIPOS_MENSAJE.SISTEMA.ERROR,
                        origen: getPadreId(),
                        destino: mensaje.origen,
                        datos: {
                            error: error.message,
                            mensaje: 'Error procesando reto completado',
                            retoId: mensaje.datos?.retoId
                        }
                    });
