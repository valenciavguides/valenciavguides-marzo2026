                    logger.error(`${logPrefix} Error enviando mensaje de error:`, errorMsg);
                }
            }
        });

        // Iniciar limpieza periódica de pendings (TTL, out-of-range) si no inicializada
        if (!window.__VV_PENDING_CLEANUP) {
            const pendingCfg = (window.Config && window.Config.PENDING) ? window.Config.PENDING : { TTL_MS: 10*60*1000, CLEANUP_INTERVAL_MS: 60*1000 };
            window.__VV_PENDING_CLEANUP = setInterval(() => {
                try {
                        const now = Date.now();
                        const est = getEstadoSafe();
                        if (!est || !est.pendingCompleciones) return;
                        for (const [clave, pending] of Object.entries(est.pendingCompleciones)) {
                            if (!pending) continue;
                            // TTL expirado (use per-pending ttlMs if defined)
                            const ttl = (typeof pending.ttlMs === 'number') ? pending.ttlMs : (pendingCfg && typeof pendingCfg.TTL_MS === 'number' ? pendingCfg.TTL_MS : (10 * 60 * 1000));
                            if ((now - (pending.timestamp || now)) >= ttl) {
                                cancelarPending(clave, 'ttl_expirado');
                                continue;
                            }
                            // Out-of-range handled by updatePendingDistances via GPS updates; also enforce if _outOfRangeAt stale
                            const grace = (typeof pending.outOfRangeGrace === 'number') ? pending.outOfRangeGrace : (pendingCfg && typeof pendingCfg.OUT_OF_RANGE_GRACE_MS === 'number' ? pendingCfg.OUT_OF_RANGE_GRACE_MS : (5 * 60 * 1000));
                            if (pending._outOfRangeAt && (now - pending._outOfRangeAt >= grace)) {
                                cancelarPending(clave, 'out_of_range_expirado');
                                continue;
                            }
                        }
                } catch (e) {
                    logger.warn('[PADRE][PENDING] Error en limpieza periódica de pendings:', e);
                }
            }, pendingCfg.CLEANUP_INTERVAL_MS || 60000);
        }

        // CONTROLADOR 11.5: RETO.MOSTRADO (Recibe de hijo4 cuando muestra un reto)
        window.registrarControladorSeguro(TIPOS_MENSAJE.RETO.MOSTRADO, async (mensaje) => {

        // CONTROLADOR 12: AUDIO.ESTADO_ACTUALIZADO (Recibe de hijo3)
        window.registrarControladorSeguro(TIPOS_MENSAJE.AUDIO.ESTADO_ACTUALIZADO, async (mensaje) => {

        window.registrarControladorSeguro(TIPOS_MENSAJE.AUDIO.FIN_REPRODUCCION, async (mensaje) => {

                logger.info(`${logPrefix} Audio finalizado desde ${mensaje.origen}`, {
                    audioId,
                    duracion
                });

                // Actualizar estado global
                if (estado.audioActual?.id === audioId) {
                    estado.audioActual.estado = 'finalizado';
                    estado.audioActual.timestamp = audioTimestamp || Date.now();
                }

                // LÓGICA FUSIONADA DE SCRIPT 1: Habilitar retosBtn solo en modo aventura
                const modoActual = estado.modo?.actual || MODOS.CASA;
                if (modoActual === MODOS.AVENTURA && estado.hijosInicializados && estado.hijosInicializados.has('hijo3')) {
                    logger.info(`${logPrefix} Audio finalizado en modo aventura, habilitando retosBtn en hijo3`);
                    try {
                        await enviarMensajePadre({
                            tipo: TIPOS_MENSAJE.CONTROL.HABILITAR,
                            origen: getPadreId(),
                            destino: 'hijo3',
                            datos: { control: 'retosBtn', timestamp: Date.now(), razon: 'audio_fin_reproduccion_aventura' }
                        });
                    } catch (errHabilitar) {
                        logger.error(`${logPrefix} Error habilitando retosBtn:`, errHabilitar);
                    }
                }

                // Registrar evento
                registrarEventoScript2('AUDIO_FINALIZADO', {
                    audioId,
                    duracion,
                    timestamp: audioTimestamp
                }, 'info');

                // Lógica de progresión: marcar audio finalizado en pending y verificar si hay reto disponible
                try {
                    // Map audioId -> elemento y marcar pending.audio
                    const elementoAudio = findElementoPorAudio(audioId);
                    if (elementoAudio) {
                        const clave = elementoAudio.padreid || `padre-${elementoAudio.parada_id || elementoAudio.tramo_id}`;

                // Luego continuar con la lógica anterior de habilitación/avanzado
                if (estado.elementoActual && estado.elementoActual.audio_id === audioId) {

                    const tieneRetos = retosDelElemento.length > 0;

                    if (tieneRetos && estado.modo.actual === MODOS.AVENTURA && estado.hijosInicializados && estado.hijosInicializados.has('hijo4')) {
                        // Hay reto(s) disponible(s): inicializar cola y habilitar botón
                        logger.info(`${logPrefix} Audio finalizado en modo aventura, habilitando botón de retos para ${retosDelElemento.length} reto(s): ${retosDelElemento.join(', ')}`);

                        logger.info(`${logPrefix} Audio finalizado, no hay reto disponible o no es modo aventura, intentando completar elemento`);

                            const claveA = elementoAudio?.padreid || (elementoAudio?.parada_id ? `padre-${elementoAudio.parada_id}` : null);
                            if (claveA) {
                                const p = ensurePending(claveA, elementoAudio?.tipo || 'parada');

        window.registrarControladorSeguro(TIPOS_MENSAJE.DATOS.RESPUESTA_RETO, async (mensaje) => {

        /**

        /**

                logger.debug(`${logPrefix} Idioma almacenado en estado global: ${idioma}`);

        /**
         * Controlador: SELECCION.AVENTURA_SELECCIONADA
         * Descripción: Recibe la aventura seleccionada por el usuario
         * Origen: seleccion (En-busca-del-tesoro.html)
         */
        window.registrarControladorSeguro(TIPOS_MENSAJE.SELECCION.AVENTURA_SELECCIONADA, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[SELECCION.AVENTURA]`;

            try {
                const { aventura, idioma, timestamp } = mensaje.datos || {};

                logger.info(`${logPrefix} Aventura seleccionada: ${aventura} (idioma: ${idioma}) desde ${mensaje.origen}`);

                // Almacenar en estado global
                if (!estado.seleccion) estado.seleccion = {};
                estado.seleccion.aventura = aventura;
                estado.seleccion.idioma = idioma || estado.seleccion.idioma;
                estado.seleccion.timestampAventura = timestamp;

                // Exponer globalmente
                window.aventuraSeleccionada = aventura;
                window.idiomaSeleccionado = idioma || window.idiomaSeleccionado;
                try {
                    localStorage.setItem('vv_aventura', aventura);
                    localStorage.setItem('vv_idioma', idioma || window.idiomaSeleccionado || 'es');
                } catch (_e) { /* ok */ }

                logger.debug(`${logPrefix} Aventura almacenada en estado global: ${aventura}`);

                // � FASE 2: CARGAR DATOS DIFERIDOS DE AVENTURA
                // Cargar coordenadas, audios y retos AHORA que el usuario seleccionó
                logger.info(`${logPrefix} 🚀 Iniciando Fase 2: Cargando datos de aventura...`);
                try {
                    if (typeof window.__cargarDatosAventuraDiferidos === 'function') {
                        const datosCargados = await window.__cargarDatosAventuraDiferidos();
                        if (datosCargados) {
                            logger.success(`${logPrefix} ✅ Datos de aventura cargados correctamente (Fase 2)`);
                        } else {
                            logger.error(`${logPrefix} ❌ Error cargando datos de aventura`);
                        }
                    } else {
                        logger.warn(`${logPrefix} ⚠️ Función de carga diferida no disponible`);
                    }
                } catch (cargaError) {
                    logger.error(`${logPrefix} ❌ Error en carga diferida:`, cargaError);
                }

                // �🔥 DISTRIBUIR DATOS A LOS HIJOS
                // Enviar coordenadas, audios y retos a los hijos correspondientes
                try {
                    logger.info(`${logPrefix} Distribuyendo datos de aventura ${aventura} (${idioma}) a los hijos...`);

                    // Esperar a que enviarMensaje esté disponible
                    const esperarEnviarMensaje = () => new Promise((resolve) => {
                        const check = () => {
                            if (typeof window.enviarMensaje === 'function') {
                                resolve();
                            } else {
                                setTimeout(check, 50);
                            }
                        };
                        check();
                    });

                    await esperarEnviarMensaje();
                    logger.debug(`${logPrefix} enviarMensaje disponible, procediendo con distribución`);

                    const resultados = await distribuirDatosAventura(aventura, idioma);

                    if (resultados.pospuesto) {
                        logger.warn(`${logPrefix} ⚠️ ${resultados.mensaje}, marcando como pendiente`);
                        // Marcar que se necesita distribución pendiente
                        window.__pendingDistribucion = { aventura, idioma };
                    } else {
                        logger.success(`${logPrefix} ✅ Distribución completada:`, resultados);
                    }
                } catch (distribucionError) {
                    if (distribucionError.message.includes('Datos centralizados no disponibles')) {
                        logger.warn(`${logPrefix} ⚠️ Datos aún no disponibles, se distribuirán cuando se complete la carga inicial`);
                        // Los datos se distribuirán automáticamente cuando se complete la carga inicial
                        // mediante el mecanismo de sincronización existente
                    } else {
                        logger.error(`${logPrefix} ❌ Error distribuyendo datos:`, distribucionError);
                    }
                }

                // 🔥 CARGAR RESTO DE IFRAMES después de selección de aventura
                logger.info(`${logPrefix} 🚀 Cargando resto de iframes después de selección de aventura...`);
                try {
                    await cargarRestoDeiframes();
                    logger.success(`${logPrefix} ✅ Resto de iframes cargados correctamente`);

                    logger.error(`${logPrefix} ❌ Error cargando resto de iframes:`, error);

                }

                // 🔥 CARGAR hijo5 después de selección de aventura
                logger.info(`${logPrefix} 🚀 Cargando hijo5 después de selección de aventura...`);
                await cargarHijoCasa();

            } catch (error) {

        // ============================================================
        // FUNCIÓN: DISTRIBUIR DATOS DE AVENTURA A LOS HIJOS
        // Envía coordenadas, audios y retos según aventura e idioma
        // ============================================================

        /**
         * Mapea código de idioma corto a nombre completo (para audios)
         * @param {string} idiomaCorto - 'es', 'en', 'fr', etc.
         * @returns {string} nombre completo del idioma
         */


        /**
         * Distribuye los datos centralizados a los hijos según aventura e idioma
         * @param {string} aventura - Nombre de la aventura (ej: 'Aventura1')
         * @param {string} idioma - Código de idioma (ej: 'es')
         * @returns {Promise<{coordenadas: boolean, audios: boolean, retos: boolean}>}
         */
        async function distribuirDatosAventura(aventura, idioma) {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[DISTRIBUIR_DATOS]`;
            const resultados = { coordenadas: false, audios: false, retos: false, textos: false };

            // Verificar que el sistema esté completamente inicializado (iframes cargados)
            if (!window.sistemaInicializado) {
                logger.warn(`${logPrefix} Sistema no inicializado aún. Esperando carga de iframes...`);
                return {
                    coordenadas: false,
                    audios: false,
                    retos: false,
                    textos: false,
                    pospuesto: true,
                    mensaje: 'Sistema no inicializado - iframes aún cargándose'
                };
            }

            // Verificar que los datos centralizados estén disponibles
            if (!window.__vv_DATOS_AVENTURAS || !window.__vv_AUDIOS_AVENTURAS || !window.__vv_RETOS_AVENTURAS) {
                logger.warn(`${logPrefix} Datos centralizados no disponibles aún. Esperando carga...`);
                throw new Error('Datos centralizados no disponibles - los módulos aún se están cargando');
            }

            // Verificar que enviarMensaje_S1 esté disponible
            if (typeof window.enviarMensaje !== 'function') {
                logger.warn(`${logPrefix} window.enviarMensaje no disponible aún. Esperando inicialización de mensajería...`);
                // En lugar de lanzar error, devolver resultado indicando que se pospuso
                return {
                    coordenadas: false,
                    audios: false,
                    retos: false,
                    textos: false,
                    pospuesto: true,
                    mensaje: 'Distribución pospuesta - mensajería no disponible'
                };
            }

            // Obtener datos centralizados
            const datosAventuras = window.__vv_DATOS_AVENTURAS;
            const audiosAventuras = window.__vv_AUDIOS_AVENTURAS;
            const retosAventuras = window.__vv_RETOS_AVENTURAS;
            const textosAventuras = window.__vv_TEXTOS_AVENTURAS;

            // 1. COORDENADAS → hijo2
            try {
                if (datosAventuras && datosAventuras[aventura]) {
                    const datosCoord = datosAventuras[aventura];
                    // El formato es datosAventuras.Aventura1['coordenadas-hijo2.html'].coordenadas
                    const coordenadas = datosCoord['coordenadas-hijo2.html']?.coordenadas || [];

                    if (coordenadas.length > 0) {
                        if (typeof window.enviarMensaje === 'function') {
                            await window.enviarMensaje({
                                tipo: TIPOS_MENSAJE.DATOS.CARGAR_COORDENADAS,
                                origen: getPadreId(),
                                destino: 'hijo2',
                                datos: {
                                    aventura: aventura,
                                    idioma: idioma,
                                    coordenadas: coordenadas,
                                    total: coordenadas.length,
                                    timestamp: Date.now()
                                }
                            });
                            logger.info(`${logPrefix} ✅ Coordenadas enviadas a hijo2: ${coordenadas.length} paradas/tramos`);
                            resultados.coordenadas = true;
                        } else {
                            logger.warn(`${logPrefix} window.enviarMensaje no disponible para cargar coordenadas`);
                        }
                    } else {
                        logger.warn(`${logPrefix} ⚠️ No hay coordenadas para ${aventura}`);
                    }
                } else {
                    logger.warn(`${logPrefix} ⚠️ Datos de aventura no encontrados: ${aventura}`);
                }
            } catch (coordError) {
                logger.error(`${logPrefix} Error enviando coordenadas a hijo2:`, coordError);
            }

            // 2. AUDIOS → hijo3
            try {
                if (audiosAventuras && audiosAventuras[aventura]) {
                    const audios = audiosAventuras[aventura][idioma] || [];

                    if (audios.length > 0) {
                        if (typeof window.enviarMensaje === 'function') {
                            await window.enviarMensaje({
                                tipo: TIPOS_MENSAJE.DATOS.CARGAR_AUDIOS,
                                origen: getPadreId(),
                                destino: 'hijo3',
                                datos: {
                                    aventura: aventura,
                                    idioma: idioma,
                                    audios: audios,
                                    total: audios.length,
                                    timestamp: Date.now()
                                }
                            });
                            logger.info(`${logPrefix} ✅ Audios enviados a hijo3: ${audios.length} pistas`);
                            resultados.audios = true;
                        } else {
                            logger.warn(`${logPrefix} window.enviarMensaje no disponible para cargar audios`);
                        }
                    } else {
                        logger.warn(`${logPrefix} ⚠️ No hay audios para ${aventura}/${idioma}`);
                    }
                } else {
                    logger.warn(`${logPrefix} ⚠️ Audios de aventura no encontrados: ${aventura}`);
                }
            } catch (audioError) {
                logger.error(`${logPrefix} Error enviando audios a hijo3:`, audioError);
            }

            // 3. RETOS → hijo4
            try {
                if (retosAventuras && retosAventuras[aventura]) {
                    const retos = retosAventuras[aventura][idioma] || [];

                    if (retos.length > 0) {
                        if (typeof window.enviarMensaje === 'function') {
                            await window.enviarMensaje({
                                tipo: TIPOS_MENSAJE.DATOS.CARGAR_RETOS,
                                origen: getPadreId(),
                                destino: 'hijo4',
                                datos: {
                                    aventura: aventura,
                                    idioma: idioma,
                                    retos: retos,
                                    total: retos.length,
                                    timestamp: Date.now()
                                }
                            });
                            logger.info(`${logPrefix} ✅ Retos enviados a hijo4: ${retos.length} retos`);
                            resultados.retos = true;
                        } else {
                            logger.warn(`${logPrefix} window.enviarMensaje no disponible para cargar retos`);
                        }
                    } else {
                        logger.warn(`${logPrefix} ⚠️ No hay retos para ${aventura}/${idioma}`);
                    }
                } else {
                    logger.warn(`${logPrefix} ⚠️ Retos de aventura no encontrados: ${aventura}`);
                }
            } catch (retoError) {
                logger.error(`${logPrefix} Error enviando retos a hijo4:`, retoError);
            }

            // 4. TEXTOS → hijo2
            try {
                if (textosAventuras && textosAventuras[aventura]) {
                    const textos = textosAventuras[aventura][idioma] || [];

                    if (textos.length > 0) {
                        if (typeof window.enviarMensaje === 'function') {
                            await window.enviarMensaje({
                                tipo: TIPOS_MENSAJE.DATOS.CARGAR_TEXTOS,
                                origen: getPadreId(),
                                destino: 'hijo2',
                                datos: {
                                    aventura: aventura,
                                    idioma: idioma,
                                    textos: textos,
                                    total: textos.length,
                                    timestamp: Date.now()
                                }
                            });
                            logger.info(`${logPrefix} ✅ Textos enviados a hijo2: ${textos.length} textos`);
                            resultados.textos = true;
                        } else {
                            logger.warn(`${logPrefix} window.enviarMensaje no disponible para cargar textos`);
                        }
                    } else {
                        logger.warn(`${logPrefix} ⚠️ No hay textos para ${aventura}/${idioma}`);
                    }
                } else {
                    logger.warn(`${logPrefix} ⚠️ Textos de aventura no encontrados: ${aventura}`);
                }
            } catch (textoError) {
                logger.error(`${logPrefix} Error enviando textos a hijo2:`, textoError);
            }

            // Exponer paradas para funciones-mapa.js (window.AVENTURA_PARADAS)
            try {
                const elementosParadas = window.DATOS_PADRE?.[aventura]?.[idioma]?.elementosIDpadre;
                if (Array.isArray(elementosParadas) && elementosParadas.length > 0) {
                    window.AVENTURA_PARADAS = elementosParadas;
                    logger.info(`${logPrefix} ✅ window.AVENTURA_PARADAS asignado: ${elementosParadas.length} elementos`);
                } else {
                    logger.warn(`${logPrefix} ⚠️ elementosIDpadre no disponible para ${aventura}/${idioma}`);
                }
            } catch (e) {
                logger.error(`${logPrefix} Error asignando AVENTURA_PARADAS:`, e);
            }

            logger.info(`${logPrefix} Distribución completada: coordenadas=${resultados.coordenadas}, audios=${resultados.audios}, retos=${resultados.retos}, textos=${resultados.textos}`);
            return resultados;
        }

        // Exponer función para uso desde otros scripts
        window.distribuirDatosAventura = distribuirDatosAventura;

        /**
         * Controlador: SELECCION.PREPARAR_HIJOS
         * Descripción: Hijo1 (selección) notifica al padre durante el puzzle (P8)
         * para que almacene idioma/aventura tempranamente.
         * Origen: seleccion (En-busca-del-tesoro.html)
         */
        window.registrarControladorSeguro(TIPOS_MENSAJE.SELECCION.PREPARAR_HIJOS, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[PREPARAR_HIJOS]`;

            try {
                const { idioma, aventura, timestamp } = mensaje.datos || {};
                logger.info(`${logPrefix} Pre-selección recibida: ${aventura} (${idioma})`);

                if (!estado.seleccion) estado.seleccion = {};
                if (aventura) estado.seleccion.aventura = aventura;
                if (idioma) estado.seleccion.idioma = idioma;
                estado.seleccion.preSeleccionTimestamp = timestamp;
            } catch (error) {
                logger.error(`${logPrefix} Error procesando pre-selección:`, error);
            }
        });

        /**
         * Controlador: SELECCION.INICIAR_AVENTURA
         * Descripción: El usuario está listo para iniciar la aventura
         * Origen: seleccion (En-busca-del-tesoro.html)
         */
        window.registrarControladorSeguro(TIPOS_MENSAJE.SELECCION.INICIAR_AVENTURA, async (mensaje) => {
            const logPrefix = `${(CONFIG_PADRE && CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'}[SELECCION.INICIAR]`;

            console.log('🎯 [PADRE] INICIAR_AVENTURA RECIBIDO:', mensaje);

            try {
                const { aventura, idioma, terminosAceptados, timestamp } = mensaje.datos || {};

                logger.info(`${logPrefix} 🚀 Iniciando aventura: ${aventura} (idioma: ${idioma})`);

                // Validar que tengamos todos los datos necesarios
                if (!aventura) {
                    logger.error(`${logPrefix} No se especificó aventura`);
                    return;
                }

                // Almacenar configuración final
                if (!estado.seleccion) estado.seleccion = {};
                estado.seleccion.aventura = aventura;
                estado.seleccion.idioma = idioma || 'es';
                estado.seleccion.terminosAceptados = terminosAceptados;
                estado.seleccion.iniciada = true;

                // =====================================================
                // CARGAR IFRAMES HIJOS AHORA (diferido hasta selección)
                // =====================================================
                logger.info(`${logPrefix} 📦 Cargando iframes hijos...`);

                const iframesHijos = [
                    { id: 'hijo1-opciones', src: 'extrainfo-hijo1.html' },
                    { id: 'hijo2', src: 'coordenadas-hijo2.html' },
                    { id: 'hijo3', src: 'audio-hijo3.html' },
                    { id: 'hijo5', src: 'boton-casa-hijo5.html' }
                ];

                // Cargar iframes en paralelo para mayor velocidad
                const promesasCarga = iframesHijos.map(async (iframeConfig) => {
                    const iframeEl = document.getElementById(iframeConfig.id);
                    if (!iframeEl) {
                        logger.warn(`${logPrefix} Iframe ${iframeConfig.id} no encontrado en DOM`);
                        return false;
                    }

                    // Registrar en mensajería si corresponde
                    if (typeof registrarIframe_S1 === 'function') {
                        try {
                            registrarIframe_S1(iframeConfig.id, iframeEl, { capacidades: [] });
                        } catch (e) { /* ignore */ }
                    }

                    // Cargar el iframe
                    return new Promise((resolve) => {
                        const timeout = setTimeout(() => {
                            logger.warn(`${logPrefix} ⚠️ Timeout cargando ${iframeConfig.id}`);
                            resolve(false);
                        }, 8000);

                        const onLoad = () => {
                            clearTimeout(timeout);
                            iframeEl.removeEventListener('load', onLoad);
                            iframeEl.removeEventListener('error', onError);
                            logger.info(`${logPrefix} ✅ ${iframeConfig.id} cargado`);
                            resolve(true);
                        };

                        const onError = () => {
                            clearTimeout(timeout);
                            iframeEl.removeEventListener('load', onLoad);
                            iframeEl.removeEventListener('error', onError);
                            logger.error(`${logPrefix} ❌ Error cargando ${iframeConfig.id}`);
                            resolve(false);
                        };

                        iframeEl.addEventListener('load', onLoad, { once: true });
                        iframeEl.addEventListener('error', onError, { once: true });
                        iframeEl.src = iframeConfig.src;
                    });
                });

                // Esperar a que todos los iframes carguen (o timeout)
                await Promise.all(promesasCarga);
                logger.success(`${logPrefix} ✅ Iframes hijos cargados`);
                estado.seleccion.timestampInicio = timestamp;

                // Persistir que la aventura ha sido iniciada (para reanudación tras recarga)
                try {
                    localStorage.setItem('vv_aventura_iniciada', JSON.stringify({
                        aventura: aventura,
                        idioma: idioma || 'es',
                        timestamp: Date.now()
                    }));
                } catch (_e) { /* ok */ }

                // =====================================================
                // DISTRIBUIR DATOS DE AVENTURA A LOS HIJOS
                // =====================================================
                logger.info(`${logPrefix} Distribuyendo datos de aventura ${aventura} (${idioma}) a los hijos...`);
                try {
                    const resultadosDistribucion = await distribuirDatosAventura(aventura, idioma);
                    if (resultadosDistribucion.pospuesto) {
                        logger.warn(`${logPrefix} ⚠️ Distribución pospuesta: ${resultadosDistribucion.mensaje}`);
                    } else {
                        logger.success(`${logPrefix} ✅ Distribución completada:`, resultadosDistribucion);

    <!-- Reconectar iframes tras cambio de pestaña -->
    <script>
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) return;
        console.info('[PADRE] Pestaña visible de nuevo, enviando heartbeat a hijos');
        try {
            const iframes = document.querySelectorAll('iframe[name]');
            iframes.forEach(iframe => {

    <!-- Cleanup on pagehide: removes iframes and global references to reduce memory -->
    <script>
    // Implementar pagehide para limpiar iframes y referencias globales
    window.addEventListener('pagehide', () => {
        console.info(`[codigo-padre] Limpiando recursos en pagehide`);
        const iframes = document.querySelectorAll('iframe');
        iframes.forEach(iframe => {
            iframe.src = 'about:blank';
            iframe.remove();
        });
        // DATOS_PADRE is a module import, no need to delete
        if (window.modoActual) {
            delete window.modoActual;
        }
        if (window.intervaloMonitoreo) {
            clearInterval(window.intervaloMonitoreo);
        }
        // Detener limpieza periódica de correlaciones
        if (window.__vv_correlacion_cleanup) {
            try { clearInterval(window.__vv_correlacion_cleanup); } catch (e) {}
            try { delete window.__vv_correlacion_cleanup; } catch (e) {}
        }

        // Rechazar correlaciones pendientes y limpiar mapa
        try {
            if (window.estadoPadre && window.estadoPadre.correlacionesMensajes) {
                for (const [id, meta] of window.estadoPadre.correlacionesMensajes) {
                    try { meta.reject && meta.reject(new Error('Page hidden - correlation aborted')); } catch (e) {}
                }
                window.estadoPadre.correlacionesMensajes.clear();
            }
        } catch (e) {
            (window.logger || console).warn('[PADRE] Error limpiando correlaciones en pagehide:', e && e.message);
        }

        // Intentar detener heartbeat si existe
        try {
            if (window.__HEARTBEAT_INICIADO) {
                if (typeof window.detenerHeartbeat === 'function') {
                    try { window.detenerHeartbeat(); } catch (e) {}
                }
                window.__HEARTBEAT_INICIADO = false;
            }
        } catch (e) {
            (window.logger || console).warn('[PADRE] Error deteniendo heartbeat en pagehide:', e && e.message);
        }

        // Limpiar registro de controladores locales
        if (window.__CONTROLADOR_REGISTRADOS && typeof window.__CONTROLADOR_REGISTRADOS.clear === 'function') {
            try { window.__CONTROLADOR_REGISTRADOS.clear(); } catch (e) {}
        }
        if (window.controladores) {
            window.controladores.clear();
        }
        console.log('Recursos limpiados completamente');
    });
    </script>

    <script>
        // Intercept addEventListener to remap 'unload'/'beforeunload' to 'pagehide' for modern policies
        const originalAddEventListener = EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener = function (type, listener, options) {
            if (type === 'unload' || type === 'beforeunload') {
                // Avoid permission policy violation in strict environments (e.g. modern browsers/iframes)
                try {
                    console.info(`[PADRE] Remapeando listener '${type}' a 'pagehide' para compatibilidad`);
                } catch (e) {}
                // Also register the original to support old behavior in permissive contexts when possible
                try {
                    originalAddEventListener.call(this, 'pagehide', listener, options);
                } catch (e) {
                    // fallback: try registering 'visibilitychange' as a last resort
                    try { originalAddEventListener.call(this, 'visibilitychange', listener, options); } catch (e2) {}
                }
                // Do not register original 'unload' listener to avoid permissions policy errors
                return;
            }
            return originalAddEventListener.call(this, type, listener, options);
        };
    </script>

    <script type="module">
        // ============================================================
        // SCRIPT 4: Migración de controladores y diagnóstico GPS
        // NOTA: inicializarMensajeria ya fue llamada en Script 1
        // ============================================================

        // mensajeria.js ya importado en Script 1 - usar window.mensajeria
        const { enviarMensaje: enviarMensaje_S4 } = window.mensajeria;
        const { ajustarTimeoutPorConexion } = await import('./js/utils.js');
        const { TIPOS_MENSAJE: TIPOS_MENSAJE_S4, MODOS: MODOS_S4 } = await import('./js/constants.js');
        const { CONFIG: CONFIG_PADRE } = await import('./js/config.js');

        // Migrar controladores registrados tempranamente en módulos al sistema de mensajería
        try {
            const { registrarControladoresMonitoreo } = await import('./js/monitoreo.js');
            const { registrarControladoresMapa } = await import('./js/funciones-mapa.js');
            const { registrarControladoresApp } = await import('./js/app.js');
            const { registrarControladoresUtils } = await import('./js/utils.js');

            // Ejecutar migraciones en orden (monitoreo primero para logs)
            try { await registrarControladoresMonitoreo(); } catch (e) { /* Ignorar errores en migración de monitoreo */ }
            try { await registrarControladoresMapa(); } catch (e) { /* Ignorar errores en migración de mapa */ }
            try { await registrarControladoresApp(); } catch (e) { /* Ignorar errores en migración de app */ }
            try { await registrarControladoresUtils(); } catch (e) { /* Ignorar errores en migración de utils */ }
        } catch (e) {
            console.warn('No se pudieron migrar algunos controladores:', e.message);
        }

        // Iniciar o pausar heartbeat según el modo inicial (si estamos en el padre)
        if (window.parent === window && !window.__HEARTBEAT_INICIADO) {
            const modoInicial = window.estadoPadre?.modo?.actual || MODOS_S4.CASA;
            try {
                if (modoInicial === MODOS_S4.AVENTURA) {
                    // Start heartbeat via messaging (mensajeria.js handler will call iniciarHeartbeat internally)
                    try {
                        await enviarMensaje_S4({
                            tipo: TIPOS_MENSAJE_S4.SISTEMA.HEARTBEAT_START,
                            origen: CONFIG_PADRE.ID,
                            destino: CONFIG_PADRE.ID,
                            datos: { intervalo: (typeof ajustarTimeoutPorConexion === 'function') ? ajustarTimeoutPorConexion(10000) : 10000 }
                        });
                    } catch (e) {
                        try { // Fallback to direct function call in case messaging is not yet running
                            (typeof window.iniciarHeartbeat === 'function') && window.iniciarHeartbeat(ajustarTimeoutPorConexion(10000));
                        } catch (err) { /* ignore */ }
                    }
                    window.__HEARTBEAT_INICIADO = true;
                    console.info('[PADRE] Heartbeat iniciado (Script 4) - modo AVENTURA');
                } else {
                    // Ensure heartbeat is paused in CASA
                    try {
                        await enviarMensaje_S4({
                            tipo: TIPOS_MENSAJE_S4.SISTEMA.HEARTBEAT_PAUSE,
                            origen: CONFIG_PADRE.ID,
                            destino: CONFIG_PADRE.ID,
                            datos: { timestamp: Date.now(), razon: 'modo_inicial_casa' }
                        });
                    } catch (e) {
                        try { (typeof window.pausarHeartbeat === 'function') && window.pausarHeartbeat(); } catch (err) { /* ignore */ }
                    }
                    console.info('[PADRE] Heartbeat no iniciado por modo CASA (Script 4)');
                }
            } catch (e) {
                console.warn('[PADRE] Error controlando heartbeat en script 4:', e);
            }

            // Propagar control de heartbeat a hijos críticos según el modo inicial
            try {
                const hijosCriticos = ['hijo2', 'hijo3', 'hijo4', 'hijo5'];
                for (const h of hijosCriticos) {
                    try {
                        await enviarMensaje_S4({
                            tipo: modoInicial === MODOS_S4.AVENTURA ? TIPOS_MENSAJE_S4.SISTEMA.HEARTBEAT_START : TIPOS_MENSAJE_S4.SISTEMA.HEARTBEAT_PAUSE,
                            origen: CONFIG_PADRE.ID,
                            destino: h,
                            datos: { timestamp: Date.now(), initial: true }
                        });
                    } catch (e) {
                        // If a child isn't ready yet, it's fine; it'll get the mode broadcast later
                        console.debug('[PADRE] broadcast HEARTBEAT to child failed (maybe not ready):', h, e && e.message);
                    }
                }
            } catch (e) {
                console.warn('[PADRE] Error propagando heartbeat control inicial:', e);
            }
        }

        // Función de diagnóstico GPS para debugging desde consola
        window.diagnosticarGPS = async function() {
            console.log('🔍 Iniciando diagnóstico GPS...');

            try {
                // Importar función de diagnóstico
                const { diagnosticarGPS } = await import('./js/funciones-mapa.js');
                const resultado = await diagnosticarGPS();

                console.log('📊 Resultado del diagnóstico GPS:', resultado);

                // Mostrar resumen
                console.log('📋 Resumen:');
                console.log(`   - Protocolo: ${resultado.navegador.protocolo} (${resultado.navegador.esHttps ? '✅ HTTPS' : '❌ HTTP - GPS limitado'})`);
                console.log(`   - Geolocation soportada: ${resultado.navegador.geolocationSoportada ? '✅' : '❌'}`);
                console.log(`   - GPS activo: ${resultado.gpsEstado.activo ? '✅' : '❌'}`);
                console.log(`   - Posición disponible: ${resultado.gpsEstado.posicionUsuario ? '✅' : '❌'}`);

                if (resultado.permisosActuales) {
                    console.log(`   - Permisos: ${resultado.permisosActuales.estado}`);
                }

                // Helper: Consultar estado del heartbeat via mensajería
                window.consultarHeartbeat = async function() {
                    try {
                        const respuesta = await enviarMensaje_S4({
                            tipo: TIPOS_MENSAJE_S4.SISTEMA.HEARTBEAT_ESTADO,
                            origen: CONFIG_PADRE.ID,
                            destino: CONFIG_PADRE.ID,
                            datos: {}
                        });
                        console.info('[PADRE] Estado heartbeat:', respuesta);
                        return respuesta;
                    } catch (e) {
                        console.error('[PADRE] Error consultando estado heartbeat:', e);
                        throw e;
                    }
                };

                // Test helper: Pausar y reanudar heartbeat y comprobar estado
                window._testHeartbeatPauseResume = async function() {
                    try {
                        console.info('[PADRE][TEST] Iniciando prueba pause/restart heartbeat');
                        // Pausar mediante cambio de modo
                        await enviarMensaje_S4({ tipo: TIPOS_MENSAJE_S4.SISTEMA.CAMBIO_MODO, origen: CONFIG_PADRE.ID, destino: CONFIG_PADRE.ID, datos: { modo: MODOS_S4.CASA } });
                        await new Promise(resolve => setTimeout(resolve, 150));
                        let estado = await window.consultarHeartbeat();
                        console.assert(estado?.estado?.userPaused === true, 'expected userPaused true after CASA');
                        console.assert(estado?.estado?.activo === false, 'expected activo false after CASA');

                        // Intentar iniciar: debe ignorarse por userPaused
                        await enviarMensaje_S4({ tipo: TIPOS_MENSAJE_S4.SISTEMA.HEARTBEAT_START, origen: CONFIG_PADRE.ID, destino: CONFIG_PADRE.ID, datos: { intervalo: 3000 } });
                        await new Promise(resolve => setTimeout(resolve, 150));
                        estado = await window.consultarHeartbeat();
                        console.assert(estado?.estado?.userPaused === true && estado?.estado?.activo === false, 'expected no change when starting while userPaused');

                        // Reanudar mediante cambio de modo a aventura
                        await enviarMensaje_S4({ tipo: TIPOS_MENSAJE_S4.SISTEMA.CAMBIO_MODO, origen: CONFIG_PADRE.ID, destino: CONFIG_PADRE.ID, datos: { modo: MODOS_S4.AVENTURA } });
                        await new Promise(resolve => setTimeout(resolve, 200));
                        estado = await window.consultarHeartbeat();
                        console.assert(estado?.estado?.userPaused === false, 'expected userPaused false after AVENTURA');
                        console.assert(estado?.estado?.activo === true, 'expected activo true after AVENTURA');
                        console.info('[PADRE][TEST] Prueba heartbeat pause/restart completada');
                    } catch (e) {
                        console.error('[PADRE][TEST] Error durante prueba heartbeat:', e);
                    }
                };

                if (resultado.testUbicacion) {
                    if (resultado.testUbicacion.exito) {
                        console.log(`   - Test ubicación: ✅ (${resultado.testUbicacion.lat.toFixed(6)}, ${resultado.testUbicacion.lng.toFixed(6)})`);
                    } else {
                        console.log(`   - Test ubicación: ❌ ${resultado.testUbicacion.error}`);
                    }
                }

                return resultado;
            } catch (error) {
                console.error('❌ Error en diagnóstico GPS:', error);
                return { error: error.message };
            }
        };

        console.log('🔧 Función de diagnóstico GPS disponible: window.diagnosticarGPS()');

        // ℹ️ NOTA: marcarScript2Listo() se llama inmediatamente después de registrar
        // controladores (línea ~8345) para evitar el timeout de 15s en mensajeria.js
    </script>
