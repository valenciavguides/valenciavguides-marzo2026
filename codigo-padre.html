                const hijoId = mensaje.origen;
                const { version = '1.0.0', capacidades = [] } = mensaje.datos || {};

                logger.info(`${logPrefix} Hijo preparado: ${hijoId}`, {
                    version,
                    capacidades: capacidades.length
                });

                // Marcar hijo como preparado
                if (!window.estadoPadre) {
                    logger.error(`${logPrefix} estadoPadre no inicializado`);
                    return;
                }
                window.estadoPadre.hijosPreparados = window.estadoPadre.hijosPreparados || new Set();
                window.estadoPadre.hijosPreparados.add(hijoId);

                const estadoHijo = window.estadoPadre.estadoHijos.get(hijoId) || {};
                window.estadoPadre.estadoHijos.set(hijoId, {
                    ...estadoHijo,
                    preparado: true,
                    ultimoPing: timestamp,
                    version,
                    capacidades
                });

                logger.success(`${logPrefix} ✅ ${hijoId} marcado como preparado`);

                // Enviar ACK confirmando que padre recibió la notificación HIJO_PREPARADO
                // NOTA: enviarMensaje_S1 podría no estar disponible durante la inicialización temprana,
                // por lo que usamos verificación defensiva. El ACK no es crítico para la funcionalidad.
                try {
                    if (typeof enviarMensaje_S1 === 'function') {
                        await enviarMensaje_S1({
                            tipo: TIPOS_MENSAJE_S1.SISTEMA.ACK,
                            origen: getPadreId(),
                            destino: hijoId,
                            datos: {
                                tipoMensajeOriginal: 'SISTEMA.HIJO_PREPARADO',
                                timestamp: Date.now()
                            }
                        });
                        logger.info(`${logPrefix} ACK enviado a ${hijoId}`);
                    } else {
                        logger.debug(`${logPrefix} enviarMensaje_S1 no disponible aún para ACK a ${hijoId}`);
                    }
                } catch (ackError) {
                    logger.warn(`${logPrefix} Error enviando ACK a ${hijoId}:`, {
                        error: ackError?.message || ackError,
                        stack: ackError?.stack,
                        hijoId,
                        timestamp: Date.now()
                    });
                }

                // NOTA: solicitarManejadoresConRetry eliminado (obsoleto)
                // El sistema actual usa state-manager centralizado sin necesidad de migración manual

                // Enviar PADRE_DATOS para completar el handshake (sigue siendo necesario)
                try {
                    if (typeof enviarMensaje_S1 === 'function') {
                        await enviarMensaje_S1({
                            destino: hijoId,
                            tipo: TIPOS_MENSAJE_S1.SISTEMA.PADRE_DATOS,
                            origen: getPadreId(),
                            datos: {
                                modo: window.estadoPadre?.modoActual || 'casa',
                                timestamp: Date.now()
                            }
                        });
                        logger.info(`${logPrefix} PADRE_DATOS enviado a ${hijoId}`);
                    }
                } catch (error) {
                    logger.error(`${logPrefix} Error enviando PADRE_DATOS a ${hijoId}:`, error);
                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando HIJO_PREPARADO:`, error);
            }
        });

        // ============================================================
        // CONTROLADOR CRÍTICO: SISTEMA.HIJO_LISTO
        // ============================================================
        // IMPORTANTE: Se registra AQUÍ (Script 1) ANTES de cargar iframes
        // para garantizar que esté activo cuando los hijos envíen sus mensajes
        registrarControladorSeguro(TIPOS_MENSAJE_S1.SISTEMA.HIJO_LISTO, async (mensaje) => {
            const logPrefix = `${CONFIG_PADRE.LOG_PREFIX}[HIJO_LISTO]`;
            const timestamp = Date.now();

            console.log(`🔥 [PADRE] HIJO_LISTO RECIBIDO de ${mensaje?.origen}:`, mensaje);
            logger.info(`Padre recibió HIJO_LISTO de ${mensaje?.origen}`);

            try {
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Mensaje sin origen`);
                    return;
                }

                const hijoId = mensaje.origen;

                // Inmediatamente actualizar el estado para resolver la promesa de carga
                estado.hijosInicializados.add(hijoId);

                const { version = '1.0.0', capacidades = [], tiempoInicializacion = 0 } = mensaje.datos || {};

                logger.info(`${logPrefix} Hijo listo: ${hijoId}`, {
                    version,
                    capacidades: capacidades.length,
                    tiempoInicializacion
                });

                const estadoHijo = estado.estadoHijos.get(hijoId) || {};
                estado.estadoHijos.set(hijoId, {
                    ...estadoHijo,
                    activo: true,
                    listo: true,
                    ultimoPing: timestamp,
                    fallosConsecutivos: 0,
                    version,
                    capacidades,
                    tiempoInicializacion
                });

                logger.info(`${logPrefix} ✅ ${hijoId} listo y estado actualizado.`);

                // Confirmar al hijo que está listo
                try {
                    if (typeof enviarMensaje_S1 === 'function') {
                        await enviarMensaje_S1({
                            destino: hijoId,
                            tipo: TIPOS_MENSAJE_S1.SISTEMA.PADRE_CONFIRMA_HIJO_LISTO,
                            origen: getPadreId(),
                            datos: {
                                timestamp: Date.now(),
                                mensaje: 'Hijo confirmado como listo'
                            }
                        });
                        logger.info(`${logPrefix} PADRE_CONFIRMA_HIJO_LISTO enviado a ${hijoId}`);
                    }
                } catch (error) {
                    logger.error(`${logPrefix} Error enviando PADRE_CONFIRMA_HIJO_LISTO a ${hijoId}:`, error);
                }

                // Si es hijo2, enviar datos de paradas para inicializar funciones-mapa
                if (hijoId === 'hijo2') {
                    try {
                        if (window.aventuraSeleccionada && window.idiomaSeleccionado && DATOS_PADRE[window.aventuraSeleccionada] && DATOS_PADRE[window.aventuraSeleccionada][window.idiomaSeleccionado]) {
                            const paradasNormalizadas = normalizarParadas_S1(DATOS_PADRE[window.aventuraSeleccionada][window.idiomaSeleccionado].elementosIDpadre || []);
                            if (typeof enviarMensaje_S1 === 'function') {
                                await enviarMensaje_S1({
                                    destino: 'hijo2',
                                    tipo: TIPOS_MENSAJE_S1.NAVEGACION.RESPUESTA_DATOS_PARADAS,
                                    origen: getPadreId(),
                                    datos: {
                                        paradas: paradasNormalizadas,
                                        timestamp: Date.now()
                                    }
                                });
                                logger.info(`${logPrefix} Datos de paradas enviados a hijo2 para inicialización (normalizados)`);
                            }
                        } else {
                            logger.debug(`${logPrefix} Aventura no seleccionada aún, omitiendo envío de datos de paradas a hijo2`);
                        }
                    } catch (error) {
                        logger.error(`${logPrefix} Error enviando datos de paradas a hijo2:`, error);
                    }
                }

                const hijosCriticos = ['hijo2', 'hijo3', 'hijo4', 'hijo5'];
                const todosListos = hijosCriticos.every(id => estado.hijosInicializados && estado.hijosInicializados.has(id));

                if (todosListos && !estado.todosHijosListos) {
                    estado.todosHijosListos = true;
                    logger.success(`${logPrefix} ✅ ¡Todos los hijos críticos están listos!`);

                    registrarEvento('TODOS_HIJOS_LISTOS', {
                        timestamp,
                        hijosInicializados: Array.from(estado.hijosInicializados),
                        tiempoTotal: Date.now() - (estado.tiempoInicio || timestamp)
                    });

                    // Sincronización inicial de modo
                    try {
                        const modoActual = estado.modo?.actual || MODOS.CASA;
                        logger.info(`${logPrefix} Enviando sincronización inicial de modo: ${modoActual}`);

                        for (const criticoId of hijosCriticos) {
                            try {
                                if (typeof enviarMensaje_S1 === 'function') {
                                    await enviarMensaje_S1({
                                        tipo: TIPOS_MENSAJE_S1.SISTEMA.CAMBIO_MODO,
                                        origen: CONFIG_PADRE.ID,
                                        destino: criticoId,
                                        datos: {
                                            modo: modoActual,
                                            timestamp: Date.now(),
                                            razon: 'sincronizacion_inicial',
                                            secuenciaCompleta: true
                                        }
                                    });
                                    logger.debug(`${logPrefix} CAMBIO_MODO inicial enviado a ${criticoId}`);
                                } else {
                                    logger.warn(`${logPrefix} enviarMensaje_S1 no disponible para sincronización inicial`);
                                }
                            } catch (error) {
                                logger.error(`${logPrefix} Error enviando CAMBIO_MODO inicial a ${criticoId}:`, error);
                            }
                        }
                    } catch (error) {
                        logger.error(`${logPrefix} Error en sincronización inicial de modo:`, error);
                    }

                    // Actualizar distancias de pendings
                    try {
                        if (estado.gps && estado.gps.posicionUsuario) updatePendingDistances(estado.gps.posicionUsuario);
                    } catch (err) { logger.warn('[PADRE][PENDING] updatePendingDistances error:', err); }

                    // Solicitar coordenadas iniciales según el modo
                    try {
                        const modoActual = estado.modo.actual;
                        logger.info(`${logPrefix} Modo inicial: ${modoActual}`);

                        if (modoActual === MODOS.AVENTURA) {
                            // En modo aventura, iniciar GPS para detección secuencial
                            logger.info(`${logPrefix} Iniciando GPS para modo aventura secuencial`);
                            // El GPS se maneja en funciones-mapa.js
                        } else {
                            // En modo casa, no dibujar nada inicialmente
                            logger.info(`${logPrefix} Modo casa: no se dibujan coordenadas iniciales`);
                        }
                    } catch (error) {
                        logger.error(`${logPrefix} Error solicitando coordenadas iniciales:`, error);
                    }
                }

                // 🔥 REENVÍO DE CAMBIOS DE MODO PENDIENTES
                // Si hay cambios de modo pendientes para este hijo, reenviarlos
                try {
                    if (typeof window.pendingModeChanges !== 'undefined' && window.pendingModeChanges.has(hijoId)) {
                        const pending = window.pendingModeChanges.get(hijoId);
                        logger.info(`${logPrefix} [CAMBIO_MODO][RESEND] HIJO_LISTO de ${hijoId}, reenviando CAMBIO_MODO pendiente (intentos=${pending.intentos})`);
                        try {
                            if (typeof enviarMensaje_S1 === 'function') {
                                await enviarMensaje_S1({
                                    destino: hijoId,
                                    tipo: TIPOS_MENSAJE_S1.SISTEMA.CAMBIO_MODO,
                                    origen: getPadreId(),
                                    datos: {
                                        modo: pending.modo,
                                        ...pending.datos,
                                        secuenciaCompleta: true // Forzar bandera
                                    }
                                });
                                window.pendingModeChanges.delete(hijoId);
                                logger.success(`${logPrefix} [CAMBIO_MODO][RESEND] CAMBIO_MODO pendiente reenviado exitosamente a ${hijoId}`);
                            } else {
                                logger.warn(`${logPrefix} [CAMBIO_MODO][RESEND] enviarMensaje_S1 no disponible para reenviar CAMBIO_MODO pendiente`);
                            }
                        } catch (sendErr) {
                            logger.warn(`${logPrefix} [CAMBIO_MODO][RESEND] Error reenviando CAMBIO_MODO a ${hijoId} tras HIJO_LISTO:`, sendErr);
                            // update nextAttemptAt to retry later
                            const intentos = Math.min((pending.intentos || 0) + 1, (window.MODE_RETRY_MAX_INTENTOS || 5));
                            window.pendingModeChanges.set(hijoId, {
                                ...pending,
                                intentos,
                                nextAttemptAt: Date.now() + (window._computeBackoff ? window._computeBackoff(intentos) : (intentos * 1000))
                            });
                        }
                    }
                } catch (reenvioError) {
                    logger.warn(`${logPrefix} [CAMBIO_MODO][RESEND] Error procesando reenvío de CAMBIO_MODO tras HIJO_LISTO:`, reenvioError);
                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando hijo listo:`, error);
            }
        });

        logger.info(`${CONFIG_PADRE.LOG_PREFIX} ✅ Controlador HIJO_LISTO registrado (Script 1)`);

        // ============================================================
        // CONTROLADORES ADICIONALES (MOVIDOS DESDE SCRIPT 2)
        // Registrados ANTES de cargar iframes para evitar errores de timing
        // ============================================================

        // CONTROLADOR: SISTEMA.CAMBIO_MODO
        registrarControladorSeguro(TIPOS_MENSAJE_S1.SISTEMA.CAMBIO_MODO, async (mensaje) => {
            const logPrefix = `${CONFIG_PADRE.LOG_PREFIX}[CAMBIO_MODO]`;

            try {
                logger.info(`${logPrefix} Procesando cambio de modo desde ${mensaje.origen}`);

                const resultado = await manejarCambioModo(estado, mensaje);

                if (resultado.exito) {
                    logger.success(`${logPrefix} Cambio de modo exitoso: ${resultado.modoActual}`);

                    // 🔥 PROPAGACIÓN DEL CAMBIO DE MODO A HIJOS CRÍTICOS
                    const { origen, modo } = mensaje.datos || {};
                    const hijosCriticos = ['hijo2', 'hijo3', 'hijo4', 'hijo5'];

                    logger.info(`${logPrefix} Propagando cambio de modo ${modo} a hijos críticos: ${hijosCriticos.join(', ')}`);

                    // Enviar SISTEMA.CAMBIO_MODO a cada hijo crítico
                    for (const hijoId of hijosCriticos) {
                        try {
                            if (typeof enviarMensaje_S1 === 'function') {
                                await enviarMensaje_S1({
                                    tipo: TIPOS_MENSAJE_S1.SISTEMA.CAMBIO_MODO,
                                    origen: CONFIG_PADRE.ID,
                                    destino: hijoId,
                                    datos: {
                                        modo: modo,
                                        timestamp: Date.now(),
                                        propagadoDesde: mensaje.origen,
                                        razon: 'cambio_modo_global',
                                        secuenciaCompleta: true
                                    }
                                });
                                logger.debug(`${logPrefix} SISTEMA.CAMBIO_MODO enviado a ${hijoId}`);
                            } else {
                                logger.warn(`${logPrefix} enviarMensaje_S1 no disponible para propagación de modo`);
                            }
                        } catch (error) {
                            logger.error(`${logPrefix} Error enviando SISTEMA.CAMBIO_MODO a ${hijoId}:`, error);
                        }
                    }

                    // 🔁 También notificar explícitamente sobre heartbeat según modo
                    try {
                        if (modo === 'aventura') {
                            // Iniciar heartbeat en el padre: preferir envío de mensaje al propio mensajería
                            try {
                                if (typeof enviarMensaje_S1 === 'function') {
                                    await enviarMensaje_S1({
                                        tipo: TIPOS_MENSAJE_S1.SISTEMA.HEARTBEAT_START,
                                        origen: CONFIG_PADRE.ID,
                                        destino: CONFIG_PADRE.ID,
                                        datos: { intervalo: (typeof ajustarTimeoutPorConexion_S1 === 'function') ? ajustarTimeoutPorConexion_S1(5000) : 5000 }
                                    });
                                } else {
                                    // Fallback: si mensajería no está disponible, invocar la función directa si está disponible
                                    try { (typeof window.iniciarHeartbeat === 'function') ? window.iniciarHeartbeat() : null; } catch (e) { logger.error(`${logPrefix} Error iniciando heartbeat local (fallback):`, e); }
                                }
                            } catch (e) { logger.error(`${logPrefix} Error iniciando heartbeat local via messaging:`, e); }
                            for (const h of hijosCriticos) {
                                try {
                                    if (typeof enviarMensaje_S1 === 'function') {
                                        await enviarMensaje_S1({
                                            tipo: TIPOS_MENSAJE_S1.SISTEMA.HEARTBEAT_START,
                                            origen: CONFIG_PADRE.ID,
                                            destino: h,
                                            datos: { timestamp: Date.now(), propagadoDesde: mensaje.origen }
                                        });
                                    } else {
                                        logger.warn(`${logPrefix} enviarMensaje_S1 no disponible para HEARTBEAT_START`);
                                    }
                                } catch (error) {
                                    logger.warn(`${logPrefix} Error enviando HEARTBEAT_START a ${h}:`, error);
                                }
                            }
                            // Ensure default parada if none set
                            try { await ensureDefaultParada(); } catch (err) { logger.warn('[CAMBIO_MODO] ensureDefaultParada error', err); }
                        } else if (modo === 'casa') {
                            // Limpiar aventura activa (el usuario volvió a CASA voluntariamente)
                            try {
                                localStorage.removeItem('vv_aventura_iniciada');
                                localStorage.removeItem('vv_progreso');
                                localStorage.removeItem('vv_paradas_completadas');
                            } catch (_e) { /* ok */ }

                            // Pausar heartbeat en el padre localmente
                            try {
                                if (typeof enviarMensaje_S1 === 'function') {
                                    await enviarMensaje_S1({
                                        tipo: TIPOS_MENSAJE_S1.SISTEMA.HEARTBEAT_PAUSE,
                                        origen: CONFIG_PADRE.ID,
                                        destino: CONFIG_PADRE.ID,
                                        datos: { timestamp: Date.now(), razon: 'cambio_modo_casa' }
                                    });
                                } else {
                                    try { (typeof window.pausarHeartbeat === 'function') ? window.pausarHeartbeat() : null; } catch (e) { logger.error(`${logPrefix} Error pausando heartbeat local (fallback):`, e); }
                                }
                            } catch (e) { logger.error(`${logPrefix} Error pausando heartbeat local via messaging:`, e); }

                            for (const h of hijosCriticos) {
                                try {
                                    if (typeof enviarMensaje_S1 === 'function') {
                                        await enviarMensaje_S1({
                                            tipo: TIPOS_MENSAJE_S1.SISTEMA.HEARTBEAT_PAUSE,
                                            origen: CONFIG_PADRE.ID,
                                            destino: h,
                                            datos: { timestamp: Date.now(), propagadoDesde: mensaje.origen }
                                        });
                                    } else {
                                        logger.warn(`${logPrefix} enviarMensaje_S1 no disponible para HEARTBEAT_PAUSE`);
                                    }
                                } catch (error) {
                                    logger.warn(`${logPrefix} Error enviando HEARTBEAT_PAUSE a ${h}:`, error);
                                }
                            }
                        }
                    } catch (error) {
                        logger.error(`${logPrefix} Error propagando heartbeat control a hijos criticos:`, error);
                    }

                    // ✅ GESTIÓN OVERLAYS GPS SEGÚN MODO (GPS ya activo desde inicio)
                    if (modo === 'aventura') {
                        logger.info(`${logPrefix} 🗺️ Modo AVENTURA → GPS activo con validación de distancias`);
                        // GPS ya está activo desde DOMContentLoaded
                        // hijo2 validará distancias automáticamente en este modo
                    } else if (modo === 'casa') {
                        logger.info(`${logPrefix} 🏠 Modo CASA → GPS activo SIN validaciones (emoji 🛸)`);
                        // GPS permanece activo, hijo2 NO valida distancias
                        // Mostrar emoji 🛸 en vez de flecha azul
                        // Ocultar overlays GPS cuando entramos en modo CASA
                        try { hideNextEntityOverlay(); } catch (e) {}
                        try { hideGpsOutOfRangeOverlay(); } catch (e) {}
                    }

                    // 🔥 COORDINACIÓN GPS: Si el cambio viene de hijo5, sincronizar GPS con hijo2
                    if (origen === 'boton-gps' && mensaje.origen === 'hijo5') {
                        const gpsMessageType = modo === 'aventura'
                            ? TIPOS_MENSAJE.NAVEGACION.GPS.ACTIVAR
                            : TIPOS_MENSAJE.NAVEGACION.GPS.DESACTIVAR;

                        logger.info(`${logPrefix} Coordinando GPS por cambio de modo: ${modo}`);

                        try {
                            // Enviar comando GPS a hijo2 (sin esperar respuesta)
                            await enviarMensajePadre({
                                tipo: gpsMessageType,
                                origen: CONFIG_PADRE.ID,
                                destino: 'hijo2',
                                datos: {
                                    razon: `modo_cambiado_a_${modo}`,
                                    solicitadoPor: 'hijo5',
                                    timestamp: Date.now()
                                }
                            });

                            logger.debug(`${logPrefix} Comando GPS enviado a hijo2`);
                        } catch (gpsError) {
                            logger.error(`${logPrefix} Error coordinando GPS:`, gpsError);
                            // No fallar el cambio de modo por error GPS
                        }
                    }
                } else {
                    logger.error(`${logPrefix} Error en cambio de modo:`, resultado.error);
                }

                return resultado;

            } catch (error) {
                logger.error(`${logPrefix} Error procesando cambio de modo:`, error);
                return { exito: false, error: error.message };
            }
        });

        // NOTA: AUDIO.FIN_REPRODUCCION se maneja en Script 2 para evitar duplicados
        // (Controlador eliminado de aquí - ver línea ~6993 en Script 2)

        // CONTROLADOR: SISTEMA.HEARTBEAT
        registrarControladorSeguro(TIPOS_MENSAJE_S1.SISTEMA.HEARTBEAT, async (mensaje) => {
            const logPrefix = `${CONFIG_PADRE.LOG_PREFIX}[HEARTBEAT]`;

            try {
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Heartbeat sin origen`);
                    return;
                }

                // Silenciado: Solo loguear en modo debug explícito
                // logger.debug(`${logPrefix} Heartbeat recibido de ${mensaje.origen}`);

                if (typeof enviarMensaje_S1 === 'function') {
                    await enviarMensaje_S1({
                        tipo: TIPOS_MENSAJE_S1.SISTEMA.HEARTBEAT_RESPONSE,
                        origen: CONFIG_PADRE.ID,
                        destino: mensaje.origen,
                        datos: {
                            timestamp: Date.now(),
                            mensajeOriginalId: mensaje.mensajeId,
                            estado: 'activo',
                            modo: estado.modo?.actual,
                            hijosActivos: estado.estadoHijos.size
                        }
                    });
                } else {
                    logger.warn(`${logPrefix} enviarMensaje_S1 no disponible para HEARTBEAT_RESPONSE`);
                }

                if (estado.estadoHijos.has(mensaje.origen)) {
                    const hijoEstado = estado.estadoHijos.get(mensaje.origen);
                    hijoEstado.ultimoPing = Date.now();
                    hijoEstado.fallosConsecutivos = 0;
                    hijoEstado.activo = true;
                } else {
                    estado.estadoHijos.set(mensaje.origen, {
                        activo: true,
                        ultimoPing: Date.now(),
                        fallosConsecutivos: 0
                    });
                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando heartbeat:`, error);
            }
        });

        // CONTROLADOR: SISTEMA.HEARTBEAT_RESPONSE
        registrarControladorSeguro(TIPOS_MENSAJE_S1.SISTEMA.HEARTBEAT_RESPONSE, async (mensaje) => {
            const logPrefix = `${CONFIG_PADRE.LOG_PREFIX}[HEARTBEAT_RESPONSE]`;

            try {
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Respuesta sin origen`);
                    return;
                }

                // Silenciado: Solo loguear en modo debug explícito
                // logger.debug(`${logPrefix} Respuesta heartbeat de ${mensaje.origen}`);

                if (estado.estadoHijos.has(mensaje.origen)) {
                    const hijoEstado = estado.estadoHijos.get(mensaje.origen);
                    hijoEstado.ultimoPing = Date.now();
                    hijoEstado.fallosConsecutivos = 0;
                    hijoEstado.activo = true;

                    // Silenciado: Solo loguear en modo debug explícito
                    // logger.debug(`${logPrefix} Estado de ${mensaje.origen} actualizado`);
                } else {
                    estado.estadoHijos.set(mensaje.origen, {
                        activo: true,
                        ultimoPing: Date.now(),
                        fallosConsecutivos: 0
                    });

                    // Mantener este log porque es importante saber cuando un hijo nuevo se registra
                    logger.info(`${logPrefix} Nuevo hijo registrado: ${mensaje.origen}`);
                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando respuesta heartbeat:`, error);
            }
        });

        // NOTA: Los handlers de CAMBIO_MODO_ENTENDIDO y CAMBIO_MODO_EFECTUADO
        // se registran en app.js (actualizarInterfazModo) para que el protocolo

        // CONTROLADOR: SISTEMA.HIJO_FALLIDO
        // Recibe notificaciones de hijos que no pudieron inicializar correctamente
        registrarControladorSeguro(TIPOS_MENSAJE_S1.SISTEMA.HIJO_FALLIDO, async (mensaje) => {
            const logPrefix = `${CONFIG_PADRE.LOG_PREFIX}[HIJO_FALLIDO]`;
            try {
                const { componenteId, error: errorHijo, timestamp: ts } = mensaje.datos || {};
                logger.error(`${logPrefix} ${mensaje.origen || componenteId} reportó fallo de inicialización: ${errorHijo || 'sin detalle'}`);

                if (estado.estadoHijos.has(mensaje.origen)) {
                    const hijoEstado = estado.estadoHijos.get(mensaje.origen);
                    hijoEstado.activo = false;
                    hijoEstado.fallido = true;
                    hijoEstado.errorFallo = errorHijo;
                }
            } catch (error) {
                logger.error(`${logPrefix} Error procesando HIJO_FALLIDO:`, error);
            }
        });
        // bidireccional pueda rastrear qué hijos respondieron. Registrarlos aquí
        // bloquearía los de app.js debido a la dedup por tipo en registrarControladorSeguro,
        // provocando timeouts de 15s en cada cambio de modo.
        // Los ACKs se envían ahora desde los handlers de app.js.

        // CONTROLADOR: SISTEMA.CAMBIO_MODO_RESPONSE
        registrarControladorSeguro(TIPOS_MENSAJE_S1.SISTEMA.CAMBIO_MODO_RESPONSE, async (mensaje) => {
            const logPrefix = `${CONFIG_PADRE.LOG_PREFIX}[CAMBIO_MODO_RESPONSE]`;

            try {
                if (!mensaje?.origen) {
                    logger.warn(`${logPrefix} Respuesta sin origen`);
                    return;
                }

                const { modo, exito, mensaje: mensajeHijo } = mensaje.datos || {};

                logger.info(`${logPrefix} Confirmación de cambio de modo desde ${mensaje.origen}: modo=${modo}, exito=${exito}`);

                if (exito) {
                    logger.success(`${logPrefix} ${mensaje.origen} cambió exitosamente a modo ${modo}`);
                } else {
                    logger.error(`${logPrefix} Error en ${mensaje.origen} al cambiar a modo ${modo}: ${mensajeHijo}`);
                }

                // Actualizar estado del hijo si es necesario
                if (estado.estadoHijos.has(mensaje.origen)) {
                    const hijoEstado = estado.estadoHijos.get(mensaje.origen);
                    hijoEstado.modoActual = modo;
                    hijoEstado.ultimaActualizacionModo = Date.now();
                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando respuesta de cambio de modo:`, error);
            }
        });

        logger.info(`${CONFIG_PADRE.LOG_PREFIX} ✅ Controladores SISTEMA registrados (Script 1)`);

        // CONTROLADOR: UI.ACCION_USUARIO
        // Recibe acciones de usuario desde hijos (mostrar-imagen, etc.)
        registrarControladorSeguro(TIPOS_MENSAJE_S1.UI.ACCION_USUARIO, async (mensaje) => {
            const logPrefix = `${CONFIG_PADRE.LOG_PREFIX}[ACCION_USUARIO]`;
            try {
                const { accion, paradaActual, urlImagen, urlVideo, nombre, sinContenido, mensajeError, textoParada, imagenes, tipo, mapa_numero } = mensaje.datos || {};
                logger.info(`${logPrefix} Acción recibida desde ${mensaje.origen}: ${accion}`);

                if (accion === 'mostrar-imagen') {
                    // Buscar texto correspondiente a la parada si no viene en el mensaje
                    let textoFinal = textoParada || null;
                    if (!textoFinal && paradaActual && window.__vv_TEXTOS_AVENTURAS) {
                        try {
                            const aventuraActual = window.__vv_aventuraSeleccionada || window.aventuraSeleccionada;
                            const idiomaActual = window.__vv_idiomaSeleccionado || window.idiomaSeleccionado || 'es';
                            if (aventuraActual) {
                                const textos = window.__vv_TEXTOS_AVENTURAS[aventuraActual]?.[idiomaActual] || [];
                                // Convertir parada_id (P-1, TR-2) a patrón de texto (P1, TR2)
                                const paradaNorm = paradaActual.replace(/-/g, '');
                                const textoEncontrado = textos.find(t => {
                                    if (!t || !t.id) return false;
                                    return t.id.includes(paradaNorm);
                                });
                                if (textoEncontrado) {
                                    textoFinal = textoEncontrado;
                                    logger.info(`${logPrefix} Texto encontrado para ${paradaActual}: "${textoEncontrado.title}"`);
                                } else {
                                    logger.debug(`${logPrefix} No se encontró texto para parada ${paradaActual} (norm: ${paradaNorm})`);
                                }
                            }
                        } catch (textoErr) {
                            logger.warn(`${logPrefix} Error buscando texto para parada:`, textoErr);
                        }
                    }

                    if (typeof window.mostrarImagenOverlay === 'function') {
                        window.mostrarImagenOverlay(urlImagen, nombre || '', mensajeError, textoFinal, {
                            imagenes: imagenes || [],
                            tipo: tipo || 'parada',
                            mapa_numero: mapa_numero != null ? mapa_numero : null
                        });
                    } else {
                        logger.error(`${logPrefix} mostrarImagenOverlay no disponible`);
                    }
                } else if (accion === 'reproducir-video') {
                    if (typeof window.mostrarVideoOverlay === 'function') {
                        window.mostrarVideoOverlay(urlVideo, nombre || '', mensajeError);
                    } else {
                        logger.error(`${logPrefix} mostrarVideoOverlay no disponible`);
                    }
                } else {
                    logger.debug(`${logPrefix} Acción no manejada: ${accion}`);
                }
            } catch (error) {
                logger.error(`${logPrefix} Error procesando ACCION_USUARIO:`, error);
            }
        });

        // CONTROLADOR: SISTEMA.APLICACION_INICIALIZADA
        registrarControladorSeguro(TIPOS_MENSAJE_S1.SISTEMA.APLICACION_INICIALIZADA, async (mensaje) => {
            const logPrefix = `${CONFIG_PADRE.LOG_PREFIX}[APLICACION_INICIALIZADA]`;
            const timestamp = Date.now();

            try {
                logger.info(`${logPrefix} Aplicación completamente inicializada`);

                const {
                    totalComponentes = 0,
                    tiempoInicializacion = 0,
                    version = '1.0.0'
                } = mensaje.datos || {};

                estado.mensajeriaInicializada = true;

                registrarEvento('APLICACION_INICIALIZADA', {
                    timestamp,
                    totalComponentes,
                    tiempoInicializacion,
                    version,
                    componentesListos: Array.from(estado.hijosInicializados)
                });

                for (const hijoId of estado.hijosInicializados) {
                    try {
                        if (typeof enviarMensaje_S1 === 'function') {
                            await enviarMensaje_S1({
                                tipo: TIPOS_MENSAJE_S1.SISTEMA.NOTIFICACION,
                                origen: window.CONFIG_PADRE && window.CONFIG_PADRE.ID ? window.CONFIG_PADRE.ID : 'padre',
                                destino: hijoId,
                                datos: {
                                    evento: 'aplicacion_lista',
                                    timestamp,
                                    totalComponentes,
                                    estado: 'operativo'
                                }
                            });
                        } else {
                            logger.warn(`${logPrefix} enviarMensaje_S1 no disponible para notificación`);
                        }
                    } catch (error) {
                        logger.warn(`${logPrefix} Error notificando a ${hijoId}:`, error);
                    }
                }

                logger.success(`${logPrefix} ✅ Sistema completamente operativo`);

                // ============================================================
                // INICIALIZACIÓN DE AVENTURA - ESTADO DE PROGRESO
                // ============================================================
                try {
                    logger.info(`${logPrefix} Inicializando aventura...`);

                    // Inicializar estado de progreso
                        const restored = restoreProgressFromStorage();
                        if (restored && typeof restored.indiceProgreso === 'number') {
                            // Already restored a known index
                            estado.indiceProgreso = restored.indiceProgreso;
                            estado.elementoActual = obtenerElementoActual();
                        } else {
                            // No persisted progress: ensure default parada (P-0, inicio or first parada)
                            estado.indiceProgreso = null;
                            estado.elementoActual = obtenerElementoActual();
                            await ensureDefaultParada();
                        }

                    if (estado.elementoActual) {
                        logger.info(`${logPrefix} Primer elemento cargado: ${estado.elementoActual.tipo} ${estado.elementoActual.parada_id || estado.elementoActual.tramo_id}`);

                        // Configurar cola de retos si existen
                        const retosIniciales = obtenerRetosIds(estado.elementoActual);
                        estado.retoActual = {
                            id: retosIniciales[0] || null,
                            disponible: false,
                            completado: false,
                            cola: retosIniciales,
                            indiceCola: 0,
                            colaCompletados: new Set()
                        };

                        // Solicitar coordenadas del primer destino
                        await solicitarCoordenadasAHijo2(estado.elementoActual);

                        // Solicitar reproducción del primer audio
                        await solicitarAudioAHijo3(estado.elementoActual.audio_id);

                        logger.success(`${logPrefix} ✅ Aventura inicializada correctamente`);
                    } else {
                        logger.warn(`${logPrefix} No se pudo cargar el primer elemento de la aventura`);
                    }

                } catch (error) {
                    logger.error(`${logPrefix} Error inicializando aventura:`, error);
                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando aplicación inicializada:`, error);
            }
        });

        // Controladores principales en Script 2: RETO.SOLICITAR_RETO, DATOS.SOLICITAR_PARADAS, NAVEGACION.CAMBIO_PARADA

        logger.info(`${CONFIG_PADRE.LOG_PREFIX} ✅ Controladores CRÍTICOS registrados (Script 1)`);

        // Función para carga secuencial de iframes
        // ============================================================
        // FUNCIÓN: CARGAR SOLO IFRAME DE SELECCIÓN
        // Se llama durante startup - carga SOLO En-busca-del-tesoro.html
        // ============================================================
        async function cargarIframeSoloSeleccion() {
            // Asegurarse de que el Map estadoHijos existe
            if (!window.estadoPadre.estadoHijos) {
                window.estadoPadre.estadoHijos = new Map();
            }

            const iframes = [
                // SOLO la página de selección - se carga primero y visible
                { id: 'seleccion', src: 'En-busca-del-tesoro.html', mostrarInicial: true }
            ];

            logger.info(`${CONFIG_PADRE.LOG_PREFIX} Iniciando carga secuencial de iframes...`);

            const hijosFallidos = [];

            for (const iframe of iframes) {
                logger.info(`${CONFIG_PADRE.LOG_PREFIX} Cargando iframe: ${iframe.id}`);

                try {
                    const iframeEl = document.getElementById(iframe.id);
                    if (!iframeEl) {
                        throw new Error(`Iframe ${iframe.id} no encontrado en DOM`);
                    }

                    // ✅ Registrar iframe en mensajería para permitir envío de mensajes
                    if (typeof registrarIframe_S1 === 'function') {
                        registrarIframe_S1(iframe.id, iframeEl, { capacidades: iframe.capacidades || [] });
                        logger.debug(`${CONFIG_PADRE.LOG_PREFIX} Iframe ${iframe.id} registrado en mensajería`);
                    }

                    // Si tiene mostrarInicial, mostrarlo directamente; si no, ocultarlo
                    if (iframe.mostrarInicial) {
                        iframeEl.style.display = 'block';
                        iframeEl.style.visibility = 'visible';
                    } else {
                        iframeEl.style.display = 'none';
                        iframeEl.style.visibility = 'hidden';
                    }

                    // Esperar a que el iframe cargue usando eventos onload/onerror
                    await new Promise((resolve, reject) => {
                        const timeoutFallback = setTimeout(() => {
                            logger.warn(`${CONFIG_PADRE.LOG_PREFIX} ⚠️ Timeout de carga para ${iframe.id}, continuando...`);
                            resolve(); // Continuar incluso si hay timeout
                        }, ajustarTimeoutPorConexion_S1(10000)); // Ajustado dinámicamente según conexión

                        const onLoad = () => {
                            clearTimeout(timeoutFallback);
                            iframeEl.removeEventListener('load', onLoad);
                            iframeEl.removeEventListener('error', onError);
                            logger.info(`${CONFIG_PADRE.LOG_PREFIX} ✅ ${iframe.id} cargado (evento onload)`);
                            resolve();
                        };

                        const onError = (err) => {
                            clearTimeout(timeoutFallback);
                            iframeEl.removeEventListener('load', onLoad);
                            iframeEl.removeEventListener('error', onError);
                            logger.error(`${CONFIG_PADRE.LOG_PREFIX} ❌ Error de carga para ${iframe.id}:`, err);
                            resolve(); // Continuar incluso si hay error (se manejará después)
                        };

                        iframeEl.addEventListener('load', onLoad, { once: true });
                        iframeEl.addEventListener('error', onError, { once: true });

                        logger.info(`${CONFIG_PADRE.LOG_PREFIX} Asignando src a ${iframe.id}: ${iframe.src}`);
                        iframeEl.src = iframe.src;
                    });

                    // NOTA: No enviamos PADRE_DATOS manualmente aquí.
                    // El hijo enviará HIJO_PREPARADO cuando esté listo, y el controlador
                    // de HIJO_PREPARADO en el padre enviará PADRE_DATOS automáticamente.
                    // Esto garantiza que el hijo haya registrado sus controladores antes.

                    // Esperar a que el hijo esté listo
                    logger.info(`${CONFIG_PADRE.LOG_PREFIX} Esperando HIJO_LISTO de ${iframe.id}...`);
                    await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error(`Timeout esperando HIJO_LISTO de ${iframe.id}`));
                        }, ajustarTimeoutPorConexion_S1(CONFIG.MENSAJERIA.TIMEOUTS.CONFIRMACION)); // Ajustado dinámicamente según conexión

                        const check = () => {
                            if (window.estadoPadre.hijosInicializados.has(iframe.id)) {
                                clearTimeout(timeout);
                                logger.info(`${CONFIG_PADRE.LOG_PREFIX} HIJO_LISTO recibido de ${iframe.id}`);
                                resolve();
                            } else {
                                setTimeout(check, 100);
                            }
                        };
                        check();
                    });

                    logger.success(`${CONFIG_PADRE.LOG_PREFIX} ✅ ${iframe.id} listo y confirmado.`);
                    iframeEl.style.display = '';
                    iframeEl.style.visibility = 'visible';

                } catch (error) {
                    // Si un hijo falla, registrarlo pero continuar con los demás
                    logger.error(`${CONFIG_PADRE.LOG_PREFIX} ❌ Error cargando ${iframe.id}: ${error.message}`);
                    logger.warn(`${CONFIG_PADRE.LOG_PREFIX} Continuando con siguiente hijo...`);

                    // DEBUG: Dump central handlers and estadoPadre for diagnosis
                    try {
                        (async () => {
                            try {
                                if (window.__vv_stateManager && typeof window.__vv_stateManager.getControladoresPorTipo === 'function') {
                                    const central = await window.__vv_stateManager.getControladoresPorTipo(TIPOS_MENSAJE.SISTEMA.HIJO_LISTO);
                                    console.log(`${CONFIG_PADRE.LOG_PREFIX} [DEBUG] Controladores centralizados para HIJO_LISTO:`, central.map(c => c.id));
                                }
                            } catch (e) {
                                console.warn(`${CONFIG_PADRE.LOG_PREFIX} [DEBUG] No se pudo consultar state-manager:`, e && e.message);
                            }
                            try { console.log(`${CONFIG_PADRE.LOG_PREFIX} [DEBUG] estadoPadre.hijosInicializados:`, Array.from(window.estadoPadre.hijosInicializados || new Set())); } catch (e) {}
                            try { console.log(`${CONFIG_PADRE.LOG_PREFIX} [DEBUG] estadoPadre.hijosListos:`, Array.from(window.estadoPadre.hijosListos || new Set())); } catch (e) {}
                        })();
                    } catch (e) { /* ignore debug errors */ }

                    // Rastrear hijo fallido para reconexión posterior
                    hijosFallidos.push({
                        id: iframe.id,
                        src: iframe.src,
                        error: error.message,
                        timestamp: Date.now()
                    });

                    // Inicializar estado del hijo fallido
                    if (!window.estadoPadre.estadoHijos.has(iframe.id)) {
                        window.estadoPadre.estadoHijos.set(iframe.id, {
                            activo: false,
                            fallosConsecutivos: 1,
                            ultimoPing: null,
                            ultimoError: error.message
                        });
                    } else {
                        const estadoHijo = window.estadoPadre.estadoHijos.get(iframe.id);
                        if (estadoHijo) {
                            estadoHijo.fallosConsecutivos = (estadoHijo.fallosConsecutivos || 0) + 1;
                            estadoHijo.ultimoError = error.message;
                        }
                    }
                }
            }

            logger.success(`${CONFIG_PADRE.LOG_PREFIX} ✅ Carga secuencial completada`);

            // 🔥 PROCESAR DISTRIBUCIONES PENDIENTES DESPUÉS DE CARGA DE IFRAMES
            // Una vez que todos los iframes están cargados y conectados, procesar distribuciones pendientes
            if (window.__pendingDistribucion && typeof enviarMensaje_S1 === 'function') {
                const { aventura, idioma } = window.__pendingDistribucion;
                logger.info(`${CONFIG_PADRE.LOG_PREFIX} 🔄 Procesando distribución pendiente de aventura ${aventura} (${idioma}) después de carga de iframes...`);
                try {
                    const resultados = await distribuirDatosAventura(aventura, idioma);
                    if (resultados.pospuesto) {
                        logger.warn(`${CONFIG_PADRE.LOG_PREFIX} ⚠️ Distribución pendiente aún pospuesta: ${resultados.mensaje}`);
                    } else {
                        logger.success(`${CONFIG_PADRE.LOG_PREFIX} ✅ Distribución pendiente completada:`, resultados);
                        delete window.__pendingDistribucion;
                    }
                } catch (error) {
                    logger.error(`${CONFIG_PADRE.LOG_PREFIX} ❌ Error en distribución pendiente después de carga de iframes:`, error);
                }
            }

            // RECONEXIÓN: Intentar reconectar hijos fallidos después de cargar todos los exitosos
            if (hijosFallidos.length > 0) {
                logger.warn(`${CONFIG_PADRE.LOG_PREFIX} 🔄 Detectados ${hijosFallidos.length} hijos fallidos, iniciando reconexión...`);
                await intentarReconectarHijosFallidos(hijosFallidos);
            } else {
                logger.success(`${CONFIG_PADRE.LOG_PREFIX} ✅ Todos los iframes conectados exitosamente`);
            }
        }

        /**
         * Intenta reconectar hijos que fallaron durante la carga inicial
         * Implementa reintentos secuenciales con límite de 3 intentos por hijo
         * @param {Array} hijosFallidos - Lista de hijos que fallaron inicialmente
         */
        async function intentarReconectarHijosFallidos(hijosFallidos) {
            const MAX_REINTENTOS = 3;
            const TIMEOUT_RECONEXION = ajustarTimeoutPorConexion_S1(CONFIG.MENSAJERIA.TIMEOUTS.CONFIRMACION); // Timeout ajustado según conexión

            logger.info(`${CONFIG_PADRE.LOG_PREFIX} 🔄 SISTEMA DE RECONEXIÓN ACTIVADO`);
            logger.info(`${CONFIG_PADRE.LOG_PREFIX} Hijos a reconectar: ${hijosFallidos.map(h => h.id).join(', ')}`);

            for (const hijoFallido of hijosFallidos) {
                const { id, src } = hijoFallido;
                let reconectado = false;

                logger.warn(`${CONFIG_PADRE.LOG_PREFIX} 🔄 Intentando reconectar: ${id}`);

                for (let intento = 1; intento <= MAX_REINTENTOS && !reconectado; intento++) {
                    logger.info(`${CONFIG_PADRE.LOG_PREFIX} 🔄 ${id} - Intento ${intento}/${MAX_REINTENTOS}`);

                    try {
                        // Recargar el iframe
                        const iframeElement = document.getElementById(id);
                        if (!iframeElement) {
                            logger.error(`${CONFIG_PADRE.LOG_PREFIX} ❌ ${id} - Elemento iframe no encontrado en DOM`);
                            break;
                        }

                        // Ocultar iframe mientras se intenta reconectar
                        try { iframeElement.style.display = 'none'; iframeElement.style.visibility = 'hidden'; console.log(`[PADRE] Ocultando iframe ${id} para reconexión intento ${intento}`); } catch (e) {}

                        // Esperar carga usando evento onload/onerror
                        await new Promise((resolve) => {
                            const timeoutReconexion = setTimeout(() => {
                                logger.warn(`${CONFIG_PADRE.LOG_PREFIX} ⚠️ Timeout cargando ${id} en reconexión intento ${intento}`);
                                resolve();
                            }, 8000); // 8s timeout para reconexión

                            const onLoadReconexion = () => {
                                clearTimeout(timeoutReconexion);
                                iframeElement.removeEventListener('load', onLoadReconexion);
                                iframeElement.removeEventListener('error', onErrorReconexion);
                                logger.info(`${CONFIG_PADRE.LOG_PREFIX} ✅ ${id} cargado (reconexión intento ${intento})`);
                                resolve();
                            };

                            const onErrorReconexion = () => {
                                clearTimeout(timeoutReconexion);
                                iframeElement.removeEventListener('load', onLoadReconexion);
                                iframeElement.removeEventListener('error', onErrorReconexion);
                                logger.warn(`${CONFIG_PADRE.LOG_PREFIX} ⚠️ Error en reconexión ${id} intento ${intento}`);
                                resolve();
                            };

                            iframeElement.addEventListener('load', onLoadReconexion, { once: true });
                            iframeElement.addEventListener('error', onErrorReconexion, { once: true });
                            iframeElement.src = src;
                        });

                        // NOTA: No enviamos PADRE_DATOS manualmente en reconexión.
                        // El hijo enviará HIJO_PREPARADO cuando esté listo, y el controlador
                        // de HIJO_PREPARADO en el padre enviará PADRE_DATOS automáticamente.

                        // Esperar HIJO_LISTO con timeout
                        await new Promise((resolve, reject) => {
                            const timeout = setTimeout(() => {
                                reject(new Error(`Timeout en intento ${intento}`));
                            }, TIMEOUT_RECONEXION);

                            const checkInterval = setInterval(() => {
                                if (!window.estadoPadre || !window.estadoPadre.hijosInicializados) return;
                                if (window.estadoPadre.hijosInicializados.has(id)) {
                                    clearTimeout(timeout);
                                    clearInterval(checkInterval);
                                    resolve();
                                }
                            }, 100);
                        });

                        // Si llegamos aquí, reconexión exitosa
                        reconectado = true;
                        logger.success(`${CONFIG_PADRE.LOG_PREFIX} ✅ ${id} RECONECTADO en intento ${intento}`);

                        // Actualizar estado del hijo
                        const estadoHijo = window.estadoPadre.estadoHijos.get(id);
                        if (estadoHijo) {
                            estadoHijo.activo = true;
                            estadoHijo.fallosConsecutivos = 0;
                            estadoHijo.ultimoPing = Date.now();
                            estadoHijo.ultimoError = null;
                        }

                    } catch (error) {
                        logger.warn(`${CONFIG_PADRE.LOG_PREFIX} ⚠️ ${id} - Intento ${intento} falló: ${error.message}`);

                        // Actualizar contador de fallos
                        const estadoHijo = window.estadoPadre.estadoHijos.get(id);
                        if (estadoHijo) {
                            estadoHijo.fallosConsecutivos++;
                        }

                        // Si no es el último intento
                        if (intento < MAX_REINTENTOS) {
                            const espera = 2000 * intento; // Espera progresiva: 2s, 4s, 6s
                            logger.info(`${CONFIG_PADRE.LOG_PREFIX} ⏳ Esperando ${espera/1000}s antes del siguiente intento...`);
                            await new Promise(resolve => setTimeout(resolve, espera));
                        }
                    }
                }

                // Resultado final para este hijo
                if (!reconectado) {
                    logger.error(`${CONFIG_PADRE.LOG_PREFIX} ❌ ${id} - RECONEXIÓN FALLIDA después de ${MAX_REINTENTOS} intentos`);
                    logger.error(`${CONFIG_PADRE.LOG_PREFIX} ⚠️ La aplicación continuará sin ${id} - Funcionalidad reducida`);

                    // Marcar hijo como definitivamente fallido
                    const estadoHijo = window.estadoPadre.estadoHijos.get(id);
                    if (estadoHijo) {
                        estadoHijo.activo = false;
                        estadoHijo.reconexionFallida = true;
                    }
                }
            }

            // Reporte final
            const hijosReconectados = hijosFallidos.filter(h => window.estadoPadre && window.estadoPadre.hijosInicializados && window.estadoPadre.hijosInicializados.has(h.id));
            const hijosPermanentementeFallidos = hijosFallidos.filter(h => !window.estadoPadre || !window.estadoPadre.hijosInicializados || !window.estadoPadre.hijosInicializados.has(h.id));

            logger.info(`${CONFIG_PADRE.LOG_PREFIX} 📊 REPORTE DE RECONEXIÓN:`);
            logger.info(`${CONFIG_PADRE.LOG_PREFIX}    ✅ Reconectados: ${hijosReconectados.length}/${hijosFallidos.length}`);

            if (hijosPermanentementeFallidos.length > 0) {
                logger.error(`${CONFIG_PADRE.LOG_PREFIX}    ❌ Fallos permanentes: ${hijosPermanentementeFallidos.map(h => h.id).join(', ')}`);
            }

            logger.info(`${CONFIG_PADRE.LOG_PREFIX} 🏁 Sistema de reconexión finalizado`);
        }

        // Wait for Leaflet to load and initialize map
        function waitForLeafletAndInitialize() {
            return new Promise((resolve) => {
                const checkLeaflet = () => {
                    if (typeof L !== 'undefined' && L.map) {
                        initializeMap().then(resolve).catch(resolve); // Resolve even on error to continue app init
                    } else {
                        setTimeout(checkLeaflet, 100);
                    }
                };
                checkLeaflet();
            });
        }

        // ============================================================
        // VALIDACIÓN DE MENSAJERÍA (parte de FASE 1)
        // Se ejecuta después de cargar infraestructura, antes de FASE 2
        // ============================================================
        /**
         * Valida que window.mensajeria esté completamente inicializado
         * antes de proceder a cargar datos y iframes.
         *
         * PROBLEMA QUE RESUELVE:
         * Los iframes se cargan y envían HIJO_PREPARADO antes de que
         * window.mensajeria esté listo, causando que los mensajes se pierdan.
         *
         * SOLUCIÓN:
         * Esperar bloqueadamente hasta que window.mensajeria.enviarMensaje
         * sea una función disponible, garantizando que la comunicación
         * padre↔hijos funcionará correctamente.
         *
         * @returns {Promise<void>} Resuelve cuando mensajería está validada
         * @throws {Error} Si mensajería no está disponible después de reintentos
         */
        async function validarMensajeriaFase1() {
            const logPrefix = '[PADRE][FASE1-VALIDACION]';
            const maxReintentos = 20;
            const intervaloPorReintento = 200; // ms
            let intentos = 0;

            logger.info(`${logPrefix} 🔄 Iniciando validación de mensajería...`);

            // Esperar hasta que window.mensajeria y su método enviarMensaje estén disponibles
            while (!window.mensajeria || typeof window.mensajeria.enviarMensaje !== 'function') {
                intentos++;

                if (intentos >= maxReintentos) {
                    const errorMsg = `window.mensajeria no disponible después de ${maxReintentos} reintentos (${maxReintentos * intervaloPorReintento / 1000}s)`;
                    logger.error(`${logPrefix} ❌ ${errorMsg}`);
                    throw new Error(errorMsg);
                }

                logger.info(`${logPrefix} ⏳ Esperando mensajería... (intento ${intentos}/${maxReintentos})`);
                await new Promise(r => setTimeout(r, intervaloPorReintento));
            }

            // Validar también que window.estadoPadre existe
            if (!window.estadoPadre) {
                logger.warn(`${logPrefix} ⚠️ window.estadoPadre no existe, creando estructura básica...`);
                window.estadoPadre = {
                    modo: { actual: MODOS.CASA },
                    hijosInicializados: new Set(),
                    hijosPreparados: new Set(),
                    hijosListos: new Set(),
                    estadoHijos: new Map()
                };
            }

            // Verificar que enviarMensaje_S1 también esté disponible (alias usado en iframes)
            if (typeof enviarMensaje_S1 !== 'function') {
                logger.warn(`${logPrefix} ⚠️ enviarMensaje_S1 no disponible como función global`);
            }

            logger.success(`${logPrefix} ✅ Mensajería validada correctamente`);
            logger.info(`${logPrefix} 📊 Validación exitosa en ${intentos} intento(s)`);
            logger.info(`${logPrefix} ✅ enviarMensaje: ${typeof window.mensajeria.enviarMensaje}`);
            logger.info(`${logPrefix} ✅ registrarControlador: ${typeof window.mensajeria.registrarControlador}`);

            return;
        }

        async function populatePendingCoords(pendKey) {
