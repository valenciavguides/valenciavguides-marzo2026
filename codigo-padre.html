                    }
                    resolve('otra');
                }

                // Timer auto-continuar 30s
                const cuentaEl = overlay.querySelector('#cuenta-regresiva');
                timerInterval = setInterval(() => {
                    cuentaRegresiva--;
                    if (cuentaEl) cuentaEl.textContent = cuentaRegresiva;
                    if (cuentaRegresiva <= 0) {
                        ejecutarReanudacion();
                    }
                }, 1000);

                // Event listeners paso 1
                overlay.querySelector('#btn-continuar-aventura').addEventListener('click', ejecutarReanudacion);
                overlay.querySelector('#btn-elegir-otra').addEventListener('click', () => {
                    if (timerInterval) clearInterval(timerInterval);
                    // Mostrar paso 2 (advertencia)
                    const paso1 = overlay.querySelector('#dialogo-reanudacion-paso1');
                    const paso2 = overlay.querySelector('#dialogo-reanudacion-paso2');
                    if (paso1) paso1.style.display = 'none';
                    if (paso2) paso2.style.display = 'block';
                });

                // Event listeners paso 2
                overlay.querySelector('#btn-volver-aventura').addEventListener('click', ejecutarReanudacion);
                overlay.querySelector('#btn-confirmar-otra').addEventListener('click', ejecutarElegirOtra);
            });
        }

        // Ejecuta la restauración completa de una aventura guardada
        async function ejecutarRestauracionAventura(datosGuardados) {
            const logPrefix = '[PADRE][RESTAURACION]';
            try {
                // Restaurar idioma y aventura en globals
                window.aventuraSeleccionada = datosGuardados.aventura;
                window.idiomaSeleccionado = datosGuardados.idioma || 'es';
                if (!estado.seleccion) estado.seleccion = {};
                estado.seleccion.aventura = datosGuardados.aventura;
                estado.seleccion.idioma = datosGuardados.idioma || 'es';
                estado.seleccion.iniciada = true;

                // Ocultar selección, mostrar hijos
                const iframeSeleccion = document.getElementById('seleccion');
                if (iframeSeleccion) iframeSeleccion.style.display = 'none';

                const iframesToShow = ['hijo2', 'hijo3', 'hijo1-opciones', 'hijo5'];
                for (const iframeId of iframesToShow) {
                    const iframe = document.getElementById(iframeId);
                    if (iframe) {
                        iframe.style.display = 'block';
                        iframe.style.visibility = 'visible';
                    }
                }

                const logoEl = document.getElementById('logo-aventura');
                const fondoEl = document.getElementById('fondo-blanco');
                const fondoInferiorEl = document.getElementById('fondo-blanco-inferior');
                if (logoEl) logoEl.style.display = 'block';
                if (fondoEl) fondoEl.style.display = 'block';
                if (fondoInferiorEl) fondoInferiorEl.style.display = 'block';

                // Restaurar paradas completadas
                try {
                    const paradasRaw = localStorage.getItem('vv_paradas_completadas');
                    if (paradasRaw) {
                        const paradasObj = JSON.parse(paradasRaw);
                        if (paradasObj && typeof paradasObj === 'object') {
                            estado.paradasCompletadas = new Map(Object.entries(paradasObj));
                            logger.info(`${logPrefix} ✅ ${estado.paradasCompletadas.size} paradas completadas restauradas`);
                        }
                    }
                } catch (pErr) { logger.warn(`${logPrefix} Error restaurando paradas completadas`, pErr); }

                // Cargar datos diferidos
                if (typeof window.__cargarDatosAventuraDiferidos === 'function') {
                    await window.__cargarDatosAventuraDiferidos();
                }

                // Esperar a que los hijos críticos completen su handshake antes de distribuir datos.
                // Sin esta espera, distribuirDatosAventura envía mensajes a iframes que aún no
                // han registrado sus controladores y los pierden.
                const _hijosCriticosRest = ['hijo2', 'hijo3'];
                const _maxEsperaRest = 8000; // 8 segundos máximo
                const _inicioEsperaRest = Date.now();
                while (_hijosCriticosRest.some(id => !estado.hijosInicializados.has(id))) {
                    if (Date.now() - _inicioEsperaRest > _maxEsperaRest) {
                        logger.warn(`${logPrefix} ⏱ Timeout esperando hijos críticos (hijo2, hijo3). Distribuyendo datos de todos modos.`);
                        break;
                    }
                    await new Promise(r => setTimeout(r, 200));
                }
                logger.info(`${logPrefix} Hijos listos: [${Array.from(estado.hijosInicializados).join(', ')}]`);

                // Distribuir datos a hijos
                try {
                    await distribuirDatosAventura(datosGuardados.aventura, datosGuardados.idioma);
                    logger.success(`${logPrefix} ✅ Datos distribuidos a hijos tras reanudación`);
                } catch (distErr) {
                    logger.warn(`${logPrefix} Error distribuyendo datos en reanudación:`, distErr);
                }

                // Restaurar progreso
                const restored = restoreProgressFromStorage();
                if (restored && typeof restored.indiceProgreso === 'number') {
                    estado.indiceProgreso = restored.indiceProgreso;
                    estado.elementoActual = obtenerElementoActual();
                    logger.info(`${logPrefix} ✅ Progreso restaurado: índice ${restored.indiceProgreso}, parada ${restored.paradaActual}`);
                } else {
                    await ensureDefaultParada();
                    logger.info(`${logPrefix} Sin progreso previo, usando parada por defecto`);
                }

                // Activar modo AVENTURA y GPS
                try {
                    estado.modoActual = MODOS.AVENTURA;
                    window.__vv_modoActual = MODOS.AVENTURA;

                    if (typeof enviarMensaje_S1 === 'function') {
                        await enviarMensaje_S1({
                            tipo: TIPOS_MENSAJE.SISTEMA.CAMBIO_MODO,
                            origen: CONFIG_PADRE.ID,
                            destino: 'todos',
                            datos: {
                                modo: MODOS.AVENTURA,
                                aventura: datosGuardados.aventura,
                                idioma: datosGuardados.idioma,
                                restaurado: true,
                                timestamp: Date.now()
                            }
                        });
                    }

                    if (window.funcionesMapa && typeof window.funcionesMapa.iniciarGPSAventura === 'function') {
                        window.funcionesMapa.iniciarGPSAventura();
                        logger.info(`${logPrefix} ✅ GPS activado tras reanudación`);
                    }

                    logger.success(`${logPrefix} 🎉 AVENTURA REANUDADA: ${datosGuardados.aventura} (${datosGuardados.idioma})`);
                } catch (modoErr) {
                    logger.error(`${logPrefix} Error activando modo aventura:`, modoErr);
                }
            } catch (err) {
                logger.error(`${logPrefix} Error restaurando aventura:`, err);
            }
        }

        // === INICIALIZACIONES ADICIONALES DE SEGURIDAD Y CORRELACIÓN ===
        // Garantizar mapas/sets compartidos antes de que otros scripts los usen
        if (!window.estadoPadre.correlacionesMensajes) {
            window.estadoPadre.correlacionesMensajes = new Map();
        }
        if (!window.estadoPadre.hijosFallidos) {
            window.estadoPadre.hijosFallidos = new Set();
        }

        // Guards/flags globales para evitar doble inicialización/registro
        window.__MENSAJERIA_INICIADA = window.__MENSAJERIA_INICIADA || false;
        window.__HEARTBEAT_INICIADO = window.__HEARTBEAT_INICIADO || false;
        window.__CONTROLADOR_REGISTRADOS = window.__CONTROLADOR_REGISTRADOS || new Set();

        // Limpieza periódica de correlaciones (TTL: 30s)
        if (!window.__vv_correlacion_cleanup) {
            window.__vv_correlacion_cleanup = setInterval(() => {
                try {
                    const TTL = 30000;
                    const now = Date.now();
                    for (const [id, meta] of window.estadoPadre.correlacionesMensajes) {
                        if (!meta || !meta.timestamp || (now - (meta.timestamp || now) > TTL)) {
                            try { meta.reject && meta.reject(new Error('Correlation timeout')); } catch (e) {}
                            window.estadoPadre.correlacionesMensajes.delete(id);
                        }
                    }
                } catch (e) {
                    // proteger la rutina de limpieza contra fallos
                    (window.logger || console).warn('[PADRE] Error en limpieza de correlaciones:', e && e.message);
                }
            }, 30000);
        }

        // Wrapper seguro para evitar doble registro de controladores críticos
        if (typeof window.registrarControladorSeguro === 'undefined') {
            window.registrarControladorSeguro = function(tipo, handler, opciones) {
                try {
                    if (!tipo) return;
                    if (window.__CONTROLADOR_REGISTRADOS.has(tipo)) {
                        (window.logger || console).warn(`${(window.CONFIG_PADRE && window.CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'} Controlador ya registrado, omitiendo: ${tipo}`);
                        return;
                    }
                    window.__CONTROLADOR_REGISTRADOS.add(tipo);

                    // Si registrarControlador_S1 no está disponible, usar mensajeria directa como fallback
                    if (typeof registrarControlador_S1 === 'function') {
                        return registrarControlador_S1(tipo, handler, opciones);
                    } else if (window.mensajeria && window.mensajeria.registrarControlador) {
                        return window.mensajeria.registrarControlador(tipo, handler, opciones);
                    } else {
                        // Como último recurso, guardar en cola para registrar después
                        if (!window.__CONTROLADORES_PENDIENTES) window.__CONTROLADORES_PENDIENTES = [];
                        window.__CONTROLADORES_PENDIENTES.push({tipo, handler, opciones});
                        (window.logger || console).info(`${(window.CONFIG_PADRE && window.CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'} Controlador encolado: ${tipo} (mensajería no disponible)`);
                        return;
                    }
                } catch (e) {
                    (window.logger || console).error(`${(window.CONFIG_PADRE && window.CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'} Error registrando controlador seguro ${tipo}:`, e && e.message);
                }
            };

            // Función para procesar controladores en cola cuando mensajería esté lista
            window.procesarControladoresPendientes = function() {
                if (window.__CONTROLADORES_PENDIENTES && window.__CONTROLADORES_PENDIENTES.length > 0) {
                    const pendientes = window.__CONTROLADORES_PENDIENTES.splice(0);
                    (window.logger || console).info(`${(window.CONFIG_PADRE && window.CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'} Procesando ${pendientes.length} controladores pendientes`);

                    for (const {tipo, handler, opciones} of pendientes) {
                        try {
                            window.registrarControladorSeguro(tipo, handler, opciones);
                        } catch (e) {
                            (window.logger || console).error(`${(window.CONFIG_PADRE && window.CONFIG_PADRE.LOG_PREFIX) || '[PADRE]'} Error procesando controlador pendiente ${tipo}:`, e && e.message);
                        }
                    }
                }
            };
        }

        // Create local alias for easier access
        const registrarControladorSeguro = window.registrarControladorSeguro;

        // ============================================================
        // FUNCIONES AUXILIARES LOCALES (compartidas con Script 2)
        // ============================================================

        /**
         * Registra un evento en el sistema de monitoreo local
         */
        window.registrarEvento = function(tipo, datos = {}, nivel = 'info') {
            const mensaje = `[PADRE] Evento: ${tipo}, Nivel: ${nivel}`;

            switch (nivel) {
                case 'debug':
                    logger.debug(mensaje, datos);
                    break;
                case 'info':
                    logger.info(mensaje, datos);
                    break;
                case 'warn':
                    logger.warn(mensaje, datos);
                    break;
                case 'error':
                    logger.error(mensaje, datos);
                    break;
            }

            if (estado.monitoreo?.config?.habilitado && estado.monitoreo?.config?.rastrearEventos) {
                try {
                    const evento = {
                        tipo,
                        datos,
                        nivel,
                        timestamp: new Date().toISOString(),
                        timestampMs: Date.now()
                    };

                    estado.monitoreo.historial.eventos.push(evento);

                    if (estado.monitoreo.historial.eventos.length > estado.monitoreo.config.maxEventos) {
                        estado.monitoreo.historial.eventos = estado.monitoreo.historial.eventos.slice(-estado.monitoreo.config.maxEventos);
                    }
                } catch (error) {
                    logger.error('[PADRE] Error registrando evento:', error);
                }
            }
        };

        logger.info(`${CONFIG_PADRE.LOG_PREFIX} Script 1: Configuración y estado inicializados`);

        // ===== HANDLER GLOBAL: Recibir manifest de manejadores desde hijos (migration) =====
        try {
            registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.HIJO_MANEJADORES, async (mensaje) => {
                const logPrefix2 = `${CONFIG_PADRE.LOG_PREFIX}[HIJO_MANEJADORES]`;
                try {
                    const hijoOrigen = mensaje?.origen;
                    const manejadores = (mensaje && mensaje.datos && mensaje.datos.manejadores) || [];
                    const pedidoId = mensaje?.datos?.pedidoId || null;

                    if (!hijoOrigen) {
                        logger.warn(`${logPrefix2} Mensaje HIJO_MANEJADORES sin campo origen, omitiendo`);
                        return;
                    }

                    if (!window.estadoPadre) window.estadoPadre = {};
                    if (!window.estadoPadre.estadoHijos || !window.estadoPadre.estadoHijos.has(hijoOrigen)) {
                        logger.warn(`${logPrefix2} Origen ${hijoOrigen} no registrado como hijo preparado; revisar seguridad`);
                        // continue processing but mark with a flag
                    }

                    // Sanitize manifest entries
                    const saneManejadores = [];
                    for (const m of manejadores) {
                        if (m && typeof m.tipo === 'string') saneManejadores.push(m);
                        else logger.warn(`${logPrefix2} Manifest entry inválido, omitiendo: ${JSON.stringify(m)}`);
                    }

                    window.estadoPadre = window.estadoPadre || {};
                    window.estadoPadre.manejadoresRegistrados = window.estadoPadre.manejadoresRegistrados || new Map();
                    const aplicados = [];

                    for (const m of saneManejadores) {
                        const tipo = m.tipo;
                        if (!window.estadoPadre.manejadoresRegistrados.has(tipo)) {
                            const proxy = async (msg) => {
                                try {
                                    if (typeof enviarMensaje_S1 === 'function') {
                                        await enviarMensaje_S1({ destino: hijoOrigen, tipo: tipo, origen: getPadreId(), datos: msg.datos || {} });
                                    }
                                } catch (err) { logger.warn(`${logPrefix2} Error proxy reenviando ${tipo} a ${hijoOrigen}:`, err && err.message); }
                            };
                            try {
                                registrarControladorSeguro(tipo, proxy);
                                window.estadoPadre.manejadoresRegistrados.set(tipo, hijoOrigen);
                                aplicados.push(tipo);
                                logger.info(`${logPrefix2} Proxy creado para ${tipo} -> ${hijoOrigen}`);
                            } catch (err) { logger.warn(`${logPrefix2} Error registrando proxy para ${tipo}:`, err && err.message); }
                        } else {
                            logger.debug(`${logPrefix2} Tipo ${tipo} ya registrado, omitiendo`);
                        }
                    }

                    // NOTA: PADRE_APLICA_MANEJADORES eliminado (obsoleto)

                    // Resolver petición pendiente si existe
                    try {
                        if (pedidoId && window.estadoPadre && window.estadoPadre.pendingMigraciones && window.estadoPadre.pendingMigraciones.has(pedidoId)) {
                            const pending = window.estadoPadre.pendingMigraciones.get(pedidoId);
                            if (pending && pending.hijoId === hijoOrigen && typeof pending.resolve === 'function') {
                                pending.resolved = true;
                                try { pending.resolve({ pedidoId, manejadores, aplicados, timestamp: Date.now() }); } catch (e) { logger.warn(`${logPrefix2} Error al invocar resolve de pending:`, e && e.message); }
                                logger.info(`${logPrefix2} Pending migracion resuelta pedidoId=${pedidoId}`);
                            } else if (pending) {
                                logger.warn(`${logPrefix2} Pending migracion pedidoId=${pedidoId} no coincide con hijoOrigen esperado: ${pending.hijoId}`);
                            }
                        }
                    } catch (err) { logger.warn(`${logPrefix2} Error resolviendo pending migracion pedidoId=${pedidoId}:`, err && err.message); }

                } catch (err) { logger.error('[PADRE][HIJO_MANEJADORES] Error procesando manifest:', err && err.message); }
            });
        } catch (err) { logger.warn('[PADRE] No se pudo registrar handler HIJO_MANEJADORES:', err && err.message); }

        // NOTA: solicitarManejadoresConRetry y PADRE_PIDE_MANEJADORES eliminados (obsoletos)
        // El sistema actual usa state-manager centralizado sin necesidad de migración manual

        // ============================================================
        // FUNCIONES GPS CENTRALIZADAS EN EL PADRE
        // ============================================================

        /**
         * Verifica permisos de geolocalización
         */
        async function verificarPermisosGPS() {
            const logPrefix = '[PADRE][GPS][PERMISOS]';

            try {
                if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                    const warningMsg = 'Geolocalización requiere HTTPS. Sirve la aplicación con HTTPS para funcionalidad GPS completa.';
                    logger.warn(`${logPrefix} ${warningMsg}`);
                    return true; // Permitir continuar pero con warning
                }

                if (!navigator.permissions) {
                    logger.warn(`${logPrefix} API de permisos no soportada, asumiendo permisos concedidos`);
                    return true;
                }

                const permiso = await navigator.permissions.query({ name: 'geolocation' });
                logger.info(`${logPrefix} Estado de permisos: ${permiso.state}`);

                switch (permiso.state) {
                    case 'granted':
                        return true;
                    case 'denied':
                        logger.error(`${logPrefix} Permisos denegados`);
                        return false;
                    case 'prompt':
                        logger.info(`${logPrefix} Solicitando permisos...`);
                        return true;
                    default:
                        return true;
                }
            } catch (error) {
                logger.error(`${logPrefix} Error verificando permisos:`, error);
                return true;
            }
        }

        /**
         * Calcula la distancia entre dos puntos GPS usando la fórmula de Haversine
         * @param {number} lat1 - Latitud del punto 1
         * @param {number} lon1 - Longitud del punto 1
         * @param {number} lat2 - Latitud del punto 2
         * @param {number} lon2 - Longitud del punto 2
         * @returns {number} Distancia en metros
         */
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Radio de la Tierra en metros
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                     Math.cos(φ1) * Math.cos(φ2) *
                     Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; // Distancia en metros
        }

        /**
         * Helper: obtener coordenadas P-0 de la aventura actual (evita hardcodear lat/lng).
         * Accesible desde activarGPS y CENTRAR_EN_UBICACION.
         */
        function _obtenerCoordenadasP0Fallback() {
            try {
                const coords = window.__vv_coordenadasAventura || (window.AVENTURA_PARADAS);
                if (Array.isArray(coords)) {
                    const p0 = coords.find(e => e.id === 'P-0' && e.coordenadas);
                    if (p0 && p0.coordenadas) {
                        return { lat: p0.coordenadas.lat, lng: p0.coordenadas.lng };
                    }
                    const primera = coords.find(e => e.tipo === 'parada' && e.coordenadas);
                    if (primera && primera.coordenadas) {
                        return { lat: primera.coordenadas.lat, lng: primera.coordenadas.lng };
                    }
                }
            } catch (e) { /* ignore */ }
            return { lat: 39.47876, lng: -0.37626 };
        }

        /**
         * Activa GPS usando navigator.geolocation.watchPosition
         */
        async function activarGPS() {
            const logPrefix = '[PADRE][GPS][ACTIVAR]';

            // Mutex: si ya hay una activación en curso, devolver la promesa existente
            const est = getEstadoSafe();
            est.gps = est.gps || {};
            if (est.gps.activando) {
                logger.debug(`${logPrefix} Activación ya en progreso, esperando resultado existente`);
                try { return await est.gps.activandoPromise; } catch (e) { throw e; }
            }

            // Marcar como en progreso y guardar la promesa para otras llamadas concurrentes
            let resolveActivacion, rejectActivacion;
            const activacionPromise = new Promise((resolve, reject) => { resolveActivacion = resolve; rejectActivacion = reject; });
            est.gps.activando = true;
            est.gps.activandoPromise = activacionPromise;

            try {
                logger.info(`${logPrefix} Iniciando activación GPS...`);

                // Antes de intentar fallback a hijo2, esperar brevemente a que los hijos estén listos
                try {
                    if (window.mensajeria && typeof window.mensajeria.esperarHijosListos === 'function') {
                        const esperar = window.mensajeria.esperarHijosListos;
                        const waitPromise = typeof esperar === 'function' ? esperar(5000) : Promise.resolve({ ready: true });
                        const dynamicTimeout = window.ajustarTimeoutPorConexion ? window.ajustarTimeoutPorConexion(5000) : 5000;
                        const race = await Promise.race([waitPromise, new Promise(r => setTimeout(() => r({ timeout: true }), dynamicTimeout))]);
                        if (race && race.timeout) {
                            logger.warn(`${logPrefix} Espera de hijosListos expiró (${dynamicTimeout}ms); proceder de todos modos`);
                        } else {
                            logger.debug(`${logPrefix} Hijos listos o settled antes de iniciar GPS`);
                        }
                    }
                } catch (e) { logger.debug(`${logPrefix} Error esperando hijos listos:`, e); }

                // Comprobar que el iframe hijo2 permite geolocation (informativo)
                try {
                    const iframeHijo2 = document.getElementById('hijo2');
                    if (iframeHijo2 && typeof iframeHijo2.getAttribute === 'function') {
                        const allowAttr = iframeHijo2.getAttribute('allow') || '';
                        if (!allowAttr.includes('geolocation')) {
                            logger.warn(`${logPrefix} Iframe 'hijo2' no expone 'geolocation' en allow attribute; fallback P-0 puede fallar`);
                        } else {
                            logger.debug(`${logPrefix} Iframe 'hijo2' tiene allow="geolocation"`);
                        }
                    }
                } catch (e) { /* ignore */ }

                // Diagnostics: report permission API status and environment
                try {
                    if (navigator.permissions && typeof navigator.permissions.query === 'function') {
                        navigator.permissions.query({ name: 'geolocation' }).then(r => logger.debug(`${logPrefix} permisos.geolocation state: ${r.state}`)).catch(() => {});
                    }
                    logger.debug(`${logPrefix} userAgent: ${navigator.userAgent}`);
                } catch (diagErr) { /* ignore diagnostics */ }

                // Runtime-safe estado + gps subobj (re-using 'est' definido arriba)
                est.gps = est.gps || {};

                // Verificar permisos
                const permisosConcedidos = await verificarPermisosGPS();
                if (!permisosConcedidos) {
                    est.gps.error = 'Permisos de geolocalización denegados';
                    est.gps.permisos = false;
                    est.gps.activo = false;
                    throw new Error(est.gps.error);
                }

                // Verificar soporte
                if (!navigator.geolocation) {
                    est.gps.error = 'Geolocalización no soportada';
                    est.gps.activo = false;
                    throw new Error(est.gps.error);
                }

                // Si ya está activo, no hacer nada
                if (est.gps.activo && est.gps.watchId !== null) {
                    logger.info(`${logPrefix} GPS ya activo`);
                    resolveActivacion(true);
                    return true;
                }

                logger.debug(`${logPrefix} Iniciando watchPosition...`);

                // Try several quick high-accuracy getCurrentPosition attempts (with backoff) to obtain an immediate usable fix
                try {
                    if (navigator.geolocation && typeof navigator.geolocation.getCurrentPosition === 'function') {
                        const gpsCfg = (window.Config && window.Config.GPS) ? window.Config.GPS : {};
                        const maxAttempts = Number(gpsCfg.HIGH_ACC_INIT_ATTEMPTS || 2);
                        const baseTimeout = Number(gpsCfg.INIT_ATTEMPT_TIMEOUT_MS || 5000);

                        const getCurrentPositionAsync = (opts) => new Promise((resolve, reject) => {
                            navigator.geolocation.getCurrentPosition(resolve, reject, opts);
                        });

                        let initialAccepted = false;
                        for (let i = 0; i < maxAttempts; i++) {
                            // Apply connection-aware timeout adjustment when available
                            const rawTimeout = Math.round(baseTimeout * Math.pow(1.8, i)); // mild exponential backoff
                            const timeoutMs = (typeof ajustarTimeoutPorConexion_S1 === 'function')
                                ? ajustarTimeoutPorConexion_S1(rawTimeout)
                                : rawTimeout;
                            try {
                                try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.inicial_intentos'); } catch (e) { /* ignore */ }
                                const fresh = await getCurrentPositionAsync({ enableHighAccuracy: true, timeout: timeoutMs, maximumAge: 0 });
                                const a2 = fresh.coords && fresh.coords.accuracy;
                                logger.info(`${logPrefix} getCurrentPosition inicial intento ${i + 1}/${maxAttempts}: [${fresh.coords.latitude.toFixed(6)}, ${fresh.coords.longitude.toFixed(6)}] (±${Math.round(a2)}m)`);

                                if (typeof a2 === 'number' && (!gpsCfg.REJECT_ACCURACY_M || a2 < gpsCfg.REJECT_ACCURACY_M)) {
                                    // Accept this initial position
                                    const fLat = fresh.coords.latitude;
                                    const fLng = fresh.coords.longitude;
                                    est.gps.posicionUsuario = { lat: fLat, lng: fLng, accuracy: a2, timestamp: fresh.timestamp };
                                    est.gps.ultimaUbicacion = est.gps.posicionUsuario;
                                    est.gps.precision = a2;
                                    est.gps.permisos = true;
                                    initialAccepted = true;
                                    try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.inicial_intentos_exitosos'); } catch (e) { /* ignore */ }
                                    logger.debug(`${logPrefix} ✅ Posición inicial de alta precisión aceptada (±${Math.round(a2)}m)`);
                                    break;
                                } else {
                                    logger.warn(`${logPrefix} Posición inicial obtenida pero precisión insuficiente: ±${Math.round(a2)}m`);
                                    try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.inicial_intentos_precision_insuficiente'); } catch (e) { /* ignore */ }
                                }
                            } catch (errAttempt) {
                                logger.debug(`${logPrefix} getCurrentPosition intento ${i + 1} falló:`, errAttempt && errAttempt.message ? errAttempt.message : errAttempt);
                                try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.inicial_intentos_fallidos'); } catch (e) { /* ignore */ }
                            }
                        }

                        // If after attempts we still don't have an acceptable position, try to obtain safe fallback coords (P-0) from hijo2
                        if (!initialAccepted) {
                            logger.warn(`${logPrefix} No se obtuvo posición inicial aceptable tras ${maxAttempts} intentos; intentando fallback a coordenadas de inicio (P-0)`);
                            try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.fallback_intento_hijo2'); } catch (e) { /* ignore */ }
                            try {
                                const coordenadasResponse = await solicitarCoordenadasHijo('hijo2', { paradaId: 'P-0', incluirMetadatos: false, contexto: 'gps_fallback' }, ajustarTimeoutPorConexionSafe(5000));

                                if (coordenadasResponse && coordenadasResponse.exito && coordenadasResponse.coordenadas && Array.isArray(coordenadasResponse.coordenadas) && coordenadasResponse.coordenadas.length > 0 && coordenadasResponse.coordenadas[0].coordenadas) {
                                    const c = coordenadasResponse.coordenadas[0].coordenadas;
                                    est.gps.posicionUsuario = { lat: c.lat || c[0], lng: c.lng || c[1], accuracy: 1000, timestamp: Date.now() };
                                    est.gps.ultimaUbicacion = est.gps.posicionUsuario;
                                    est.gps.precision = 1000;
                                    try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.fallback_hijo2_ok'); } catch (e) { /* ignore */ }
                                    logger.info(`${logPrefix} Coordenadas de fallback obtenidas de hijo2 y aplicadas: [${est.gps.posicionUsuario.lat}, ${est.gps.posicionUsuario.lng}]`);
                                } else {
                                    logger.warn(`${logPrefix} Respuesta inválida de coordenadas de fallback:`, coordenadasResponse);
                                    // Fallback: obtener P-0 de los datos locales de coordenadas-aventuras
                                    const fallbackCoords = _obtenerCoordenadasP0Fallback();
                                    est.gps.posicionUsuario = { ...fallbackCoords, accuracy: 1000, timestamp: Date.now() };
                                    est.gps.ultimaUbicacion = est.gps.posicionUsuario;
                                    est.gps.precision = 1000;
                                    try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.fallback_p0'); } catch (e) { /* ignore */ }
                                    logger.info(`${logPrefix} Fallback a inicio (P-0) aplicado: [${est.gps.posicionUsuario.lat}, ${est.gps.posicionUsuario.lng}]`);
                                }
                            } catch (err) {
                                // En caso de timeout o error al solicitar a hijo2, fallback a P-0
                                const fallbackCoords = _obtenerCoordenadasP0Fallback();
                                est.gps.posicionUsuario = { ...fallbackCoords, accuracy: 1000, timestamp: Date.now() };
                                est.gps.ultimaUbicacion = est.gps.posicionUsuario;
                                est.gps.precision = 1000;
                                try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.fallback_p0'); } catch (e) { /* ignore */ }
                                logger.warn(`${logPrefix} Error solicitando coordenadas a hijo2 para fallback (${err.message}); fallback a inicio (P-0)`);
                            }
                        }
                    }
                } catch (e) {
                    logger.debug(`${logPrefix} getCurrentPosition iniciales fallaron:`, e);
                }

                // ✅ DIAGNÓSTICO GPS: Historial de posiciones para análisis
                if (!window._gpsHistorial) {
                    window._gpsHistorial = [];
                    window._gpsActivadoEn = Date.now();
                }

                // Iniciar watchPosition
                est.gps.watchId = navigator.geolocation.watchPosition(
                    // Success callback
                    (position) => {
                        const { latitude: lat, longitude: lng, accuracy } = position.coords;

                        // Guardar en historial para diagnóstico
                        window._gpsHistorial.push({
                            lat,
                            lng,
                            accuracy,
                            timestamp: position.timestamp,
                            recibidoEn: Date.now(),
                            heading: position.coords.heading,
                            speed: position.coords.speed
                        });
                        // Mantener solo las últimas 20 posiciones
                        if (window._gpsHistorial.length > 20) window._gpsHistorial.shift();

                        // ✅ CORRECCIÓN CRÍTICA: Filtro de precisión reducido de 100m a 50m
                        // Solo actualizar si precisión < 50m para evitar mostrar posiciones inexactas
                        if (accuracy > 50) {
                            logger.warn(`${logPrefix} Precisión GPS insuficiente (${Math.round(accuracy)}m > 50m), ignorando actualización`);
                            // Mostrar overlay visual al usuario
                            try { if (typeof showGpsOutOfRangeOverlay === 'function') showGpsOutOfRangeOverlay(accuracy); } catch (e) { /* ignore */ }
                            return;
                        }

                        // Actualizar estado GPS
                        est.gps.posicionUsuario = { lat, lng, accuracy, timestamp: position.timestamp };
                        est.gps.ultimaUbicacion = { lat, lng, accuracy, timestamp: position.timestamp };
                        est.gps.precision = accuracy;
                        est.gps.error = null;
                        est.gps.activo = true;
                        // Reset retries after successful update
                        est.gps.retries = 0;
                        est.gps.permisos = true;

                        logger.debug(`${logPrefix} 📍 Ubicación GPS: [${lat.toFixed(6)}, ${lng.toFixed(6)}] (±${Math.round(accuracy)}m)`);

                        // Si la precisión es absurdamente alta, intentar diagnóstico y un getCurrentPosition puntual
                        try {
                            const gpsCfg = (window.Config && window.Config.GPS) ? window.Config.GPS : null;
                            if (gpsCfg && typeof accuracy === 'number' && accuracy >= gpsCfg.REJECT_ACCURACY_M) {
                                            logger.warn(`${logPrefix} Posición descartada por precisión (±${Math.round(accuracy)}m >= REJECT ${gpsCfg.REJECT_ACCURACY_M}m)`);
                                            try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.posicion_descartada'); } catch (e) { /* ignore */ }
                                        try {
                                            // Telemetría: GPS descartado por baja precisión
                                            registrarEvento && typeof registrarEvento === 'function' && registrarEvento('GPS_DESCARTADO', {
                                                accuracy: accuracy,
                                                lat: position?.coords?.latitude,
                                                lng: position?.coords?.longitude,
                                                contexto: 'watchPosition_diagnostico',
                                                timestamp: Date.now()
                                            });
                                        } catch (e) { /* ignore telemetry errors */ }
                                        try {
                                            // Mostrar overlay informativo al usuario
                                            if (typeof showGpsOutOfRangeOverlay === 'function') showGpsOutOfRangeOverlay(accuracy);
                                        } catch (e) { /* ignore UI errors */ }
                                // Log completo para diagnóstico
                                try { logger.debug(`${logPrefix} Posición completa (diagnóstico):`, position); } catch (e) { /* ignore */ }

                                // Intentar obtener una posición puntual más precisa
                                try {
                                     try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.diagnostico_iniciado'); } catch (e) { /* ignore */ }
                                    navigator.geolocation.getCurrentPosition(
                                        (fresh) => {
                                            const a2 = fresh?.coords?.accuracy;
                                            logger.info(`${logPrefix} getCurrentPosition diagnostico: [${fresh.coords.latitude.toFixed(6)}, ${fresh.coords.longitude.toFixed(6)}] (±${Math.round(a2)}m)`);
                                            if (typeof a2 === 'number' && a2 < gpsCfg.REJECT_ACCURACY_M) {
                                                // Actualizar estado con la posición fresca y procesarla
                                                const fLat = fresh.coords.latitude;
                                                const fLng = fresh.coords.longitude;
                                                est.gps.posicionUsuario = { lat: fLat, lng: fLng, accuracy: a2, timestamp: fresh.timestamp };
                                                est.gps.ultimaUbicacion = { lat: fLat, lng: fLng, accuracy: a2, timestamp: fresh.timestamp };
                                                est.gps.precision = a2;
                                                logger.debug(`${logPrefix} ✅ Posición fresca aceptada y procesada`);
                                                try {
                                                    if (window.funcionesMapa && typeof window.funcionesMapa.procesarPosicionGPSParaAventura === 'function') {
                                                        window.funcionesMapa.procesarPosicionGPSParaAventura(fresh);
                                                    }
                                                } catch (procErr) {
                                                    logger.warn(`${logPrefix} Error procesando posición fresca:`, procErr);
                                                }
                                                try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.diagnostico_ok'); } catch (e) { /* ignore */ }
                                            } else {
                                                logger.warn(`${logPrefix} getCurrentPosition tampoco mejoró precisión: ±${Math.round(a2)}m`);
                                                try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.diagnostico_no_mejoro'); } catch (e) { /* ignore */ }
                                            }
                                        },
                                        (err) => {
                                            logger.warn(`${logPrefix} getCurrentPosition diagnóstico falló:`, err && err.message ? err.message : err);
                                            try { typeof window.incrementarContador === 'function' && window.incrementarContador('gps.diagnostico_fallo'); } catch (e) { /* ignore */ }
                                        },
                                        { enableHighAccuracy: true, timeout: ajustarTimeoutPorConexion_S1(30000), maximumAge: 0 }
                                    );
                                } catch (errGet) {
                                    logger.warn(`${logPrefix} Error invocando getCurrentPosition diagnóstico:`, errGet);
                                }

                                // No continuar con el broadcast usando esta posición; esperar a la posición fresca
                                return;
                            }
                        } catch (diagErr) {
                            logger.warn(`${logPrefix} Error en diagnóstico de precisión GPS:`, diagErr);
                        }

                        // ✅ CRÍTICO: Llamar procesamiento GPS en funciones-mapa.js
                        if (window.funcionesMapa && typeof window.funcionesMapa.procesarPosicionGPSParaAventura === 'function') {
                            try {
                                window.funcionesMapa.procesarPosicionGPSParaAventura(position);
                                logger.debug(`${logPrefix} ✅ Posición GPS procesada por funciones-mapa`);
                                // Ocultar overlay si estaba visible: posición aceptada
                                try { if (typeof hideGpsOutOfRangeOverlay === 'function') hideGpsOutOfRangeOverlay(); } catch (e) { /* ignore UI errors */ }
                            } catch (procesarError) {
                                logger.error(`${logPrefix} ❌ Error procesando posición GPS:`, procesarError);
                            }
                        } else {
                            logger.warn(`${logPrefix} ⚠️ funcionesMapa.procesarPosicionGPSParaAventura no disponible`);
                        }

                        // Notificar a todos los hijos de la actualización de ubicación
                        try {
                            // Instrumentación: listar hijos que declaran capability 'gps'
                            try {
                                const targets = typeof hijosConCapability === 'function' ? hijosConCapability('gps') : [];
                                logger.debug(`${logPrefix} Broadcast targets for 'gps':`, targets);
                            } catch (e) { /* ignore */ }

                            // Normalizar y enriquecer payload: enviar tanto `precision` como `accuracy`
                            const gpsCfg = (window.Config && window.Config.GPS) ? window.Config.GPS : null;
                            const precision = accuracy;

                            // Rechazar broadcasts con precisión absurda (evita spam y falsas detecciones)
                            if (gpsCfg && typeof precision === 'number' && precision >= gpsCfg.REJECT_ACCURACY_M) {
                                logger.warn(`${logPrefix} Posición descartada por precisión (±${Math.round(precision)}m >= REJECT ${gpsCfg.REJECT_ACCURACY_M}m)`);
                                try {
                                    registrarEvento && typeof registrarEvento === 'function' && registrarEvento('GPS_DESCARTADO', {
                                        accuracy: precision,
                                        lat,
                                        lng,
                                        contexto: 'watchPosition_broadcast',
                                        timestamp: Date.now()
                                    });
                                } catch (e) { /* ignore telemetry errors */ }
                                try { if (typeof showGpsOutOfRangeOverlay === 'function') showGpsOutOfRangeOverlay(precision); } catch (e) { /* ignore */ }
                            } else {
                                const payload = {
                                    tipo: TIPOS_MENSAJE_S1.NAVEGACION.GPS.UBICACION_ACTUALIZADA,
                                    origen: getPadreId(),
                                    datos: {
                                        lat,
                                        lng,
                                        accuracy,
                                        precision,
                                        timestamp: position.timestamp,
                                        weak: gpsCfg && typeof precision === 'number' && precision > gpsCfg.SOFT_ACCURACY_M
                                    }
                                };

                                if (typeof broadcastToCapability === 'function') {
                                    const r = broadcastToCapability('gps', payload);
                                    logger.debug(`${logPrefix} BroadcastToCapability result:`, r);
                                } else if (typeof enviarMensaje_S1 === 'function') {
                                    const r = enviarMensaje_S1(Object.assign({ destino: 'todos' }, payload));
                                    if (r && typeof r.then === 'function') r.catch(error => logger.error(`${logPrefix} Error notificando ubicación:`, error));
                                }
                            }
                        } catch (error) {
                            logger.error(`${logPrefix} Error notificando ubicación:`, error);
                        }

                const progreso = Math.max(0, Math.min(100, (rangoMaximo / distanciaActual) * 100));

                        let idx = (typeof estado !== 'undefined' && typeof estado.indiceProgreso === 'number') ? estado.indiceProgreso : null;
                        // Si no hay índice, intentar usar estado.paradaActual para localizar
                        if (idx == null && typeof estado !== 'undefined' && estado.paradaActual) {
                            const indexActual = paradas.findIndex(p => p.padreid === estado.paradaActual || p.parada_id === estado.paradaActual);

                        }

                        let siguiente = null;
                        if (idx == null) {
                            siguiente = paradas[0];
                        } else if (idx + 1 < paradas.length) {
                            siguiente = paradas[idx + 1];
                        } else {

                            return null;
