    <script>
    /* Escalado proporcional PURO: sincronizar con viewport del padre SIN LÍMITES */
    (function(){
        function escalar(){
            var w, h;
            try { w = (window.top || window.parent).innerWidth; h = (window.top || window.parent).innerHeight; }
            catch(e) { w = window.innerWidth; h = window.innerHeight; }
            var f = Math.min(w, h) * 0.025; // Sin límites - proporcional puro
            document.documentElement.style.fontSize = f + "px";
        }
        escalar();
        window.addEventListener("resize", escalar);
    })();
    </script>

        #progressBar {
            height: 100%;

        #progressBar::after {
            content: '';

            right: -0.5rem;
            top: 50%;

    <script type="module">
    import { retryUntilAvailable, resolverIdsParada, getPadreId } from './js/utils.js';
    import { TIPOS_MENSAJE } from './js/constants.js';
    import logger from './js/logger.js';

    // NOTA: Bloque IIFE "RESPALDO" para PADRE_PIDE_MANEJADORES eliminado (obsoleto).
    // El sistema actual usa state-manager centralizado sin necesidad de migración manual.

    // Fallbacks que esperan a que window.mensajeria esté disponible
    const enviarMensaje = async (...args) => {
        // En hijos, usar postMessage directamente al padre
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            try {
                window.parent.postMessage({
                    tipo: mensaje.tipo,
                    origen: mensaje.origen || 'hijo3',
                    destino: mensaje.destino,
                    datos: mensaje.datos,
                    timestamp: Date.now()
                }, window.location.origin);
                return Promise.resolve();
            } catch (e) {
                console.error('[hijo3] Error enviando mensaje via postMessage:', e);
                return Promise.reject(e);
            }
        } else {
            // Fallback al método anterior si no estamos en iframe
            return await retryUntilAvailable(
                () => window.mensajeria.enviarMensaje(...args),
                () => window.mensajeria && window.mensajeria.enviarMensaje,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    const registrarControlador = async (tipo, callback) => {
        // En hijos, los controladores se registran localmente para mensajes del padre
        if (window.parent && window.parent !== window) {
            // Registrar listener para mensajes del padre
            const listener = (event) => {
                if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                    callback(event.data);
                }
            };
            window.addEventListener('message', listener);
            return Promise.resolve(() => window.removeEventListener('message', listener));
        } else {
            // Fallback al método anterior
            return await retryUntilAvailable(
                () => window.mensajeria.registrarControlador(tipo, callback),
                () => window.mensajeria && window.mensajeria.registrarControlador,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    const enviarMensajeConConfirmacion = async (...args) => {
        // Similar a enviarMensaje pero esperando confirmación
        if (window.parent && window.parent !== window) {
            const mensaje = args[0];
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error('Timeout esperando confirmación')), 
                    window.ajustarTimeoutPorConexion ? window.ajustarTimeoutPorConexion(5000) : 5000);
                
                const confirmListener = (event) => {
                    if (event.source === window.parent && event.data && event.data.tipo === 'SISTEMA.CONFIRMACION') {
                        clearTimeout(timeout);
                        window.removeEventListener('message', confirmListener);
                        resolve();
                    }
                };
                
                window.addEventListener('message', confirmListener);
                
                try {
                    window.parent.postMessage({
                        tipo: mensaje.tipo,
                        origen: mensaje.origen || 'hijo3',
                        destino: mensaje.destino,
                        datos: mensaje.datos,
                        timestamp: Date.now(),
                        requiereConfirmacion: true
                    }, window.location.origin);
                } catch (e) {
                    clearTimeout(timeout);
                    window.removeEventListener('message', confirmListener);
                    reject(e);
                }
            });
        } else {
            return await retryUntilAvailable(
                () => window.mensajeria.enviarMensajeConConfirmacion(...args),
                () => window.mensajeria && window.mensajeria.enviarMensajeConConfirmacion,
                10, 500, (...a) => (window.logger || console).error(...a)
            );
        }
    };

    // ==================== MESSAGING ADAPTER PARA COMUNICACIÓN CON PADRE ====================
    // Este adapter permite a los hijos registrar controladores centralmente en el state-manager del padre
    if (typeof window !== 'undefined' && typeof window.messagingAdapter === 'undefined') {
        window.messagingAdapter = {
            /**
             * Registra un controlador en el state-manager centralizado del padre
             * @param {string} controladorId - ID único del controlador
             * @param {Function} handler - Función manejadora
             * @param {Object} opciones - Opciones incluyendo tipoMensaje
             * @returns {Promise<boolean>} - True si se registró, false si ya existía
             */
            registrarControladorCentral: async function(controladorId, handler, opciones = {}) {
                const iframeId = window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo';
                const tipo = opciones.tipoMensaje || controladorId;
                
                // El registro real ocurre localmente - el padre sincroniza via HIJO_MANEJADORES
                // NOTA: No verificar __CONTROLADOR_REGISTRADOS aquí porque ya se hace en registrarControladorSeguro
                // La verificación duplicada causaba que el listener nunca se añadiera
                
                // Registrar listener local para este tipo de mensaje con soporte para confirmaciones automáticas
                window.addEventListener('message', async function adapterListener(event) {
                    if (event.source === window.parent && event.data && event.data.tipo === tipo) {
                        try {
                            // Ejecutar handler y capturar resultado
                            const resultado = await handler(event.data);
                            
                            // Si el mensaje requería confirmación y el handler devolvió resultado, enviar confirmación automática
                            if (event.data.requiereConfirmacion && event.data.id && resultado !== undefined) {
                                try {
                                    const confirmacion = {
                                        tipo: (typeof TIPOS_MENSAJE !== 'undefined' && TIPOS_MENSAJE.SISTEMA && TIPOS_MENSAJE.SISTEMA.CONFIRMACION) || 'SISTEMA.CONFIRMACION',
                                        idOriginal: event.data.id,
                                        origen: iframeId,
                                        destino: event.data.origen || 'padre',
                                        timestamp: Date.now(),
                                        datos: resultado
                                    };
                                    if (window.parent && window.parent !== window) {
                                        window.parent.postMessage(confirmacion, '*');
                                        (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Auto-confirmación enviada para ${event.data.id}`);
                                    }
                                } catch (confError) {
                                    (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error enviando confirmación:`, confError);
                                }
                            }
                        } catch (e) {
                            (window.logger || console).error && (window.logger || console).error(`[messagingAdapter] Error en handler ${tipo}:`, e && e.message);
                        }
                    }
                });
                
                (window.logger || console).info && (window.logger || console).info(`[messagingAdapter] Handler registrado para ${tipo} en ${iframeId}`);
                return true;
            },
            
            /**
             * Envía mensaje al padre para que lo procese centralmente
             */
            enviarMensajeCentral: async function(mensaje) {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage(mensaje, '*'); // '*' para compatibilidad con file://
                    return { exito: true, metodo: 'postMessage' };
                }
                return { exito: false, error: 'No hay padre disponible' };
            }
        };
        (window.logger || console).info && (window.logger || console).info('[HIJO] messagingAdapter creado para comunicación con padre');
    }

    // Wrapper seguro para evitar doble registro de controladores en hijos
    if (typeof window !== 'undefined' && typeof window.registrarControladorSeguro === 'undefined') {
        window.__CONTROLADOR_REGISTRADOS = window.__CONTROLADOR_REGISTRADOS || new Set();
        window.registrarControladorSeguro = async function(tipo, handler, opciones) {
            try {
                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControladorSeguro called: ${tipo}`);
                if (!tipo || typeof handler !== 'function') {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro parámetros inválidos: tipo=${tipo}`);
                    return;
                }
                if (window.__CONTROLADOR_REGISTRADOS.has(tipo)) {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Controlador ya registrado, omitiendo: ${tipo}`);
                    return;
                }
                window.__CONTROLADOR_REGISTRADOS.add(tipo);
                // Prefer central registration via messagingAdapter/state-manager when available
                try {
                    const iframeId = (window.name || (typeof CONFIG_HIJO !== 'undefined' && CONFIG_HIJO.IFRAME_ID) || 'hijo');
                    const controladorId = `${iframeId}:${tipo}`;
                    if (window.messagingAdapter && typeof window.messagingAdapter.registrarControladorCentral === 'function') {
                        try {
                            const centralRes = await window.messagingAdapter.registrarControladorCentral(controladorId, handler, { tipoMensaje: tipo });
                            if (centralRes === true) {
                                (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador registered centrally: ${controladorId} -> ${tipo}`);
                                return true;
                            }
                        } catch (e) {
                            (window.logger || console).warn && (window.logger || console).warn(`[HIJO] Central registrar failed for ${tipo}: ${e && e.message}`);
                        }
                    }
                    if (typeof registrarControlador === 'function') {
                        try {
                            const res = await safeRegistrar(tipo, handler, opciones);
                            (window.logger || console).info && (window.logger || console).info(`[HIJO] registrarControlador delegated to mensajeria for ${tipo}`);
                            return res;
                        } catch (err) {
                            (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControlador failed for ${tipo}: ${err && err.message}`);
                        }
                    }
                } catch (e) {
                    (window.logger || console).warn && (window.logger || console).warn(`[HIJO] registrarControladorSeguro central attempt error for ${tipo}: ${e && e.message}`);
                }
                // Handler remains tracked locally in `window.__CONTROLADOR_REGISTRADOS`
                (window.logger || console).info && (window.logger || console).info(`[HIJO] Handler queued for migration: ${tipo} (local queue)`);
                return;
            } catch (e) {
                (window.logger || console).error(`[HIJO] Error registrando controlador seguro ${tipo}:`, e && e.message);
            }
        };
    }

    // Helper: safeRegistrar delegates to registrarControladorSeguro when available
    if (typeof window !== 'undefined' && typeof window.safeRegistrar === 'undefined') {
        window.safeRegistrar = async function(tipo, handler, opciones) {
            try {
                if (!tipo || typeof handler !== 'function') return;
                if (window.__CONTROLADOR_REGISTRADOS && window.__CONTROLADOR_REGISTRADOS.has(tipo)) return;
                if (typeof window.registrarControladorSeguro === 'function') return window.registrarControladorSeguro(tipo, handler, opciones);
                if (typeof registrarControlador === 'function') return registrarControlador(tipo, handler, opciones);
            } catch (e) { (window.logger || console).warn && (window.logger || console).warn('[HIJO] safeRegistrar error', e && e.message); }
        };
    }

    const CONFIG_HIJO = {
        IFRAME_ID: 'hijo3',
        COMPONENTE_ID: 'AUDIO',
        DEBUG: true
    };

    // Exportar CONFIG_HIJO para compatibilidad con mensajeria.js y para que el padre lo consulte
    if (typeof module !== 'undefined' && module.exports) {
        module.exports = CONFIG_HIJO;
    } else {
        window.CONFIG_HIJO = CONFIG_HIJO;
    }

    let currentAudioId = null;
    let isPlaying = false; // Estado de reproducción - ACTUALIZADO 2026-01-08

    // ═══════════════════════════════════════════════════════════════════════════
    // 🔧 UTILIDADES - AJUSTE DINÁMICO DE TIMEOUTS
    // ═══════════════════════════════════════════════════════════════════════════

    /**
     * Calcula multiplicador de timeout según tipo de conexión
     * Metodología consistente con codigo-padre.html (utils.js)
     * @returns {number} Multiplicador (1.0-3.0)
     */
    function calcularMultiplicadorTimeoutConexion() {
        try {
            if (!navigator.connection) {
                return 1.5; // Valor moderado si no hay info de conexión
            }

            const effectiveType = navigator.connection.effectiveType || 'unknown';
            const multiplicadores = {
                '4g': 1.0,      // Conexión rápida
                '3g': 1.5,      // Conexión media - 50% más tiempo
                '2g': 2.0,      // Conexión lenta - doble tiempo
                'slow-2g': 3.0, // Conexión muy lenta - triple tiempo
                'unknown': 1.5  // Desconocido - moderado
            };

            return multiplicadores[effectiveType] || 1.5;
        } catch (error) {
            console.warn('[HIJO3][TIMEOUT] Error calculando multiplicador:', error);
            return 1.5;
        }
    }

    /**
     * Ajusta timeout según conexión de red actual
     * @param {number} timeoutBase - Timeout base en ms
     * @returns {number} Timeout ajustado
     */
    function ajustarTimeoutPorConexion(timeoutBase) {
        const multiplicador = calcularMultiplicadorTimeoutConexion();
        const timeoutAjustado = Math.round(timeoutBase * multiplicador);
        console.debug(`[HIJO3][TIMEOUT] ${timeoutBase}ms -> ${timeoutAjustado}ms (${multiplicador}x)`);
        return timeoutAjustado;
    }

    // Estado del componente (homologado con otros hijos)
    const estado = {
        inicializado: false,
        modoActual: 'aventura',
        pendingCambioModo: null,
        hijoListoEnviado: false  // Flag para evitar envío duplicado de HIJO_LISTO
    };

    // Funciones de reproductor (fusionadas y adaptadas)
    function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function updateUI() {
        const playPauseBtn = document.getElementById('playPauseBtn');
        if (audioPlayer.paused) {
            playPauseBtn.innerHTML = '<i class="fas fa-play icon-play"></i>';
            isPlaying = false;
        } else {
            playPauseBtn.innerHTML = '<i class="fas fa-pause icon-play"></i>';
            isPlaying = true;
        }
    }

    // Prepara el audio en el reproductor y opcionalmente lo reproduce.
    // autoplay: boolean (por defecto false) — si es true intentará iniciar reproducción inmediatamente.
    async function cargarYReproducirAudio(audioId, autoplay = false) {
        // ✅ Usar función centralizada que prioriza datos del padre
        const files = obtenerAudioFiles();
        if (!files || !Array.isArray(files) || files.length === 0) {
            logger.error(`Audio array no disponible o vacío. Imposible preparar ${audioId}. ¿Se cargaron los audios desde el padre?`);
            return { exito: false, error: 'audioFiles_missing' };
        }
        const audioData = files.find(audio => audio.id === audioId || audio.id === `audio-${audioId}`);
        if (!audioData) {
            logger.error(`Audio no encontrado: ${audioId}`);
            return { exito: false, error: 'audio_not_found' };
        }

        // Preparar la fuente siempre (permite que el usuario pulse Play más tarde)
        audioPlayer.src = audioData.file;
        currentAudioId = audioId;

        if (autoplay) {
            try {
                await audioPlayer.play();
                return { exito: true, reproducido: true };
            } catch (playError) {
                // Es posible que el intento de autoplay sea bloqueado por la política del navegador.
                logger.warn(`[hijo3] Intento de autoplay bloqueado o fallido para ${audioId}:`, playError && playError.message ? playError.message : playError);
                return { exito: true, reproducido: false, autoplayBlocked: true };
            }
        }

        // Si no se debe reproducir automáticamente, indicamos que la carga fue correcta
        return { exito: true, reproducido: false };
    }

    // Elementos DOM
    const audioPlayer = document.getElementById('audioPlayer');
    const progressBar = document.getElementById('progressBar');
    const currentTimeElement = document.getElementById('currentTime');
    const durationElement = document.getElementById('duration');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const retosBtn = document.getElementById('retosBtn');

    // Event listener para botón de Play/Pause
    playPauseBtn.addEventListener('click', () => {
        if (audioPlayer.paused) {
            audioPlayer.play();
        } else {
            audioPlayer.pause();
        }
    });

    // Event listener para botón de Retos
    retosBtn.addEventListener('click', async () => {
        try {
            logger.info(`[hijo3] Botón de retos clickeado, solicitando reto al padre`);
            
            // Enviar solicitud al padre para mostrar un reto
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.RETO.SOLICITAR_RETO,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: { 
                    contexto: 'manual',
                    audioId: currentAudioId 
                }
            });
            
            logger.debug(`[hijo3] Solicitud de reto enviada exitosamente`);
        } catch (error) {
            logger.error(`[hijo3] Error al solicitar reto:`, error);
        }
    });

    // Event listener para barra de progreso (seek)
    const progressContainer = document.getElementById('progressContainer');
    // Allow vertical page scrolling while enabling horizontal drag on the bar
    // `pan-y` lets vertical scrolling but allows us to intercept horizontal gestures.
    progressContainer.style.touchAction = 'pan-y';
    // Internal state for dragging/seeking
    let isSeeking = false;
    let activePointerId = null;
    let initialX = 0;
    let initialY = 0;
    let lockedToSeeking = null; // null = undecided, true = seeking (horizontal), false = allow vertical scroll
    let wasPlayingDuringSeek = false;

    function updateProgressFromClientX(clientX) {
        try {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = clientX - rect.left;
            const percent = clickX / rect.width;
            const validPercent = Math.max(0, Math.min(1, percent));
            // Update progress bar UI
            if (isFinite(audioPlayer.duration) && audioPlayer.duration > 0) {
                progressBar.style.width = `${validPercent * 100}%`;
                // Update accessible attribute
                progressContainer.setAttribute('aria-valuenow', Math.round(validPercent * 100));
            } else {
                // If duration not available, just update visual width temporarily
                progressBar.style.width = `${validPercent * 100}%`;
            }
            return validPercent;
        } catch (error) {
            logger.error('[hijo3] updateProgressFromClientX error', error);
            return 0;
        }
    }

    progressContainer.addEventListener('click', (e) => {
        try {
            // Calcular posición del click relativa a la barra
            const percent = updateProgressFromClientX(e.clientX);
            
            // Validar rango (0-100%)
            const validPercent = Math.max(0, Math.min(1, percent));
            
            // Validar que el audio esté cargado y duration sea finito
            if (!audioPlayer || !isFinite(audioPlayer.duration) || audioPlayer.duration === 0) {
                logger.warn(`[hijo3] Audio no cargado o duration inválido, ignorando seek`);
                return;
            }
            
            // Saltar a la posición clickeada
            audioPlayer.currentTime = validPercent * audioPlayer.duration;
            
            logger.debug(`[hijo3] Seek en barra de progreso: ${(validPercent * 100).toFixed(1)}%`);
        } catch (error) {
            logger.error(`[hijo3] Error al hacer seek en barra de progreso:`, error);
        }
    });

    // Pointer/touch drag handlers for seamless mobile and desktop seeking
    progressContainer.addEventListener('pointerdown', (e) => {
        try {
            if (e.pointerType === 'mouse' && e.button !== 0) return; // only left button
            isSeeking = true;
            lockedToSeeking = null;
            initialX = e.clientX;
            initialY = e.clientY;
            activePointerId = e.pointerId;
            // We defer pausing until the user moves horizontally and we lock the gesture to seeking.
            activePointerId = e.pointerId;
            // Do not set pointer capture yet to allow normal vertical scrolling unless we lock to seeking.
            // updateProgressFromClientX(e.clientX); // only set on lock
        } catch (err) {
            logger.error('[hijo3] pointerdown error', err);
        }
    });

    progressContainer.addEventListener('pointermove', (e) => {
        try {
            if (!isSeeking || e.pointerId !== activePointerId) return;
            // If undecided, check if movement leans horizontal vs vertical to lock behavior
            if (lockedToSeeking === null) {
                const dx = Math.abs(e.clientX - initialX);
                const dy = Math.abs(e.clientY - initialY);
                const H_LOCK_THRESHOLD = 10; // pixels before locking
                // If horizontal movement is more pronounced than vertical, lock to seeking
                if (dx > H_LOCK_THRESHOLD && dx > dy * 1.5) {
                    lockedToSeeking = true;
                    // Capture pointer now to receive subsequent pointer events without the page scrolling
                    try { progressContainer.setPointerCapture(activePointerId); } catch (err) {}
                    wasPlayingDuringSeek = !audioPlayer.paused && !audioPlayer.ended;
                    if (wasPlayingDuringSeek) audioPlayer.pause();
                    e.preventDefault();
                    updateProgressFromClientX(e.clientX);
                } else if (dy > H_LOCK_THRESHOLD && dy > dx * 1.5) {
                    // Lock to vertical scrolling and stop seeking behavior
                    lockedToSeeking = false;
                    // Release pointer capture if previously set
                    try { progressContainer.releasePointerCapture(activePointerId); } catch (err) {}
                    isSeeking = false; // allow page to scroll vertically
                } else {
                    // Not enough movement to decide yet; do nothing
                }
            } else if (lockedToSeeking === true) {
                // We are currently seeking; update progress
                e.preventDefault();
                updateProgressFromClientX(e.clientX);
            } else {
                // lockedToSeeking === false -> vertical scroll in progress; ignore pointermove
            }
        } catch (err) {
            logger.error('[hijo3] pointermove error', err);
        }
    });

    function finalizeSeek(clientX) {
        try {
            const percent = updateProgressFromClientX(clientX);
            if (isFinite(audioPlayer.duration) && audioPlayer.duration > 0) {
                audioPlayer.currentTime = percent * audioPlayer.duration;
            }
            // resume playback if it was playing before seek
            if (wasPlayingDuringSeek) {
                audioPlayer.play().catch(err => logger.warn('[hijo3] Unable to resume playback after seek', err));
            }
        } catch (err) {
            logger.error('[hijo3] finalizeSeek error', err);
        }
    }

    progressContainer.addEventListener('pointerup', (e) => {
        try {
            if (!isSeeking || e.pointerId !== activePointerId) return;
            if (lockedToSeeking === true) {
                finalizeSeek(e.clientX);
            }
            // Clean up
            isSeeking = false;
            lockedToSeeking = null;
            try { progressContainer.releasePointerCapture(e.pointerId); } catch (_) {}
            activePointerId = null;
        } catch (err) {
            logger.error('[hijo3] pointerup error', err);
        }
    });

    progressContainer.addEventListener('pointercancel', (e) => {
        try {
            if (!isSeeking || e.pointerId !== activePointerId) return;
            if (lockedToSeeking === true) finalizeSeek(e.clientX);
            isSeeking = false;
            lockedToSeeking = null;
            try { progressContainer.releasePointerCapture(e.pointerId); } catch(_){}
            activePointerId = null;
        } catch (err) {
            logger.error('[hijo3] pointercancel error', err);
        }
    });

    // Fallback for older browsers: touch events (if pointer events unsupported)
    progressContainer.addEventListener('touchstart', (e) => {
        try {
            const touch = e.touches[0];
            isSeeking = true;
            lockedToSeeking = null;
            initialX = touch.clientX;
            initialY = touch.clientY;
            // don't update yet until the user moves horizontally enough
            e.preventDefault();
        } catch (err) { logger.error('[hijo3] touchstart error', err); }
    }, { passive: false });
    progressContainer.addEventListener('touchmove', (e) => {
        try {
            if (!isSeeking) return;
            const touch = e.touches[0];
            const dx = Math.abs(touch.clientX - initialX);
            const dy = Math.abs(touch.clientY - initialY);
            const H_LOCK_THRESHOLD = 10;
            if (lockedToSeeking === null) {
                if (dx > H_LOCK_THRESHOLD && dx > dy * 1.5) {
                    lockedToSeeking = true;
                    wasPlayingDuringSeek = !audioPlayer.paused && !audioPlayer.ended;
                    if (wasPlayingDuringSeek) audioPlayer.pause();
                    e.preventDefault();
                    updateProgressFromClientX(touch.clientX);
                } else if (dy > H_LOCK_THRESHOLD && dy > dx * 1.5) {
                    lockedToSeeking = false;
                    isSeeking = false;
                    // allow scrolling
                }
            } else if (lockedToSeeking === true) {
                e.preventDefault();
                updateProgressFromClientX(touch.clientX);
            } else {
                // locked to vertical scrolling - ignore
            }
        } catch (err) { logger.error('[hijo3] touchmove error', err); }
    }, { passive: false });
    progressContainer.addEventListener('touchend', (e) => {
        try {
            if (!isSeeking) return;
            // touchend has no touches, use changedTouches
            const touch = e.changedTouches[0];
            if (lockedToSeeking === true) finalizeSeek(touch.clientX);
            isSeeking = false;
            lockedToSeeking = null;
        } catch (err) { logger.error('[hijo3] touchend error', err); }
    });

    // Keyboard support: seek with left/right arrow while progress container is focused
    progressContainer.addEventListener('keydown', (e) => {
        try {
            const step = 5; // 5 seconds per keypress
            if (!audioPlayer || !isFinite(audioPlayer.duration)) return;
            if (e.key === 'ArrowLeft') {
                audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - step);
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + step);
                e.preventDefault();
            }
        } catch (err) {
            logger.error('[hijo3] keydown error on progressContainer', err);
        }
    });

    // Event listeners para audio (adaptados para notificar al padre con enviarMensaje)
    audioPlayer.addEventListener('timeupdate', () => {
        // Validar que duration sea finito antes de calcular porcentaje
        if (isFinite(audioPlayer.duration) && audioPlayer.duration > 0) {
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressBar.style.width = `${percent}%`;
            progressContainer.setAttribute('aria-valuenow', Math.round(percent));
            currentTimeElement.textContent = formatTime(audioPlayer.currentTime);
        }
    });

    audioPlayer.addEventListener('loadedmetadata', () => {
        durationElement.textContent = formatTime(audioPlayer.duration);
    });

    audioPlayer.addEventListener('play', async () => {
        updateUI();
        if (currentAudioId) {
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.AUDIO.ESTADO_ACTUALIZADO,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: { audioId: currentAudioId, estado: 'reproduciendo' }
            });
        }
    });

    audioPlayer.addEventListener('pause', async () => {
        updateUI();
        if (currentAudioId) {
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.AUDIO.ESTADO_ACTUALIZADO,
                origen: CONFIG_HIJO.IFRAME_ID, // Se agrega el valor correcto
                datos: { audioId: currentAudioId, estado: 'pausado' }
            });
        }
    });

    audioPlayer.addEventListener('ended', async () => {
        if (currentAudioId) {
            await enviarMensaje({
                tipo: TIPOS_MENSAJE.AUDIO.FIN_REPRODUCCION,
                origen: CONFIG_HIJO.IFRAME_ID,
                destino: getPadreId(),
                datos: { audioId: currentAudioId, estado: 'finalizado' }
            });
        }
        updateUI();
    });

    audioPlayer.addEventListener('error', async () => {
        // Enviar AUDIO.ERROR al padre en caso de fallo
        await enviarMensaje({
            tipo: TIPOS_MENSAJE.AUDIO.ERROR,
            origen: CONFIG_HIJO.IFRAME_ID,
            destino: getPadreId(),
            datos: { audioId: currentAudioId, error: audioPlayer.error?.message || 'Error desconocido' }
        });
    });

    // Normaliza un valor de modo (acepta string u objeto) y devuelve
    // una cadena segura para usar en clases CSS y dataset.
    function normalizarModo(modo) {
        try {
            if (typeof modo === 'string') {
                modo = modo.trim();
            } else if (modo && typeof modo === 'object') {
                modo = modo.actual || modo.modo || modo.nombre || Object.values(modo).find(v => typeof v === 'string') || '';
            } else if (modo === null || typeof modo === 'undefined') {
                modo = '';
            } else {
                modo = String(modo);
            }
            modo = String(modo || '').trim().toLowerCase();
            // Dejar sólo caracteres seguros para clases: a-z0-9_- (reemplazar otros con guión)
            modo = modo.replace(/[^a-z0-9_-]/g, '-').replace(/^-+|-+$/g, '');
            return modo;
        } catch (e) {
            return '';
        }
    }

    // Función para actualizar la interfaz según el modo
    function actualizarInterfazModo(modo) {
        const modoSeguro = normalizarModo(modo);
        console.log(`[AUDIO] Actualizando interfaz para modo:`, { original: modo, normalizado: modoSeguro });
        const body = document.body;

        // Actualizar clases CSS (sólo si hay un modo válido)
        body.classList.remove('modo-casa', 'modo-aventura');
        if (modoSeguro) body.classList.add(`modo-${modoSeguro}`);

        logger.info(`[hijo3] Interfaz actualizada para modo: ${modoSeguro}`);
    }

    // Inicialización y controladores (adaptados a mensajería actual)
    try {
        // Ocultar la UI hasta que el padre confirme que los controladores están listos
        let _uiConfirmado = false;
        const _originalDisplay = (document.body && document.body.style && document.body.style.display) || '';
        try { if (document.body) document.body.style.display = 'none'; } catch (e) { /* ignore */ }
        function mostrarUI() {
            if (!_uiConfirmado) { console.warn('[hijo3] mostrarUI ignorado: esperando PADRE_CONFIRMA_HIJO_LISTO'); return; }
            try { if (document.body) document.body.style.display = _originalDisplay || 'block'; console.log('[hijo3] UI visible tras PADRE_CONFIRMA_HIJO_LISTO'); } catch (e) {}
        }

        // No necesitamos inicializarMensajeria aquí, los fallbacks esperan automáticamente

        // NOTA: HIJO_PREPARADO se envía MÁS ABAJO, DESPUÉS de registrar todos los controladores críticos.
        // Esto garantiza que el padre no envíe PADRE_DATOS antes de que los controladores estén listos.

        // ============================================================
        // CONTROLADOR 1: SISTEMA.PADRE_DATOS
        // ============================================================
        logger.info(`Hijo ${CONFIG_HIJO.IFRAME_ID} registrado el controlador PADRE_DATOS`);
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_DATOS, async (mensaje) => {
            const logPrefix = `[hijo3][PADRE_DATOS]`;

            try {
                if (!mensaje || !mensaje.origen) {
                    logger.error(`${logPrefix} Mensaje sin origen válido`, mensaje);
                    return;
                }

                logger.info(`${logPrefix} Datos del padre recibidos desde ${mensaje.origen}`);
                logger.info(`Hijo ${CONFIG_HIJO.IFRAME_ID} recibió PADRE_DATOS`);

                // ✅ PROCESAR DATOS INICIALES DEL PADRE
                if (mensaje.datos) {
                    const { modo, paradas, paradaActual } = mensaje.datos;

                    if (modo) {
                        logger.info(`${logPrefix} Procesando modo inicial del padre: ${modo}`);
                        actualizarInterfazModo(modo);
                    }

                    if (paradas) {
                        logger.debug(`${logPrefix} Paradas recibidas: ${paradas.length}`);
                        // Procesar paradas si necesario
                    }

                    if (paradaActual) {
                        logger.debug(`${logPrefix} Parada actual: ${paradaActual}`);
                        // Procesar parada actual si necesario
                    }
                }

            } catch (error) {
                logger.error(`${logPrefix} Error procesando PADRE_DATOS:`, error);
            }

            // Enviar HIJO_LISTO para completar handshake
            if (!estado.hijoListoEnviado) {
                try {
                    await enviarMensaje({
                        destino: getPadreId(),
                        tipo: TIPOS_MENSAJE.SISTEMA.HIJO_LISTO,
                        origen: CONFIG_HIJO.IFRAME_ID,
                        datos: {
                            componenteId: CONFIG_HIJO.COMPONENTE_ID,
                            iframeId: CONFIG_HIJO.IFRAME_ID,
                            timestamp: Date.now()
                        }
                    });
                    estado.hijoListoEnviado = true;
                    logger.info('[hijo3] HIJO_LISTO enviado al padre');
                } catch (error) {
                    logger.error('[hijo3] Error enviando HIJO_LISTO:', error);
                }
            }
        });

        /**
         * Controlador: SISTEMA.PADRE_CONFIRMA_HIJO_LISTO
         * Descripción: Recibe confirmación del padre de que los controladores están listos
         * Origen esperado: padre
         * Respuesta: Ninguna (preparado para futuras solicitudes de datos)
         */
        registrarControladorSeguro(TIPOS_MENSAJE.SISTEMA.PADRE_CONFIRMA_HIJO_LISTO, async (mensaje) => {
            const logPrefix = `[hijo3][PADRE_CONFIRMA_HIJO_LISTO][${mensaje?.origen || 'desconocido'}]`;

            try {
                console.log('[hijo3] PADRE_CONFIRMA_HIJO_LISTO recibido:', mensaje);
                if (!mensaje?.origen) {
                    logger.error(`${logPrefix} Mensaje sin origen válido`, mensaje);
                    return;
                }

                logger.info(`${logPrefix} Confirmación recibida del padre - controladores listos`);

                // Aplicar cambio de modo encolado si existía
                try {
                    if (estado && estado.pendingCambioModo && estado.pendingCambioModo.modo) {
                        const modoPendiente = estado.pendingCambioModo.modo;
                        logger.info(`${logPrefix} Aplicando modo pendiente: ${modoPendiente}`);
                        actualizarInterfazModo(modoPendiente);
                        await enviarMensaje({
                            destino: mensaje.origen,
                            tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION,
                            origen: CONFIG_HIJO.IFRAME_ID,
                            datos: { tipo: 'inicializacion', modo: modoPendiente }
                        });
                        if (estado) delete estado.pendingCambioModo;
                    }
                    // Mostrar UI ahora que el padre confirmó
                    try { _uiConfirmado = true; mostrarUI(); } catch (e) { /* ignore */ }
                    try { enviarMensaje({ destino: getPadreId(), tipo: TIPOS_MENSAJE.SISTEMA.CONFIRMACION, origen: CONFIG_HIJO.IFRAME_ID, datos: { tipo: 'UI_VISIBLE', timestamp: Date.now() } }).catch(() => {}); } catch (e) { /* ignore */ }
                } catch (err) {
                    logger.error(`${logPrefix} Error aplicando modo pendiente:`, err);
                }

                // 🔥 NUEVO: Procesar modo inicial si viene en datos
                const { modoInicial } = mensaje.datos || {};
                if (modoInicial) {
                    logger.info(`${logPrefix} Modo inicial recibido: ${modoInicial}`);
                    actualizarInterfazModo(modoInicial);
                    logger.debug(`${logPrefix} Interfaz actualizada según modo inicial`);
                }

                // Preparado para futuras solicitudes de datos adicionales del padre
                logger.debug(`${logPrefix} Componente listo para recibir datos adicionales si es necesario`);

            } catch (error) {
                logger.error(`${logPrefix} Error procesando confirmación del padre:`, error);
            }
        });

        // ============================================================
        // CONTROLADOR: DATOS.CARGAR_AUDIOS
        // Recibe audios centralizados del padre al iniciar aventura
        // ============================================================
        
        /**
         * Controlador: DATOS.CARGAR_AUDIOS
         * Descripción: Recibe y almacena los audios de la aventura seleccionada
         * Origen: padre (codigo-padre.html)
         * Datos recibidos: { aventura, idioma, audios: Array, total, timestamp }
         */
        registrarControladorSeguro(TIPOS_MENSAJE.DATOS.CARGAR_AUDIOS, async (mensaje) => {
            const logPrefix = `[hijo3][CARGAR_AUDIOS]`;
            
            try {
                const { aventura, idioma, audios, total, timestamp } = mensaje.datos || {};
                
                logger.info(`${logPrefix} 📥 Recibiendo audios de ${aventura} (${idioma}): ${total} pistas`);
                
                if (!audios || !Array.isArray(audios)) {
                    throw new Error('Datos de audios inválidos o no son un array');
                }
                
                // Almacenar en estado global para uso en funciones de reproducción
                window.__vv_audioFiles = audios;

                tipo: TIPOS_MENSAJE.SISTEMA.HIJO_PREPARADO,
                origen: CONFIG_HIJO.IFRAME_ID,
                datos: {
                    componenteId: CONFIG_HIJO.COMPONENTE_ID,
                    version: '1.0.0',
                    capacidades: ['audio', 'reproduccion', 'controles'],
                    timestamp: Date.now()
                }
            });
            logger.debug('[hijo3] HIJO_PREPARADO enviado; esperando PADRE_DATOS');
        } catch (e) {
            logger.warn('[hijo3] Error enviando HIJO_PREPARADO:', e);
        }

        logger.info(`[hijo3] Inicialización completada exitosamente`);
    } catch (error) {
        logger.error(`[hijo3] Error durante la inicialización:`, error);
    }

    // Implementar pagehide para limpiar recursos
    window.addEventListener('pagehide', () => {
        logger.info(`[hijo3] Limpiando recursos en pagehide`);
    });
    </script>
</body>
</html>
